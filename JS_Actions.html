<script>
window.actions = {
    toggleDarkMode: () => { const h = document.documentElement; h.classList.toggle('dark'); localStorage.setItem('tt_theme', h.classList.contains('dark') ? 'dark' : 'light'); },
    hardReset:()=>{if(confirm("すべてリセットしますか？")){localStorage.removeItem(STORAGE_KEY_DRAFT);localStorage.removeItem(STORAGE_KEY_SLOTS);location.reload();}},
    
    buildExpectedLessons: () => {
        let lessons = [];
        const teacherMap = {}; (state.teachers||[]).forEach(t => teacherMap[t.id] = t.name);
        const roomObj = {}; (state.rooms||[]).forEach(r => roomObj[r.name] = r);
        const rules = state.advancedRules || {};

        if (state.specialBlocks) {
          state.specialBlocks.forEach(b => {
            let tMap = {}; (b.teachers||[]).forEach(t => tMap[t.id] = parseInt(t.hours)||0);
            let fTimes = (b.fixedTimes || []).slice();
            for (let i=0; i<b.hours; i++) {
              let tIds = []; (b.teachers||[]).forEach(t => { if(tMap[t.id]>0) { tIds.push(t.id); tMap[t.id]--; }});
              let fTime = fTimes.length > 0 ? fTimes.shift() : null;
              lessons.push({ id:`sp_${b.id}_${i}`, subjectId:b.subjectId, subject:safeFind(state.subjects,'id',b.subjectId)?.name||'特殊', targets:b.targets||[], teacherIds:tIds, teacherName:tIds.map(id=>teacherMap[id]||'').join(','), room:b.room||'通常教室', isSpecialist:true, length:1, totalHours:b.hours, type:'special', limitOnePerDay: b.limitOnePerDay === true, isFixed: !!fTime, fixedTime: fTime });
            }
          });
        }
        if (state.classAssignments) {
          Object.keys(state.classAssignments).forEach(cls => {
            const grade = cls.split('-')[0], data = state.classAssignments[cls];
            (state.subjects||[]).forEach(sub => {
              let stdHrs = parseInt(sub.stdHours?.[grade])||0; if(stdHrs === 0) return;
              let specialHrs = 0; if (state.specialBlocks) { state.specialBlocks.forEach(b => { if (b.subjectId === sub.id && (b.targets||[]).includes(cls)) specialHrs += (parseInt(b.hours) || 0); }); }
              let remainingHrs = stdHrs - specialHrs; if (remainingHrs <= 0) return;
              const ovr = data.overrides?.[sub.id] || {}, rName = ovr.room || sub.defaultRoom || '通常教室';
              const isCont = rules.continuousClasses?.some(rc => rc.subject === sub.name && matchRuleTarget(rc, { targets: [cls] }));
              let fTimes = (ovr.fixedTimes || []).slice();
              let lessonCounter = 0; 
              
              const proc = (tId, h) => {
                if(!tId) return; 
                const isSp = (roomObj[rName] || tId !== data.homeroom);
                let localH = h;
                while(localH > 0 && fTimes.length > 0) {
                  let fTime = fTimes.shift();
                  lessons.push({ id:`n_${cls}_${sub.id}_f${lessonCounter}`, subjectId:sub.id, subject:sub.name, targets:[cls], teacherIds:[tId], teacherName:teacherMap[tId]||'', room:rName, isSpecialist:isSp, length:1, totalHours:remainingHrs, type:'normal', limitOnePerDay: false, isFixed: !!fTime, fixedTime: fTime });
                  localH--; lessonCounter++;
                }
                if (isCont && localH >= 2) {
                  for(let i=0; i<Math.floor(localH/2); i++) {
                    lessons.push({ id:`n_${cls}_${sub.id}_p${lessonCounter}`, subjectId:sub.id, subject:sub.name, targets:[cls], teacherIds:[tId], teacherName:teacherMap[tId]||'', room:rName, isSpecialist:isSp, length:2, totalHours:remainingHrs, type:'normal', limitOnePerDay: false, isFixed: false });
                    lessonCounter++;
                  }
                  if(localH%2 !== 0) {
                    lessons.push({ id:`n_${cls}_${sub.id}_s${lessonCounter}`, subjectId:sub.id, subject:sub.name, targets:[cls], teacherIds:[tId], teacherName:teacherMap[tId]||'', room:rName, isSpecialist:isSp, length:1, totalHours:remainingHrs, type:'normal', limitOnePerDay: false, isFixed: false });
                    lessonCounter++;
                  }
                } else {
                  for(let i=0; i<localH; i++) {
                    lessons.push({ id:`n_${cls}_${sub.id}_${lessonCounter}`, subjectId:sub.id, subject:sub.name, targets:[cls], teacherIds:[tId], teacherName:teacherMap[tId]||'', room:rName, isSpecialist:isSp, length:1, totalHours:remainingHrs, type:'normal', limitOnePerDay: false, isFixed: false });
                    lessonCounter++;
                  }
                }
              };
              if (ovr.allocations?.length > 0) ovr.allocations.forEach(a => proc(a.teacherId, parseInt(a.hours)||0)); else proc(ovr.teacherId||data.homeroom, remainingHrs);
            });
          });
        }
        return lessons;
    },

    syncScheduleData: () => {
        if (!state.generatedSchedule && (!state.unassigned || state.unassigned.length === 0)) return false;

        const expected = actions.buildExpectedLessons();
        const expectedMap = new Map();
        // 参照を切るためにディープコピーして格納
        expected.forEach(l => expectedMap.set(l.id, JSON.parse(JSON.stringify(l))));

        // 1. ダッシュボードで手動削除された駒の事前消費
        if(state.manualDeletedConfigs) {
            state.manualDeletedConfigs.forEach(del => {
                let remaining = del.length;
                for (const [eId, exp] of expectedMap.entries()) {
                    if (remaining <= 0) break;
                    if (exp.targets.includes(del.cls) && exp.subjectId === del.subjectId) {
                        const consume = Math.min(remaining, exp.length);
                        remaining -= consume;
                        exp.length -= consume;
                        if (exp.length <= 0) expectedMap.delete(eId);
                    }
                }
            });
        }

        let updatedCount = 0, addedCount = 0, removedCount = 0;
        const syncedInstances = new Map(); 
        const idMigrationMap = new Map();  

        // 長さ（length）の差分を消費するヘルパー関数
        const consumeExtraLength = (l, diff) => {
            let remainingDiff = diff;
            for (const [eId, e] of expectedMap.entries()) {
                if (remainingDiff <= 0) break;
                if (e.targets.slice().sort().join(',') === l.targets.slice().sort().join(',') && e.subjectId === l.subjectId) {
                    const consume = Math.min(remainingDiff, e.length || 1);
                    remainingDiff -= consume;
                    e.length -= consume;
                    if (e.length <= 0) expectedMap.delete(eId);
                }
            }
        };

        const syncLesson = (l) => {
            const exp = expectedMap.get(l.id);
            if (exp) {
                let isUpdated = false;
                if (l.teacherName !== exp.teacherName || l.room !== exp.room || JSON.stringify(l.teacherIds) !== JSON.stringify(exp.teacherIds)) isUpdated = true;
                
                const oldLength = l.length || 1;
                Object.assign(l, exp, { isLocked: l.isLocked || false, isFixed: exp.isFixed || l.isFixed || false, length: oldLength });
                
                syncedInstances.set(l.id, l);
                idMigrationMap.set(l.id, l.id); 
                expectedMap.delete(l.id);
                if (isUpdated) updatedCount++;

                // 手動結合により長さが増えている場合、その分を消費してトレイ増殖を防ぐ
                if (oldLength > exp.length) {
                    consumeExtraLength(l, oldLength - exp.length);
                }
                return l; 
            }
            return null;
        };

        const fallbackMatch = (l) => {
           // 手動追加された未知の駒は強制維持
           if (l.id && String(l.id).startsWith('manual_')) {
               syncedInstances.set(l.id, l);
               idMigrationMap.set(l.id, l.id);
               return l;
           }

           let bestMatchIdx = expected.findIndex(al => expectedMap.has(al.id) && al.subjectId === l.subjectId && al.targets.slice().sort().join(',') === l.targets.slice().sort().join(',') && al.length === l.length);
           if (bestMatchIdx === -1) bestMatchIdx = expected.findIndex(al => expectedMap.has(al.id) && al.subjectId === l.subjectId && al.targets.includes(l.targets[0]) && al.length === l.length);
           if (bestMatchIdx === -1) bestMatchIdx = expected.findIndex(al => expectedMap.has(al.id) && al.subjectId === l.subjectId && al.targets.includes(l.targets[0]));
           
           if (bestMatchIdx > -1) {
               const originalExp = expected[bestMatchIdx];
               const exp = expectedMap.get(originalExp.id);
               if (!exp) return null;
               
               const oldLength = l.length || 1;
               Object.assign(l, exp, { isLocked: l.isLocked || false, isFixed: exp.isFixed || l.isFixed || false, length: oldLength });
               
               idMigrationMap.set(l.id, exp.id); 
               l.id = exp.id; 
               syncedInstances.set(exp.id, l);
               expectedMap.delete(exp.id);
               updatedCount++;

               if (oldLength > exp.length) {
                   consumeExtraLength(l, oldLength - exp.length);
               }
               return l;
           }
           removedCount++;
           return null;
        };

        DAYS.forEach(d => {
            getDynamicPeriods().forEach(p => {
                if (state.generatedSchedule[d] && state.generatedSchedule[d][p]) {
                    let newCell = [];
                    state.generatedSchedule[d][p].forEach(l => {
                        if (idMigrationMap.has(l.id)) {
                            const newId = idMigrationMap.get(l.id);
                            newCell.push(syncedInstances.get(newId));
                        } else {
                            let sl = expectedMap.has(l.id) ? syncLesson(l) : fallbackMatch(l);
                            if (sl) newCell.push(sl);
                        }
                    });
                    state.generatedSchedule[d][p] = newCell;
                }
            });
        });

        if (state.unassigned) {
            let newUnassigned = [];
            state.unassigned.forEach(l => {
                if (idMigrationMap.has(l.id)) {
                    newUnassigned.push(syncedInstances.get(idMigrationMap.get(l.id)));
                } else {
                    let sl = expectedMap.has(l.id) ? syncLesson(l) : fallbackMatch(l);
                    if (sl) newUnassigned.push(sl);
                }
            });
            state.unassigned = Array.from(new Set(newUnassigned));
        } else {
            state.unassigned = [];
        }

        // 残った expected をトレイに追加（ただし、length が0になっていれば除外）
        expectedMap.forEach(exp => {
            if (exp.length > 0) {
                state.unassigned.push(exp);
                addedCount++;
            }
        });

        if (updatedCount > 0 || addedCount > 0 || removedCount > 0) {
            actions.pushScheduleHistory();
        }
        if (typeof validateSchedule === 'function') validateSchedule();
        
        return { updatedCount, addedCount, removedCount };
    },

    deleteLessonFromDashboard: (lId) => {
        const target = findLessonById(lId);
        if (!target) return;
        
        if (target.isLocked || target.isFixed) {
            showToast("📌 固定されている駒は削除できません", "error");
            return;
        }

        if(!state.manualDeletedConfigs) state.manualDeletedConfigs = [];
        state.manualDeletedConfigs.push({ cls: target.targets[0], subjectId: target.subjectId, length: target.length || 1 });

        DAYS.forEach(day => {
            getDynamicPeriods().forEach(period => {
                if (state.generatedSchedule[day]?.[period]) {
                    state.generatedSchedule[day][period] = state.generatedSchedule[day][period].filter(l => l.id !== lId);
                }
            });
        });
        state.unassigned = state.unassigned.filter(l => l.id !== lId);
        
        if (state.movingLesson && state.movingLesson.id === lId) state.movingLesson = null;
        if (state.stitchTargetId === lId) state.stitchTargetId = null;

        actions.pushScheduleHistory();
        validateSchedule();
        render();
        if(typeof window.hideViolationPopup === 'function') window.hideViolationPopup();
        showToast("🗑️ 駒を削除しました", "success");
    },
    
    addLessonToDashboard: (cls, subId, teacherId, room, length) => {
        if (!cls || !subId) {
            showToast("クラスと教科は必須です", "warning");
            return;
        }
        const sub = safeFind(state.subjects, 'id', subId);
        const t = safeFind(state.teachers, 'id', teacherId);
        const tIds = teacherId ? [teacherId] : [];
        const tName = t ? t.name : '';
        const isSp = tIds.length > 0 && tIds[0] !== state.classAssignments?.[cls]?.homeroom;

        const newLesson = {
            id: `manual_${Date.now()}_${Math.random().toString(36).substr(2, 5)}`,
            subjectId: subId,
            subject: sub.name,
            targets: [cls],
            teacherIds: tIds,
            teacherName: tName,
            room: room || '通常教室',
            isSpecialist: isSp,
            length: parseInt(length) || 1,
            totalHours: parseInt(length) || 1,
            type: 'normal',
            limitOnePerDay: false,
            isFixed: false,
            isLocked: false
        };

        state.unassigned.push(newLesson);
        actions.closeModal();
        actions.pushScheduleHistory();
        validateSchedule();
        render();
        showToast(`✨ ${sub.name}の駒をトレイに追加しました`, "success");
    },

    jumpToResult:()=>{
        const syncRes = actions.syncScheduleData();
        state.currentStep=10;
        render();
        if (syncRes) showToast(`設定同期: 更新${syncRes.updatedCount}件, 追加${syncRes.addedCount}件, 削除${syncRes.removedCount}件`, "success");
    },
    
    initScheduleHistory: () => {
        if(state.generatedSchedule && state.unassigned) {
            state.scheduleHistory = [{ schedule: JSON.parse(JSON.stringify(state.generatedSchedule)), unassigned: JSON.parse(JSON.stringify(state.unassigned)) }];
            state.historyIndex = 0;
        }
    },
    pushScheduleHistory: () => {
        if(!state.scheduleHistory) state.scheduleHistory = [];
        const snapshot = { schedule: JSON.parse(JSON.stringify(state.generatedSchedule)), unassigned: JSON.parse(JSON.stringify(state.unassigned)) };
        if (state.historyIndex < state.scheduleHistory.length - 1) state.scheduleHistory = state.scheduleHistory.slice(0, state.historyIndex + 1);
        state.scheduleHistory.push(snapshot);
        if (state.scheduleHistory.length > 30) { state.scheduleHistory.shift(); state.historyIndex--; }
        state.historyIndex = state.scheduleHistory.length - 1;
    },
    undoSchedule: () => {
        if (state.historyIndex > 0) {
            state.historyIndex--;
            const snap = state.scheduleHistory[state.historyIndex];
            state.generatedSchedule = JSON.parse(JSON.stringify(snap.schedule)); state.unassigned = JSON.parse(JSON.stringify(snap.unassigned));
            state.movingLesson = null; state.stitchTargetId = null;
            actions.syncScheduleData(); render(); showToast("操作を戻しました");
        }
    },
    redoSchedule: () => {
        if (state.historyIndex < (state.scheduleHistory?.length||0) - 1) {
            state.historyIndex++;
            const snap = state.scheduleHistory[state.historyIndex];
            state.generatedSchedule = JSON.parse(JSON.stringify(snap.schedule)); state.unassigned = JSON.parse(JSON.stringify(snap.unassigned));
            state.movingLesson = null; state.stitchTargetId = null;
            actions.syncScheduleData(); render(); showToast("やり直しました");
        }
    },

    toggleStitchMode: () => {
        state.stitchMode = !state.stitchMode;
        if(state.stitchMode) {
            state.paintLockMode = false;
            state.splitMode = false;
            state.movingLesson = null;
            state.stitchTargetId = null;
            showToast("🧶 結合する1つ目の駒を選んでください");
        }
        render();
    },
    toggleSplitMode: () => {
        state.splitMode = !state.splitMode;
        if(state.splitMode) {
            state.paintLockMode = false;
            state.stitchMode = false;
            state.movingLesson = null;
            showToast("✂️ 分割したい連続授業を選んでください");
        }
        render();
    },

    autoStitchAll: () => {
        if(!state.generatedSchedule) return;
        let stitchedCount = 0;
        const classes = Object.keys(state.classAssignments || {});
        
        classes.forEach(cls => {
            DAYS.forEach(d => {
                let prevLesson = null;
                getDynamicPeriods().forEach(p => {
                    if(!state.generatedSchedule[d] || !state.generatedSchedule[d][p]) return;
                    let ls = state.generatedSchedule[d][p];
                    let currentIdx = ls.findIndex(l => l.targets?.includes(cls));
                    
                    if (currentIdx > -1) {
                        let current = ls[currentIdx];
                        if (prevLesson && 
                            prevLesson.subjectId === current.subjectId && 
                            prevLesson.id !== current.id && 
                            prevLesson.teacherIds.slice().sort().join(',') === current.teacherIds.slice().sort().join(',')) {
                            
                            const newLength = (prevLesson.length || 1) + (current.length || 1);
                            const oldId = current.id;
                            
                            DAYS.forEach(dd => {
                                getDynamicPeriods().forEach(pp => {
                                    if(state.generatedSchedule[dd]?.[pp]) {
                                        let idx = state.generatedSchedule[dd][pp].findIndex(x => x.id === oldId);
                                        if(idx > -1) state.generatedSchedule[dd][pp][idx] = prevLesson;
                                    }
                                });
                            });
                            
                            prevLesson.length = newLength;
                            stitchedCount++;
                        } else {
                            prevLesson = current;
                        }
                    } else {
                        prevLesson = null;
                    }
                });
            });
        });
        
        if (stitchedCount > 0) {
            actions.pushScheduleHistory();
            validateSchedule();
            render();
            showToast(`✨ ${stitchedCount} 箇所の連続授業を自動修復しました！`, "success");
        } else {
            showToast("修復が必要な連続授業は見つかりませんでした", "info");
        }
    },

    togglePaintLockMode: () => {
        state.paintLockMode = !state.paintLockMode;
        if(state.paintLockMode) {
            state.stitchMode = false;
            state.splitMode = false;
            state.movingLesson = null;
        }
        render();
        showToast(state.paintLockMode ? "🖌️なぞりロックをONにしました" : "なぞりロックをOFFにしました");
    },
    setLock: (id, lockState) => {
        let l = findLessonById(id);
        if(l && l.isLocked !== lockState) {
            l.isLocked = lockState;
            document.querySelectorAll(`.lesson-cell[data-lesson-id="${id}"]`).forEach(el => {
                if(lockState) {
                    el.classList.add('opacity-80', 'saturate-50', 'brightness-90');
                    if(!el.querySelector('.pin-icon')) {
                        const pin = document.createElement('div');
                        pin.className = "pin-icon absolute -top-1 -right-1 bg-slate-700 text-white text-[8px] w-3 h-3 flex items-center justify-center rounded-full shadow-md z-10 border border-white";
                        pin.innerText = "📌";
                        if(el.closest('#step10-birdeye-scroll')) {
                             pin.className = "pin-icon absolute -top-0.5 -right-0.5 bg-slate-700 text-white text-[6px] w-2.5 h-2.5 flex items-center justify-center rounded-full shadow-md z-10";
                        }
                        el.appendChild(pin);
                    }
                } else {
                    el.classList.remove('opacity-80', 'saturate-50', 'brightness-90');
                    const pin = el.querySelector('.pin-icon');
                    if(pin) pin.remove();
                }
            });
            try{localStorage.setItem(STORAGE_KEY_DRAFT,JSON.stringify(state));}catch(e){}
        }
    },
    toggleLock: (id) => {
        let l = findLessonById(id);
        if(l) {
            l.isLocked = !l.isLocked;
            render();
            showToast(l.isLocked ? "📌固定しました" : "固定を解除しました");
        }
    },
    lockAll: (doLock) => {
        if(!state.generatedSchedule) return;
        DAYS.forEach(d => {
            getDynamicPeriods().forEach(p => {
                (state.generatedSchedule[d]?.[p]||[]).forEach(l => l.isLocked = doLock);
            });
        });
        (state.unassigned||[]).forEach(l => l.isLocked = doLock);
        render();
        showToast(doLock ? "すべての駒を固定しました" : "すべての固定を解除しました");
    },
    lockHomeroom: () => {
        if(!state.generatedSchedule || !state.classAssignments) return;
        let count = 0;
        DAYS.forEach(d => {
            getDynamicPeriods().forEach(p => {
                (state.generatedSchedule[d]?.[p]||[]).forEach(l => {
                    const cls = l.targets[0];
                    const homeroomId = state.classAssignments[cls]?.homeroom;
                    if(homeroomId && l.teacherIds.includes(homeroomId)) {
                        l.isLocked = true;
                        count++;
                    }
                });
            });
        });
        render();
        showToast(`担任授業を固定しました(${count}コマ)`);
    },

    handleCellClick: (d, p, cls, lId = null) => {
        if(state.paintLockMode) return;
        window.hideViolationPopup();
        if (!state.generatedSchedule) return;

        if (state.splitMode) {
            if (!lId) return;
            const target = findLessonById(lId);
            if (!target) return;
            if ((target.length || 1) <= 1) {
                showToast("分割できるのは連続授業だけです", "warning");
                return;
            }
            if (target.isLocked || target.isFixed) {
                showToast("📌 固定されている駒は分割できません", "error");
                return;
            }

            let foundParts = [];
            DAYS.forEach(day => {
                getDynamicPeriods().forEach(period => {
                    if (state.generatedSchedule[day]?.[period]) {
                        const idx = state.generatedSchedule[day][period].findIndex(l => l.id === lId);
                        if (idx > -1) foundParts.push({ day, period, lesson: state.generatedSchedule[day][period][idx] });
                    }
                });
            });

            foundParts.forEach((part, index) => {
                let newLesson = JSON.parse(JSON.stringify(part.lesson));
                newLesson.id = newLesson.id + "_split_" + Date.now() + "_" + index;
                newLesson.length = 1;
                newLesson.totalHours = 1;
                state.generatedSchedule[part.day][part.period] = state.generatedSchedule[part.day][part.period].filter(l => l.id !== lId);
                state.generatedSchedule[part.day][part.period].push(newLesson);
            });

            state.unassigned.filter(l => l.id === lId).forEach((trayL) => {
               state.unassigned = state.unassigned.filter(l => l.id !== lId);
               for(let i=0; i<(trayL.length||1); i++) {
                   let newLesson = JSON.parse(JSON.stringify(trayL));
                   newLesson.id = newLesson.id + "_split_tray_" + Date.now() + "_" + i;
                   newLesson.length = 1;
                   newLesson.totalHours = 1;
                   state.unassigned.push(newLesson);
               }
            });

            state.splitMode = false;
            actions.pushScheduleHistory();
            validateSchedule();
            render();
            showToast("✂️ 授業を分割しました", "success");
            return;
        }

        if (state.stitchMode) {
            if (!lId) return;
            const target = findLessonById(lId);
            if (!target) return;

            if (!state.stitchTargetId) {
                state.stitchTargetId = lId;
                render();
                return;
            } else {
                if (state.stitchTargetId === lId) {
                    state.stitchTargetId = null;
                    render();
                    return;
                }
                const firstTarget = findLessonById(state.stitchTargetId);
                if (!firstTarget) {
                    state.stitchTargetId = null;
                    render();
                    return;
                }

                if (firstTarget.subjectId !== target.subjectId || firstTarget.targets.slice().sort().join(',') !== target.targets.slice().sort().join(',')) {
                    showToast("教科やクラスが異なるため結合できません", "error");
                    state.stitchTargetId = null;
                    render();
                    return;
                }
                if (firstTarget.isLocked || target.isLocked || firstTarget.isFixed || target.isFixed) {
                    showToast("📌 固定されている駒は結合できません", "error");
                    state.stitchTargetId = null;
                    render();
                    return;
                }

                const newLength = (firstTarget.length || 1) + (target.length || 1);
                const baseId = firstTarget.id;

                DAYS.forEach(day => {
                    getDynamicPeriods().forEach(period => {
                        if (state.generatedSchedule[day]?.[period]) {
                            const index = state.generatedSchedule[day][period].findIndex(x => x.id === lId);
                            if(index > -1) state.generatedSchedule[day][period][index] = firstTarget; 
                        }
                    });
                });

                let newUnassigned = [];
                state.unassigned.forEach(l => { if (l.id !== lId) newUnassigned.push(l); });
                state.unassigned = newUnassigned;

                firstTarget.length = newLength;
                DAYS.forEach(day => {
                    getDynamicPeriods().forEach(period => {
                        if (state.generatedSchedule[day]?.[period]) {
                            state.generatedSchedule[day][period].forEach(l => { if (l.id === baseId) l.length = newLength; });
                        }
                    });
                });

                state.stitchMode = false;
                state.stitchTargetId = null;
                actions.pushScheduleHistory();
                validateSchedule();
                render();
                showToast("🧶 授業を結合しました！", "success");
                return;
            }
        }
        
        if (!state.movingLesson && lId) {
            const l = findLessonById(lId);
            if (l && l.isLocked) {
                showToast("📌 固定されているため移動できません", "error");
                return;
            }
        }

        if (state.movingLesson) {
            const fromL = state.movingLesson;
            if (fromL.id === lId) { state.movingLesson = null; render(); return; }
            
            let schedule = state.generatedSchedule;
            const fromD = fromL.day;
            const fromP = fromL.period;

            let movingGroup = [];
            if (fromD && fromP) {
                movingGroup = schedule[fromD][fromP].filter(l => l.id === fromL.id);
                schedule[fromD][fromP] = schedule[fromD][fromP].filter(l => l.id !== fromL.id);
            } else {
                const uIndex = state.unassigned.findIndex(x => x.id === fromL.id);
                if(uIndex > -1) {
                    movingGroup = [state.unassigned[uIndex]];
                    state.unassigned.splice(uIndex, 1);
                }
            }

            if (movingGroup.length === 0) { state.movingLesson = null; render(); return; }

            if (d === 'tray') {
                state.unassigned.push(...movingGroup);
                showToast("トレイに戻しました", "success");
            } else if (d && p) {
                if (!schedule[d][p]) schedule[d][p] = [];
                const targetClasses = movingGroup.flatMap(m => m.targets);
                const bumpedGroup = schedule[d][p].filter(l => l.targets.some(c => targetClasses.includes(c)));
                schedule[d][p] = schedule[d][p].filter(l => !l.targets.some(c => targetClasses.includes(c)));
                schedule[d][p].push(...movingGroup);

                if (fromD && fromP) {
                    if (!schedule[fromD][fromP]) schedule[fromD][fromP] = [];
                    schedule[fromD][fromP].push(...bumpedGroup);
                } else {
                    state.unassigned.push(...bumpedGroup);
                }
                showToast(bumpedGroup.length > 0 ? "合同授業を入れ替えました" : "駒を移動しました", "success");
            }

            state.movingLesson = null;
            actions.pushScheduleHistory(); 
            validateSchedule();
            render();
        } else {
            if (!lId) return;
            if(state.violations && state.violations[lId]) { setTimeout(() => window.showViolationPopup(lId), 10); }
            if(d === 'tray') {
                const target = safeFind(state.unassigned, 'id', lId);
                state.movingLesson = { id: lId, day: null, period: null, targets: target?.targets||[], teacherIds: target?.teacherIds||[] };
            } else {
                let obj = (state.generatedSchedule[d][p]||[]).find(x=>x.id===lId);
                if(obj) state.movingLesson = { id: lId, day: d, period: p, cls: cls, targets: obj.targets, teacherIds: obj.teacherIds };
            }
            render();
        }
    },

            if (window.showSaveFilePicker) {
                try {
                    const fileHandle = await window.showSaveFilePicker({
                        suggestedName: defaultFileName,
                        types: [{ description: 'JSON Files', accept: {'application/json': ['.json']} }]
                    });
                    const writable = await fileHandle.createWritable();
                    await writable.write(dataStr);
                    await writable.close();
                    showToast("端末へ保存しました", "success");
                    return; 
                } catch (err) {
                    if (err.name === 'AbortError') return; 
                }
            }
            
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", url);
            dlAnchorElem.setAttribute("download", defaultFileName);
            document.body.appendChild(dlAnchorElem);
            dlAnchorElem.click();
            dlAnchorElem.remove();
            URL.revokeObjectURL(url);
            showToast("端末へ保存しました", "success");
        } catch(e) {
            showToast("保存に失敗しました", "error");
        }
    },

    preparePayload: () => { 
        const pS = JSON.parse(JSON.stringify(state)); 
        if (pS.advancedRules) { 
            Object.keys(pS.advancedRules).forEach(k => { 
                if (k === 'priorities') return; 
                const oR = pS.advancedRules[k]; 
                if (!Array.isArray(oR)) return; 
                const exR = []; 
                oR.forEach(r => { 
                    if (k === 'exclusivePairs') { 
                        const s1s = r.subjects1 || [r.subject1]; const s2s = r.subjects2 || [r.subject2]; 
                        s1s.forEach(s1 => s2s.forEach(s2 => { if(s1 !== s2) exR.push({subject1: s1, subject2: s2}); })); 
                    } else { 
                        const tgs = (r.targets?.length) ? r.targets : [undefined]; const excs = (r.excludes?.length) ? r.excludes : [undefined]; const subs = (r.subjects?.length) ? r.subjects : [undefined]; const dys = (r.days?.length) ? r.days : [undefined]; const pds = (r.periods?.length) ? r.periods : [undefined]; 
                        tgs.forEach(tg => excs.forEach(ex => subs.forEach(su => dys.forEach(dy => pds.forEach(pd => { let nr = {}; if (tg) nr.grade = tg; if (ex) nr.exclude = ex; if (su) nr.subject = su; if (dy) nr.day = dy; if (pd) nr.period = parseInt(pd.toString().replace(new RegExp('[^0-9]', 'g'), ''), 10); exR.push(nr); }))))); 
                    } 
                }); 
                pS.advancedRules[k] = exR; 
            }); 
            if (state.marathon.relaxRules && pS.advancedRules.priorities) {
                Object.keys(pS.advancedRules.priorities).forEach(k => { pS.advancedRules.priorities[k] = 'low'; });
            }
        } 
        return pS; 
    },

    startGeneration: async function(){ state.marathon.active = true; state.marathon.currentGen = 1; globalStartTime = Date.now(); state.best = {unassignedCount:9999, schedule:null, unassigned:null, scoreCard:null, reportDetails:null}; actions.runMarathonCycle(); },
    continueMarathon: async function(){ 
        const addGen = 10; 
        state.marathon.active = true; 
        if(state.marathon.maxGen !== Infinity) state.marathon.maxGen = parseInt(state.marathon.maxGen, 10) + addGen; 
        actions.runMarathonCycle();

    continueGeneration: function(){ state.marathon.active = false; actions.runSingleCycle("今の盤面を元に再調整中...", false); },
    cancelGeneration: () => { hideLoading(); state.marathon.active = false; if (state.best.schedule) { state.generatedSchedule = state.best.schedule; state.unassigned = state.best.unassigned; state.scoreCard = state.best.scoreCard; state.reportDetails = state.best.reportDetails; state.currentStep = 10; actions.initScheduleHistory(); showToast(`ベスト盤面を表示します。`, "info"); } else { state.currentStep = 9; } render(); },
    
    runMarathonCycle: async function(){ 
        if (!state.marathon.active) return; 
        const m = state.marathon; startGenTimer(); 
        showLoading("AI思考中...", `${Number(m.currentGen)}回目`, true); 
        try { 
            const res = await fetch(GAS_URL, { method:'POST', mode:'cors', body:JSON.stringify({ action:'generate', state: actions.preparePayload(), currentSchedule: null, unassigned: null }) }); 
            const data = await res.json(); 
            if (!state.marathon.active) return; 
            if(data.schedule) state.generatedSchedule = data.schedule; 
            if(data.unassigned) state.unassigned = data.unassigned; 
            if(data.scoreCard) state.scoreCard = data.scoreCard; 
            if(data.reportDetails) state.reportDetails = data.reportDetails;
            
            if(data.fatalError) {
                hideLoading();
                state.marathon.active = false;
                render();
                showToast("致命的な矛盾を検知しました", "error");
                setTimeout(actions.openFatalErrorModal, 500);
                return;
            }

            if(data.success){ 
                const bc = document.getElementById('loading-best-container'), br = document.getElementById('loading-best-record'), lr = document.getElementById('loading-latest-record'); 
                if(bc && lr){ bc.classList.remove('hidden'); bc.classList.add('flex'); lr.innerText = data.unassigned.length; } 
                if(data.unassigned.length < state.best.unassignedCount) { 
                    state.best = { unassignedCount: data.unassigned.length, schedule: data.schedule, unassigned: data.unassigned, scoreCard: data.scoreCard, reportDetails: data.reportDetails }; 
                    if (br) br.innerText = state.best.unassignedCount; 
                } 
                const goalReached = state.best.unassignedCount <= m.target, genLimitReached = Number(m.currentGen) >= parseInt(m.maxGen, 10); 
                
                if (goalReached || genLimitReached) { 
                    state.generatedSchedule = state.best.schedule; state.unassigned = state.best.unassigned; state.scoreCard = state.best.scoreCard; state.reportDetails = state.best.reportDetails; 
                    state.currentStep=10; state.marathon.active = false; actions.initScheduleHistory(); render(); hideLoading(); 
                    
                    if (state.best.unassignedCount === 0) {
                        showToast(`🎉 完璧な時間割が完成しました！`, "success"); 
                        setTimeout(triggerCelebration, 300); 
                    } else if (goalReached) {
                        showToast(`目標達成！未配置${state.best.unassignedCount}`, "success"); 
                    } else {
                        showToast(`最大チャレンジ回数に到達。`, "success"); 
                    }
                } else { 
                    m.currentGen = Number(m.currentGen) + 1; 
                    actions.runMarathonCycle(); 
                } 
            } else { showToast("エラー発生","error"); hideLoading(); state.marathon.active = false; } 
        } catch(e) { showToast("通信エラー","error"); hideLoading(); state.marathon.active = false; } 
    },
    runSingleCycle: async function(status, isNew){ 
        startGenTimer(); showLoading("計算中", status, true); 
        try { 
            const res = await fetch(GAS_URL, { method:'POST', mode:'cors', body:JSON.stringify({ action:'generate', state: actions.preparePayload(), currentSchedule: isNew?null:state.generatedSchedule, unassigned: state.unassigned }) }); 
            const data = await res.json(); 
            if(data.schedule) state.generatedSchedule=data.schedule; 
            if(data.unassigned) state.unassigned=data.unassigned; 
            if(data.scoreCard) state.scoreCard=data.scoreCard; 
            if(data.reportDetails) state.reportDetails=data.reportDetails; 
            
            if(data.fatalError) {
                hideLoading();
                render();
                showToast("致命的な矛盾を検知しました", "error");
                setTimeout(actions.openFatalErrorModal, 500);
                return;
            }

            if(data.success) { state.currentStep=10; actions.initScheduleHistory(); render(); hideLoading(); } 
            else { showToast("エラー","error"); hideLoading(); } 
        } catch(e) { showToast("通信エラー","error"); hideLoading(); } 
    },

            if (data.success) {
                state.generatedSchedule = data.schedule; state.unassigned = []; state.currentStep = 10; actions.initScheduleHistory();
                
                actions.syncScheduleData();

                if (data.errors && data.errors.length > 0) {
                    const errBox = document.getElementById('import-ss-errors');
                    errBox.innerHTML = '<b>一部の読み込みでエラーが発生しました：</b><br>' + data.errors.join('<br>');
                    errBox.classList.remove('hidden'); showToast(`一部エラーあり: ${data.importCount}件読み込みました`, "warning");
                } else { actions.closeImportSSModal(); showToast(data.message, "success"); }
                render();
            } else showToast(data.message, "error");
        } catch (e) { btn.innerHTML = '読み込む'; btn.disabled = false; showToast("通信エラーが発生しました", "error"); }
    }
};

function setupPaintListeners() {
  document.addEventListener('mousedown', () => { isPainting = true; });
  document.addEventListener('mouseup', () => { 
    isPainting = false; 
    paintTargetLock = true; 
  });
}

// 違反ポップアップ内で「削除ボタン」を表示できるように修正
window.showViolationPopup = function(lessonId) {
    const l = findLessonById(lessonId);
    if(!l) return;
    const msgs = (state.violations && state.violations[lessonId]) ? state.violations[lessonId] : ["この駒のプロパティを確認します"];
    const el = document.getElementById('violation-popup');
    
    // 削除ボタンの追加
    const deleteBtn = `<button onclick="actions.deleteLessonFromDashboard('${lessonId}')" class="mt-2 w-full py-1.5 bg-rose-600 hover:bg-rose-700 text-white rounded text-xs font-black transition-colors shadow-sm border border-rose-700 flex items-center justify-center gap-1">🗑️ この駒を完全に削除する</button>`;

    el.innerHTML = `<div class="font-black text-rose-500 text-xs mb-1 flex items-center gap-1">⚠️ 駒のステータス</div><ul class="text-[10px] font-bold list-disc pl-4 space-y-1 leading-snug">${msgs.map(m=>`<li>${m}</li>`).join('')}</ul>${deleteBtn}`;
    el.classList.remove('opacity-0', 'pointer-events-none', 'scale-95');
    state.activeViolationNode = lessonId;
};
window.hideViolationPopup = function() {
    const el = document.getElementById('violation-popup');
    if(el) el.classList.add('opacity-0', 'pointer-events-none', 'scale-95');
    state.activeViolationNode = null;
};
document.addEventListener('click', (e) => {
    if(state.activeViolationNode && !e.target.closest('#violation-popup')) {
        setTimeout(window.hideViolationPopup, 50);
    }
});

document.addEventListener('DOMContentLoaded', () => {
    if (typeof load === 'function') load();
});
</script>
