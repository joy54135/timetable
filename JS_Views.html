<script>
function render(){
    saveUIState(); 
    try{localStorage.setItem(STORAGE_KEY_DRAFT,JSON.stringify(state));}catch(e){}
    if(state.currentStep===10) validateSchedule();
    
    const hU = document.getElementById('step-header-utils');
    if(hU) hU.innerHTML=`
        <!-- ダークモード切り替え -->
        <button onclick="actions.toggleDarkMode()" class="p-1.5 rounded-lg text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"><svg class="w-4 h-4 hidden dark:block text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg><svg class="w-4 h-4 block dark:hidden text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg></button>
        
        <div class="flex gap-2">
            <button onclick="actions.openSlotModal('save')" class="px-3 py-1.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg shadow-sm text-[10px] font-black transition-colors flex items-center gap-1 border border-blue-700">💾 セーブ</button>
            <button onclick="actions.openSlotModal('load')" class="px-3 py-1.5 bg-blue-50 hover:bg-blue-100 text-blue-700 border border-blue-200 rounded-lg shadow-sm text-[10px] font-black transition-colors flex items-center gap-1">📂 ロード</button>
            <button onclick="actions.startExportData()" class="px-3 py-1.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg shadow-sm text-[10px] font-black transition-colors flex items-center gap-1 border border-emerald-700">💻 端末保存</button>
            <button onclick="actions.importData()" class="px-3 py-1.5 bg-emerald-50 hover:bg-emerald-100 text-emerald-700 border border-emerald-200 rounded-lg shadow-sm text-[10px] font-black transition-colors flex items-center gap-1">📥 読込</button>
            <button onclick="actions.openImportSSModal()" class="px-3 py-1.5 bg-teal-600 hover:bg-teal-700 text-white rounded-lg shadow-sm text-[10px] font-black transition-colors flex items-center gap-1 border border-teal-700">📊 スプシ同期</button>
        </div>
    `;

    document.getElementById('step-title').innerText=stepTitles[state.currentStep-1]||'';
    document.getElementById('progress-dots').innerHTML=Array.from({length:10},(_,i)=>`<div class="step-dot ${i+1<=state.currentStep?'active !bg-blue-600':''}"></div>`).join('');
    
    const nb=document.getElementById('btn-next'), nt=document.getElementById('btn-next-text'), pb=document.getElementById('btn-prev');
    if(pb){pb.style.visibility=(state.currentStep===1?'hidden':'visible'); pb.onclick=()=>{if(state.currentStep>1){state.currentStep--;render();}};}
    if(nb&&nt){
        nb.onclick=null;
        if(state.currentStep===9){
            nb.style.display='none';
        }else if(state.currentStep===10){
            nb.style.display='flex';
            nt.innerText="ＰＤＦ・スプシに出力"; 
            nb.onclick=()=>{ actions.openExportModal(); };
        }else{
            nb.style.display='flex';
            nt.innerText="次へ進む";
            nb.onclick=()=>{state.currentStep++;render();};
        }
    }
    
    const content=document.getElementById('step-content');
    if(content){try{content.innerHTML=window[`viewStep${state.currentStep}`]();}catch(e){console.error(e);}}
    
    restoreUIState(); 
}

function buildGrid(ngMap,gMap,actStr,scrollId='grid-scroll', unstableMap=null){
    const PERIODS=getDynamicPeriods();
    return `<div id="${scrollId}" class="overflow-x-auto w-full custom-scrollbar min-h-0"><table class="border-separate border-spacing-1 table-fixed w-max mx-auto"><thead><tr><th class="w-8"></th>${DAYS.map(d=>`<th class="text-center text-xs font-black text-slate-400 dark:text-slate-500 w-9">${d}</th>`).join('')}</tr></thead><tbody>${PERIODS.map(p=>`<tr><td class="text-right pr-2 text-[10px] font-bold text-slate-400 dark:text-slate-500">${p}限</td>${DAYS.map(d=>{
        const k=`${d}-${p}`;
        const gl=gMap?.[k], ng=ngMap?.[k], un=unstableMap?.[k];
        const cls=`w-8 h-8 border rounded-lg flex items-center justify-center cursor-pointer font-bold text-xs transition-colors ${gl?'bg-slate-700 dark:bg-slate-400 dark:text-slate-900 text-white shadow-md border-slate-700':(ng?'bg-rose-50 dark:bg-rose-900/40 border-rose-200 dark:border-rose-800/60 text-rose-500':(un?'bg-slate-100 dark:bg-slate-800 border-dashed border-2 border-slate-400 dark:border-slate-500 text-slate-400':'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 text-slate-200 dark:text-slate-600 hover:bg-blue-50 dark:hover:bg-slate-700'))}`;
        const icon = gl?'■':(ng?'✕':(un?'☁️':'〇'));
        return `<td class="p-0"><div onclick="${actStr.replace('__KEY__',k)}" class="${cls}">${icon}</div></td>`;
    }).join('')}</tr>`).join('')}</tbody></table></div>`;
}

window.viewStep1=()=>`<div class="flex flex-col gap-4 h-full"><div class="bg-white dark:bg-slate-800/50 rounded-2xl p-4 border border-slate-200 dark:border-slate-800 shadow-sm"><h3 class="font-black text-sm mb-3 dark:text-slate-200">学級数</h3><div class="grid grid-cols-3 md:grid-cols-6 gap-3">${GRADES.map(g=>`<div class="bg-slate-50 dark:bg-slate-900 p-2 rounded-xl border dark:border-slate-800 flex flex-col items-center"><span class="text-slate-500 text-xs font-bold">${g}年</span><div class="flex items-center gap-1 mt-1"><button onclick="actions.updateGrade(${g},-1)" class="w-6 h-6 rounded bg-white dark:bg-slate-800 border shadow-sm font-black text-slate-500">-</button><input id="gr-${g}" type="number" value="${state.grades?.[g]||1}" onblur="actions.setGrade(${g},this.value)" class="w-8 text-lg font-black text-blue-600 text-center bg-transparent outline-none appearance-none"><button onclick="actions.updateGrade(${g},1)" class="w-6 h-6 rounded bg-white dark:bg-slate-800 border shadow-sm font-black text-slate-500">+</button></div></div>`).join('')}</div></div><div class="bg-white dark:bg-slate-800/50 rounded-2xl p-4 border border-slate-200 dark:border-slate-800 shadow-sm"><h3 class="font-black text-sm mb-3 dark:text-slate-200">日ごとのコマ数</h3><div id="step1-pd-scroll" class="overflow-x-auto custom-scrollbar"><table class="w-full text-xs text-center border-collapse min-w-[500px]"><thead><tr><th class="p-2 border-b dark:border-slate-700">学年</th>${DAYS.map(d=>`<th class="p-2 border-b dark:border-slate-700 font-black">${d}曜</th>`).join('')}</tr></thead><tbody>${GRADES.map(g=>`<tr><td class="p-2 font-bold border-b dark:border-slate-700 dark:text-slate-300">${g}年</td>${DAYS.map(d=>`<td class="p-2 border-b dark:border-slate-700"><div class="flex items-center justify-center gap-1"><button onclick="actions.updatePeriod(${g},'${d}',-1)" class="w-5 h-5 bg-slate-100 dark:bg-slate-700 border rounded font-black text-slate-500">-</button><input id="pd-${g}-${d}" type="number" value="${state.periods?.[g]?.[d]||0}" onblur="actions.setPeriod(${g},'${d}',this.value)" class="w-6 text-center font-black text-blue-600 bg-transparent outline-none appearance-none"><button onclick="actions.updatePeriod(${g},'${d}',1)" class="w-5 h-5 bg-slate-100 dark:bg-slate-700 border rounded font-black text-slate-500">+</button></div></td>`).join('')}</tr>`).join('')}</tbody></table></div></div></div>`;
window.viewStep2=()=>`<div class="flex flex-col items-center justify-center h-full text-center space-y-4"><div class="bg-white dark:bg-slate-800/50 border dark:border-slate-800 rounded-[32px] p-6 shadow-sm"><h2 class="text-xl font-black mb-2 dark:text-slate-100">行事・全校不可・不安定枠の設定</h2><p class="text-[10px] font-bold text-slate-500 mb-4 uppercase">タップで切替：✕(不可枠) → ☁️(不安定/会議枠) → 〇(空き)</p>${buildGrid(null, state.globalBlocks, "actions.toggleBlock('__KEY__')", 'step2-grid-scroll', state.unstableBlocks)}</div></div>`;
window.viewStep3=()=>{const rmOpts=`<option value="通常教室">通常教室</option>`+(state.rooms||[]).map(r=>`<option value="${r.name}">${r.name}</option>`).join(''); return `<div class="flex flex-col md:flex-row gap-4 h-full"><div class="w-full md:w-1/4 flex flex-col bg-slate-100 dark:bg-slate-800/50 rounded-2xl border dark:border-slate-800 p-3 min-h-[200px]"><div class="flex justify-between items-center mb-3"><h3 class="font-black text-xs dark:text-slate-300">特別教室</h3><button onclick="actions.addRoom()" class="text-[10px] bg-blue-600 text-white px-2 py-1 rounded-lg font-bold">+ 追加</button></div><div id="step3-rooms-scroll" class="flex-1 overflow-y-auto custom-scrollbar space-y-1.5 pr-1">${(state.rooms||[]).map((r,i)=>`<div class="flex items-center gap-1 bg-white dark:bg-slate-900 p-1.5 rounded-lg border dark:border-slate-800 shadow-sm"><div class="flex flex-col gap-0.5 mr-1"><button onclick="actions.moveItem('rooms',${i},-1)" class="w-4 h-4 text-[8px] text-slate-400 cursor-pointer hover:bg-slate-100 rounded flex items-center justify-center">▲</button><button onclick="actions.moveItem('rooms',${i},1)" class="w-4 h-4 text-[8px] text-slate-400 cursor-pointer hover:bg-slate-100 rounded flex items-center justify-center">▼</button></div><input id="rm-nm-${r.id}" type="text" value="${r.name}" onblur="actions.updateRoomName('${r.id}',this.value)" class="flex-1 min-w-0 text-xs font-bold outline-none bg-transparent px-1 dark:text-slate-200"><input type="number" value="${r.capacity||1}" onblur="actions.updateRoomCap('${r.id}',this.value)" title="定員(クラス数)" class="w-10 text-center font-bold text-xs bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded"><button onclick="actions.removeRoom('${r.id}')" class="text-slate-300 hover:text-rose-500 px-2 font-bold">✕</button></div>`).join('')}</div></div><div class="flex-1 flex flex-col bg-white dark:bg-slate-900 rounded-2xl border dark:border-slate-800 p-3 overflow-hidden shadow-sm"><div class="flex justify-between items-center mb-3"><h3 class="font-black text-xs dark:text-slate-300">科目時数(A週/B週)と色設定</h3><div class="flex gap-2"><button onclick="actions.migrateSubjectHours(); render();" class="text-[10px] bg-amber-50 text-amber-700 border border-amber-200 px-2 py-1 rounded font-bold shadow-sm" title="既存の「1.5」などをA週2、B週1に自動振り分けします">🔄 時数移行</button><button onclick="actions.undoSubjects()" class="p-1 rounded bg-slate-100 dark:bg-slate-800">↩️</button><button onclick="actions.addSubject('教科を追加')" class="text-[10px] bg-blue-600 text-white px-3 py-1 rounded-lg font-bold">+ 教科を追加</button></div></div><div id="step3-subs-scroll" class="flex-1 overflow-auto custom-scrollbar border dark:border-slate-800 rounded-xl"><table class="w-full text-xs text-center border-collapse min-w-[800px]"><thead class="sticky top-0 bg-slate-50 dark:bg-slate-800 z-10 border-b dark:border-slate-700"><tr><th class="w-8"></th><th class="p-2 text-left pl-3 w-24">科目名</th><th class="w-8">色</th><th class="p-2 w-24">基本教室</th><th class="w-8 border-l border-r dark:border-slate-700 text-[9px] text-slate-400 font-bold">週</th>${GRADES.map(g=>`<th class="p-2 w-[70px]">${g}年</th>`).join('')}<th class="w-8"></th></tr></thead><tbody>${(state.subjects||[]).map((s,i)=>`<tr class="border-b dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800/40"><td><div class="flex flex-col items-center"><button onclick="actions.moveItem('subjects',${i},-1)" class="w-5 h-4 text-[10px] text-slate-400 cursor-pointer hover:bg-slate-200 rounded">▲</button><button onclick="actions.moveItem('subjects',${i},1)" class="w-5 h-4 text-[10px] text-slate-400 cursor-pointer hover:bg-slate-200 rounded">▼</button></div></td><td class="p-1"><input id="sb-nm-${s.id}" type="text" value="${s.name}" onblur="actions.updateSubject('${s.id}','name',this.value)" class="m3-input !p-1 !text-sm bg-transparent border-transparent dark:text-white"></td><td class="p-1"><input id="sb-cl-${s.id}" type="color" value="${s.color||getDefaultHexColor(s.name)}" onblur="actions.updateSubject('${s.id}','color',this.value)" class="w-6 h-6 p-0 border-0 rounded cursor-pointer bg-transparent"></td><td><select id="sb-rm-${s.id}" onchange="actions.updateSubject('${s.id}','defaultRoom',this.value)" class="m3-input !p-1 !text-[10px] dark:bg-slate-800 dark:border-slate-700">${rmOpts.replace(`value="${s.defaultRoom||'通常教室'}"`,`value="${s.defaultRoom||'通常教室'}" selected`)}</select></td><td class="border-l border-r dark:border-slate-700 bg-slate-50/50 dark:bg-slate-800/30 p-0"><div class="flex flex-col h-full text-[9px] font-black"><div class="flex-1 flex items-center justify-center text-blue-600 dark:text-blue-400 border-b dark:border-slate-700 py-1">A</div><div class="flex-1 flex items-center justify-center text-rose-600 dark:text-rose-400 py-1">B</div></div></td>${GRADES.map(g=>{
    const valA = parseFloat(s.stdHoursA?.[g]||(s.stdHours?.[g]||0));
    const valB = parseFloat(s.stdHoursB?.[g]||(s.stdHours?.[g]||0));
    const isRot = Math.abs(valA - valB) > 0.01;
    return `<td class="p-1"><div class="flex flex-col items-center bg-white dark:bg-slate-800 rounded-lg border dark:border-slate-700 relative overflow-hidden shadow-sm">
        ${isRot ? `<div class="absolute right-0 top-1/2 -translate-y-1/2 text-[8px] opacity-20 pointer-events-none">🔄</div>` : ''}
        <input type="number" step="0.1" value="${valA}" onblur="actions.setSubjectHourA('${s.id}',${g},this.value)" class="w-full text-center font-black text-blue-700 dark:text-blue-300 bg-blue-50/30 dark:bg-blue-900/10 outline-none border-b dark:border-slate-700 py-1 text-sm appearance-none" title="A時間割のコマ数">
        <input type="number" step="0.1" value="${valB}" onblur="actions.setSubjectHourB('${s.id}',${g},this.value)" class="w-full text-center font-black text-rose-700 dark:text-rose-300 bg-rose-50/30 dark:bg-rose-900/10 outline-none py-1 text-sm appearance-none" title="B時間割のコマ数">
        <select onchange="actions.updateGradeRoom('${s.id}',${g},this.value)" class="text-[8px] w-full border-t outline-none text-slate-400 bg-slate-100 dark:bg-slate-900 dark:border-slate-700 text-center py-0.5"><option value="">同左</option>${rmOpts.replace(`value="${s.gradeRooms?.[g]||''}"`,`value="${s.gradeRooms?.[g]||''}" selected`)}</select></div></td>`;
}).join('')}<td><button onclick="actions.removeSubject('${s.id}')" class="text-slate-300 hover:text-rose-500 font-black px-2">✕</button></td></tr>`).join('')}</tbody></table></div></div></div>`;};

window.viewStep4=()=>{if(!state.selectedTeacherId&&state.teachers?.length>0)state.selectedTeacherId=state.teachers[0].id; const t=safeFind(state.teachers,'id',state.selectedTeacherId); const hrOpts=`<option value="">専科等</option>`+GRADES.map(g=>Array.from({length:parseInt(state.grades?.[g])||1},(_,i)=>`<option value="${g}-${i+1}">${g}年${i+1}組</option>`).join('')).join(''); return `<div class="flex flex-col md:flex-row gap-4 h-full"><div class="w-full md:w-1/2 flex flex-col bg-white dark:bg-slate-800 border dark:border-slate-800 p-3 min-h-[300px] rounded-2xl"><div class="flex justify-between items-center mb-2"><h3 class="font-black text-xs dark:text-slate-300">教員名簿</h3><button onclick="actions.addTeacher()" class="text-[10px] bg-blue-600 text-white px-2 py-1 rounded-lg">+ 追加</button></div><div id="step4-teas-scroll" class="flex-1 overflow-y-auto custom-scrollbar space-y-1.5 pr-1">${(state.teachers||[]).map((tc,i)=>{const isSel=tc.id===state.selectedTeacherId, isEdit=tc.id===state.editingTeacherId, maxH=tc.maxHours||24; return `<div onclick="actions.handleTeacherClick('${tc.id}')" class="flex items-center gap-1 p-2 rounded-xl border cursor-pointer transition-colors ${isSel?'bg-blue-50 dark:bg-blue-900/40 border-blue-400':'bg-slate-50 dark:bg-slate-900 border-slate-200 dark:border-slate-800'}"><div class="flex flex-col gap-0.5"><button onclick="event.stopPropagation();actions.moveItem('teachers',${i},-1)" class="w-5 h-4 text-[9px] text-slate-400 hover:bg-slate-200 rounded flex items-center justify-center">▲</button><button onclick="event.stopPropagation();actions.moveItem('teachers',${i},1)" class="w-5 h-4 text-[9px] text-slate-400 hover:bg-slate-200 rounded flex items-center justify-center">▼</button></div><div class="flex-1 px-2" ondblclick="event.stopPropagation();actions.startEditTeacher('${tc.id}')">${isEdit?`<input id="te-nm-${tc.id}" type="text" value="${tc.name}" onblur="actions.updateTeacher('${tc.id}','name',this.value);actions.stopEditTeacher()" class="m3-input !p-1 text-sm">`:`<span class="text-sm font-black truncate block select-none pointer-events-none dark:text-slate-100">${tc.name}先生</span>`}</div><select id="te-hr-${tc.id}" onchange="actions.updateTeacherHomeroom('${tc.id}',this.value)" onclick="event.stopPropagation()" class="text-[10px] p-1 bg-white dark:bg-slate-800 rounded border dark:border-slate-700 outline-none dark:text-slate-200">${tc.homeroom?hrOpts.replace(`value="${tc.homeroom}"`,`value="${tc.homeroom}" selected`):hrOpts}</select><div class="flex items-center gap-1 bg-white dark:bg-slate-800 border dark:border-slate-700 p-1 rounded" onclick="event.stopPropagation()">${state.editingTeacherLimitId===tc.id?`<input id="te-lm-${tc.id}" type="number" value="${maxH}" onblur="actions.updateTeacher('${tc.id}','maxHours',parseInt(this.value)||0);state.editingTeacherLimitId=null;render();" class="w-8 text-center font-black text-blue-600 bg-slate-100 dark:bg-slate-900 rounded appearance-none" autofocus>`:`<button onclick="actions.updateTeacher('${tc.id}','maxHours',Math.max(0,${maxH}-1))" class="text-slate-400 font-black px-1 hover:bg-slate-100 dark:hover:bg-slate-700 rounded">-</button><span onclick="state.editingTeacherLimitId='${tc.id}';render();" class="text-center font-black text-blue-600 text-xs cursor-pointer w-4">${maxH}</span><button onclick="actions.updateTeacher('${tc.id}','maxHours',${maxH}+1)" class="text-slate-400 font-black px-1 hover:bg-slate-100 dark:hover:bg-slate-700 rounded">+</button>`}</div><button onclick="event.stopPropagation();actions.removeTeacher('${tc.id}')" class="text-slate-300 hover:text-rose-500 px-2">✕</button></div>`;}).join('')}</div></div><div class="flex-1 flex flex-col bg-slate-100/50 dark:bg-slate-800/30 border dark:border-slate-800 p-4 min-h-[300px] items-center rounded-2xl">${t?`<div class="w-full bg-gradient-to-r from-blue-600 to-indigo-700 rounded-2xl p-4 mb-4 text-white flex justify-between items-center"><h3 class="font-black text-lg">👤 ${t.name}先生</h3><span class="text-[9px] font-black bg-black/20 px-2 py-1 rounded-full border border-white/20">NG枠設定</span></div>${buildGrid(t.ngTimes,state.globalBlocks,`actions.toggleTeacherNG('${t.id}','__KEY__')`, 'step4-grid-scroll')}`:'<div class="flex-1 flex items-center justify-center text-slate-400 font-black">教員を選択してください</div>'}</div></div>`;};

window.viewStep5=()=>{const sb=state.specialBuilder, sOpts=(state.subjects||[]).map(s=>`<option value="${s.id}" ${sb.subjectId===s.id?'selected':''}>${s.name}</option>`).join(''), rOpts=`<option value="通常教室" ${sb.room==='通常教室'?'selected':''}>通常教室</option>`+(state.rooms||[]).map(r=>`<option value="${r.name}" ${sb.room===r.name?'selected':''}>${r.name}</option>`).join(''), clsKeys=state.classAssignments?Object.keys(state.classAssignments):[], PERIODS=getDynamicPeriods(); return `<div class="flex flex-col h-full gap-4"><div class="bg-indigo-50/50 dark:bg-indigo-900/30 border border-indigo-200 dark:border-indigo-500/30 rounded-2xl p-3 shrink-0"><div class="flex justify-between items-center mb-2"><h3 class="font-black text-indigo-900 dark:text-indigo-300 text-xs">🛠️ 特殊授業ビルダー</h3></div><div class="flex flex-col gap-2"><div class="flex flex-wrap gap-2 items-center bg-white dark:bg-slate-800 p-1.5 rounded-lg border dark:border-slate-700 shadow-sm"><select id="sp-b-type" onchange="actions.updateBuilder('type',this.value)" class="m3-input !w-auto !py-1"><option value="joint" ${sb.type==='joint'?'selected':''}>合同</option><option value="split" ${sb.type==='split'?'selected':''}>分割</option></select><select id="sp-b-sub" onchange="actions.updateBuilder('subjectId',this.value)" class="m3-input !w-auto !py-1">${sOpts}</select><div class="flex items-center gap-1 bg-slate-50 dark:bg-slate-900 px-1 rounded border dark:border-slate-700"><button onclick="actions.updateBuilder('hours',Math.max(1,${sb.hours}-1))" class="px-2 font-black">-</button><input id="sp-b-hrs" type="number" step="0.1" value="${sb.hours}" onblur="actions.updateBuilder('hours',Math.max(1,parseFloat(this.value)||1))" class="w-8 text-center font-black bg-transparent appearance-none"><button onclick="actions.updateBuilder('hours',${sb.hours}+1)" class="px-2 font-black">+</button></div><select id="sp-b-rm" onchange="actions.updateBuilder('room',this.value)" class="m3-input !w-auto !py-1">${rOpts}</select><button onclick= window.viewStep9=()=>{
    const uS=Array.from(new Set((state.subjects||[]).map(s=>s.name))), PERIODS=getDynamicPeriods(), cN={}, cA={}, cls=Object.keys(state.classAssignments||{}), m=state.marathon; 
    cls.forEach(c=>{uS.forEach(s=>{cN[`${c}-${s}`]=0;cA[`${c}-${s}`]=0;});}); 
    cls.forEach(c=>{
        const cD=state.classAssignments[c],g=c.split('-')[0];
        (state.subjects||[]).forEach(s=>{
            let hr=parseFloat(s.stdHours?.[g])||0;
            cN[`${c}-${s.name}`]+=hr;
            if(hr<=0)return;
            if(state.specialBlocks?.some(b=>b.subjectId===s.id&&b.targets?.includes(c)))return;
            const ov=cD.overrides?.[s.id]||{};
            if(ov.allocations?.length>0)ov.allocations.forEach(a=>cA[`${c}-${s.name}`]+=parseFloat(a.hours)||0);
            else if(ov.teacherId||cD.homeroom)cA[`${c}-${s.name}`]+=hr;
        });
    }); 
    (state.specialBlocks||[]).forEach(b=>{
        const sO=safeFind(state.subjects,'id',b.subjectId);
        if(sO&&b.targets)b.targets.forEach(c=>{if(cA[`${c}-${sO.name}`]!==undefined)cA[`${c}-${sO.name}`]+=parseFloat(b.hours)||0;});
    }); 
    let tIss=[]; let lds=getTeacherLoads(); 
    (state.teachers||[]).forEach(t=>{
        let ld=lds[t.id]||0, un=0; 
        DAYS.forEach(d=>PERIODS.forEach(p=>{if(state.globalBlocks[`${d}-${p}`]||(t.ngTimes&&t.ngTimes[`${d}-${p}`]))un++;})); 
        let mx=(DAYS.length*PERIODS.length)-un; 
        if(ld>mx)tIss.push(`${t.name}(担当${ld}/上限${mx})`);

                <span class="text-[9px] font-black text-blue-600 dark:text-blue-400 uppercase tracking-widest">Dashboard</span>
                <span class="text-xs font-black text-slate-800 dark:text-white">${Number(m.currentGen)}回目</span>
            </div>
            <div class="h-6 w-px bg-slate-200 dark:bg-slate-700 mx-0.5"></div>
            <div class="flex gap-1 bg-slate-100 dark:bg-slate-800 p-1 rounded-lg border dark:border-slate-700">
                <button onclick="actions.setDashTab('matrix')" class="px-3 py-1 rounded font-black text-[10px] transition-all ${state.dashTab==='matrix'?'bg-white shadow-sm text-blue-600 dark:text-blue-400 dark:bg-slate-900':'text-slate-500 hover:bg-slate-200 dark:text-slate-400 dark:hover:bg-slate-700'}">全体</button>
                <button onclick="actions.setDashTab('individual')" class="px-3 py-1 rounded font-black text-[10px] transition-all ${state.dashTab==='individual'?'bg-white shadow-sm text-blue-600 dark:text-blue-400 dark:bg-slate-900':'text-slate-500 hover:bg-slate-200 dark:text-slate-400 dark:hover:bg-slate-700'}">個別</button>
            </div>
            ${subControls}
            <div class="flex gap-1 bg-slate-100 dark:bg-slate-800 p-1 rounded-lg border dark:border-slate-700">
                <button onclick="state.rotationWeek='all'; render();" class="px-2 py-1 rounded font-black text-[10px] transition-all ${rotW==='all'?'bg-white shadow-sm text-amber-600 dark:text-amber-400 dark:bg-slate-900':'text-slate-500 hover:bg-slate-200 dark:text-slate-400 dark:hover:bg-slate-700'}">🔄 全表示</button>
                <button onclick="state.rotationWeek='A'; render();" class="px-2 py-1 rounded font-black text-[10px] transition-all ${rotW==='A'?'bg-white shadow-sm text-amber-600 dark:text-amber-400 dark:bg-slate-900':'text-slate-500 hover:bg-slate-200 dark:text-slate-400 dark:hover:bg-slate-700'}">A週</button>
                <button onclick="state.rotationWeek='B'; render();" class="px-2 py-1 rounded font-black text-[10px] transition-all ${rotW==='B'?'bg-white shadow-sm text-amber-600 dark:text-amber-400 dark:bg-slate-900':'text-slate-500 hover:bg-slate-200 dark:text-slate-400 dark:hover:bg-slate-700'}">B週</button>
            </div>
            ${lockToolsHtml}
        </div>
        <div class="flex items-center gap-1 mt-1 md:mt-0">
            ${sc?`<div class="flex items-center gap-1 bg-slate-50 dark:bg-slate-800 px-2 py-1 rounded border dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors cursor-pointer" onclick="actions.openReportModal()"><span class="text-[8px] font-bold text-slate-500 uppercase">Score:</span><span class="text-[10px] font-black text-emerald-600 dark:text-emerald-400">${sc?.basic?.score||0}%</span><button class="ml-1 px-1.5 py-0.5 bg-white dark:bg-slate-900 rounded text-[8px] font-bold border dark:border-slate-600 shadow-sm dark:text-slate-300">詳細</button></div>`:''}
            <button onclick="actions.toggleBirdEye()" class="px-3 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-[10px] font-black shadow-sm flex items-center gap-1 transition-colors border border-indigo-700">🦅俯瞰モード</button>
        </div>
    </div>`;
    
    if (state.dashTab === 'matrix') {
        html+=`<div class="flex sm:hidden gap-1 shrink-0 p-1 bg-slate-100 dark:bg-slate-800 rounded-xl w-full border dark:border-slate-700"><button onclick="actions.setMatrixAxis('class')" class="flex-1 px-3 py-1 text-[10px] font-black rounded transition-all ${state.matrixAxis==='class'?'bg-white shadow-sm text-blue-600 dark:text-blue-400 dark:bg-slate-900':'text-slate-500 hover:bg-slate-200 dark:text-slate-400 dark:hover:bg-slate-700'}">クラス軸</button><button onclick="actions.setMatrixAxis('teacher')" class="flex-1 px-3 py-1 text-[10px] font-black rounded transition-all ${state.matrixAxis==='teacher'?'bg-white shadow-sm text-blue-600 dark:text-blue-400 dark:bg-slate-900':'text-slate-500 hover:bg-slate-200 dark:text-slate-400 dark:hover:bg-slate-700'}">教員軸</button><button onclick="actions.setMatrixAxis('room')" class="flex-1 px-3 py-1 text-[10px] font-black rounded transition-all ${state.matrixAxis==='room'?'bg-white shadow-sm text-blue-600 dark:text-blue-400 dark:bg-slate-900':'text-slate-500 hover:bg-slate-200 dark:text-slate-400 dark:hover:bg-slate-700'}">教室軸</button></div>`;
        let rows=[]; 
        if(state.matrixAxis==='class') rows=classes; 
        else if(state.matrixAxis==='teacher') rows=teachers.map(t=>t.id); 
        else rows=(state.rooms||[]).map(r=>r.name);

        html+=`<div id="step10-matrix-scroll" class="flex-1 overflow-auto bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl custom-scrollbar relative shadow-inner"><table class="w-max border-collapse text-center table-fixed"><thead class="sticky top-0 z-20"><tr class="bg-slate-50 dark:bg-slate-800 border-b dark:border-slate-700"><th class="sticky left-0 bg-slate-50 dark:bg-slate-800/90 z-30 p-2 w-20 border-r dark:border-slate-700 font-black text-[9px] text-slate-400 dark:text-slate-300">Axis</th>${DAYS.map((d,i)=>`<th colspan="${PERIODS.length}" class="p-1 border-r dark:border-slate-700 font-black text-[10px] text-slate-500 dark:text-slate-300 ${i%2===0?'bg-white dark:bg-slate-800':'bg-slate-50 dark:bg-slate-900/50'}">${d}曜</th>`).join('')}</tr><tr class="bg-white dark:bg-slate-800 border-b dark:border-slate-700"><th class="sticky left-0 bg-white dark:bg-slate-800/90 z-30 p-1 border-r dark:border-slate-700 text-[8px] font-black text-slate-300 dark:text-slate-400">Period</th>${DAYS.map((d,i)=>PERIODS.map(p=>`<th class="p-1 w-[50px] border-r dark:border-slate-700 font-black text-[8px] text-slate-300 dark:text-slate-400 ${i%2===0?'bg-white dark:bg-slate-800':'bg-slate-50 dark:bg-slate-900/50'}">${p}</th>`).join('')).join('')}</tr></thead><tbody>`;
        html += rows.map(rowId=>{
            let rowName=rowId; if(state.matrixAxis==='teacher') rowName=teachers.find(t=>t.id===rowId)?.name||'不明';
            let tr=`<tr class="border-b dark:border-slate-700 transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/50"><td class="sticky left-0 bg-white dark:bg-slate-800 border-r dark:border-slate-700 p-1 text-[9px] font-black z-10 shadow-sm shadow-[2px_0_4px_rgba(0,0,0,0.05)] dark:shadow-[2px_0_4px_rgba(0,0,0,0.2)] whitespace-nowrap overflow-hidden text-ellipsis dark:text-slate-200">${rowName}</td>`;
            DAYS.forEach((d,i)=>{PERIODS.forEach(p=>{
                const bgCls = i%2===0 ? 'bg-white dark:bg-slate-900/80' : 'bg-slate-50 dark:bg-slate-950';
                let borderCls = 'border-r dark:border-slate-700/50'; if(p===1) borderCls += ' border-l-2 border-l-slate-300 dark:border-l-slate-500';
                
                const isBanned = isBannedArea(d, p, rowId, state.matrixAxis);
                const bannedCls = isBanned ? 'bg-banned pointer-events-none' : (state.paintLockMode ? 'hover:bg-slate-50 dark:hover:bg-slate-800' : 'cursor-pointer hover:bg-slate-200 dark:hover:bg-slate-700');
                
                let hintCls = '';
                if (state.movingLesson && !state.paintLockMode && !isBanned) {
                    let isTargetRow = false;
                    if (state.matrixAxis === 'class' && state.movingLesson.targets.includes(rowId)) isTargetRow = true;
                    if (state.matrixAxis === 'teacher' && state.movingLesson.teacherIds.includes(rowId)) isTargetRow = true;
                    if (isTargetRow) {
                        hintCls = getHintClass(d, p, state.movingLesson.targets[0]);
                    }
                }

                let lessons=(state.generatedSchedule?.[d]?.[p]||[]).filter(l=>state.matrixAxis==='class'?l.targets?.includes(rowId):state.matrixAxis==='teacher'?l.teacherIds?.includes(rowId):l.room===rowId);
                lessons = lessons.filter(l => rotW === 'all' || getWeekType(l) === 'both' || getWeekType(l) === rotW);
                
                if(lessons.length===0){ 
                    const isSelCls = (state.movingLesson && !state.paintLockMode && state.movingLesson.day===d && state.movingLesson.period===p && ((state.matrixAxis==='class'&&state.movingLesson.targets.includes(rowId)) || (state.matrixAxis==='teacher'&&state.movingLesson.teacherIds.includes(rowId)))) ? 'ring-2 ring-rose-500 inset-0 absolute z-10' : '';
                    tr+=`<td class="p-0 ${borderCls} ${bgCls} ${bannedCls} ${hintCls} relative align-top h-full transition-colors" ${!isBanned?`onclick="actions.handleCellClick('${d}',${p},'${state.matrixAxis==='class'?rowId:state.dashFilter}')"`:''}><div class="${isSelCls}"></div></td>`;
                } else { 
                    const l=lessons[0]; const subT=state.matrixAxis==='class'?`${l.teacherName||'?'}`:`${l.targets?.join(',')}`;
                    const cStyle = getSubjectStyle(l.subject); const cClass = cStyle ? '' : getSubjectColorClass(l.subject);
                    const isSel = (state.movingLesson && !state.paintLockMode && state.movingLesson.id === l.id);
                    const isVio = state.violations && state.violations[l.id];
                    let ringCls = ''; if(isSel) ringCls='ring-2 ring-rose-500 scale-90 opacity-80 z-20 shadow-lg'; else if(isVio) ringCls='ring-[1px] ring-rose-500 animate-pulse';
                    
                    const isLocked = l.isLocked || false;
                    const lockIcon = isLocked ? `<div class="pin-icon absolute -top-1 -right-1 bg-slate-700 text-white text-[8px] w-3 h-3 flex items-center justify-center rounded-full shadow-md z-10 border border-white">📌</div>` : '';
                    const fracIcon = l.isFraction ? `<div class="absolute top-0 left-0 bg-amber-400 text-amber-900 text-[6px] px-0.5 rounded-br font-black z-10 shadow-sm">🔄${getWeekType(l)}</div>` : '';
                    const lockStyleCls = isLocked ? 'opacity-80 saturate-50 brightness-90' : '';

                    tr+=`<td class="p-0.5 ${borderCls} ${bgCls} ${bannedCls} ${hintCls} align-top h-full transition-colors" ${!isBanned||isSel?`onclick="actions.handleCellClick('${d}',${p},'${state.matrixAxis==='class'?rowId:state.dashFilter}','${l.id}')"`:''}>
                        <div class="lesson-cell flex flex-col items-center justify-center p-0.5 rounded-[4px] border ${cClass} ${ringCls} ${lockStyleCls} shadow-sm relative overflow-hidden h-full min-h-[40px] select-none dark:border-opacity-50 border-transparent" data-lesson-id="${l.id}" ondblclick="actions.toggleLock('${l.id}')" ${cStyle?`style="${cStyle}"`:''}>
                            <div class="absolute inset-0 bg-slate-900/60 opacity-0 dark:opacity-100 pointer-events-none z-0"></div>
                            <div class="relative z-10 flex flex-col items-center w-full">
                                ${fracIcon}${lockIcon}
                                ${lessons.length>1?`<span class="absolute top-0 right-0 bg-rose-500 text-white text-[6px] px-0.5 rounded-bl">重</span>`:''}
                                <div class="font-black text-[clamp(9px,1vw,12px)] w-full truncate leading-tight text-slate-800 dark:text-white">${l.subject}</div>
                                <div class="text-[7px] font-extrabold opacity-100 text-slate-700 dark:text-slate-200 w-full truncate leading-none mt-0.5">${subT}</div>
                            </div>
                        </div>
                    </td>`;
                }
            });}); tr+=`</tr>`; return tr;
        }).join(''); html += `</tbody></table></div>`;
    } else {
        const fOpts=state.dashView==='class'?classes.map(c=>`<option value="${c}" ${c===state.dashFilter?'selected':''}>${c}</option>`).join(''):teachers.map(t=>`<option value="${t.id}" ${t.id===state.dashFilter?'selected':''}>${t.name}先生</option>`).join('');
        html+=`<div class="flex sm:hidden justify-between items-center bg-white dark:bg-slate-800 border dark:border-slate-700 p-1.5 rounded-xl shrink-0 gap-2 flex-wrap shadow-sm"><div class="flex items-center gap-1 bg-slate-50 dark:bg-slate-900 p-1 rounded-lg border dark:border-slate-700 flex-1"><button onclick="actions.setDashView('class')" class="flex-1 px-3 py-1 rounded font-black text-[9px] transition-all ${state.dashView==='class'?'bg-white shadow-sm text-blue-600 dark:text-blue-400 dark:bg-slate-800':'text-slate-500 hover:bg-slate-200 dark:text-slate-400 dark:hover:bg-slate-700'}">クラス別</button><button onclick="actions.setDashView('teacher')" class="flex-1 px-3 py-1 rounded font-black text-[9px] transition-all ${state.dashView==='teacher'?'bg-white shadow-sm text-blue-600 dark:text-blue-400 dark:bg-slate-800':'text-slate-500 hover:bg-slate-200 dark:text-slate-400 dark:hover:bg-slate-700'}">教員別</button></div><select id="dash-filter-mobile" onchange="actions.setDashFilter(this.value)" class="m3-input !py-1 !text-xs w-1/2 dark:bg-slate-900 dark:border-slate-600 dark:text-white">${fOpts}</select></div>`;
        html+=`<div id="step10-indiv-scroll" class="flex-1 overflow-auto bg-white dark:bg-slate-900 border dark:border-slate-700 rounded-2xl custom-scrollbar p-1 min-h-0 shadow-inner"><div class="grid grid-cols-[40px_repeat(5,1fr)] min-w-[600px] h-full gap-px bg-slate-200 dark:bg-slate-700 border dark:border-slate-700"><div class="bg-slate-50 dark:bg-slate-800 flex items-center justify-center font-black text-[8px] uppercase text-slate-400 dark:text-slate-300">Time</div>${DAYS.map(d=>`<div class="bg-slate-50 dark:bg-slate-800 flex items-center justify-center font-black text-xs py-1 text-slate-500 dark:text-slate-300">${d}曜</div>`).join('')}`;
        
        PERIODS.forEach(p=>{ html+=`<div class="bg-white dark:bg-slate-800/80 flex items-center justify-center font-black text-[10px] border-r dark:border-slate-700 text-slate-400 dark:text-slate-400">${p}限</div>`;
            DAYS.forEach(d=>{
                let ls=(state.generatedSchedule?.[d]?.[p]||[]).filter(l=>state.dashView==='class'?l.targets?.includes(state.dashFilter):l.teacherIds?.includes(state.dashFilter));
                ls = ls.filter(l => rotW === 'all' || getWeekType(l) === 'both' || getWeekType(l) === rotW);

                const isBanned = isBannedArea(d, p, state.dashFilter, state.dashView);
                const bannedCls = isBanned ? 'bg-banned pointer-events-none' : (state.paintLockMode ? 'hover:bg-slate-50 dark:hover:bg-slate-800' : 'cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800');
                
                let hintCls = '';
                if (state.movingLesson && !state.paintLockMode && !isBanned) {
                    let targetCls = state.dashView === 'class' ? state.dashFilter : (state.movingLesson.targets[0] || '');
                    if (state.movingLesson.targets.includes(targetCls) || (state.dashView === 'teacher' && state.movingLesson.teacherIds.includes(state.dashFilter))) {
                        hintCls = getHintClass(d, p, targetCls);
                    }
                }

                const selCls = (state.movingLesson && !state.paintLockMode && state.movingLesson.day===d && state.movingLesson.period===p && ((state.dashView==='class'&&state.movingLesson.targets.includes(state.dashFilter)) || (state.dashView==='teacher'&&state.movingLesson.teacherIds.includes(state.dashFilter)))) ? 'ring-2 ring-rose-500 inset-0 absolute z-10' : '';
                
                html+=`<div class="dash-cell border-b border-r dark:border-slate-700 bg-white dark:bg-slate-900 relative transition-colors ${bannedCls} ${hintCls}" ${!isBanned?`onclick="actions.handleCellClick('${d}',${p},'${state.dashFilter}','${ls.length>0?ls[0].id:''}')"`:''}><div class="${selCls}"></div>${ls.map(l=>{
                    const cStyle = getSubjectStyle(l.subject); const cClass = cStyle ? '' : getSubjectColorClass(l.subject);
                    const isSel = state.movingLesson && !state.paintLockMode && state.movingLesson.id === l.id;
                    const isVio = state.violations && state.violations[l.id];
                    let ringCls = ''; if(isSel) ringCls='ring-2 ring-rose-500 scale-90 opacity-80 z-20 shadow-lg'; else if(isVio) ringCls='ring-[2px] ring-rose-500 animate-pulse shadow-rose-500 shadow-md';
                    
                    const isLocked = l.isLocked || false;
                    const lockIcon = isLocked ? `<div class="pin-icon absolute -top-1 -right-1 bg-slate-700 text-white text-[8px] w-3 h-3 flex items-center justify-center rounded-full shadow-md z-10 border border-white">📌</div>` : '';
                    const fracIcon = l.isFraction ? `<div class="absolute top-0 left-0 bg-amber-400 text-amber-900 text-[6px] px-0.5 rounded-br font-black z-10 shadow-sm">🔄${getWeekType(l)}</div>` : '';
                    const lockStyleCls = isLocked ? 'opacity-80 saturate-50 brightness-90' : '';

                    return `<div class="lesson-cell text-center w-full px-0.5 flex flex-col items-center justify-center h-full gap-0.5 relative z-0 transition-transform select-none" data-lesson-id="${l.id}" ondblclick="actions.toggleLock('${l.id}')">
                        <div class="px-1 py-0.5 rounded border leading-none ${cClass} ${ringCls} ${lockStyleCls} shadow-sm truncate max-w-full w-full flex-1 flex flex-col justify-center relative overflow-hidden dark:border-opacity-50 border-transparent" ${cStyle?`style="${cStyle}"`:''}>
                            <div class="absolute inset-0 bg-slate-900/60 opacity-0 dark:opacity-100 pointer-events-none z-0"></div>
                            <div class="relative z-10 flex flex-col items-center w-full">
                                ${fracIcon}${lockIcon}
                                <div class="text-[clamp(12px,1.5vw,18px)] font-black text-slate-800 dark:text-white">${l.subject}</div>
                                <div class="text-[clamp(9px,1.2vw,14px)] font-black text-slate-700 dark:text-slate-200 mt-[4px] opacity-90">${state.dashView==='teacher'?l.targets?.join(','):(l.teacherName||'担任')}</div>
                            </div>
                        </div>
                    </div>`;
                }).join('')}</div>`;
            });
        }); html+=`</div></div>`;
    }
    
    html += trayHtml;
    html += `</div>`; return html;
};
</script>
