<script>
function render(){
    saveUIState(); 
    try{localStorage.setItem(STORAGE_KEY_DRAFT,JSON.stringify(state));}catch(e){}
    if(state.currentStep===10) validateSchedule();
    
    const hU = document.getElementById('step-header-utils');
    if(hU) hU.innerHTML=`
        <button onclick="actions.toggleDarkMode()" class="p-1.5 rounded-lg text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"><svg class="w-4 h-4 hidden dark:block text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg><svg class="w-4 h-4 block dark:hidden text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg></button>
        
        <div class="flex gap-2">
            <button onclick="actions.openSlotModal('save')" class="px-3 py-1.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg shadow-sm text-[10px] font-black transition-colors flex items-center gap-1 border border-blue-700">💾 セーブ</button>
            <button onclick="actions.openSlotModal('load')" class="px-3 py-1.5 bg-blue-50 hover:bg-blue-100 text-blue-700 border border-blue-200 rounded-lg shadow-sm text-[10px] font-black transition-colors flex items-center gap-1">📂 ロード</button>
            <button onclick="actions.startExportData()" class="px-3 py-1.5 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg shadow-sm text-[10px] font-black transition-colors flex items-center gap-1 border border-emerald-700">💻 端末保存</button>
            <button onclick="actions.importData()" class="px-3 py-1.5 bg-emerald-50 hover:bg-emerald-100 text-emerald-700 border border-emerald-200 rounded-lg shadow-sm text-[10px] font-black transition-colors flex items-center gap-1">📥 読込</button>
            <button onclick="actions.openImportSSModal()" class="px-3 py-1.5 bg-teal-600 hover:bg-teal-700 text-white rounded-lg shadow-sm text-[10px] font-black transition-colors flex items-center gap-1 border border-teal-700">📊 スプシ同期</button>
        </div>
    `;

    document.getElementById('step-title').innerText=stepTitles[state.currentStep-1]||'';
    document.getElementById('progress-dots').innerHTML=Array.from({length:10},(_,i)=>`<div class="step-dot ${i+1<=state.currentStep?'active !bg-blue-600':''}"></div>`).join('');
    
    const nb=document.getElementById('btn-next'), nt=document.getElementById('btn-next-text'), pb=document.getElementById('btn-prev');
    if(pb){pb.style.visibility=(state.currentStep===1?'hidden':'visible'); pb.onclick=()=>{if(state.currentStep>1){state.currentStep--;render();}};}
    if(nb&&nt){
        nb.onclick=null;
        if(state.currentStep===9){
            nb.style.display='none';
        }else if(state.currentStep===10){
            nb.style.display='flex';
            nt.innerText="ＰＤＦ・スプシに出力"; 
            nb.onclick=()=>{ actions.openExportModal(); };
        }else{
            nb.style.display='flex';
            nt.innerText="次へ進む";
            nb.onclick=()=>{state.currentStep++;render();};
        }
    }
    
    const content=document.getElementById('step-content');
    if(content){try{content.innerHTML=window[`viewStep${state.currentStep}`]();}catch(e){console.error(e);}}
    
    restoreUIState(); 
}

function buildGrid(ngMap,gMap,actStr,scrollId='grid-scroll'){
    const PERIODS=getDynamicPeriods();
    return `<div id="${scrollId}" class="overflow-x-auto w-full custom-scrollbar min-h-0"><table class="border-separate border-spacing-1 table-fixed w-max mx-auto"><thead><tr><th class="w-8"></th>${DAYS.map(d=>`<th class="text-center text-xs font-black text-slate-400 dark:text-slate-500 w-9">${d}</th>`).join('')}</tr></thead><tbody>${PERIODS.map(p=>`<tr><td class="text-right pr-2 text-[10px] font-bold text-slate-400 dark:text-slate-500">${p}限</td>${DAYS.map(d=>{const k=`${d}-${p}`,gl=gMap?.[k],ng=ngMap?.[k],cls=`w-8 h-8 border rounded-lg flex items-center justify-center cursor-pointer font-bold text-xs transition-colors ${gl?'bg-slate-700 dark:bg-slate-400 dark:text-slate-900 text-white shadow-md border-slate-700':(ng?'bg-rose-50 dark:bg-rose-900/40 border-rose-200 dark:border-rose-800/60 text-rose-500':'bg-white dark:bg-slate-800 border-slate-200 dark:border-slate-700 text-slate-200 dark:text-slate-600 hover:bg-blue-50 dark:hover:bg-slate-700')}`;return `<td class="p-0"><div onclick="${actStr.replace('__KEY__',k)}" class="${cls}">${gl?'■':(ng?'✕':'〇')}</div></td>`;}).join('')}</tr>`).join('')}</tbody></table></div>`;
}

window.viewStep1=()=>`<div class="flex flex-col gap-4 h-full"><div class="bg-white dark:bg-slate-800/50 rounded-2xl p-4 border border-slate-200 dark:border-slate-800 shadow-sm"><h3 class="font-black text-sm mb-3 dark:text-slate-200">学級数</h3><div class="grid grid-cols-3 md:grid-cols-6 gap-3">${GRADES.map(g=>`<div class="bg-slate-50 dark:bg-slate-900 p-2 rounded-xl border dark:border-slate-800 flex flex-col items-center"><span class="text-slate-500 text-xs font-bold">${g}年</span><div class="flex items-center gap-1 mt-1"><button onclick="actions.updateGrade(${g},-1)" class="w-6 h-6 rounded bg-white dark:bg-slate-800 border shadow-sm font-black text-slate-500">-</button><input id="gr-${g}" type="number" value="${state.grades?.[g]||1}" onblur="actions.setGrade(${g},this.value)" class="w-8 text-lg font-black text-blue-600 text-center bg-transparent outline-none appearance-none"><button onclick="actions.updateGrade(${g},1)" class="w-6 h-6 rounded bg-white dark:bg-slate-800 border shadow-sm font-black text-slate-500">+</button></div></div>`).join('')}</div></div><div class="bg-white dark:bg-slate-800/50 rounded-2xl p-4 border border-slate-200 dark:border-slate-800 shadow-sm"><h3 class="font-black text-sm mb-3 dark:text-slate-200">日ごとのコマ数</h3><div id="step1-pd-scroll" class="overflow-x-auto custom-scrollbar"><table class="w-full text-xs text-center border-collapse min-w-[500px]"><thead><tr><th class="p-2 border-b dark:border-slate-700">学年</th>${DAYS.map(d=>`<th class="p-2 border-b dark:border-slate-700 font-black">${d}曜</th>`).join('')}</tr></thead><tbody>${GRADES.map(g=>`<tr><td class="p-2 font-bold border-b dark:border-slate-700 dark:text-slate-300">${g}年</td>${DAYS.map(d=>`<td class="p-2 border-b dark:border-slate-700"><div class="flex items-center justify-center gap-1"><button onclick="actions.updatePeriod(${g},'${d}',-1)" class="w-5 h-5 bg-slate-100 dark:bg-slate-700 border rounded font-black text-slate-500">-</button><input id="pd-${g}-${d}" type="number" value="${state.periods?.[g]?.[d]||0}" onblur="actions.setPeriod(${g},'${d}',this.value)" class="w-6 text-center font-black text-blue-600 bg-transparent outline-none appearance-none"><button onclick="actions.updatePeriod(${g},'${d}',1)" class="w-5 h-5 bg-slate-100 dark:bg-slate-700 border rounded font-black text-slate-500">+</button></div></td>`).join('')}</tr>`).join('')}</tbody></table></div></div></div>`;
window.viewStep2=()=>`<div class="flex flex-col items-center justify-center h-full text-center space-y-4"><div class="bg-white dark:bg-slate-800/50 border dark:border-slate-800 rounded-[32px] p-6 shadow-sm"><h2 class="text-xl font-black mb-2 dark:text-slate-100">行事・全校不可枠設定</h2><p class="text-[10px] font-bold text-slate-500 mb-4 uppercase">Global Unavailable Slots</p>${buildGrid(null,state.globalBlocks,"actions.toggleBlock('__KEY__')", 'step2-grid-scroll')}</div></div>`;
window.viewStep3=()=>{const rmOpts=`<option value="通常教室">通常教室</option>`+(state.rooms||[]).map(r=>`<option value="${r.name}">${r.name}</option>`).join(''); return `<div class="flex flex-col md:flex-row gap-4 h-full"><div class="w-full md:w-1/4 flex flex-col bg-slate-100 dark:bg-slate-800/50 rounded-2xl border dark:border-slate-800 p-3 min-h-[200px]"><div class="flex justify-between items-center mb-3"><h3 class="font-black text-xs dark:text-slate-300">特別教室</h3><button onclick="actions.addRoom()" class="text-[10px] bg-blue-600 text-white px-2 py-1 rounded-lg font-bold">+ 追加</button></div><div id="step3-rooms-scroll" class="flex-1 overflow-y-auto custom-scrollbar space-y-1.5 pr-1">${(state.rooms||[]).map((r,i)=>`<div class="flex items-center gap-1 bg-white dark:bg-slate-900 p-1.5 rounded-lg border dark:border-slate-800 shadow-sm"><div class="flex flex-col gap-0.5 mr-1"><button onclick="actions.moveItem('rooms',${i},-1)" class="w-4 h-4 text-[8px] text-slate-400 cursor-pointer hover:bg-slate-100 rounded flex items-center justify-center">▲</button><button onclick="actions.moveItem('rooms',${i},1)" class="w-4 h-4 text-[8px] text-slate-400 cursor-pointer hover:bg-slate-100 rounded flex items-center justify-center">▼</button></div><input id="rm-nm-${r.id}" type="text" value="${r.name}" onblur="actions.updateRoomName('${r.id}',this.value)" class="flex-1 min-w-0 text-xs font-bold outline-none bg-transparent px-1 dark:text-slate-200"><input type="number" value="${r.capacity||1}" onblur="actions.updateRoomCap('${r.id}',this.value)" title="定員(クラス数)" class="w-10 text-center font-bold text-xs bg-slate-50 dark:bg-slate-800 border dark:border-slate-700 rounded"><button onclick="actions.removeRoom('${r.id}')" class="text-slate-300 hover:text-rose-500 px-2 font-bold">✕</button></div>`).join('')}</div></div><div class="flex-1 flex flex-col bg-white dark:bg-slate-900 rounded-2xl border dark:border-slate-800 p-3 overflow-hidden shadow-sm"><div class="flex justify-between items-center mb-3"><h3 class="font-black text-xs dark:text-slate-300">科目時数と色設定</h3><div class="flex gap-2"><button onclick="actions.undoSubjects()" class="p-1 rounded bg-slate-100 dark:bg-slate-800">↩️</button><button onclick="actions.addSubject('教科を追加')" class="text-[10px] bg-blue-600 text-white px-3 py-1 rounded-lg font-bold">+ 教科を追加</button></div></div><div id="step3-subs-scroll" class="flex-1 overflow-auto custom-scrollbar border dark:border-slate-800 rounded-xl"><table class="w-full text-xs text-center border-collapse min-w-[800px]"><thead class="sticky top-0 bg-slate-50 dark:bg-slate-800 z-10 border-b dark:border-slate-700"><tr><th class="w-8"></th><th class="p-2 text-left pl-3 w-24">科目名</th><th class="w-8">色</th><th class="p-2 w-24">基本教室</th>${GRADES.map(g=>`<th class="p-2 w-[60px]">${g}年</th>`).join('')}<th class="w-8"></th></tr></thead><tbody>${(state.subjects||[]).map((s,i)=>`<tr class="border-b dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800/40"><td><div class="flex flex-col items-center"><button onclick="actions.moveItem('subjects',${i},-1)" class="w-5 h-4 text-[10px] text-slate-400 cursor-pointer hover:bg-slate-200 rounded">▲</button><button onclick="actions.moveItem('subjects',${i},1)" class="w-5 h-4 text-[10px] text-slate-400 cursor-pointer hover:bg-slate-200 rounded">▼</button></div></td><td class="p-1"><input id="sb-nm-${s.id}" type="text" value="${s.name}" onblur="actions.updateSubject('${s.id}','name',this.value)" class="m3-input !p-1 !text-sm bg-transparent border-transparent dark:text-white"></td><td class="p-1"><input id="sb-cl-${s.id}" type="color" value="${s.color||getDefaultHexColor(s.name)}" onblur="actions.updateSubject('${s.id}','color',this.value)" class="w-6 h-6 p-0 border-0 rounded cursor-pointer bg-transparent"></td><td><select id="sb-rm-${s.id}" onchange="actions.updateSubject('${s.id}','defaultRoom',this.value)" class="m3-input !p-1 !text-[10px] dark:bg-slate-800 dark:border-slate-700">${rmOpts.replace(`value="${s.defaultRoom||'通常教室'}"`,`value="${s.defaultRoom||'通常教室'}" selected`)}</select></td>${GRADES.map(g=>{const isEdit=state.editingSubjectId===s.id&&state.editingHourGrade===g; return `<td class="p-1"><div class="flex flex-col items-center bg-slate-50 dark:bg-slate-800 p-1 rounded-lg border dark:border-slate-700"><div class="flex items-center gap-1">${isEdit?`<input id="sb-hr-${s.id}-${g}" type="number" value="${s.stdHours?.[g]||0}" onblur="actions.setSubjectHour('${s.id}',${g},this.value);state.editingSubjectId=null;state.editingHourGrade=null;render();" class="w-8 text-center font-black text-blue-600 bg-white dark:bg-slate-900 border rounded appearance-none" autofocus>`:`<button onclick="actions.setSubjectHour('${s.id}',${g},Math.max(0,(parseInt(${s.stdHours?.[g]||0})-1)))" class="w-4 text-slate-400 font-bold hover:bg-slate-200 rounded">-</button><span onclick="state.editingSubjectId='${s.id}';state.editingHourGrade=${g};render();" class="w-4 text-center font-black text-blue-600 cursor-pointer">${s.stdHours?.[g]||0}</span><button onclick="actions.setSubjectHour('${s.id}',${g},parseInt(${s.stdHours?.[g]||0})+1)" class="w-4 text-slate-400 font-bold hover:bg-slate-200 rounded">+</button>`}</div><select id="sb-grm-${s.id}-${g}" onchange="actions.updateGradeRoom('${s.id}',${g},this.value)" class="text-[8px] w-full border-none outline-none text-slate-400 bg-transparent text-center"><option value="">同左</option>${rmOpts.replace(`value="${s.gradeRooms?.[g]||''}"`,`value="${s.gradeRooms?.[g]||''}" selected`)}</select></div></td>`;}).join('')}<td><button onclick="actions.removeSubject('${s.id}')" class="text-slate-300 hover:text-rose-500 font-black px-2">✕</button></td></tr>`).join('')}</tbody></table></div></div></div>`;};
window.viewStep4=()=>{if(!state.selectedTeacherId&&state.teachers?.length>0)state.selectedTeacherId=state.teachers[0].id; const t=safeFind(state.teachers,'id',state.selectedTeacherId); const hrOpts=`<option value="">専科等</option>`+GRADES.map(g=>Array.from({length:parseInt(state.grades?.[g])||1},(_,i)=>`<option value="${g}-${i+1}">${g}年${i+1}組</option>`).join('')).join(''); return `<div class="flex flex-col md:flex-row gap-4 h-full"><div class="w-full md:w-1/2 flex flex-col bg-white dark:bg-slate-800 border dark:border-slate-800 p-3 min-h-[300px] rounded-2xl"><div class="flex justify-between items-center mb-2"><h3 class="font-black text-xs dark:text-slate-300">教員名簿</h3><button onclick="actions.addTeacher()" class="text-[10px] bg-blue-600 text-white px-2 py-1 rounded-lg">+ 追加</button></div><div id="step4-teas-scroll" class="flex-1 overflow-y-auto custom-scrollbar space-y-1.5 pr-1">${(state.teachers||[]).map((tc,i)=>{const isSel=tc.id===state.selectedTeacherId, isEdit=tc.id===state.editingTeacherId, maxH=tc.maxHours||24; return `<div onclick="actions.handleTeacherClick('${tc.id}')" class="flex items-center gap-1 p-2 rounded-xl border cursor-pointer transition-colors ${isSel?'bg-blue-50 dark:bg-blue-900/40 border-blue-400':'bg-slate-50 dark:bg-slate-900 border-slate-200 dark:border-slate-800'}"><div class="flex flex-col gap-0.5"><button onclick="event.stopPropagation();actions.moveItem('teachers',${i},-1)" class="w-5 h-4 text-[9px] text-slate-400 hover:bg-slate-200 rounded flex items-center justify-center">▲</button><button onclick="event.stopPropagation();actions.moveItem('teachers',${i},1)" class="w-5 h-4 text-[9px] text-slate-400 hover:bg-slate-200 rounded flex items-center justify-center">▼</button></div><div class="flex-1 px-2" ondblclick="event.stopPropagation();actions.startEditTeacher('${tc.id}')">${isEdit?`<input id="te-nm-${tc.id}" type="text" value="${tc.name}" onblur="actions.updateTeacher('${tc.id}','name',this.value);actions.stopEditTeacher()" class="m3-input !p-1 text-sm">`:`<span class="text-sm font-black truncate block select-none pointer-events-none dark:text-slate-100">${tc.name}先生</span>`}</div><select id="te-hr-${tc.id}" onchange="actions.updateTeacherHomeroom('${tc.id}',this.value)" onclick="event.stopPropagation()" class="text-[10px] p-1 bg-white dark:bg-slate-800 rounded border dark:border-slate-700 outline-none dark:text-slate-200">${tc.homeroom?hrOpts.replace(`value="${tc.homeroom}"`,`value="${tc.homeroom}" selected`):hrOpts}</select><div class="flex items-center gap-1 bg-white dark:bg-slate-800 border dark:border-slate-700 p-1 rounded" onclick="event.stopPropagation()">${state.editingTeacherLimitId===tc.id?`<input id="te-lm-${tc.id}" type="number" value="${maxH}" onblur="actions.updateTeacher('${tc.id}','maxHours',parseInt(this.value)||0);state.editingTeacherLimitId=null;render();" class="w-8 text-center font-black text-blue-600 bg-slate-100 dark:bg-slate-900 rounded appearance-none" autofocus>`:`<button onclick="actions.updateTeacher('${tc.id}','maxHours',Math.max(0,${maxH}-1))" class="text-slate-400 font-black px-1 hover:bg-slate-100 dark:hover:bg-slate-700 rounded">-</button><span onclick="state.editingTeacherLimitId='${tc.id}';render();" class="text-center font-black text-blue-600 text-xs cursor-pointer w-4">${maxH}</span><button onclick="actions.updateTeacher('${tc.id}','maxHours',${maxH}+1)" class="text-slate-400 font-black px-1 hover:bg-slate-100 dark:hover:bg-slate-700 rounded">+</button>`}</div><button onclick="event.stopPropagation();actions.removeTeacher('${tc.id}')" class="text-slate-300 hover:text-rose-500 px-2">✕</button></div>`;}).join('')}</div></div><div class="flex-1 flex flex-col bg-slate-100/50 dark:bg-slate-800/30 border dark:border-slate-800 p-4 min-h-[300px] items-center rounded-2xl">${t?`<div class="w-full bg-gradient-to-r from-blue-600 to-indigo-700 rounded-2xl p-4 mb-4 text-white flex justify-between items-center"><h3 class="font-black text-lg">👤 ${t.name}先生</h3><span class="text-[9px] font-black bg-black/20 px-2 py-1 rounded-full border border-white/20">NG枠設定</span></div>${buildGrid(t.ngTimes,state.globalBlocks,`actions.toggleTeacherNG('${t.id}','__KEY__')`, 'step4-grid-scroll')}`:'<div class="flex-1 flex items-center justify-center text-slate-400 font-black">教員を選択してください</div>'}</div></div>`;};

    } else {
        const fOpts=state.dashView==='class'?classes.map(c=>`<option value="${c}" ${c===state.dashFilter?'selected':''}>${c}</option>`).join(''):teachers.map(t=>`<option value="${t.id}" ${t.id===state.dashFilter?'selected':''}>${t.name}先生</option>`).join('');
        html+=`<div class="flex sm:hidden justify-between items-center bg-white dark:bg-slate-800 border dark:border-slate-700 p-1.5 rounded-xl shrink-0 gap-2 flex-wrap shadow-sm"><div class="flex items-center gap-1 bg-slate-50 dark:bg-slate-900 p-1 rounded-lg border dark:border-slate-700 flex-1"><button onclick="actions.setDashView('class')" class="flex-1 px-3 py-1 rounded font-black text-[9px] transition-all ${state.dashView==='class'?'bg-white shadow-sm text-blue-600 dark:text-blue-400 dark:bg-slate-800':'text-slate-500 hover:bg-slate-200 dark:text-slate-400 dark:hover:bg-slate-700'}">クラス別</button><button onclick="actions.setDashView('teacher')" class="flex-1 px-3 py-1 rounded font-black text-[9px] transition-all ${state.dashView==='teacher'?'bg-white shadow-sm text-blue-600 dark:text-blue-400 dark:bg-slate-800':'text-slate-500 hover:bg-slate-200 dark:text-slate-400 dark:hover:bg-slate-700'}">教員別</button></div><select id="dash-filter-mobile" onchange="actions.setDashFilter(this.value)" class="m3-input !py-1 !text-xs w-1/2 dark:bg-slate-900 dark:border-slate-600 dark:text-white">${fOpts}</select></div>`;
        html+=`<div id="step10-indiv-scroll" class="flex-1 overflow-auto bg-white dark:bg-slate-900 border dark:border-slate-700 rounded-2xl custom-scrollbar p-1 min-h-0 shadow-inner"><div class="grid grid-cols-[40px_repeat(5,1fr)] min-w-[600px] h-full gap-px bg-slate-200 dark:bg-slate-700 border dark:border-slate-700"><div class="bg-slate-50 dark:bg-slate-800 flex items-center justify-center font-black text-[8px] uppercase text-slate-400 dark:text-slate-300">Time</div>${DAYS.map(d=>`<div class="bg-slate-50 dark:bg-slate-800 flex items-center justify-center font-black text-xs py-1 text-slate-500 dark:text-slate-300">${d}曜</div>`).join('')}`;
        
        PERIODS.forEach(p=>{ html+=`<div class="bg-white dark:bg-slate-800/80 flex items-center justify-center font-black text-[10px] border-r dark:border-slate-700 text-slate-400 dark:text-slate-400">${p}限</div>`;
            DAYS.forEach(d=>{
                const ls=(state.generatedSchedule?.[d]?.[p]||[]).filter(l=>state.dashView==='class'?l.targets?.includes(state.dashFilter):l.teacherIds?.includes(state.dashFilter));
                const isBanned = isBannedArea(d, p, state.dashFilter, state.dashView);
                const bannedCls = isBanned ? 'bg-banned pointer-events-none' : (state.paintLockMode ? 'hover:bg-slate-50 dark:hover:bg-slate-800' : 'cursor-pointer hover:bg-slate-50 dark:hover:bg-slate-800');
                
                let hintCls = '';
                if (state.movingLesson && !state.paintLockMode && !state.stitchMode && !state.splitMode && !isBanned) {
                    let targetCls = state.dashView === 'class' ? state.dashFilter : (state.movingLesson.targets[0] || '');
                    if (state.movingLesson.targets.includes(targetCls) || (state.dashView === 'teacher' && state.movingLesson.teacherIds.includes(state.dashFilter))) {
                        hintCls = getHintClass(d, p, targetCls);
                    }
                }

                const selCls = (state.movingLesson && !state.paintLockMode && !state.stitchMode && !state.splitMode && state.movingLesson.day===d && state.movingLesson.period===p && ((state.dashView==='class'&&state.movingLesson.targets.includes(state.dashFilter)) || (state.dashView==='teacher'&&state.movingLesson.teacherIds.includes(state.dashFilter)))) ? 'ring-2 ring-rose-500 inset-0 absolute z-10' : '';
                
                html+=`<div class="dash-cell border-b border-r dark:border-slate-700 bg-white dark:bg-slate-900 relative transition-colors ${bannedCls} ${hintCls}" ${!isBanned?`onclick="actions.handleCellClick('${d}',${p},'${state.dashFilter}','${ls.length>0?ls[0].id:''}')"`:''}><div class="${selCls}"></div>${ls.map(l=>{
                    const cStyle = getSubjectStyle(l.subject); const cClass = cStyle ? '' : getSubjectColorClass(l.subject);
                    const isSel = state.movingLesson && !state.paintLockMode && !state.stitchMode && !state.splitMode && state.movingLesson.id === l.id;
                    const isVio = state.violations && state.violations[l.id];
                    
                    let ringCls = '';
                    if(state.stitchMode && state.stitchTargetId === l.id) ringCls='ring-4 ring-fuchsia-500 scale-95 opacity-100 z-30 shadow-fuchsia-500 shadow-lg animate-pulse';
                    else if(state.splitMode && (l.length||1)>1) ringCls='ring-2 ring-rose-400 border-dashed hover:border-solid hover:bg-rose-50 dark:hover:bg-rose-900/30 transition-all cursor-crosshair';
                    else if(isSel) ringCls='ring-2 ring-rose-500 scale-90 opacity-80 z-20 shadow-lg'; 
                    else if(isVio) ringCls='ring-[2px] ring-rose-500 animate-pulse shadow-rose-500 shadow-md';
                    
                    const isLocked = l.isLocked || false;
                    const isFixed = l.isFixed || false;
                    const lockIcon = isLocked ? `<div class="pin-icon absolute -top-1 -right-1 bg-slate-700 text-white text-[8px] w-3 h-3 flex items-center justify-center rounded-full shadow-md z-10 border border-white">📌</div>` : (isFixed ? `<div class="pin-icon absolute -top-1 -right-1 bg-indigo-600 text-white text-[8px] w-3 h-3 flex items-center justify-center rounded-full shadow-md z-10 border border-white">⚙️</div>` : '');
                    const lockStyleCls = (isLocked || isFixed) ? 'opacity-80 saturate-50 brightness-90' : '';

                    return `<div class="lesson-cell text-center w-full px-0.5 flex flex-col items-center justify-center h-full gap-0.5 relative z-0 transition-transform select-none" data-lesson-id="${l.id}" ondblclick="actions.toggleLock('${l.id}')">
                        <div class="px-1 py-0.5 rounded border leading-none ${cClass} ${ringCls} ${lockStyleCls} shadow-sm truncate max-w-full w-full flex-1 flex flex-col justify-center relative overflow-hidden dark:border-opacity-50 border-transparent" ${cStyle?`style="${cStyle}"`:''}>
                            <div class="absolute inset-0 bg-slate-900/60 opacity-0 dark:opacity-100 pointer-events-none z-0"></div>
                            <div class="relative z-10 flex flex-col items-center w-full">
                                ${lockIcon}
                                <div class="text-[clamp(12px,1.5vw,18px)] font-black text-slate-800 dark:text-white">${l.subject}</div>
                                <div class="text-[clamp(9px,1.2vw,14px)] font-black text-slate-700 dark:text-slate-200 mt-[4px] opacity-90">${state.dashView==='teacher'?l.targets?.join(','):(l.teacherName||'担任')}</div>
                            </div>
                        </div>
                    </div>`;
                }).join('')}</div>`;
            });
        }); html+=`</div></div>`;
    }
    
    html += trayHtml;
    html += `</div>`; return html;
};
</script>
