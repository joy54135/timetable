<script>
var GAS_URL="https://script.google.com/macros/s/AKfycbzroFhG1DdlVy7Wx185J3TqyHyRZjO2Tull0JoVqRQaacii3RvagWjc5yRu9cfoBS42dw/exec";
var GRADES=[1,2,3,4,5,6], DAYS=['月','火','水','木','金'], PERIODS=[1,2,3,4,5,6];
var stepTitles=["1. 基本設定","2. 行事・不可枠","3. 教科と教室設定","4. 教員名簿と不可枠","5. 特殊授業ビルダー","6. クラス別担当設定","7. 教員別 持ち時数確認","8. 配置ルール詳細","9. 最終点検","10. 司令塔(ダッシュボード)"];

const step8Packages = [
  { id: "pkg1", title: "【基本構造】 パズルの骨組み", desc: "授業の分散や連続設定など、時間割の骨格を定義します。",

      { key: "limitContinuousToSpecificPeriods", type: "boolean", title: "連続授業を「1-2, 3-4, 5-6限」に限定", desc: "中休みや昼休みを跨ぐ連続授業を防止する", tip: "休み時間による活動の中断を防ぎます。" },

      { key: "exclusivePairs", type: "array", fields: ['subject1', 'subject2'], format: "[subject1] と [subject2] を同じ日にしない", title: "同日実施回避 (排他ペア)", desc: "体育(中)と体育(外)など、重なると負担が大きい教科を指定する", tip: "児童の肉体的負担を分散させます。" },
      { key: "maxIntervalSubjects", type: "array", fields: ['target', 'exclude', 'subject'], format: "[target] ただし [exclude] を除く の [subject] は連日配置を避ける", title: "実施日を離す教科 (等間隔)", desc: "体育などが連日にならないよう、前日・翌日を避ける", tip: "体力回復や学習の定着期間を確保します。" }
    ]
  },
  { id: "pkg2", title: "【教員連携・外部対応】 チームワーク同期", desc: "学年会議、若手フォロー、外部支援員などの予定を同期します。",
    items: [
      { key: "homeroomOnlyTimes", type: "array", fields: ['target', 'exclude', 'day', 'period'], format: "[target] ただし [exclude] を除く の [day]曜 [period]限 は専科を入れない", title: "担任授業固定枠 (専科ブロック)", desc: "行事準備等で専科を入れない枠を指定する", tip: "学年一斉の活動時間を確保しやすくします。" },
      { key: "avoidSpecialistTimes", type: "array", fields: ['day', 'period'], format: "全校の [day]曜 [period]限 は専科授業を避ける", title: "専科回避指定枠", desc: "会議や出張が多い時間帯に専科授業を避ける", tip: "専科教員の校務分掌時間を確保します。" }
    ]
  },
  { id: "pkg3", title: "【児童配慮】 学習リズムと集中力", desc: "児童の脳の活性化度や疲労度に合わせた教科配置を行います。",
    items: [
      { key: "amPrioritySubjects", type: "array", fields: ['target', 'exclude', 'subject'], format: "[target] ただし [exclude] を除く の [subject] は午前に優先配置", title: "午前に優先して配置する教科", desc: "国語や算数など、主要教科を1〜4限に集める", tip: "脳が最も活性化している時間帯に重要単元を学習させます。" },
      { key: "lastPeriodSubjects", type: "array", fields: ['target', 'exclude', 'subject'], format: "[target] ただし [exclude] を除く の [subject] は最終コマに配置", title: "最終コマに優先して配置する教科", desc: "クラブ、委員会、総合など", tip: "活動的な授業を午後の最後に配置し、メリハリをつけます。" }
    ]
  },
  { id: "pkg4", title: "【安全・円滑】 生活動線とバッファ", desc: "移動・着替え・片付けなどの時間を確保し、トラブルを防ぎます。",
    items: [
      { key: "avoidSpecificTimes", type: "array", fields: ['target', 'exclude', 'subject', 'day', 'period'], format: "[target] ただし [exclude] を除く の [subject] は [day]曜 [period]限 を避ける", title: "特定の時間帯への配置を避ける", desc: "「午後の体育」など、ピンポイントで避ける", tip: "熱中症対策や、直後の移動混雑を防ぎます。" },
      { key: "homeroomBufferSubjects", type: "array", fields: ['target', 'exclude', 'subject'], format: "[target] ただし [exclude] を除く の [subject] の前後に担任バッファを確保", title: "担任裁量バッファ (延長・準備枠)", desc: "家庭科や図工等の前後に「担任の空き」か「担任授業」を確保する", tip: "片付けの延長に柔軟に対応し、トラブルを防ぎます。" }

var state={currentStep:1, grades:{1:3,2:3,3:3,4:3,5:3,6:3}, periods:{}, rooms:[], subjects:[], teachers:[], globalBlocks:{}, specialBlocks:[], classAssignments:{}, advancedRules:{priorities:{}}, ruleEditor:{}, openPkgs:{pkg1:true}, generatedSchedule:null, unassigned:[], reportDetails:{}, scoreCard:null, dashTab:'matrix', matrixAxis:'class', dashView:'class', dashFilter:'', marathon: {active:false, target:0, maxGen:10, currentGen:1, ignoreFatal:true}, best: {unassignedCount:9999, schedule:null, unassigned:null, scoreCard:null, reportDetails:null}, selectedTeacherId:null, editingTeacherId:null, specialBuilder: {type:'joint', subjectId:'', hours:1, room:'通常教室', targets:[], teachers:[]}, openSpecialEdits:{}};

function safeFind(arr,k,v){return (arr||[]).find(x=>x[k]===v);}
function forceInitState(){
    if(!state.periods) state.periods={}; GRADES.forEach(g=>{if(!state.periods[g]) state.periods[g]={月:5,火:5,水:4,木:5,金:5};});
    if(!state.rooms?.length) state.rooms=[{id:'r1',name:'校庭',capacity:2,ngTimes:{}},{id:'r2',name:'体育館',capacity:2,ngTimes:{}},{id:'r3',name:'理科室',capacity:1,ngTimes:{}}];
    if(!state.subjects?.length) state.subjects=[{id:'s1',name:'国語',stdHours:{1:9,2:9,3:7,4:7,5:5,6:5},defaultRoom:'通常教室', gradeRooms:{}},{id:'s2',name:'算数',stdHours:{1:4,2:5,3:5,4:5,5:5,6:5},defaultRoom:'通常教室', gradeRooms:{}}];
    if(!state.grades) state.grades={1:3,2:3,3:3,4:3,5:3,6:3}; if(!state.classAssignments) state.classAssignments={};
    GRADES.forEach(g=>{for(let i=1;i<=(parseInt(state.grades[g])||1);i++){let c=`${g}-${i}`;if(!state.classAssignments[c]) state.classAssignments[c]={homeroom:'',overrides:{}};}});
    if(!state.advancedRules) state.advancedRules={priorities:{}}; if(!state.ruleEditor) state.ruleEditor={}; if(!state.openPkgs) state.openPkgs={pkg1:true};
    if(!state.specialBuilder) state.specialBuilder={type:'joint', subjectId:(state.subjects[0]?.id||''), hours:1, room:'通常教室', targets:[], teachers:[]};
    if(!state.openSpecialEdits) state.openSpecialEdits={};
}

function load(){ try{const d=localStorage.getItem('tt_v15_stable_final_v3');if(d){Object.assign(state,JSON.parse(d));}}catch(e){} forceInitState(); render(); }
function showToast(msg,type='info'){const t=document.getElementById('toast'),m=document.getElementById('toast-msg');if(!t||!m)return; t.className=`fixed top-4 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full shadow-xl font-bold text-sm z-[9999] transition-all opacity-100 ${type==='success'?'bg-emerald-600 text-white':(type==='error'?'bg-rose-600 text-white':'bg-blue-600 text-white')}`; m.innerText=msg; setTimeout(()=>t.classList.replace('opacity-100','opacity-0'),3000);}
function showLoading(t,d,showCancel=false, statusText=""){ const l=document.getElementById('loading-overlay'), cBtn=document.getElementById('btn-cancel-gen'), stEl=document.getElementById('loading-status'); if(l){ document.getElementById('loading-title').innerText=t; document.getElementById('loading-desc').innerText=d; if(statusText) { stEl.innerText=statusText; stEl.classList.remove('hidden'); stEl.classList.add('block'); } else { stEl.classList.add('hidden'); } if(showCancel)cBtn.classList.remove('hidden');else cBtn.classList.add('hidden'); l.classList.replace('hidden','flex'); } }
function hideLoading(){ stopGenTimer(); const l=document.getElementById('loading-overlay'); if(l)l.classList.replace('flex','hidden'); }

let genTimerInterval = null, sessionStartTime = null, globalStartTime = null;
function startGenTimer() { sessionStartTime = Date.now(); if (!globalStartTime) globalStartTime = Date.now(); if(genTimerInterval) clearInterval(genTimerInterval); genTimerInterval = setInterval(() => { const tEl = document.getElementById('loading-timer'), gEl = document.getElementById('global-timer-display'), now = Date.now(); if(tEl && sessionStartTime) tEl.innerText = ((now - sessionStartTime) / 1000).toFixed(1) + 's'; if(gEl && globalStartTime) gEl.innerText = `累計経過時間: ${((now - globalStartTime) / 1000).toFixed(1)}s`; }, 100); }
function stopGenTimer() { clearInterval(genTimerInterval); genTimerInterval = null; }

function getSubjectColor(s){
  if(!s)return 'bg-slate-100 text-slate-500 border-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700';
  if(s.includes('国')||s.includes('書'))return 'bg-blue-100 text-blue-800 border-blue-200 dark:bg-blue-900/40 dark:text-blue-300 dark:border-blue-800/60';
  if(s.includes('算')||s.includes('数'))return 'bg-yellow-100 text-yellow-800 border-yellow-200 dark:bg-yellow-900/40 dark:text-yellow-300 dark:border-yellow-800/60';
  if(s.includes('体'))return 'bg-red-100 text-red-800 border-red-200 dark:bg-red-900/40 dark:text-red-300 dark:border-red-800/60';
  if(s.includes('理'))return 'bg-green-100 text-green-800 border-green-200 dark:bg-green-900/40 dark:text-green-300 dark:border-green-800/60';
  if(s.includes('社'))return 'bg-orange-100 text-orange-800 border-orange-200 dark:bg-orange-900/40 dark:text-orange-300 dark:border-orange-800/60';
  if(s.includes('英')||s.includes('外'))return 'bg-fuchsia-100 text-fuchsia-800 border-fuchsia-200 dark:bg-fuchsia-900/40 dark:text-fuchsia-300 dark:border-fuchsia-800/60';
  if(s.includes('音'))return 'bg-pink-100 text-pink-800 border-pink-200 dark:bg-pink-900/40 dark:text-pink-300 dark:border-pink-800/60';
  if(s.includes('図')||s.includes('美')||s.includes('工'))return 'bg-cyan-100 text-cyan-800 border-cyan-200 dark:bg-cyan-900/40 dark:text-cyan-300 dark:border-cyan-800/60';
  if(s.includes('家'))return 'bg-amber-100 text-amber-800 border-amber-200 dark:bg-amber-900/40 dark:text-amber-300 dark:border-amber-800/60';
  if(s.includes('道'))return 'bg-purple-100 text-purple-800 border-purple-200 dark:bg-purple-900/40 dark:text-purple-300 dark:border-purple-800/60';
  if(s.includes('総'))return 'bg-indigo-100 text-indigo-800 border-indigo-200 dark:bg-indigo-900/40 dark:text-indigo-300 dark:border-indigo-800/60';
  if(s.includes('学')||s.includes('活')||s.includes('生'))return 'bg-teal-100 text-teal-800 border-teal-200 dark:bg-teal-900/40 dark:text-teal-300 dark:border-teal-800/60';
  return 'bg-slate-100 text-slate-800 border-slate-200 dark:bg-slate-800 dark:text-slate-300 dark:border-slate-700';
}

function getTeacherLoadDetails(){
    let loads={};
    (state.teachers||[]).forEach(t=>loads[t.id]={total:0, items:[]});
    Object.keys(state.classAssignments||{}).forEach(cls=>{
        const g=cls.split('-')[0], d=state.classAssignments[cls];
        (state.subjects||[]).forEach(sub=>{
            let hrs=parseInt(sub.stdHours?.[g])||0; if(hrs===0) return;
            if((state.specialBlocks||[]).some(b=>b.subjectId===sub.id&&b.targets?.includes(cls))) return;
            const ovr=d.overrides?.[sub.id]||{};
            if(ovr.allocations?.length>0){
                ovr.allocations.forEach(a=>{ if(a.teacherId&&loads[a.teacherId]) { let h=parseInt(a.hours)||0; loads[a.teacherId].total+=h; loads[a.teacherId].items.push({cls, sub:sub.name, hrs:h}); } });
            } else {
                const tid=ovr.teacherId||d.homeroom;
                if(tid&&loads[tid]) { loads[tid].total+=hrs; loads[tid].items.push({cls, sub:sub.name, hrs}); }
            }
        });
    });
    (state.specialBlocks||[]).forEach(b=>{
        const subName = safeFind(state.subjects,'id',b.subjectId)?.name||'特殊';
        (b.teachers||[]).forEach(bt=>{
            if(bt.id&&loads[bt.id]) { let h=parseInt(bt.hours)||0; loads[bt.id].total+=h; loads[bt.id].items.push({cls: (b.targets||[]).join(','), sub:subName, hrs:h, sp:true}); }
        });
    });
    return loads;
}
function getTeacherLoads(){ let l={}; const dets=getTeacherLoadDetails(); Object.keys(dets).forEach(k=>l[k]=dets[k].total); return l; }

function isGlobalBlock(d, p) { return state.globalBlocks && state.globalBlocks[`${d}-${p}`]; }
function isTeacherNG(tid, d, p) { const t = safeFind(state.teachers, 'id', tid); return t && t.ngTimes && t.ngTimes[`${d}-${p}`]; }
function isRoomNG(rid, d, p) { const r = safeFind(state.rooms, 'name', rid); return r && r.ngTimes && r.ngTimes[`${d}-${p}`]; }
function getClassHomeroom(cls) { return state.classAssignments?.[cls]?.homeroom; }

function render(){
    const scrollEl = document.getElementById('step-content');
    const scrollPos = scrollEl ? scrollEl.scrollTop : 0;
    const currentStep = state.currentStep;

            </button>
            <button onclick="actions.openQuickSaveModal()" class="text-[9px] font-black bg-emerald-50 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-400 border border-emerald-200 dark:border-emerald-800/50 px-2 py-1.5 rounded-lg shadow-sm hover:bg-emerald-100 dark:hover:bg-emerald-800 transition-colors">💾 記録</button>

        `;

    document.getElementById('progress-dots').innerHTML=Array.from({length:10},(_,i)=>`<div class="step-dot ${i+1<=state.currentStep?'active !bg-blue-600':''}"></div>`).join('');

    const nb=document.getElementById('btn-next'), nt=document.getElementById('btn-next-text'), pb=document.getElementById('btn-prev');
    if (pb) { pb.style.visibility = (state.currentStep === 1 ? 'hidden' : 'visible'); pb.onclick = () => { if(state.currentStep > 1) { state.currentStep--; render(); } }; }

    if(nb && nt){
        nb.onclick = null;
        if(state.currentStep===9){ nt.innerText="マラソン確認"; nb.className="m3-btn-primary w-[160px] md:w-[180px] bg-indigo-600"; nb.onclick = () => { state.currentStep++; render(); };

        }else{ nt.innerText="次へ進む"; nb.className="m3-btn-primary w-[160px] md:w-[180px]"; nb.onclick = () => { state.currentStep++; render(); }; }
    }

    const content=document.getElementById('step-content');
    if(content){try{content.innerHTML=window[`viewStep${state.currentStep}`]();}catch(e){console.error(e);}}

    if (scrollEl && state.currentStep === currentStep) {
        requestAnimationFrame(() => { scrollEl.scrollTop = scrollPos; });
    } else if (scrollEl) {
        scrollEl.scrollTop = 0;
    }
}

window.viewStep6 = ()=>{
    const classes=state.classAssignments?Object.keys(state.classAssignments):[];

    const cData=state.classAssignments[activeCls]||{}, grade=activeCls.split('-')[0], loads=getTeacherLoads();
    
    let totalClassHrs = 0;
    (state.subjects||[]).forEach(s => totalClassHrs += (parseInt(s.stdHours?.[grade])||0));
    
    let tOpts='<option value="">-- 未設定 --</option>'+(state.teachers||[]).map(t=>`<option value="${t.id}">${t.name}</option>`).join('');
    const tOptsSel=cData.homeroom?tOpts.replace(`value="${cData.homeroom}"`,`value="${cData.homeroom}" selected`):tOpts;
    const hrName=safeFind(state.teachers,'id',cData.homeroom)?.name||'未設定';

    return `<div class="flex flex-col lg:flex-row h-full gap-3 md:gap-4 overflow-hidden">
        <div class="w-full lg:w-1/6 min-w-[120px] bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-800 rounded-2xl flex flex-col overflow-hidden h-1/4 lg:h-full shadow-sm">
            <div class="p-2 border-b border-slate-200 dark:border-slate-700 font-black text-[10px] text-slate-500 bg-slate-100 dark:bg-slate-800 flex justify-center items-center">クラス一覧</div>
            <div class="flex-1 overflow-y-auto p-2 space-y-1 content-start flex lg:flex-col flex-wrap lg:flex-nowrap gap-1">
                ${classes.map(c=>{
                    const isSel=c===activeCls,tN=safeFind(state.teachers,'id',state.classAssignments[c]?.homeroom)?.name||'(未定)';
                    return `<div onclick="actions.setDashFilter('${c}')" class="p-2 rounded-xl cursor-pointer transition-all border ${isSel?'bg-blue-600 text-white border-blue-700 shadow-md':'bg-white dark:bg-slate-900 dark:text-slate-300 border-slate-200 dark:border-slate-800 hover:bg-blue-50'} flex flex-col min-w-[80px]"><span class="font-black text-sm">${c}</span><span class="text-[9px] truncate ${isSel?'text-blue-100':'text-slate-400'}">${tN}</span></div>`;
                }).join('')}
            </div>
        </div>
        <div class="flex-1 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl flex flex-col overflow-hidden shadow-sm">
            <div class="p-3 bg-blue-50 dark:bg-blue-900/20 border-b dark:border-slate-800 flex justify-between items-center flex-wrap gap-2">
                <h3 class="text-lg font-black text-blue-900 dark:text-blue-300 tracking-tight">${activeCls} 担当割 <span class="ml-2 px-2 py-1 bg-white dark:bg-slate-800 rounded-lg shadow-sm text-xs border dark:border-slate-700">合計: <span class="text-blue-600 dark:text-blue-400">${totalClassHrs}</span> コマ</span></h3>
                <div class="flex items-center gap-2 bg-white dark:bg-slate-900 px-3 py-1.5 rounded-xl border dark:border-slate-700"><span class="text-xs font-bold text-slate-500">担任:</span><select onchange="actions.updateHomeroom('${activeCls}',this.value)" class="m3-input !p-1 !text-sm border-none font-black text-blue-700 dark:text-blue-400 w-32 !bg-transparent">${tOptsSel}</select></div>
            </div>
            <div class="flex-1 overflow-y-auto p-2 md:p-4 custom-scrollbar space-y-1.5 pb-10">
                ${(state.subjects||[]).map(s=>{
                    const stdH=parseInt(s.stdHours?.[grade])||0; if(stdH<=0) return '';
                    const spBlocks=(state.specialBlocks||[]).filter(b=>b.subjectId===s.id&&b.targets?.includes(activeCls));
                    const spH = spBlocks.reduce((sum, b) => sum + (parseInt(b.hours)||0), 0);
                    const normH = stdH - spH;
                    let rowsHtml = '';
                    
                    spBlocks.forEach(b=>{ 
                        const tNames=b.teachers?.length?b.teachers.map(bt=>`${safeFind(state.teachers,'id',bt.id)?.name||'?'}`).join(','):'未設定';
                        let spFixedHtml = `<div class="col-span-4 flex flex-wrap gap-1 px-2 pb-1.5 pt-0.5">`;
                        for(let fi=0; fi<b.hours; fi++) { spFixedHtml += `<select onchange="actions.updateSpecialFixedTime('${b.id}', ${fi}, this.value)" class="text-[9px] p-0.5 rounded border ${b.fixedTimes?.[fi]?'bg-amber-100 border-amber-300 text-amber-800 font-bold':'bg-white dark:bg-slate-900 text-slate-400 dark:border-slate-700'} outline-none cursor-pointer"><option value="">自動</option>${DAYS.map(d=>PERIODS.map(p=>`<option value="${d}-${p}" ${b.fixedTimes?.[fi]===`${d}-${p}`?'selected':''}>${d}${p}固定</option>`).join('')).join('')}</select>`; }
                        spFixedHtml += `</div>`;
                        rowsHtml+=`<div class="bg-indigo-50/40 dark:bg-indigo-900/10 rounded-xl mb-1 border-l-4 border-indigo-400 border border-indigo-100 dark:border-indigo-800/50"><div class="grid grid-cols-[1fr_50px_1.5fr_1fr] gap-2 p-1.5 pt-2 items-center"><div class="font-black text-sm pl-2 dark:text-indigo-300">${s.name} <span class="px-1 py-0.5 rounded text-[8px] bg-indigo-100 dark:bg-indigo-800 text-indigo-700 ml-1">特殊</span></div><div class="text-center font-black text-indigo-600 text-xs">${b.hours}</div><div class="text-[10px] font-bold text-indigo-700 bg-white dark:bg-slate-800 p-1.5 rounded-lg border dark:border-slate-700 truncate shadow-sm">🔒 ${tNames}</div><div class="text-[10px] font-bold text-slate-500 bg-white dark:bg-slate-800 p-1.5 rounded-lg border dark:border-slate-700 truncate shadow-sm">📍 ${b.room||s.defaultRoom}</div></div>${spFixedHtml}</div>`;
                    });
                    
                    if(normH > 0){
                        const ovr=cData.overrides?.[s.id]||{};
                        let defRoom = s.defaultRoom || '通常教室';
                        if(s.gradeRooms && s.gradeRooms[grade]) defRoom = s.gradeRooms[grade]; // 反映
                        
                        let rmOptsStr=`<option value="">${defRoom}</option>`+(state.rooms||[]).map(r=>`<option value="${r.name}">${r.name}</option>`).join('');
                        if(ovr.room)rmOptsStr=rmOptsStr.replace(`value="${ovr.room}"`,`value="${ovr.room}" selected`);
                        
                        let tOptsSub=`<option value="">担任 (${hrName})</option>`+(state.teachers||[]).map(t=>`<option value="${t.id}">${t.name}</option>`).join('');
                        if(ovr.teacherId)tOptsSub=tOptsSub.replace(`value="${ovr.teacherId}"`,`value="${ovr.teacherId}" selected`);
                        
                        let teacherArea = ovr.allocations?.length>0 ? `<div class="flex items-center gap-1"><div onclick="actions.openAllocModal('${activeCls}','${s.id}',${normH})" class="text-[10px] bg-blue-50 text-blue-700 px-3 py-1.5 rounded-lg border border-blue-200 font-bold truncate flex-1 cursor-pointer">🔗 分配済み</div><button onclick="actions.clearAllocations('${activeCls}','${s.id}')" class="text-slate-300 hover:text-red-500 px-2 font-bold">✕</button></div>` : `<div class="flex items-center gap-1"><select onchange="actions.updateSubjectOverride('${activeCls}','${s.id}','teacherId',this.value)" class="m3-input w-full !p-1.5 !bg-white dark:!bg-slate-900">${tOptsSub}</select><button onclick="actions.openAllocModal('${activeCls}','${s.id}',${normH})" class="bg-slate-100 hover:bg-slate-200 dark:bg-slate-700 dark:hover:bg-slate-600 text-slate-600 dark:text-slate-300 px-3 py-1.5 rounded-lg font-bold text-[10px] whitespace-nowrap shadow-sm border border-slate-200 dark:border-slate-600">分割</button></div>`;
                        
                        let fixedHtml = `<div class="col-span-4 flex flex-wrap gap-1 px-2 pb-1.5 pt-0.5">`;
                        for(let fi=0; fi<normH; fi++) { fixedHtml += `<select onchange="actions.updateSubjectFixedTime('${activeCls}', '${s.id}', ${fi}, this.value)" class="text-[9px] p-0.5 rounded border ${ovr.fixedTimes?.[fi]?'bg-amber-100 border-amber-300 text-amber-800 font-bold shadow-sm':'bg-white dark:bg-slate-900 text-slate-400 dark:border-slate-700'} outline-none cursor-pointer"><option value="">自動配置</option>${DAYS.map(d=>PERIODS.map(p=>`<option value="${d}-${p}" ${ovr.fixedTimes?.[fi]===`${d}-${p}`?'selected':''}>${d}${p}固定</option>`).join('')).join('')}</select>`; }
                        fixedHtml += `</div>`;
                        
                        rowsHtml += `<div class="bg-slate-50 dark:bg-slate-800/80 rounded-xl mb-1 border dark:border-slate-700 transition-colors hover:bg-white"><div class="grid grid-cols-[1fr_50px_1.5fr_1fr] gap-2 p-1.5 pt-2 items-center"><div class="font-black text-sm pl-2 dark:text-slate-200">${s.name}</div><div class="text-center font-black text-blue-600 text-xs">${normH}</div><div>${teacherArea}</div><div><select onchange="actions.updateSubjectOverride('${activeCls}','${s.id}','room',this.value)" class="m3-input !p-1.5 w-full !bg-white dark:!bg-slate-900">${rmOptsStr}</select></div></div>${fixedHtml}</div>`;
                    }
                    return rowsHtml;
                }).join('')}
            </div>
        </div>
    </div>`;
};

    } else {
        const fOpts=state.dashView==='class'?classes.map(c=>`<option value="${c}" ${c===state.dashFilter?'selected':''}>${c}</option>`).join(''):teachers.map(t=>`<option value="${t.id}" ${t.id===state.dashFilter?'selected':''}>${t.name}</option>`).join('');

        PERIODS.forEach(p=>{ html+=`<div class="bg-slate-50 dark:bg-slate-900 flex items-center justify-center font-black text-xs border-r dark:border-slate-800 dark:text-slate-400">${p}限</div>`;

                const ls=(state.generatedSchedule?.[d]?.[p]||[]).filter(l=>state.dashView==='class'?l.targets?.includes(state.dashFilter):l.teacherIds?.includes(state.dashFilter));

        });
        html+=`</div></div>`;
    }
    html += `</div>`; return html;
};

    updateSubjectOverride:(cls,sid,k,v)=>{if(!state.classAssignments)state.classAssignments={};if(!state.classAssignments[cls])state.classAssignments[cls]={overrides:{}};if(!state.classAssignments[cls].overrides)state.classAssignments[cls].overrides={};if(!state.classAssignments[cls].overrides[sid])state.classAssignments[cls].overrides[sid]={};if(v==="")delete state.classAssignments[cls].overrides[sid][k];else state.classAssignments[cls].overrides[sid][k]=v;render();},
    removeSpecialBlock:(idx)=>{if(state.specialBlocks)state.specialBlocks.splice(idx,1);render();},
    updateSpecialBlock:(id,k,v)=>{const b=safeFind(state.specialBlocks,'id',id);if(b)b[k]=(k==='hours'?Math.max(1,parseInt(v)||1):v);render();},
    toggleSpecialTarget:(id,cls)=>{const b=safeFind(state.specialBlocks,'id',id);if(b){if(!b.targets)b.targets=[];const i=b.targets.indexOf(cls);if(i>-1)b.targets.splice(i,1);else b.targets.push(cls);}render();},
    toggleSpecialTeacher:(id,tid)=>{const b=safeFind(state.specialBlocks,'id',id);if(b){if(!b.teachers)b.teachers=[];const i=b.teachers.findIndex(x=>x.id===tid);if(i>-1)b.teachers.splice(i,1);else b.teachers.push({id:tid, hours: b.hours});}render();},
    updateSpecialFixedTime:(id, idx, val)=>{const b=safeFind(state.specialBlocks,'id',id);if(b){if(!b.fixedTimes)b.fixedTimes=[];b.fixedTimes[idx]=val;render();}},
    openAllocModal:(cls,sId,sh)=>{const cd=state.classAssignments?.[cls],ovr=cd?.overrides?.[sId]||{},rows=ovr.allocations?.length>0?JSON.parse(JSON.stringify(ovr.allocations)):[{teacherId:(ovr.teacherId||cd?.homeroom||''),hours:sh}];state.allocationModal={cls,subId:sId,stdHours:sh,rows};actions.showAllocModalUI();},
    showAllocModalUI:()=>{ const m=state.allocationModal; let tOpts='<option value="">担任</option>'+(state.teachers||[]).map(t=>`<option value="${t.id}" ${t.id===m.rows[0].teacherId?'selected':''}>${t.name}</option>`).join(''); let h=`<div class="flex justify-between items-center mb-4 border-b pb-2 shrink-0"><h3 class="font-black text-blue-900">${m.cls} ${safeFind(state.subjects,'id',m.subId).name} 担当分配</h3><button onclick="actions.closeModal()" class="text-slate-400 font-bold">✕</button></div><div class="flex-1 overflow-y-auto custom-scrollbar p-1"><p class="text-[10px] font-bold text-slate-500 mb-3">週 ${m.stdHours} コマを教員に割り振ります。</p><div class="space-y-2">`; m.rows.forEach((r,i)=>{ h+=`<div class="flex gap-2 items-center bg-slate-50 p-2 rounded-lg border border-slate-200"><select onchange="actions.updateAllocRow(${i},'teacherId',this.value)" class="m3-input flex-1 !bg-white">${tOpts.replace('selected','')}</select><div class="flex items-center gap-1"><input type="number" value="${r.hours}" onchange="actions.updateAllocRow(${i},'hours',this.value)" class="w-12 text-center font-black text-blue-600 bg-white border p-1.5 rounded-lg text-sm"><span class="text-[10px] font-bold">コマ</span></div><button onclick="actions.removeAllocRow(${i})" class="text-rose-400 font-bold px-2">✕</button></div>`; }); h+=`</div><button onclick="actions.addAllocRow()" class="w-full mt-3 py-2 border-2 border-dashed border-slate-300 rounded-xl text-xs font-bold text-slate-400 hover:bg-slate-100">+ 教員を追加</button></div><div class="mt-4 flex justify-end shrink-0"><button onclick="actions.saveAllocModal()" class="m3-btn-primary !px-8">保存する</button></div>`; document.getElementById('modal-body').innerHTML=h; document.getElementById('modal-overlay').classList.remove('hidden');},
    updateAllocRow:(i,k,v)=>{if(state.allocationModal){if(k==='hours')state.allocationModal.rows[i][k]=Math.max(0,parseInt(v)||0);else state.allocationModal.rows[i][k]=v;actions.showAllocModalUI();}},
    removeAllocRow:(i)=>{if(state.allocationModal){state.allocationModal.rows.splice(i,1);actions.showAllocModalUI();}},
    addAllocRow:()=>{if(state.allocationModal){state.allocationModal.rows.push({teacherId:'',hours:1});actions.showAllocModalUI();}},
    saveAllocModal:()=>{if(!state.allocationModal)return;const m=state.allocationModal,tot=m.rows.reduce((s,r)=>s+(parseInt(r.hours)||0),0);if(tot!==m.stdHours)return showToast(`合計が${m.stdHours}になるようにしてください`,'error');if(!state.classAssignments[m.cls].overrides)state.classAssignments[m.cls].overrides={};if(!state.classAssignments[m.cls].overrides[m.subId])state.classAssignments[m.cls].overrides[m.subId]={};if(m.rows.length===1){state.classAssignments[m.cls].overrides[m.subId].teacherId=m.rows[0].teacherId;delete state.classAssignments[m.cls].overrides[m.subId].allocations;}else{state.classAssignments[m.cls].overrides[m.subId].allocations=JSON.parse(JSON.stringify(m.rows));}actions.closeModal();render();},
    clearAllocations:(cls,sId)=>{if(state.classAssignments[cls].overrides[sId]){delete state.classAssignments[cls].overrides[sId].allocations; render();}},
    closeModal: () => { document.getElementById('modal-overlay').classList.add('hidden'); },
    updateSubjectFixedTime:(cls, sid, idx, val)=>{if(!state.classAssignments[cls].overrides[sid])state.classAssignments[cls].overrides[sid]={}; if(!state.classAssignments[cls].overrides[sid].fixedTimes)state.classAssignments[cls].overrides[sid].fixedTimes=[]; state.classAssignments[cls].overrides[sid].fixedTimes[idx]=val; render();},
    openQuickSaveModal: () => { const slots = Array.from({length: 10}, (_, i) => i + 1); let h = `<div class="flex justify-between items-center mb-4 border-b pb-2 shrink-0"><h3 class="text-lg font-black text-blue-900">💾 セーブ/ロード (全10スロット)</h3><button onclick="actions.closeModal()" class="text-slate-400 font-bold">✕</button></div><div class="flex flex-col gap-2 overflow-y-auto custom-scrollbar pr-1 flex-1">`; slots.forEach(i => { let meta=null; try { meta=JSON.parse(localStorage.getItem('tt_v15_save_meta_'+i)); }catch(e){} const isEmpty=!meta; h+=`<div class="flex items-center justify-between p-3 border rounded-xl ${isEmpty?'bg-slate-50 border-dashed':'bg-white shadow-sm'}"><div class="flex flex-col"><span class="text-[10px] font-black text-slate-400">Slot ${i}</span><span class="text-xs font-bold ${isEmpty?'text-slate-300':'text-slate-700'}">${isEmpty?'空きスロット':meta.name}</span><span class="text-[8px] text-slate-400">${isEmpty?'':meta.time}</span></div><div class="flex gap-1"><button onclick="actions.quickSave(${i})" class="px-3 py-1.5 bg-blue-600 text-white rounded-lg text-[10px] font-bold">セーブ</button><button onclick="actions.quickLoad(${i})" class="px-3 py-1.5 bg-emerald-600 text-white rounded-lg text-[10px] font-bold ${isEmpty?'opacity-30 cursor-not-allowed':''}" ${isEmpty?'disabled':''}>ロード</button></div></div>`; }); h+=`</div>`; document.getElementById('modal-body').innerHTML=h; document.getElementById('modal-overlay').classList.remove('hidden'); },
    quickSave: (s) => { const n=prompt("データ名を入力してください"); if(!n)return; const meta={name:n,time:new Date().toLocaleString()}; try{ localStorage.setItem('tt_v15_save_'+s,JSON.stringify(state)); localStorage.setItem('tt_v15_save_meta_'+s,JSON.stringify(meta)); showToast("セーブ完了","success"); actions.openQuickSaveModal(); }catch(e){showToast("保存容量オーバー","error");} },
    quickLoad: (s) => { if(confirm("ロードしますか？")){ const d=localStorage.getItem('tt_v15_save_'+s); if(d){ Object.assign(state,JSON.parse(d)); forceInitState(); render(); showToast("ロード完了","success"); actions.closeModal(); } } },
    exportData:()=>{const blob=new Blob([JSON.stringify(state)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`timetable_v15_backup.json`;a.click();},
    importData:()=>{const i=document.createElement('input');i.type='file';i.accept='.json';i.onchange=e=>{const f=e.target.files[0];const r=new FileReader();r.onload=ev=>{Object.assign(state,JSON.parse(ev.target.result));forceInitState();render();showToast("読込完了","success");};r.readAsText(f);};i.click();},
    openExportModal: () => { let html = `<div class="flex justify-between items-center mb-4 border-b pb-2 shrink-0"><h3 class="text-lg font-black text-blue-900">📤 スプレッドシート出力</h3><button onclick="actions.closeModal()" class="text-slate-400 font-bold">✕</button></div><div class="flex flex-col gap-4 overflow-y-auto pr-1 flex-1 min-h-0"><div class="flex flex-col gap-2 p-3 bg-slate-50 rounded-xl border border-slate-200"><label class="flex items-center gap-2 cursor-pointer p-2 hover:bg-white rounded-lg transition-colors"><input type="checkbox" id="exp-mat-class" checked class="w-4 h-4 text-blue-600"><span class="font-bold text-sm">全体マトリックス (クラス)</span></label><label class="flex items-center gap-2 cursor-pointer p-2 hover:bg-white rounded-lg transition-colors"><input type="checkbox" id="exp-ind-class" checked class="w-4 h-4 text-blue-600"><span class="font-bold text-sm">各クラス時間割 (配布用)</span></label><label class="flex items-center gap-2 cursor-pointer p-2 hover:bg-white rounded-lg transition-colors"><input type="checkbox" id="exp-ind-teacher" class="w-4 h-4 text-blue-600"><span class="font-bold text-sm">各教員時間割 (配布用)</span></label></div><div class="flex justify-end mt-2"><button onclick="actions.exportToSpreadsheetExec()" class="m3-btn-primary">スプレッドシートを作成</button></div></div>`; document.getElementById('modal-body').innerHTML = html; document.getElementById('modal-overlay').classList.remove('hidden'); },
    exportToSpreadsheetExec: async function() { const opts = { matrixClass: document.getElementById('exp-mat-class')?.checked||false, individualClass: document.getElementById('exp-ind-class')?.checked||false, individualTeacher: document.getElementById('exp-ind-teacher')?.checked||false }; actions.closeModal(); showLoading("出力中", "作成には数十秒かかります。"); try{ const res=await fetch(GAS_URL,{method:'POST',mode:'cors',body:JSON.stringify({action:'export',schedule:state.generatedSchedule,state:actions.preparePayload(), options:opts})}); const data=await res.json(); if(data.success) showToast("出力成功！","success"); else showToast("出力失敗","error"); }catch(e){showToast("エラー","error");} finally {hideLoading();} },
    startGeneration: async function(){ state.marathon.active = true; state.marathon.currentGen = 1; globalStartTime = Date.now(); state.best = {unassignedCount:9999, schedule:null, unassigned:null, scoreCard:null, reportDetails:null}; actions.runMarathonCycle(); },
    continueMarathon: async function(){ const addGen = parseInt(document.getElementById('dash-add-gen')?.value)||10; state.marathon.active = true; if(state.marathon.maxGen !== Infinity) state.marathon.maxGen += addGen; actions.runMarathonCycle(); },
    continueGeneration: function(){ state.marathon.active = false; actions.runSingleCycle("今の盤面を元に再調整中...", false); },
    cancelGeneration: () => { hideLoading(); state.marathon.active = false; if (state.best.schedule) { state.generatedSchedule = state.best.schedule; state.unassigned = state.best.unassigned; state.scoreCard = state.best.scoreCard; state.reportDetails = state.best.reportDetails; state.currentStep = 10; showToast(`中止。ベスト盤面を表示します。`, "info"); } else { state.currentStep = 9; } render(); },
    runMarathonCycle: async function(){ if (!state.marathon.active) return; const m = state.marathon; startGenTimer(); showLoading("AIマラソン中", `第 ${m.currentGen} / ${m.maxGen===Infinity?'∞':m.maxGen} 世代`, true, `目標:未配置${m.target}以下`); try { const res = await fetch(GAS_URL, { method:'POST', mode:'cors', body:JSON.stringify({ action:'generate', state: actions.preparePayload(), currentSchedule: null, unassigned: null }) }); const data = await res.json(); if (!state.marathon.active) return; if(data.success){ state.generatedSchedule = data.schedule; state.unassigned = data.unassigned; state.scoreCard = data.scoreCard; state.reportDetails = data.reportDetails; const bc = document.getElementById('loading-best-container'), br = document.getElementById('loading-best-record'), lr = document.getElementById('loading-latest-record'); if(bc && lr){ bc.classList.remove('hidden'); bc.classList.add('flex'); lr.innerText = data.unassigned.length; } if(data.unassigned.length < state.best.unassignedCount) { state.best = { unassignedCount: data.unassigned.length, schedule: data.schedule, unassigned: data.unassigned, scoreCard: data.scoreCard, reportDetails: data.reportDetails }; if (br) br.innerText = state.best.unassignedCount; } const goalReached = state.best.unassignedCount <= m.target, genLimitReached = m.currentGen >= m.maxGen; if (goalReached || genLimitReached) { state.generatedSchedule = state.best.schedule; state.unassigned = state.best.unassigned; state.scoreCard = state.best.scoreCard; state.reportDetails = state.best.reportDetails; state.currentStep=10; state.marathon.active = false; render(); hideLoading(); if (goalReached) showToast(`目標達成！未配置${state.best.unassignedCount}`, "success"); else showToast(`最大世代に達しました。`, "success"); } else { m.currentGen++; actions.runMarathonCycle(); } } else { if(m.ignoreFatal) { m.currentGen++; actions.runMarathonCycle(); } else { showToast("致命的エラー","error"); hideLoading(); state.marathon.active = false; } } } catch(e) { showToast("通信エラー","error"); hideLoading(); state.marathon.active = false; } },
    runSingleCycle: async function(status, isNew){ startGenTimer(); showLoading("計算中", status, true); try { const res = await fetch(GAS_URL, { method:'POST', mode:'cors', body:JSON.stringify({ action:'generate', state: actions.preparePayload(), currentSchedule: isNew?null:state.generatedSchedule, unassigned: state.unassigned }) }); const data = await res.json(); if(data.success) { state.generatedSchedule=data.schedule; state.unassigned=data.unassigned; state.scoreCard=data.scoreCard; state.reportDetails=data.reportDetails; state.currentStep=10; render(); hideLoading(); } else { showToast("エラー","error"); hideLoading(); } } catch(e) { showToast("通信エラー","error"); hideLoading(); } },
    preparePayload: () => { const pS = JSON.parse(JSON.stringify(state)); if (pS.advancedRules) { Object.keys(pS.advancedRules).forEach(k => { if (k === 'priorities') return; const oR = pS.advancedRules[k]; if (!Array.isArray(oR)) return; const exR = []; oR.forEach(r => { if (k === 'exclusivePairs') { const s1s = r.subjects1 || [r.subject1]; const s2s = r.subjects2 || [r.subject2]; s1s.forEach(s1 => s2s.forEach(s2 => { if(s1 !== s2) exR.push({subject1: s1, subject2: s2}); })); } else { const tgs = (r.targets?.length) ? r.targets : [undefined]; const excs = (r.excludes?.length) ? r.excludes : [undefined]; const subs = (r.subjects?.length) ? r.subjects : [undefined]; const dys = (r.days?.length) ? r.days : [undefined]; const pds = (r.periods?.length) ? r.periods : [undefined]; tgs.forEach(tg => excs.forEach(ex => subs.forEach(su => dys.forEach(dy => pds.forEach(pd => { let nr = {}; if (tg) nr.grade = tg; if (ex) nr.exclude = ex; if (su) nr.subject = su; if (dy) nr.day = dy; if (pd) nr.period = parseInt(pd.replace('限','')); exR.push(nr); }))))); } }); pS.advancedRules[k] = exR; }); } return pS; },
    openReportModal:()=>{ const sc = state.scoreCard; let h = `<div class="flex justify-between items-center mb-4 border-b pb-2 shrink-0"><h3 class="text-lg font-black text-blue-900 flex items-center gap-2">📊 AI自己採点レポート</h3><button onclick="actions.closeModal()" class="text-slate-400 font-bold">✕</button></div><div class="flex-1 overflow-y-auto custom-scrollbar pr-2 flex flex-col gap-4 min-h-0">`; h += `<div class="bg-slate-50 dark:bg-slate-800 p-4 rounded-xl border border-slate-200 dark:border-slate-800 shrink-0"><div class="flex justify-between items-center mb-2"><span class="font-black text-sm dark:text-slate-300">基礎ルール (配置率)</span><span class="font-black text-lg text-emerald-600">${sc.basic.score}%</span></div></div>`; const rules = sc.advanced.rules || {}; Object.keys(rules).forEach(k => { const r = rules[k], isP = r.score === 100; h += `<div class="bg-white dark:bg-slate-900 rounded-xl border ${isP ? 'border-emerald-200' : 'border-amber-300'} shadow-sm overflow-hidden shrink-0"><div class="px-4 py-2 flex justify-between items-center ${isP ? 'bg-emerald-50' : 'bg-amber-50'} border-b dark:border-slate-800"><span class="font-black text-xs ${isP ? 'text-emerald-800' : 'text-amber-800'}">${r.name}</span><span class="font-black text-sm">${r.score}%</span></div><div class="p-3">${r.failures?.length > 0 ? `<ul class="text-[10px] font-bold text-slate-600 dark:text-slate-400 space-y-1 list-disc pl-4">${r.failures.map(f => `<li>${f}</li>`).join('')}</ul>` : `<div class="text-[10px] font-bold text-emerald-600">✅ 完璧です</div>`}</div></div>`; }); document.getElementById('modal-body').innerHTML = h + `</div>`; document.getElementById('modal-overlay').classList.remove('hidden'); }
};

document.addEventListener('DOMContentLoaded',load);
</script>
<div id="allocation-modal-container"></div>
