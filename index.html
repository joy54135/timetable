<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>Smart TimeTable - Ver 14.0</title>
<script src="https://cdn.tailwindcss.com"></script><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style type="text/tailwindcss">
@layer utilities {
html, body { @apply h-full h-[100dvh] overflow-hidden m-0 p-0 font-sans bg-slate-100 text-slate-800; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
#app-container { @apply h-full h-[100dvh] flex flex-col p-2 md:p-4 pb-[max(16px,env(safe-area-inset-bottom))] max-w-[1800px] mx-auto w-full box-border overflow-hidden; }
.custom-scrollbar::-webkit-scrollbar { @apply w-1.5 h-1.5; } .custom-scrollbar::-webkit-scrollbar-thumb { @apply bg-slate-300 rounded-full; }
.m3-card { @apply bg-white rounded-2xl shadow-sm border border-slate-200 p-4 md:p-6 flex flex-col overflow-hidden min-h-0; }
.m3-btn-primary { @apply bg-blue-600 text-white px-6 py-3 rounded-xl font-black hover:bg-blue-700 active:scale-95 transition-all shadow-md shadow-blue-200 flex items-center justify-center gap-2 text-sm whitespace-nowrap; }
.m3-btn-secondary { @apply bg-white text-slate-600 border border-slate-300 px-6 py-3 rounded-xl font-black hover:bg-slate-50 active:scale-95 transition-all flex items-center justify-center gap-2 text-sm whitespace-nowrap; }
.m3-input { @apply p-2 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-blue-500 focus:bg-white font-bold text-xs transition-colors w-full; }
.step-dot { @apply h-2 w-2 rounded-full transition-all duration-300 bg-slate-200; } .step-dot.active { @apply bg-blue-600 w-8; }
.fade-in { animation: fadeIn 0.2s ease-out forwards; } @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.dash-cell { @apply min-h-[50px] p-1 border-r border-b border-slate-200 flex flex-col items-center justify-center gap-0.5 relative bg-white transition-colors cursor-pointer hover:bg-blue-50; }
input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
.sticky-col { @apply sticky left-0 z-10 bg-white border-r border-slate-200 shadow-[2px_0_4px_-2px_rgba(0,0,0,0.1)]; }
}
</style>
</head>
<body>
<div id="toast" class="fixed top-4 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full shadow-xl font-bold text-sm flex items-center gap-2 z-[9999] transition-all opacity-0 pointer-events-none"><span id="toast-msg"></span></div>
<div id="app-container">
    <header class="flex items-center justify-between mb-3 shrink-0 px-2">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-200 shrink-0"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
            <div><h1 class="text-xl font-black tracking-tight leading-none text-slate-800">Smart TimeTable</h1><p class="text-[10px] font-bold text-indigo-500 uppercase tracking-widest leading-tight">Next Gen (14.0 Unified Engine)</p></div>
        </div>
        <div class="flex items-center gap-1.5 shrink-0 flex-wrap justify-end">
            <button onclick="actions.openQuickSaveModal()" class="text-[10px] font-bold text-emerald-700 hover:text-emerald-900 px-3 py-1.5 bg-emerald-50 border border-emerald-200 rounded-lg shadow-sm transition-colors hidden sm:flex items-center gap-1">💾 セーブ＆ロード</button>
            <button onclick="actions.exportData()" class="text-[10px] font-bold text-slate-500 hover:text-blue-600 px-3 py-1.5 bg-white border border-slate-200 rounded-lg shadow-sm transition-colors ml-1 hidden md:block">JSON出力</button>
            <button onclick="actions.importData()" class="text-[10px] font-bold text-slate-500 hover:text-blue-600 px-3 py-1.5 bg-white border border-slate-200 rounded-lg shadow-sm transition-colors hidden md:block">JSON読込</button>
            <button onclick="actions.hardReset()" class="text-[10px] font-bold text-rose-500 hover:text-rose-700 px-3 py-1.5 bg-rose-50 border border-rose-100 rounded-lg transition-colors ml-1">リセット</button>
        </div>
    </header>
    <div class="m3-card flex-1 flex flex-col min-h-0 relative">
        <div class="flex items-center justify-between mb-4 shrink-0 border-b border-slate-100 pb-4"><h2 id="step-title" class="text-lg font-black text-slate-800"></h2><div id="progress-dots" class="flex gap-1.5 flex-wrap justify-center"></div></div>
        <div id="step-content" class="fade-in flex-1 overflow-hidden flex flex-col relative min-h-0"></div>
        <div class="flex justify-between items-center mt-4 pt-4 border-t border-slate-100 shrink-0" id="bottom-navigation">
            <button id="btn-prev" class="m3-btn-secondary w-[120px]">戻る</button><button id="btn-next" class="m3-btn-primary w-[180px]"><span id="btn-next-text">次へ進む</span></button>
        </div>
    </div>
</div>
<div id="modal-overlay" class="fixed inset-0 z-[150] flex items-center justify-center hidden p-4 bg-slate-900/60 backdrop-blur-sm"><div class="bg-white rounded-3xl p-6 max-w-2xl w-full shadow-2xl flex flex-col overflow-hidden max-h-[90vh]" id="modal-body"></div></div>
<div id="allocation-modal-container"></div>
<div id="loading-overlay" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[200] hidden items-center justify-center flex-col gap-4 transition-all">
    <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
    <div class="text-white text-center"><h3 class="text-lg font-black tracking-widest mb-1" id="loading-title">AI思考中...</h3><p class="text-blue-200 font-bold text-xs" id="loading-desc">しばらくお待ちください</p></div>
    <button id="btn-cancel-gen" onclick="actions.cancelGeneration()" class="mt-4 px-6 py-2 bg-slate-800 text-slate-300 border border-slate-600 rounded-full text-xs font-bold hover:bg-rose-900 hover:border-rose-500 hover:text-rose-200 transition-colors hidden shadow-lg">生成をキャンセルして戻る</button>
</div>

<script>
// ★ Ver 14.0 の新しいURL
var GAS_URL="httpshttps://script.google.com/macros/s/AKfycbygsfyDHBVsYwzZ_HSPmC3p8iHS-niXOjhdgLFDkZOl7dUysCjE2Olkz6rr4zDAhNIgsQ/exec";

var GRADES=[1,2,3,4,5,6], DAYS=['月','火','水','木','金'], PERIODS=[1,2,3,4,5,6];
var stepTitles=["1. 基本設定","2. 行事・不可枠","3. 教科と教室","4. 教員名簿","5. 特殊授業","6. クラス別担当","7. 教員別確認","8. 配置ルール","9. 最終点検","10. ダッシュボード"];
var state={currentStep:1, grades:{1:3,2:3,3:3,4:3,5:3,6:3}, periods:{}, rooms:[], subjects:[], teachers:[], globalBlocks:{}, specialBlocks:[], classAssignments:{}, advancedRules:{priorities:{}}, generatedSchedule:null, unassigned:[], reportDetails:{}, dashTab:'matrix', matrixAxis:'class', dashView:'class', dashFilter:'1-1', relayCount:0, maxRelayCount:0, selectedTeacherId:null, editingTeacherNameId:null, selectedDashCell:null, selectedUnassignedIdx:null, subjectsUndoStack:[], undoStack:[]};
var lastClickTime=0, lastClickId=null;

function safeFind(arr,k,v){return (arr||[]).find(x=>x[k]===v);}
function forceInitState(){
    if(!state.periods) state.periods={}; GRADES.forEach(g=>{if(!state.periods[g]) state.periods[g]={月:5,火:5,水:4,木:5,金:5};});
    if(!state.rooms?.length) state.rooms=[{id:'r1',name:'校庭',capacity:2,ngTimes:{}},{id:'r2',name:'体育館',capacity:2,ngTimes:{}},{id:'r3',name:'理科室',capacity:1,ngTimes:{}}];
    if(!state.subjects?.length) state.subjects=[{id:'s1',name:'国語',stdHours:{1:9,2:9,3:7,4:7,5:5,6:5},defaultRoom:'通常教室'},{id:'s2',name:'算数',stdHours:{1:4,2:5,3:5,4:5,5:5,6:5},defaultRoom:'通常教室'}];
    if(!state.grades) state.grades={1:3,2:3,3:3,4:3,5:3,6:3}; if(!state.classAssignments) state.classAssignments={};
    GRADES.forEach(g=>{for(let i=1;i<=(parseInt(state.grades[g])||1);i++){let c=`${g}-${i}`;if(!state.classAssignments[c]) state.classAssignments[c]={homeroom:'',overrides:{}};}});
    if(!state.advancedRules) state.advancedRules={}; if(!state.advancedRules.priorities) state.advancedRules.priorities={};
    ['homeroomOnlyTimes','avoidSpecialistTimes','maxIntervalSubjects','amPrioritySubjects','lastPeriodSubjects','avoidSpecificTimes','continuousClasses'].forEach(r=>{if(!state.advancedRules[r]) state.advancedRules[r]=[];});
}
function load(){try{const d=localStorage.getItem('tt_v13_stable');if(d){const p=JSON.parse(d);Object.assign(state,p);}}catch(e){} forceInitState(); render();}

function showToast(msg,type='info'){const t=document.getElementById('toast'),m=document.getElementById('toast-msg');if(!t||!m)return; t.className=`fixed top-4 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full shadow-xl font-bold text-sm z-[9999] transition-all opacity-100 ${type==='success'?'bg-emerald-600 text-white':(type==='error'?'bg-rose-600 text-white':'bg-slate-800 text-white')}`; m.innerText=msg; setTimeout(()=>t.classList.replace('opacity-100','opacity-0'),3000);}
function showLoading(t,d,showCancel=false){
    const l=document.getElementById('loading-overlay'), cBtn=document.getElementById('btn-cancel-gen');
    if(l){document.getElementById('loading-title').innerText=t;document.getElementById('loading-desc').innerText=d;if(showCancel)cBtn.classList.remove('hidden');else cBtn.classList.add('hidden');l.classList.replace('hidden','flex');}
}
function hideLoading(){const l=document.getElementById('loading-overlay');if(l)l.classList.replace('flex','hidden');}
function getSubColor(s){if(!s)return 'bg-slate-100 text-slate-500 border-slate-200';if(s.includes('国'))return 'bg-blue-100 text-blue-800 border-blue-200';if(s.includes('算'))return 'bg-yellow-100 text-yellow-800 border-yellow-200';if(s.includes('体'))return 'bg-red-100 text-red-800 border-red-200';if(s.includes('理'))return 'bg-green-100 text-green-800 border-green-200';return 'bg-slate-100 text-slate-800 border-slate-200';}
function getTeacherLoads(){let loads={};(state.teachers||[]).forEach(t=>loads[t.id]=0);Object.keys(state.classAssignments||{}).forEach(cls=>{const g=cls.split('-')[0],d=state.classAssignments[cls];(state.subjects||[]).forEach(sub=>{let hrs=parseInt(sub.stdHours?.[g])||0;if(hrs===0)return;if((state.specialBlocks||[]).some(b=>b.subjectId===sub.id&&b.targets?.includes(cls)))return;const ovr=d.overrides?.[sub.id]||{};if(ovr.allocations?.length>0)ovr.allocations.forEach(a=>{if(a.teacherId&&loads[a.teacherId]!==undefined)loads[a.teacherId]+=(parseInt(a.hours)||0);});else{const tid=ovr.teacherId||d.homeroom;if(tid&&loads[tid]!==undefined)loads[tid]+=hrs;}});});(state.specialBlocks||[]).forEach(b=>(b.teachers||[]).forEach(bt=>{if(bt.id&&loads[bt.id]!==undefined)loads[bt.id]+=(parseInt(bt.hours)||0);}));return loads;}

function render(){
    try{localStorage.setItem('tt_v13_stable',JSON.stringify(state));}catch(e){}
    let scrollPos={};document.querySelectorAll('.custom-scrollbar').forEach(el=>{if(el.id)scrollPos[el.id]={t:el.scrollTop,l:el.scrollLeft};});
    document.getElementById('step-title').innerText=stepTitles[state.currentStep-1]||'';
    const nb=document.getElementById('btn-next'),nt=document.getElementById('btn-next-text');
    if(nb&&nt){if(state.currentStep===9){nt.innerText="AI自動生成";nb.className="m3-btn-primary w-[180px] bg-indigo-600 hover:bg-indigo-700";}else if(state.currentStep===10){nt.innerText="スプレッドシート出力";nb.className="m3-btn-primary w-[180px] bg-emerald-600 hover:bg-emerald-700";}else{nt.innerText="次へ進む";nb.className="m3-btn-primary w-[180px]";}}
    document.getElementById('btn-prev').style.visibility=(state.currentStep===1?'hidden':'visible');
    document.getElementById('progress-dots').innerHTML=state.currentStep===10?'':Array.from({length:9},(_,i)=>`<div class="step-dot ${i+1<=state.currentStep?'active':''}"></div>`).join('');
    const content=document.getElementById('step-content');
    if(content){try{content.innerHTML=window[`viewStep${state.currentStep}`]();}catch(e){content.innerHTML=`<div class="p-8 text-center flex flex-col items-center justify-center h-full"><p class="text-red-500 font-bold mb-4">データ不整合による描画エラー。</p><button onclick="actions.hardReset()" class="px-6 py-3 bg-rose-500 text-white rounded-xl font-black shadow-lg">完全リセットして自己修復</button></div>`;console.error(e);}}
    document.getElementById('allocation-modal-container').innerHTML=renderAllocationModal();
    setTimeout(()=>{Object.keys(scrollPos).forEach(id=>{const el=document.getElementById(id);if(el){el.scrollTop=scrollPos[id].t;el.scrollLeft=scrollPos[id].l;}});},0);
}
function buildGrid(ngMap,gMap,actStr){return `<div class="overflow-x-auto w-full custom-scrollbar min-h-0"><table class="border-separate border-spacing-1 table-fixed w-max mx-auto"><thead><tr><th class="w-8"></th>${DAYS.map(d=>`<th class="text-center text-xs font-black text-slate-400 w-9">${d}</th>`).join('')}</tr></thead><tbody>${PERIODS.map(p=>`<tr><td class="text-right pr-2 text-[10px] font-bold text-slate-400">${p}限</td>${DAYS.map(d=>{const k=`${d}-${p}`,gl=gMap?.[k],ng=ngMap?.[k],cls=`w-8 h-8 border rounded-lg flex items-center justify-center cursor-pointer font-bold text-xs transition-colors ${gl?'bg-slate-800 text-white shadow-md':(ng?'bg-rose-50 border-rose-300 text-rose-500':'bg-white border-slate-200 text-slate-200 hover:bg-blue-50')}`;return `<td class="p-0"><div onclick="${actStr.replace('__KEY__',k)}" class="${cls}">${gl?'■':(ng?'✕':'〇')}</div></td>`;}).join('')}</tr>`).join('')}</tbody></table></div>`;}
function renderAllocationModal(){if(!state.allocationModal)return '';const m=state.allocationModal,sName=safeFind(state.subjects,'id',m.subId)?.name||'';let t=0;const rowsHtml=m.rows.map((r,i)=>{t+=parseInt(r.hours)||0;return `<div class="flex items-center gap-2 mb-3 bg-slate-50 p-2 rounded-xl border border-slate-200 shadow-sm"><span class="text-xs font-black text-slate-400 w-4">${i+1}.</span><select onchange="actions.updateAllocRow(${i},'teacherId',this.value)" class="m3-input w-full flex-1 !py-1.5 shadow-none"><option value="">-- 教員を選択 --</option>${(state.teachers||[]).map(tc=>`<option value="${tc.id}" ${tc.id===r.teacherId?'selected':''}>${tc.name}</option>`).join('')}</select><div class="flex items-center gap-1 bg-white border border-slate-200 rounded-lg px-1"><button onclick="actions.updateAllocRow(${i},'hours',Math.max(1,${r.hours}-1))" class="w-6 h-6 text-slate-500 font-black hover:bg-slate-100 rounded">-</button><input type="number" min="1" value="${r.hours}" onchange="actions.updateAllocRow(${i},'hours',this.value)" class="w-8 text-center font-black text-blue-600 outline-none bg-transparent !py-1" /><button onclick="actions.updateAllocRow(${i},'hours',${r.hours}+1)" class="w-6 h-6 text-slate-500 font-black hover:bg-slate-100 rounded">+</button></div><button onclick="actions.removeAllocRow(${i})" class="text-red-400 hover:text-red-600 font-bold px-2 py-1 bg-white border border-red-100 rounded-lg">✕</button></div>`;}).join('');const isM=t===m.stdHours;return `<div class="fixed inset-0 z-[250] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-in fade-in duration-200"><div class="bg-white rounded-[32px] p-6 md:p-8 max-w-md w-full shadow-2xl flex flex-col"><div class="flex justify-between items-center mb-1"><h3 class="text-xl font-black text-blue-900">${m.cls} ${sName}</h3><span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-lg text-xs font-black border border-blue-200">全 ${m.stdHours} コマ</span></div><p class="text-[10px] text-slate-500 mb-4 font-bold">複数教員で分配</p><div class="flex-1 overflow-y-auto mb-4 max-h-[40vh] pr-2 custom-scrollbar">${rowsHtml}<button onclick="actions.addAllocRow()" class="mt-2 w-full text-xs font-black text-blue-600 bg-blue-50 py-3 rounded-xl hover:bg-blue-100 border border-blue-100">+ 教員を追加</button></div><div class="p-3 rounded-xl mb-6 text-center font-bold text-sm shadow-inner border ${isM?'bg-green-50 text-green-600 border-green-200':'bg-red-50 text-red-600 border-red-200'}">現在: <span class="text-lg font-black">${t}</span> / ${m.stdHours} コマ${!isM?'<br><span class="text-[10px] font-black opacity-80 mt-1">※ 一致させてください</span>':''}</div><div class="flex gap-3"><button onclick="actions.closeAllocModal()" class="flex-1 p-3 font-bold text-slate-500 bg-slate-100 rounded-xl hover:bg-slate-200">キャンセル</button><button onclick="actions.saveAllocModal()" class="flex-1 p-3 font-black text-white bg-blue-600 rounded-xl hover:bg-blue-700 disabled:opacity-50" ${!isM?'disabled':''}>保存</button></div></div></div>`;}

window.viewStep1 = ()=>`<div class="flex flex-col gap-6 h-full overflow-y-auto custom-scrollbar pr-2" id="sc-step1"><div class="bg-slate-50 rounded-2xl p-4 border border-slate-200 shadow-inner"><h3 class="font-black text-sm mb-3">学級数の設定</h3><div class="grid grid-cols-3 md:grid-cols-6 gap-3">${GRADES.map(g=>`<div class="bg-white p-3 rounded-xl border border-slate-200 shadow-sm flex flex-col items-center"><span class="text-slate-500 font-bold text-xs mb-2">${g}年</span><div class="flex items-center gap-2"><button onclick="actions.updateGrade(${g},-1)" class="w-6 h-6 rounded bg-slate-100 hover:bg-slate-200 font-black text-slate-500">-</button><input type="number" value="${state.grades?.[g]||1}" onchange="actions.setGrade(${g},this.value)" class="w-10 text-xl font-black text-blue-600 text-center outline-none bg-transparent" min="1" max="10"><button onclick="actions.updateGrade(${g},1)" class="w-6 h-6 rounded bg-slate-100 hover:bg-slate-200 font-black text-slate-500">+</button></div></div>`).join('')}</div></div><div class="bg-slate-50 rounded-2xl p-4 border border-slate-200 shadow-inner"><h3 class="font-black text-sm mb-3">時数設定</h3><div class="overflow-x-auto"><table class="w-full text-xs text-center border-collapse min-w-[500px]"><thead><tr><th class="p-2 border-b text-slate-500">学年</th>${DAYS.map(d=>`<th class="p-2 border-b font-black text-slate-700">${d}曜</th>`).join('')}</tr></thead><tbody>${GRADES.map(g=>`<tr><td class="p-2 font-bold border-b text-slate-600">${g}年</td>${DAYS.map(d=>`<td class="p-2 border-b"><div class="flex items-center justify-center gap-1"><button onclick="actions.updatePeriod(${g},'${d}',-1)" class="w-6 h-6 bg-white shadow-sm border border-slate-200 rounded-lg font-black text-slate-500">-</button><input type="number" value="${state.periods?.[g]?.[d]||0}" onchange="actions.setPeriod(${g},'${d}',this.value)" class="w-8 text-center font-black text-blue-600 outline-none bg-transparent"><button onclick="actions.updatePeriod(${g},'${d}',1)" class="w-6 h-6 bg-white shadow-sm border border-slate-200 rounded-lg font-black text-slate-500">+</button></div></td>`).join('')}</tr>`).join('')}</tbody></table></div><div class="mt-5 flex flex-wrap gap-3 justify-center">${GRADES.map(g=>{let s=0;DAYS.forEach(d=>s+=parseInt(state.periods?.[g]?.[d]||0));return `<div class="bg-white border border-slate-200 rounded-xl px-4 py-2 shadow-sm flex items-center gap-2"><span class="text-xs font-bold text-slate-500">${g}年 合計</span><span class="text-lg font-black text-blue-600">${s}</span><span class="text-[10px] font-bold text-slate-400">コマ</span></div>`;}).join('')}</div></div></div>`;
window.viewStep2 = ()=>`<div class="flex flex-col items-center justify-center h-full text-center space-y-4" id="sc-step2"><h2 class="text-xl font-black">行事・全校不可枠設定</h2><p class="text-xs text-slate-500 max-w-md">学校全体で授業を入れない時間帯</p><div class="bg-slate-50 border border-slate-200 rounded-3xl p-4 shadow-inner">${buildGrid(null,state.globalBlocks,"actions.toggleBlock('__KEY__')")}</div></div>`;
window.viewStep3 = ()=>{const rmOpts=`<option value="通常教室">通常教室</option>`+(state.rooms||[]).map(r=>`<option value="${r.name}">${r.name}</option>`).join('');return `<div class="flex flex-col md:flex-row gap-4 h-full"><div class="w-full md:w-1/4 flex flex-col bg-slate-50 rounded-2xl border border-slate-200 p-3 h-1/3 md:h-full"><div class="flex justify-between items-center mb-3"><h3 class="font-black text-xs">特別教室</h3><button onclick="actions.addRoom()" class="text-[10px] bg-blue-50 text-blue-600 border px-2 py-1 rounded-md font-bold hover:bg-blue-100">+ 追加</button></div><div class="flex-1 overflow-y-auto custom-scrollbar space-y-1.5 pr-1" id="sc-step3-l">${(state.rooms||[]).map((r,i)=>`<div class="flex items-center gap-1 bg-white p-1.5 rounded-lg border shadow-sm"><input type="text" value="${r.name}" onchange="actions.updateRoomName('${r.id}',this.value)" class="flex-1 min-w-0 text-xs font-bold outline-none"><div class="flex items-center gap-0.5 ml-1"><button onclick="actions.updateRoomCapacity('${r.id}',Math.max(1,${r.capacity||1}-1))" class="w-4 h-4 bg-slate-100 rounded text-slate-500 font-black">-</button><input type="number" value="${r.capacity||1}" onchange="actions.updateRoomCapacity('${r.id}',this.value)" min="1" class="w-6 text-xs font-black text-center bg-transparent outline-none"><button onclick="actions.updateRoomCapacity('${r.id}',${r.capacity||1}+1)" class="w-4 h-4 bg-slate-100 rounded text-slate-500 font-black">+</button></div><div class="flex flex-col gap-0.5 ml-1"><button onclick="actions.moveItem('rooms',${i},-1)" class="text-[8px] text-slate-400 hover:text-blue-600 font-black leading-none px-1" ${i===0?'disabled':''}>▲</button><button onclick="actions.moveItem('rooms',${i},1)" class="text-[8px] text-slate-400 hover:text-blue-600 font-black leading-none px-1" ${i===(state.rooms?.length||0)-1?'disabled':''}>▼</button></div><button onclick="actions.removeRoom('${r.id}')" class="text-slate-300 hover:text-rose-500 font-bold px-1">✕</button></div>`).join(' saveSlot:(i)=>{

closeAllocModal:()=>{state.allocationModal=null;render();},
addAllocRow:()=>{if(state.allocationModal)state.allocationModal.rows.push({teacherId:'',hours:1});render();},
updateAllocRow:(i,k,v)=>{if(state.allocationModal){if(k==='hours')state.allocationModal.rows[i][k]=Math.max(0,parseInt(v)||0);else state.allocationModal.rows[i][k]=v;}render();},
removeAllocRow:(i)=>{if(state.allocationModal)state.allocationModal.rows.splice(i,1);render();},
saveAllocModal:()=>{if(!state.allocationModal)return;const m=state.allocationModal,tot=m.rows.reduce((s,r)=>s+(parseInt(r.hours)||0),0);if(tot!==m.stdHours)return showToast(`合計を${m.stdHours}コマに合わせてください`,'error');if(m.rows.some(r=>!r.teacherId))return showToast('教員を選択','error');if(!state.classAssignments[m.cls].overrides)state.classAssignments[m.cls].overrides={};if(!state.classAssignments[m.cls].overrides[m.subId])state.classAssignments[m.cls].overrides[m.subId]={};if(m.rows.length===1){state.classAssignments[m.cls].overrides[m.subId].teacherId=m.rows[0].teacherId;delete state.classAssignments[m.cls].overrides[m.subId].allocations;}else{state.classAssignments[m.cls].overrides[m.subId].allocations=JSON.parse(JSON.stringify(m.rows));}state.allocationModal=null;render();showToast('分配を保存しました','success');},
clearAllocations:(cls,sId)=>{if(state.classAssignments?.[cls]?.overrides?.[sId]){delete state.classAssignments[cls].overrides[sId].allocations;render();showToast('リセットしました','success');}},
setDashTab:(v)=>{state.dashTab=v;state.selectedDashCell=null;state.selectedUnassignedIdx=null;render();},
setMatrixAxis:(v)=>{state.matrixAxis=v;state.selectedDashCell=null;state.selectedUnassignedIdx=null;render();},
setDashView:(v)=>{state.dashView=v;state.selectedDashCell=null;state.selectedUnassignedIdx=null;render();},
setDashFilter:(v)=>{state.dashFilter=v;render();},
selectUnassigned:(i)=>{state.selectedUnassignedIdx=state.selectedUnassignedIdx===i?null:i;state.selectedDashCell=null;render();},
clickMatrixCell:(d,p,aId)=>{
    if(state.selectedUnassignedIdx!==null){
        actions.pushUndo();const lesson=state.unassigned[state.selectedUnassignedIdx];
        if(!state.generatedSchedule[d])state.generatedSchedule[d]={};if(!state.generatedSchedule[d][p])state.generatedSchedule[d][p]=[];
        let warn=false;lesson.teacherIds.forEach(tid=>{if(state.generatedSchedule[d][p].some(l=>l.teacherIds.includes(tid)))warn=true;});
        if(warn)showToast("⚠️ 教員の重複が発生しています","error");else showToast("強制配置しました","success");
        state.generatedSchedule[d][p].push(lesson);state.unassigned.splice(state.selectedUnassignedIdx,1);state.selectedUnassignedIdx=null;render();return;
    }
    if(!state.selectedDashCell){state.selectedDashCell={d,p,axisId:aId};render();}
    else{
        const c1=state.selectedDashCell,c2={d,p,axisId:aId};
        if(c1.d!==c2.d||c1.p!==c2.p||c1.axisId!==c2.axisId){
            actions.pushUndo();
            if(!state.generatedSchedule[c1.d])state.generatedSchedule[c1.d]={};if(!state.generatedSchedule[c2.d])state.generatedSchedule[c2.d]={};
            let ls1=state.generatedSchedule[c1.d][c1.p]||[],ls2=state.generatedSchedule[c2.d][c2.p]||[];
            let it1=[],it2=[];
            if(state.dashTab!=='individual'){
                if(!state.matrixAxis||state.matrixAxis==='class'){it1=ls1.filter(l=>l.targets?.includes(c1.axisId));it2=ls2.filter(l=>l.targets?.includes(c2.axisId));}
                if(state.matrixAxis==='teacher'){it1=ls1.filter(l=>l.teacherIds?.includes(c1.axisId));it2=ls2.filter(l=>l.teacherIds?.includes(c2.axisId));}
                if(state.matrixAxis==='room'){it1=ls1.filter(l=>l.room===c1.axisId);it2=ls2.filter(l=>l.room===c2.axisId);}
            }else{
                if(state.dashView==='class'){it1=ls1.filter(l=>l.targets?.includes(c1.axisId));it2=ls2.filter(l=>l.targets?.includes(c2.axisId));}
                if(state.dashView==='teacher'){it1=ls1.filter(l=>l.teacherIds?.includes(c1.axisId));it2=ls2.filter(l=>l.teacherIds?.includes(c2.axisId));}
            }
            it1.forEach(i=>ls1.splice(ls1.indexOf(i),1));it2.forEach(i=>ls2.splice(ls2.indexOf(i),1));
            ls2.push(...it1);ls1.push(...it2);
            state.generatedSchedule[c1.d][c1.p]=ls1;state.generatedSchedule[c2.d][c2.p]=ls2;
        }
        state.selectedDashCell=null;render();
    }
},
openBulk:(type)=>{document.getElementById('modal-overlay').classList.remove('hidden');document.getElementById('modal-body').innerHTML=`<h3 class="text-xl font-black mb-2">${type==='rooms'?'教室':'教員'}一括貼付</h3><textarea id="bulk-txt" class="w-full h-40 p-4 bg-slate-50 border rounded-xl mb-4 text-xs font-bold" placeholder="改行区切りで貼付"></textarea><div class="flex gap-4"><button onclick="document.getElementById('modal-overlay').classList.add('hidden')" class="flex-1 p-3 bg-slate-100 rounded-xl font-bold">キャンセル</button><button onclick="actions.processBulk('${type}')" class="flex-1 bg-blue-600 text-white rounded-xl font-black">追加</button></div>`;},
processBulk:(type)=>{let c=0;document.getElementById('bulk-txt').value.split('\n').forEach((r,i)=>{const nm=r.split('\t')[0].trim();if(!nm||(i===0&&(nm.includes('名')||nm==='教室'||nm==='教員')))return;if(type==='rooms'){if(!state.rooms)state.rooms=[];state.rooms.push({id:'r_'+Date.now()+Math.random(),name:nm,capacity:1,ngTimes:{}});}if(type==='teachers'){if(!state.teachers)state.teachers=[];state.teachers.push({id:'t_'+Date.now()+Math.random(),name:nm,maxHours:24,homeroom:'',ngTimes:{},assignments:[]});}c++;});document.getElementById('modal-overlay').classList.add('hidden');render();showToast(`${c}件追加しました`,'success');},
pushUndo:()=>{if(!state.undoStack)state.undoStack=[];state.undoStack.push(JSON.stringify(state.generatedSchedule));if(state.undoStack.length>15)state.undoStack.shift();},
undo:()=>{if(state.undoStack?.length>0){state.generatedSchedule=JSON.parse(state.undoStack.pop());state.selectedDashCell=null;state.selectedUnassignedIdx=null;render();showToast('戻しました','success');}},
showDiagnostic:(key)=>{
    const diag=state.reportDetails?.[key];if(!diag)return showToast("詳細データがありません");
    document.getElementById('modal-overlay').classList.remove('hidden');
    let html=`<h3 class="text-xl font-black text-blue-900 mb-2">【AI診断】${diag.target}：${diag.subject}</h3><p class="text-xs text-slate-500 mb-6 font-bold">配置できなかった原因と対策</p><div class="space-y-4 mb-6 overflow-y-auto pr-2 custom-scrollbar">`;
    if(diag.causes?.length>0){diag.causes.forEach(c=>{const sol=c.type==="教員の都合"?`Step 4で${c.detail.split('先生')[0]}先生の「✕」を減らしてください。`:(c.type==="アルゴリズムの限界"||c.type==="厳守ルールの衝突"?`Step 8で優先度「高」のルールを緩和してください。`:`Step 3で${c.detail.split('が')[0]}の使用制限を緩和してください。`);html+=`<div class="bg-slate-50 p-4 rounded-2xl border border-slate-200 shadow-inner"><div class="flex justify-between items-start mb-2"><span class="bg-rose-100 text-rose-700 px-2 py-0.5 rounded text-[10px] font-black">${c.type}</span><span class="text-sm font-black text-rose-600">影響度: ${c.impact}%</span></div><p class="text-xs font-bold text-slate-700 mb-2">原因：${c.detail}</p><div class="bg-blue-50/50 p-3 rounded-xl border border-blue-100"><p class="text-[10px] font-black text-blue-700 mb-1">💡 対策</p><p class="text-xs font-bold text-blue-800">${sol}</p></div></div>`;});}else html+=`<div class="text-center py-6 text-sm font-bold text-slate-400">条件が厳しすぎる可能性があります。</div>`;
    document.getElementById('modal-body').innerHTML=html+`</div><button onclick="document.getElementById('modal-overlay').classList.add('hidden')" class="w-full p-4 bg-slate-800 text-white font-black rounded-2xl">閉じる</button>`;
},
hardReset:()=>{localStorage.removeItem('tt_v13_stable');location.reload();},
resetAndGenerate:()=>{if(!confirm("配置結果をリセットし、最初から計算しますか？"))return;state.generatedSchedule=null;state.unassigned=[];state.reportDetails={};actions.startGeneration();},

cancelGeneration:()=>{
    if(window.abortController) window.abortController.abort();
    hideLoading(); state.currentStep=9; render(); showToast("生成をキャンセルしました","error");
},
startGeneration:async function(){
    if(!GAS_URL||GAS_URL.includes("ここに"))return showToast("URL未設定です","error");
    state.maxRelayCount=parseInt(document.getElementById('relay-setting')?.value||1)*2;state.relayCount=1;
    showLoading("AI自動生成中...",`初期配置と最適化（リレー ${state.relayCount}/${state.maxRelayCount}回目）`, true);
    state.generatedSchedule=null;state.unassigned=[];state.reportDetails={};
    window.abortController = new AbortController();
    try{
        const res=await fetch(GAS_URL,{method:'POST',mode:'cors',signal:window.abortController.signal,body:JSON.stringify({action:'generate',state,currentSchedule:null,unassigned:null})});
        if(!res.ok)throw new Error("サーバーエラー");const data=await res.json();
        if(data.success){state.generatedSchedule=data.schedule;state.unassigned=data.unassigned;state.reportDetails=data.reportDetails;if(data.isComplete||state.relayCount>=state.maxRelayCount){state.currentStep=10;state.undoStack=[];state.selectedDashCell=null;render();showToast(data.isComplete?"生成完了！":"一時停止しました",data.isComplete?"success":"info");hideLoading();}else actions.autoContinueGeneration();}else{showToast("生成エラー: "+data.message,"error");hideLoading();}
    }catch(e){if(e.name==='AbortError')return; showToast("通信エラーが発生しました","error");hideLoading();}
},
autoContinueGeneration:async function(){
    state.relayCount++;showLoading("AI継続生成中...",`未配置コマの最適化（リレー ${state.relayCount}/${state.maxRelayCount}回目）`, true);
    window.abortController = new AbortController();
    try{
        const res=await fetch(GAS_URL,{method:'POST',mode:'cors',signal:window.abortController.signal,body:JSON.stringify({action:'generate',state,currentSchedule:state.generatedSchedule,unassigned:state.unassigned})});
        if(!res.ok)throw new Error("サーバーエラー");const data=await res.json();
        if(data.success){state.generatedSchedule=data.schedule;state.unassigned=data.unassigned;state.reportDetails=data.reportDetails;if(data.isComplete||state.relayCount>=state.maxRelayCount){state.currentStep=10;state.undoStack=[];state.selectedDashCell=null;render();showToast(data.isComplete?"生成完了！":"一時停止しました",data.isComplete?"success":"info");hideLoading();}else actions.autoContinueGeneration();}else{showToast("生成エラー: "+data.message,"error");render();hideLoading();}
    }catch(e){if(e.name==='AbortError')return; showToast("通信エラー。途中結果を表示します","error");state.currentStep=10;render();hideLoading();}
},
continueGeneration:()=>{state.maxRelayCount=state.relayCount+(parseInt(document.getElementById('relay-setting-dash')?.value||1)*2);actions.autoContinueGeneration();},
exportToSpreadsheet:async function(){
    if(!state.generatedSchedule)return;showLoading("出力中...","複数のシートを作成しています...", false);
    try{
        const res=await fetch(GAS_URL,{method:'POST',mode:'cors',body:JSON.stringify({action:'export',schedule:state.generatedSchedule,state})});const data=await res.json();
        if(data.success)showToast("出力に成功しました！","success");else showToast("出力エラー: "+data.message,"error");
    }catch(e){showToast("通信エラー","error");}finally{hideLoading();}
},
exportData:()=>{const a=document.createElement('a');a.href="data:text/json;charset=utf-8,"+encodeURIComponent(JSON.stringify(state));a.download="timetable.json";a.click();},
importData:()=>{const i=document.createElement('input');i.type='file';i.onchange=e=>{const r=new FileReader();r.readAsText(e.target.files[0]);r.onload=ev=>{try{const p=JSON.parse(ev.target.result);Object.assign(state,p);forceInitState();state.currentStep=1;render();showToast("読込完了","success");}catch(err){showToast("読込エラー","error");}}};i.click();}
};

document.getElementById('btn-next').onclick=()=>{if(state.currentStep===9)actions.startGeneration();else if(state.currentStep<10){state.currentStep++;render();}else actions.exportToSpreadsheet();};
document.getElementById('btn-prev').onclick=()=>{if(state.currentStep>1){state.currentStep--;render();}};
document.addEventListener('DOMContentLoaded',load);
</script>
</body>
</html>
