<body>

<script>
// =========================================
// 最新版URL (Ver 15.9.0 バックエンド)
// =========================================
var GAS_URL="https://script.google.com/macros/s/AKfycbx6etJIgL1vDrXIfo0rZqZwkb-be78MWY2d00tcUs8Zoe53xnpf4H17AZzCfqjVbUU1SQ/exec";

var GRADES=[1,2,3,4,5,6], DAYS=['月','火','水','木','金'], PERIODS=[1,2,3,4,5,6];
var stepTitles=["1. 基本設定","2. 行事・不可枠","3. 教科と教室設定","4. 教員名簿と不可枠","5. 特殊授業ビルダー","6. クラス別担当設定","7. 教員別 持ち時数確認","8. 配置ルール詳細","9. 最終点検","10. 司令塔(ダッシュボード)"];
var marathonGens = [10, 30, 50, 100, Infinity];

const step8Packages = [
  { id: "pkg1", title: "【基本構造】 パズルの骨組み", desc: "授業の分散や連続設定など、時間割の骨格を定義します。",
    items: [
      { key: "limitOneSubjectPerDayStrict", type: "boolean", title: "同日重複を禁止 (分散)", desc: "同じクラスに同じ教科が1日に2回以上入ることを防ぐ", tip: "児童の集中力維持と、毎日の学習習慣定着のために重要です。" },
      { key: "continuousClasses", type: "array", fields: ['target', 'exclude', 'subject'], format: "[target] ただし [exclude] を除く の [subject] を2コマ連続にする", title: "連続授業（ニコイチ）", desc: "図工や家庭科など、2コマ連続で配置したい教科と、配置枠の固定を指定する", tip: "教科ごとに「1-2, 3-4, 5-6限のみに固定するか」と「優先度」を選べます。" },
      { key: "exclusivePairs", type: "array", fields: ['subject1', 'subject2'], format: "[subject1] と [subject2] を同じ日にしない", title: "同日実施回避 (排他ペア)", desc: "体育(中)と体育(外)など、重なると負担が大きい教科を指定する", tip: "児童の肉体的負担を分散させます。" },
      { key: "maxIntervalSubjects", type: "array", fields: ['target', 'exclude', 'subject'], format: "[target] ただし [exclude] を除く の [subject] は連日配置を避ける", title: "実施日を離す教科 (等間隔)", desc: "体育などが連日にならないよう、前日・翌日を避ける", tip: "体力回復や学習の定着期間を確保します。" }
    ]
  },
  { id: "pkg2", title: "【教員連携・外部対応】 チームワーク同期", desc: "学年会議、若手フォロー、外部支援員などの予定を同期します。",
    items: [
      { key: "homeroomOnlyTimes", type: "array", fields: ['target', 'exclude', 'day', 'period'], format: "[target] ただし [exclude] を除く の [day]曜 [period]限 は専科を入れない", title: "担任授業固定枠 (専科ブロック)", desc: "行事準備等で専科を入れない枠を指定する", tip: "学年一斉の活動時間を確保しやすくします。" },
      { key: "avoidSpecialistTimes", type: "array", fields: ['day', 'period'], format: "全校の [day]曜 [period]限 は専科授業を避ける", title: "専科回避指定枠", desc: "会議や出張が多い時間帯に専科授業を避ける", tip: "専科教員の校務分掌時間を確保します。" }
    ]
  },
  { id: "pkg3", title: "【児童配慮】 学習リズムと集中力", desc: "児童の脳の活性化度や疲労度に合わせた教科配置を行います。",
    items: [
      { key: "amPrioritySubjects", type: "array", fields: ['target', 'exclude', 'subject'], format: "[target] ただし [exclude] を除く の [subject] は午前に優先配置", title: "午前に優先して配置する教科", desc: "国語や算数など、主要教科を1〜4限に集める", tip: "脳が最も活性化している時間帯に重要単元を学習させます。" },
      { key: "lastPeriodSubjects", type: "array", fields: ['target', 'exclude', 'subject'], format: "[target] ただし [exclude] を除く の [subject] は最終コマに配置", title: "最終コマに優先して配置する教科", desc: "クラブ、委員会、総合など", tip: "活動的な授業を午後の最後に配置し、メリハリをつけます。" }
    ]
  },
  { id: "pkg4", title: "【安全・円滑】 生活動線とバッファ", desc: "移動・着替え・片付けなどの時間を確保し、トラブルを防ぎます。",
    items: [
      { key: "avoidSpecificTimes", type: "array", fields: ['target', 'exclude', 'subject', 'day', 'period'], format: "[target] ただし [exclude] を除く の [subject] は [day]曜 [period]限 を避ける", title: "特定の時間帯への配置を避ける", desc: "「午後の体育」など、ピンポイントで避ける", tip: "熱中症対策や、直後の移動混雑を防ぎます。" },
      { key: "homeroomBufferSubjects", type: "array", fields: ['target', 'exclude', 'subject'], format: "[target] ただし [exclude] を除く の [subject] の前後に担任バッファを確保", title: "担任裁量バッファ (延長・準備枠)", desc: "家庭科や図工等の前後に「担任の空き」か「担任授業」を確保する", tip: "片付けの延長に柔軟に対応し、トラブルを防ぎます。" }
    ]
  }
];

var state={currentStep:1, grades:{1:3,2:3,3:3,4:3,5:3,6:3}, periods:{}, rooms:[], subjects:[], teachers:[], globalBlocks:{}, specialBlocks:[], classAssignments:{}, advancedRules:{priorities:{}}, ruleEditor:{}, openPkgs:{pkg1:true}, generatedSchedule:null, unassigned:[], reportDetails:{}, scoreCard:null, dashTab:'matrix', matrixAxis:'class', dashView:'class', dashFilter:'', marathon: {active:false, target:0, maxGen:10, currentGen:1, relaxRules:false}, best: {unassignedCount:9999, schedule:null, unassigned:null, scoreCard:null, reportDetails:null}, selectedTeacherId:null, editingTeacherId:null, editingSubjectId:null, editingTeacherLimitId:null, specialBuilder: {type:'joint', subjectId:'', hours:1, room:'通常教室', targets:[], teachers:[]}, openSpecialEdits:{}, subjectsUndoStack:[], rulesUndoStack:[], heatmapLesson:null};

function safeFind(arr,k,v){return (arr||[]).find(x=>x[k]===v);}
function forceInitState(){
    if(!state.periods) state.periods={}; GRADES.forEach(g=>{if(!state.periods[g]) state.periods[g]={月:5,火:5,水:4,木:5,金:5};});
    if(!state.rooms?.length) state.rooms=[{id:'r1',name:'校庭',capacity:2,ngTimes:{}},{id:'r2',name:'体育館',capacity:2,ngTimes:{}},{id:'r3',name:'理科室',capacity:1,ngTimes:{}}];
    if(!state.subjects?.length) state.subjects=[{id:'s1',name:'国語',stdHours:{1:9,2:9,3:7,4:7,5:5,6:5},defaultRoom:'通常教室', gradeRooms:{}},{id:'s2',name:'算数',stdHours:{1:4,2:5,3:5,4:5,5:5,6:5},defaultRoom:'通常教室', gradeRooms:{}}];
    if(!state.grades) state.grades={1:3,2:3,3:3,4:3,5:3,6:3}; if(!state.classAssignments) state.classAssignments={};
    GRADES.forEach(g=>{for(let i=1;i<=(parseInt(state.grades[g])||1);i++){let c=`${g}-${i}`;if(!state.classAssignments[c]) state.classAssignments[c]={homeroom:'',overrides:{}};}});
    if(!state.advancedRules) state.advancedRules={priorities:{}}; if(!state.ruleEditor) state.ruleEditor={}; if(!state.openPkgs) state.openPkgs={pkg1:true};
    if(!state.specialBuilder) state.specialBuilder={type:'joint', subjectId:(state.subjects[0]?.id||''), hours:1, room:'通常教室', targets:[], teachers:[]};
    if(!state.openSpecialEdits) state.openSpecialEdits={}; if(!state.subjectsUndoStack) state.subjectsUndoStack=[]; if(!state.rulesUndoStack) state.rulesUndoStack=[];
    if(typeof state.marathon.relaxRules === 'undefined') state.marathon.relaxRules = false;
    state.heatmapLesson = null;
    if(!state.best) state.best = {unassignedCount:9999, schedule:null, unassigned:null, scoreCard:null, reportDetails:null};
}

function load(){ try{const d=localStorage.getItem('tt_v15_9_0');if(d){Object.assign(state,JSON.parse(d));}}catch(e){} forceInitState(); render(); }
function showToast(msg,type='info'){const t=document.getElementById('toast'),m=document.getElementById('toast-msg');if(!t||!m)return; t.className=`fixed top-4 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full shadow-xl font-bold text-sm z-[9999] transition-all opacity-100 ${type==='success'?'bg-emerald-600 text-white':(type==='error'?'bg-rose-600 text-white':'bg-blue-600 text-white')}`; m.innerText=msg; setTimeout(()=>t.classList.replace('opacity-100','opacity-0'),3000);}
function showLoading(t,d,showCancel=false, statusText=""){ const l=document.getElementById('loading-overlay'), cBtn=document.getElementById('btn-cancel-gen'), stEl=document.getElementById('loading-status'); if(l){ document.getElementById('loading-title').innerText=t; document.getElementById('loading-desc').innerText=d; if(statusText) { stEl.innerText=statusText; stEl.classList.remove('hidden'); stEl.classList.add('block'); } else { stEl.classList.add('hidden'); } if(showCancel)cBtn.classList.remove('hidden');else cBtn.classList.add('hidden'); l.classList.replace('hidden','flex'); } }
function hideLoading(){ stopGenTimer(); const l=document.getElementById('loading-overlay'); if(l)l.classList.replace('flex','hidden'); }

let genTimerInterval = null, sessionStartTime = null, globalStartTime = null;
function startGenTimer() { sessionStartTime = Date.now(); if (!globalStartTime) globalStartTime = Date.now(); if(genTimerInterval) clearInterval(genTimerInterval); genTimerInterval = setInterval(() => { const tEl = document.getElementById('loading-timer'), gEl = document.getElementById('global-timer-display'), now = Date.now(); if(tEl && sessionStartTime) tEl.innerText = ((now - sessionStartTime) / 1000).toFixed(1) + 's'; if(gEl && globalStartTime) gEl.innerText = `累計経過時間: ${((now - globalStartTime) / 1000).toFixed(1)}s`; }, 100); }
function stopGenTimer() { clearInterval(genTimerInterval); genTimerInterval = null; }

function getSubjectColor(s){
  if(!s)return 'bg-slate-100 text-slate-500 border-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700';
  const sub = s.toLowerCase();
  if(sub.includes('国')||sub.includes('書'))return 'bg-blue-50 text-blue-800 border-blue-200 dark:bg-blue-900/30 dark:text-blue-300 dark:border-blue-800/60';
  if(sub.includes('算')||sub.includes('数'))return 'bg-yellow-50 text-yellow-800 border-yellow-200 dark:bg-yellow-900/30 dark:text-yellow-300 dark:border-yellow-800/60';
  if(sub.includes('体'))return 'bg-red-50 text-red-800 border-red-200 dark:bg-red-900/30 dark:text-red-300 dark:border-red-800/60';
  if(sub.includes('理'))return 'bg-green-50 text-green-800 border-green-200 dark:bg-green-900/30 dark:text-green-300 dark:border-green-800/60';
  if(sub.includes('社'))return 'bg-orange-50 text-orange-800 border-orange-200 dark:bg-orange-900/30 dark:text-orange-300 dark:border-orange-800/60';
  if(sub.includes('外')||sub.includes('英'))return 'bg-purple-50 text-purple-800 border-purple-200 dark:bg-purple-900/30 dark:text-purple-300 dark:border-purple-800/60';
  if(sub.includes('音'))return 'bg-pink-50 text-pink-800 border-pink-200 dark:bg-pink-900/30 dark:text-pink-300 dark:border-pink-800/60';
  if(sub.includes('図')||sub.includes('工'))return 'bg-cyan-50 text-cyan-800 border-cyan-200 dark:bg-cyan-900/30 dark:text-cyan-300 dark:border-cyan-800/60';
  return 'bg-slate-50 text-slate-800 border-slate-200 dark:bg-slate-800 dark:text-slate-300';
}

function getTeacherLoadDetails(){
    let loads={}; (state.teachers||[]).forEach(t=>loads[t.id]={total:0, items:[]});
    Object.keys(state.classAssignments||{}).forEach(cls=>{
        const g=cls.split('-')[0], d=state.classAssignments[cls];
        (state.subjects||[]).forEach(sub=>{
            let hrs=parseInt(sub.stdHours?.[g])||0; if(hrs===0) return;
            if((state.specialBlocks||[]).some(b=>b.subjectId===sub.id&&b.targets?.includes(cls))) return;
            const ovr=d.overrides?.[sub.id]||{};
            if(ovr.allocations?.length>0){ ovr.allocations.forEach(a=>{ if(a.teacherId&&loads[a.teacherId]) { let h=parseInt(a.hours)||0; loads[a.teacherId].total+=h; loads[a.teacherId].items.push({cls, sub:sub.name, hrs:h}); } });
            } else { const tid=ovr.teacherId||d.homeroom; if(tid&&loads[tid]) { loads[tid].total+=hrs; loads[tid].items.push({cls, sub:sub.name, hrs}); } }
        });
    });
    (state.specialBlocks||[]).forEach(b=>{
        const subName = safeFind(state.subjects,'id',b.subjectId)?.name||'特殊';
        (b.teachers||[]).forEach(bt=>{ if(bt.id&&loads[bt.id]) { let h=parseInt(bt.hours)||0; loads[bt.id].total+=h; loads[bt.id].items.push({cls: (b.targets||[]).join(','), sub:subName, hrs:h, sp:true}); } });
    });
    return loads;
}

function getTeacherLoads(){ let l={}; const dets=getTeacherLoadDetails(); Object.keys(dets).forEach(k=>l[k]=dets[k].total); return l; }

// =========================================
// 無重力プロトコル (フォーカス＆スクロール維持)
// =========================================
let focusState = { id: null, start: 0, end: 0 };
let scrollState = { content: 0 };

function saveUIState() {
    const el = document.activeElement;
    if (el && el.id && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.tagName === 'SELECT')) {
        focusState = { id: el.id, start: el.selectionStart || 0, end: el.selectionEnd || 0 };
    } else { focusState = { id: null }; }
    const sc = document.getElementById('step-content');
    scrollState.content = sc ? sc.scrollTop : 0;
}

function restoreUIState() {
    const sc = document.getElementById('step-content');
    if (sc) sc.scrollTop = scrollState.content;

    if (focusState.id) {
        const el = document.getElementById(focusState.id);
        if (el) {
            el.focus();
            if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') {
                try { el.setSelectionRange(focusState.start, focusState.end); } catch(e){}
            }
        }
    }
}

function render(){
    saveUIState();
    try{localStorage.setItem('tt_v15_9_0',JSON.stringify(state));}catch(e){}
    
    const headerUtils = document.getElementById('step-header-utils');
    if (headerUtils) {
        headerUtils.innerHTML = `
            <button onclick="actions.toggleDarkMode()" class="p-1.5 rounded-lg text-slate-500 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
                <svg class="w-4 h-4 hidden dark:block text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                <svg class="w-4 h-4 block dark:hidden text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>
            </button>

            <button onclick="actions.exportData()" class="text-[9px] font-black bg-slate-50 dark:bg-slate-800 text-slate-500 dark:text-slate-400 border border-slate-200 dark:border-slate-700 px-2 py-1.5 rounded-lg shadow-sm hover:bg-slate-100 transition-colors">📤 出力(JSON)</button>

            <button onclick="actions.hardReset()" class="text-[9px] font-black bg-rose-50 dark:bg-rose-900/30 text-rose-500 dark:text-rose-400 border border-rose-100 dark:border-rose-800/50 px-2 py-1.5 rounded-lg shadow-sm hover:bg-rose-100 transition-colors">🗑️ リセット</button>
        `;
    }

    document.getElementById('step-title').innerText=stepTitles[state.currentStep-1]||'';
    document.getElementById('progress-dots').innerHTML=Array.from({length:10},(_,i)=>`<div class="step-dot ${i+1<=state.currentStep?'active !bg-blue-600':''}"></div>`).join('');
    
    const nb=document.getElementById('btn-next'), nt=document.getElementById('btn-next-text'), pb=document.getElementById('btn-prev');
    if (pb) { pb.style.visibility = (state.currentStep === 1 ? 'hidden' : 'visible'); pb.onclick = () => { if(state.currentStep > 1) { state.currentStep--; render(); } }; }
    if(nb && nt){
        nb.onclick = null;
        if(state.currentStep===9){ nb.style.display = 'none'; 
        }else if(state.currentStep===10){ nb.style.display = 'flex'; nt.innerText="完了して終了"; nb.className="m3-btn-primary w-[160px] md:w-[180px]"; nb.onclick = () => { if(confirm("設定を保存して終了しますか？")) window.close(); };
        }else{ nb.style.display = 'flex'; nt.innerText="次へ進む"; nb.className="m3-btn-primary w-[160px] md:w-[180px]"; nb.onclick = () => { state.currentStep++; render(); }; }
    }
    
    const content=document.getElementById('step-content');
    if(content){try{content.innerHTML=window[`viewStep${state.currentStep}`]();}catch(e){console.error(e);}}
    
    requestAnimationFrame(() => restoreUIState());
}

                let editView = '';

// --- Step 6 ---
window.viewStep6 = ()=>{
    const classes=state.classAssignments?Object.keys(state.classAssignments):[];
    if(classes.length===0)return '<div class="p-4 text-center font-bold text-slate-400">クラス設定がありません</div>';
    if(!state.dashFilter || !classes.includes(state.dashFilter)) state.dashFilter=classes[0];
    const activeCls=state.dashFilter, cData=state.classAssignments[activeCls]||{}, grade=activeCls.split('-')[0];
    
    let totalClassHrs = 0;
    (state.subjects||[]).forEach(s => totalClassHrs += (parseInt(s.stdHours?.[grade])||0));
    
    let tOpts='<option value="">-- 未設定 --</option>'+(state.teachers||[]).map(t=>`<option value="${t.id}">${t.name}</option>`).join('');
    const tOptsSel=cData.homeroom?tOpts.replace(`value="${cData.homeroom}"`,`value="${cData.homeroom}" selected`):tOpts;
    const hrName=safeFind(state.teachers,'id',cData.homeroom)?.name||'未設定';

    return `<div class="flex flex-col lg:flex-row h-full gap-3 md:gap-4 overflow-hidden">

            <div class="p-2 border-b dark:border-slate-700 font-black text-[10px] text-slate-500 dark:text-slate-400 flex justify-center items-center bg-slate-50 dark:bg-slate-900">クラス一覧</div>
            <div class="flex-1 overflow-y-auto p-2 space-y-1.5 flex lg:flex-col flex-wrap lg:flex-nowrap gap-1 custom-scrollbar">
                ${classes.map(c=>{
                    const isSel=c===activeCls, tN=safeFind(state.teachers,'id',state.classAssignments[c]?.homeroom)?.name||'(未定)';
                    return `<button onclick="actions.setDashFilter('${c}')" class="p-2 rounded-xl text-left border transition-all ${isSel?'bg-blue-600 text-white border-blue-700 shadow-md':'bg-white dark:bg-slate-900 dark:text-slate-300 border-slate-200 dark:border-slate-800 hover:bg-blue-50'} flex flex-col min-w-[80px] w-full"><span class="font-black text-sm">${c}</span><span class="text-[9px] truncate ${isSel?'text-blue-100 opacity-80':'text-slate-400'}">${tN}</span></button>`;
                }).join('')}
            </div>
        </div>
        <div class="flex-1 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl flex flex-col overflow-hidden shadow-sm">
            <div class="p-3 bg-blue-50/50 dark:bg-blue-900/10 border-b dark:border-slate-800 flex justify-between items-center flex-wrap gap-2">
                <div class="flex items-center gap-3"><h3 class="text-base font-black text-blue-900 dark:text-blue-300 tracking-tight">${activeCls} 担当割</h3><span class="px-2.5 py-1 bg-white dark:bg-slate-800 rounded-full shadow-sm text-[10px] font-black border dark:border-slate-700">合計: <span class="text-blue-600 text-sm">${totalClassHrs}</span> コマ</span></div>
                <div class="flex items-center gap-2 bg-white dark:bg-slate-800 px-3 py-1.5 rounded-xl border dark:border-slate-700 shadow-sm"><span class="text-[10px] font-bold text-slate-500">担任:</span><select id="cls-hr-${activeCls}" onchange="actions.updateHomeroom('${activeCls}',this.value)" class="m3-input !p-0 !text-sm border-none font-black text-blue-700 dark:text-blue-400 w-32 !bg-transparent">${tOptsSel}</select></div>
            </div>
            <div class="flex-1 overflow-y-auto p-2 md:p-4 custom-scrollbar space-y-1.5 pb-20">
                ${(state.subjects||[]).map(s=>{
                    const stdH=parseInt(s.stdHours?.[grade])||0; if(stdH<=0) return '';
                    const spBlocks=(state.specialBlocks||[]).filter(b=>b.subjectId===s.id&&b.targets?.includes(activeCls));
                    const spH = spBlocks.reduce((sum, b) => sum + (parseInt(b.hours)||0), 0);
                    const normH = stdH - spH;
                    let rowsHtml = '';
                    
                    spBlocks.forEach(b=>{ 
                        const tNames=b.teachers?.length?b.teachers.map(bt=>`${safeFind(state.teachers,'id',bt.id)?.name||'?'}`).join(','):'未設定';
                        let spFixedHtml = `<div class="col-span-4 flex flex-wrap gap-1 px-2 pb-1.5 pt-0.5">`;
                        for(let fi=0; fi<b.hours; fi++) { spFixedHtml += `<select id="cls-sp-fix-${b.id}-${fi}" onchange="actions.updateSpecialFixedTime('${b.id}', ${fi}, this.value)" class="text-[9px] p-0.5 rounded border ${b.fixedTimes?.[fi]?'bg-amber-100 border-amber-400 text-amber-800 font-bold shadow-sm':'bg-white dark:bg-slate-800 text-slate-400 dark:border-slate-700'} outline-none cursor-pointer"><option value="">自動配置</option>${DAYS.map(d=>PERIODS.map(p=>`<option value="${d}-${p}" ${b.fixedTimes?.[fi]===`${d}-${p}`?'selected':''}>${d}${p}固定</option>`).join('')).join('')}</select>`; }
                        spFixedHtml += `</div>`;
                        rowsHtml+=`<div class="bg-indigo-50/20 dark:bg-indigo-900/10 rounded-xl mb-1 border-l-4 border-indigo-400 border border-slate-100 dark:border-slate-800"><div class="grid grid-cols-[1.5fr_50px_2fr_1fr] gap-2 p-1.5 pt-2 items-center"><div class="font-black text-xs pl-1 text-indigo-900 dark:text-indigo-300 flex items-center gap-1">🤝 ${s.name}<span class="text-[8px] bg-indigo-100 dark:bg-indigo-800 px-1 rounded">特殊</span></div><div class="text-center font-black text-indigo-600 text-xs">${b.hours}</div><div class="text-[10px] font-bold text-indigo-700 bg-white dark:bg-slate-800 p-1.5 rounded-lg border dark:border-slate-700 truncate shadow-sm">🔒 ${tNames}</div><div class="text-[10px] font-bold text-slate-400 bg-white dark:bg-slate-800 p-1.5 rounded-lg border dark:border-slate-700 truncate text-center">📍${b.room}</div></div>${spFixedHtml}</div>`;
                    });
                    
                    if(normH > 0){
                        const ovr=cData.overrides?.[s.id]||{}, defR = (s.gradeRooms?.[grade]||s.defaultRoom||'通常教室');
                        let rmOptsStr=`<option value="">${defR}</option>`+(state.rooms||[]).map(r=>`<option value="${r.name}">${r.name}</option>`).join('');
                        if(ovr.room) rmOptsStr=rmOptsStr.replace(`value="${ovr.room}"`,`value="${ovr.room}" selected`);
                        let tOptsSub=`<option value="">担任 (${hrName})</option>`+(state.teachers||[]).map(t=>`<option value="${t.id}">${t.name}</option>`).join('');
                        if(ovr.teacherId) tOptsSub=tOptsSub.replace(`value="${ovr.teacherId}"`,`value="${ovr.teacherId}" selected`);
                        let teacherArea = ovr.allocations?.length>0 ? `<div class="flex items-center gap-1"><div onclick="actions.openAllocModal('${activeCls}','${s.id}',${normH})" class="text-[10px] bg-blue-50 text-blue-700 px-3 py-1.5 rounded-lg border border-blue-200 font-bold truncate flex-1 cursor-pointer">🔗 分割済み</div><button onclick="actions.clearAllocations('${activeCls}','${s.id}')" class="text-slate-300 font-black px-1.5 hover:text-rose-500">✕</button></div>` : `<div class="flex items-center gap-1"><select id="cls-ovr-t-${activeCls}-${s.id}" onchange="actions.updateSubjectOverride('${activeCls}','${s.id}','teacherId',this.value)" class="m3-input w-full !p-1.5 !bg-white dark:!bg-slate-900">${tOptsSub}</select><button onclick="actions.openAllocModal('${activeCls}','${s.id}',${normH})" class="bg-slate-50 dark:bg-slate-700 text-slate-600 dark:text-slate-300 px-3 py-1.5 rounded-lg font-bold text-[10px] whitespace-nowrap shadow-sm border dark:border-slate-600">分割</button></div>`;
                        
                        let fixedHtml = `<div class="col-span-4 flex flex-wrap gap-1 px-2 pb-1.5 pt-0.5">`;
                        for(let fi=0; fi<normH; fi++) { fixedHtml += `<select id="cls-ovr-fix-${activeCls}-${s.id}-${fi}" onchange="actions.updateSubjectFixedTime('${activeCls}', '${s.id}', ${fi}, this.value)" class="text-[9px] p-0.5 rounded border ${ovr.fixedTimes?.[fi]?'bg-amber-100 border-amber-300 text-amber-800 font-bold shadow-sm':'bg-white dark:bg-slate-900 text-slate-400 dark:border-slate-700'} outline-none cursor-pointer"><option value="">自動配置</option>${DAYS.map(d=>PERIODS.map(p=>`<option value="${d}-${p}" ${ovr.fixedTimes?.[fi]===`${d}-${p}`?'selected':''}>${d}${p}固定</option>`).join('')).join('')}</select>`; }
                        fixedHtml += `</div>`;
                        
                        rowsHtml += `<div class="bg-slate-50 dark:bg-slate-800/80 rounded-xl mb-1 border dark:border-slate-700 transition-colors hover:bg-white dark:hover:bg-slate-800"><div class="grid grid-cols-[1.5fr_50px_2fr_1fr] gap-2 p-1.5 pt-2 items-center"><div class="font-black text-xs pl-2 dark:text-slate-200">${s.name}</div><div class="text-center font-black text-blue-600 dark:text-blue-400 text-xs">${normH}</div><div>${teacherArea}</div><div><select id="cls-ovr-rm-${activeCls}-${s.id}" onchange="actions.updateSubjectOverride('${activeCls}','${s.id}','room',this.value)" class="m3-input !p-1.5 w-full !bg-white dark:!bg-slate-900 !text-[10px]">${rmOptsStr}</select></div></div>${fixedHtml}</div>`;
                    }
                    return rowsHtml;
                }).join('')}
            </div>
        </div>
    </div>`;
};

    }).join('')}</div></div>`;
};

                <div class="flex gap-2 items-center">
                    ${state.reportDetails && Object.keys(state.reportDetails).length > 0 ? `<button onclick="actions.openUnassignedReasonModal()" class="px-3 py-1 bg-white dark:bg-slate-800 text-rose-600 dark:text-rose-400 border border-rose-200 dark:border-rose-800/50 rounded-lg text-[10px] font-black shadow-sm active:scale-95 hover:bg-rose-50 flex items-center gap-1">🔍 理由レポート</button>` : ''}
                    <button onclick="actions.continueGeneration()" class="px-3 py-1 bg-amber-500 text-white rounded-lg text-[10px] font-black shadow-sm active:scale-95 hover:bg-amber-600">微調整ループ</button>

            <div class="flex flex-wrap gap-1 mt-1 border-t border-amber-200/50 dark:border-amber-800/30 pt-2">

                ${unassignedBadges}
            </div>
        </div>`;
    }

    if (state.dashTab === 'matrix') {
        html+=`<div class="flex gap-1 mb-2 shrink-0 p-1 bg-slate-100 dark:bg-slate-800 rounded-xl w-fit border dark:border-slate-700"><button onclick="actions.setMatrixAxis('class')" class="px-4 py-1.5 text-xs font-black rounded-lg transition-all ${state.matrixAxis==='class'?'bg-white dark:bg-slate-700 shadow-sm text-blue-600':'text-slate-500 hover:text-slate-700'}">クラス軸</button><button onclick="actions.setMatrixAxis('teacher')" class="px-4 py-1.5 text-xs font-black rounded-lg transition-all ${state.matrixAxis==='teacher'?'bg-white dark:bg-slate-700 shadow-sm text-blue-600':'text-slate-500 hover:text-slate-700'}">教員軸</button><button onclick="actions.setMatrixAxis('room')" class="px-4 py-1.5 text-xs font-black rounded-lg transition-all ${state.matrixAxis==='room'?'bg-white dark:bg-slate-700 shadow-sm text-blue-600':'text-slate-500 hover:text-slate-700'}">教室軸</button></div>`;
        let rows=[]; if(state.matrixAxis==='class') rows=classes; else if(state.matrixAxis==='teacher') rows=teachers.map(t=>t.id); else rows=['通常教室'].concat((state.rooms||[]).map(r=>r.name));
        html+=`<div class="flex-1 overflow-auto bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl custom-scrollbar relative shadow-inner"><table class="w-max border-collapse text-center table-fixed"><thead class="sticky top-0 z-20"><tr class="bg-slate-50 dark:bg-slate-800 border-b dark:border-slate-700"><th class="sticky left-0 bg-slate-50 dark:bg-slate-800 z-30 p-2.5 w-24 border-r dark:border-slate-700 font-black text-[10px] text-slate-400 shadow-sm uppercase">Axis</th>${DAYS.map(d=>`<th colspan="6" class="p-2 border-r dark:border-slate-700 font-black text-xs text-slate-500">${d}曜</th>`).join('')}</tr><tr class="bg-white dark:bg-slate-900 border-b dark:border-slate-700"><th class="sticky left-0 bg-white dark:bg-slate-900 z-30 p-1 border-r dark:border-slate-700 text-[9px] font-black text-slate-300 shadow-sm">Period</th>${DAYS.map(d=>PERIODS.map(p=>`<th class="p-1 w-[72px] border-r dark:border-slate-700 font-black text-[9px] text-slate-300">${p}</th>`).join('')).join('')}</tr></thead><tbody>`;
        html += rows.map(rowId=>{
            let rowName=rowId; if(state.matrixAxis==='teacher') rowName=teachers.find(t=>t.id===rowId)?.name||'不明';
            let tr=`<tr class="border-b dark:border-slate-800/50 transition-colors hover:bg-slate-50 dark:hover:bg-slate-800/30"><td class="sticky left-0 bg-white dark:bg-slate-900 border-r dark:border-slate-800 p-2 text-[10px] font-black text-slate-700 dark:text-slate-300 z-10 shadow-sm">${rowName}</td>`;
            DAYS.forEach(d=>{PERIODS.forEach(p=>{
                const lessons=(state.generatedSchedule?.[d]?.[p]||[]).filter(l=>state.matrixAxis==='class'?l.targets?.includes(rowId):state.matrixAxis==='teacher'?l.teacherIds?.includes(rowId):l.room===rowId);
                if(lessons.length>0){ const l=lessons[0]; const subT=state.matrixAxis==='class'?`${l.teacherName||'?'}`:state.matrixAxis==='teacher'?`${l.targets?.join(',')}`:`${l.targets?.join(',')}`;
                    tr+=`<td class="p-1 border-r dark:border-slate-800 align-top"><div class="flex flex-col items-center justify-center p-1 rounded-lg border dark:border-slate-700 ${getSubjectColor(l.subject)} shadow-sm relative overflow-hidden min-h-[44px]">${lessons.length>1?`<span class="absolute top-0 right-0 bg-rose-500 text-white text-[7px] px-1 font-bold rounded-bl">重複</span>`:''}<div class="font-black text-[10px] w-full truncate leading-tight">${l.subject}</div><div class="text-[7px] font-bold opacity-60 w-full truncate leading-none mt-1">${subT}</div></div></td>`;
                }else{ tr+=`<td class="p-1 border-r dark:border-slate-800"></td>`; }
            });}); tr+=`</tr>`; return tr;
        }).join(''); html += `</tbody></table></div>`;
    } else {
        const fOpts=state.dashView==='class'?classes.map(c=>`<option value="${c}" ${c===state.dashFilter?'selected':''}>${c}</option>`).join(''):teachers.map(t=>`<option value="${t.id}" ${t.id===state.dashFilter?'selected':''}>${t.name}</option>`).join('');
        html+=`<div class="flex justify-between items-center mb-2 bg-white dark:bg-slate-900 border dark:border-slate-800 p-2 rounded-xl shrink-0 gap-2 flex-wrap shadow-sm"><div class="flex items-center gap-2 bg-slate-50 dark:bg-slate-800 p-1 rounded-lg border dark:border-slate-700"><button onclick="actions.setDashView('class')" class="px-4 py-1.5 rounded-md font-black text-[10px] transition-all ${state.dashView==='class'?'bg-blue-600 text-white shadow-md':'text-slate-500 hover:text-slate-700'}">クラス別</button><button onclick="actions.setDashView('teacher')" class="px-4 py-1.5 rounded-md font-black text-[10px] transition-all ${state.dashView==='teacher'?'bg-blue-600 text-white shadow-md':'text-slate-500 hover:text-slate-700'}">教員別</button></div><select id="dash-flt" onchange="actions.setDashFilter(this.value)" class="m3-input !py-1.5 !text-xs !w-40 !bg-white dark:!bg-slate-800 shadow-sm">${fOpts}</select></div>`;
        html+=`<div class="flex-1 overflow-auto bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl custom-scrollbar p-1 min-h-0 shadow-inner"><div class="grid grid-cols-[40px_repeat(5,1fr)] min-w-[700px] h-full gap-px bg-slate-200 dark:bg-slate-800 border dark:border-slate-800"><div class="bg-slate-50 dark:bg-slate-900 flex items-center justify-center font-black text-[8px] uppercase text-slate-400">Time</div>${DAYS.map(d=>`<div class="bg-slate-50 dark:bg-slate-900 flex items-center justify-center font-black text-xs py-2 text-slate-500">${d}曜</div>`).join('')}`;
        
        PERIODS.forEach(p=>{ html+=`<div class="bg-white dark:bg-slate-900 flex items-center justify-center font-black text-xs border-r dark:border-slate-800 text-slate-400">${p}限</div>`;
            DAYS.forEach(d=>{
                const ls=(state.generatedSchedule?.[d]?.[p]||[]).filter(l=>state.dashView==='class'?l.targets?.includes(state.dashFilter):l.teacherIds?.includes(state.dashFilter));
                
                let heatHtml = '';
                if (state.heatmapLesson && (state.dashView === 'class' || state.dashView === 'teacher')) {
                    let hl = state.heatmapLesson;
                    let isGlobalBlock = state.globalBlocks[`${d}-${p}`];
                    let isTeacherNG = hl.teacherIds.some(tid => {
                        let t = safeFind(state.teachers, 'id', tid);
                        return t && t.ngTimes[`${d}-${p}`];
                    });
                    let existLessons = state.generatedSchedule?.[d]?.[p] || [];
                    let isTeacherConflict = existLessons.some(el => hl.teacherIds.some(tid => el.teacherIds.includes(tid)));
                    let isClassConflict = existLessons.some(el => hl.targets.some(tgt => el.targets.includes(tgt)));
                    let grade = hl.targets[0]?.split('-')[0];
                    let maxP = state.periods?.[grade]?.[d] || 0;
                    let isOverTime = p > maxP;

                    if (isOverTime || isGlobalBlock || isTeacherNG || isTeacherConflict || isClassConflict) {
                        let reason = isOverTime ? "下校超過" : isGlobalBlock ? "全校不可" : isTeacherNG ? "教員NG枠" : isTeacherConflict ? "教員重複" : "クラス重複";
                        heatHtml = `<div class="absolute inset-0 bg-rose-500/80 backdrop-blur-[1px] flex items-center justify-center z-10 rounded-sm pointer-events-none"><span class="text-white text-[10px] font-black">${reason}</span></div>`;
                    } else {
                        heatHtml = `<div class="absolute inset-0 bg-emerald-500/20 z-10 rounded-sm pointer-events-none border-[1.5px] border-emerald-400 border-dashed"></div>`;
                    }
                }

                html+=`<div class="dash-cell border-b border-r dark:border-slate-800 transition-colors bg-white dark:bg-slate-900 hover:bg-slate-50 dark:hover:bg-slate-800 relative">${heatHtml}${ls.map(l=>`<div class="text-center w-full px-1 flex flex-col items-center justify-center h-full gap-0.5 relative z-0"><div class="px-2 py-0.5 rounded-lg text-[11px] font-black border leading-none ${getSubjectColor(l.subject)} shadow-sm truncate max-w-[95%]">${l.subject}</div><div class="text-[8px] font-bold text-slate-400 truncate mt-0.5">${state.dashView==='teacher'?l.targets?.join(','):(l.teacherName||'担任')}</div></div>`).join('')}</div>`;
            });
        }); html+=`</div></div>`;
    } html += `</div>`; return html;
};

// --- アクションロジック ---
window.actions = {
    toggleDarkMode: () => { const h = document.documentElement; h.classList.toggle('dark'); localStorage.setItem('tt_theme', h.classList.contains('dark') ? 'dark' : 'light'); },

            a.href = url;
            a.download = fileName;

            a.click();
            setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 100);
            showToast("端末に保存しました", "success");
        } catch (e) {
            try {
                const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(state));
                const a = document.createElement('a');
                a.href = dataUri;

                document.body.appendChild(a);

    importData:()=>{const i=document.createElement('input');i.type='file';i.accept='.json';i.onchange=e=>{const f=e.target.files[0];const r=new FileReader();r.onload=ev=>{Object.assign(state,JSON.parse(ev.target.result));forceInitState();render();showToast("読み込み完了","success");};r.readAsText(f);};i.click();},

    // 教科・教員・特殊授業等

    stopEditTeacher:()=>{ state.editingTeacherId=null; render(); },
    addTeacher:()=>{ state.teachers.push({id:'t_'+Date.now(),name:'教員'+(state.teachers.length+1),maxHours:24,homeroom:'',ngTimes:{},assignments:[]}); render(); },
    removeTeacher:(id)=>{ state.teachers=state.teachers.filter(x=>x.id!==id); render(); },
    updateTeacher:(id,k,v)=>{ const t=safeFind(state.teachers,'id',id); if(t){ t[k]=v; render(); }},

    // ルール操作

    renderMultiSelect: (ruleKey, fieldKey, label, options, selectedArr, theme = 'blue') => {
        let h = `<div class="flex flex-col sm:flex-row sm:items-center gap-1.5"><span class="text-[9px] font-black text-slate-400 w-12 shrink-0">${label}</span><div class="flex flex-wrap gap-1 flex-1">`;

        else if(theme==='indigo') activeC = 'bg-indigo-600 text-white border-indigo-700 shadow-md ring-1 ring-indigo-400';
        else if(theme==='amber') activeC = 'bg-amber-500 text-white border-amber-600 shadow-md ring-1 ring-amber-300';
        if (options.length > 3) { const isAll = options.every(o => selectedArr.includes(o)); h += `<button onclick="actions.toggleAllRuleEditor('${ruleKey}', '${fieldKey}', '${options.join(',')}')" class="px-2 py-0.5 text-[10px] font-black rounded border transition-all ${isAll ? activeC : 'bg-white dark:bg-slate-900 dark:border-slate-700 dark:text-slate-400 shadow-sm'}">全選択</button><span class="w-px h-3 bg-slate-200 dark:bg-slate-700 mx-0.5 self-center"></span>`; }
        options.forEach(o => { const isS = selectedArr.includes(o); h += `<button onclick="actions.toggleRuleEditor('${ruleKey}', '${fieldKey}', '${o}')" class="px-2 py-0.5 text-[9px] font-black rounded-lg border transition-all ${isS ? activeC : 'bg-white dark:bg-slate-900 border-slate-100 dark:border-slate-800 text-slate-400 hover:bg-slate-50 shadow-sm'}">${o.replace('年生','年').replace('限','')}</button>`; });
        return h + `</div></div>`;
    },
    toggleRuleEditor:(rk,fk,v)=>{ if(!state.ruleEditor[rk]) state.ruleEditor[rk]={}; if(!state.ruleEditor[rk][fk]) state.ruleEditor[rk][fk]=[]; const arr=state.ruleEditor[rk][fk]; const i=arr.indexOf(v); if(i>-1) arr.splice(i,1); else arr.push(v); actions.updatePreviewFromEditor(rk); render(); },
    toggleAllRuleEditor:(rk,fk,optsStr)=>{ const opts=optsStr.split(','); if(!state.ruleEditor[rk]) state.ruleEditor[rk]={}; const arr=state.ruleEditor[rk][fk]||[]; const isA=opts.every(o=>arr.includes(o)); state.ruleEditor[rk][fk]=isA?[]:[...opts]; actions.updatePreviewFromEditor(rk); render(); },
    clearRuleEditor:(rk)=>{ state.ruleEditor[rk]={}; actions.updatePreviewFromEditor(rk); render(); },
    addRuleMulti:(rk,fks)=>{ 
        actions.pushUndoRules(); const ed=state.ruleEditor[rk]||{}; let obj={}; let ok=true; 
        fks.split(',').forEach(fk=>{ 
            let val=ed[fk==='target'?'targets':fk==='exclude'?'excludes':fk==='subject'?'subjects':fk==='subject1'?'subjects1':fk==='subject2'?'subjects2':fk==='day'?'days':fk==='period'?'periods':fk]; 
            if(!val?.length && fk!=='exclude'){ok=false;} 
            obj[fk==='target'?'targets':fk==='exclude'?'excludes':fk==='subject'?'subjects':fk==='subject1'?'subjects1':fk==='subject2'?'subjects2':fk==='day'?'days':fk==='period'?'periods':fk]=val; 
        }); 
        if(!ok){showToast("選択項目が不足しています","error");return;} 
        if(rk==='continuousClasses') {
            obj.priority = document.getElementById('ed-priority')?.value || 'high';

    // AI マラソン & 生成ロジック
    updateMarathon: (k,v) => { state.marathon[k] = v; render(); },
    startGeneration: async function(){ 
        state.marathon.active = true; 
        state.marathon.currentGen = 1; 
        globalStartTime = Date.now();

    continueMarathon: async function(){ const addGen = 10; state.marathon.active = true; if(state.marathon.maxGen !== Infinity) state.marathon.maxGen += addGen; actions.runMarathonCycle(); },
    continueGeneration: function(){ state.marathon.active = false; actions.runSingleCycle("今の盤面を元に再調整中...", false); },
    cancelGeneration: () => { hideLoading(); state.marathon.active = false; if (state.best && state.best.schedule) { state.generatedSchedule = state.best.schedule; state.unassigned = state.best.unassigned; state.scoreCard = state.best.scoreCard; state.reportDetails = state.best.reportDetails; state.currentStep = 10; showToast(`ベスト盤面を表示します。`, "info"); } else { state.currentStep = 9; } render(); },
    
    runMarathonCycle: async function(){ 
        if (!state.marathon.active) return; 
        const m = state.marathon; 
        startGenTimer(); 
        showLoading("AIマラソン中", `第 ${m.currentGen} / ${m.maxGen===Infinity?'∞':m.maxGen} 世代`, true, `目標:未配置${m.target}以下`); 
        try { 
            const payload = actions.preparePayload();
            const res = await fetch(GAS_URL, { method:'POST', mode:'cors', body:JSON.stringify({ action:'generate', state: payload, currentSchedule: null, unassigned: null }) }); 
            const data = await res.json(); 
            if (!state.marathon.active) return; 
            
            if(data.schedule) state.generatedSchedule = data.schedule; 
            if(data.unassigned) state.unassigned = data.unassigned; 
            if(data.scoreCard) state.scoreCard = data.scoreCard; 
            if(data.reportDetails) state.reportDetails = data.reportDetails;

            if(data.success){ 
                const bc = document.getElementById('loading-best-container'), br = document.getElementById('loading-best-record'), lr = document.getElementById('loading-latest-record'); 
                if(bc && lr){ bc.classList.remove('hidden'); bc.classList.add('flex'); lr.innerText = data.unassigned.length; } 
                if(data.unassigned.length < state.best.unassignedCount) { 
                    state.best = { unassignedCount: data.unassigned.length, schedule: data.schedule, unassigned: data.unassigned, scoreCard: data.scoreCard, reportDetails: data.reportDetails }; 
                    if (br) br.innerText = state.best.unassignedCount; 
                } 
                const goalReached = state.best.unassignedCount <= m.target, genLimitReached = m.currentGen >= m.maxGen; 
                if (goalReached || genLimitReached) { 
                    state.generatedSchedule = state.best.schedule; 
                    state.unassigned = state.best.unassigned; 
                    state.scoreCard = state.best.scoreCard; 
                    state.reportDetails = state.best.reportDetails; 
                    state.currentStep=10; 
                    state.marathon.active = false; 
                    render(); 
                    hideLoading(); 
                    if (goalReached) showToast(`目標達成！未配置${state.best.unassignedCount}`, "success"); 
                    else showToast(`最大世代に到達。`, "success"); 
                } else { 
                    m.currentGen++; 
                    actions.runMarathonCycle(); 
                } 
            } else { 
                showToast("エラー発生","error"); 
                hideLoading(); 
                state.marathon.active = false; 
            } 
        } catch(e) { 
            showToast("通信エラー","error"); 
            hideLoading(); 
            state.marathon.active = false; 
        } 
    },
    
    runSingleCycle: async function(status, isNew){ 
        startGenTimer(); 
        showLoading("計算中", status, true); 
        try { 
            const res = await fetch(GAS_URL, { method:'POST', mode:'cors', body:JSON.stringify({ action:'generate', state: actions.preparePayload(), currentSchedule: isNew?null:state.generatedSchedule, unassigned: state.unassigned }) }); 
            const data = await res.json(); 
            if(data.schedule) state.generatedSchedule=data.schedule; 
            if(data.unassigned) state.unassigned=data.unassigned; 
            if(data.scoreCard) state.scoreCard=data.scoreCard; 
            if(data.reportDetails) state.reportDetails=data.reportDetails; 

            if(data.success) { 
                state.currentStep=10; 
                render(); 
                hideLoading(); 
            } else { 
                showToast("エラー","error"); 
                hideLoading(); 
            } 
        } catch(e) { 
            showToast("通信エラー","error"); 
            hideLoading(); 
        } 
    },
    
    // ガード節を強化したペイロード生成
    preparePayload: () => { 
        const pS = JSON.parse(JSON.stringify(state)); 
        if (pS.advancedRules) { 
            Object.keys(pS.advancedRules).forEach(k => { 
                if (k === 'priorities') return; 
                const oR = pS.advancedRules[k]; 
                if (!Array.isArray(oR)) return; 
                const exR = []; 
                oR.forEach(r => { 
                    if (k === 'exclusivePairs') { 
                        const s1s = r.subjects1 || [r.subject1]; const s2s = r.subjects2 || [r.subject2]; 
                        s1s.forEach(s1 => s2s.forEach(s2 => { if(s1 !== s2) exR.push({subject1: s1, subject2: s2}); })); 
                    } else { 
                        const tgs = (r.targets?.length) ? r.targets : [undefined]; 
                        const excs = (r.excludes?.length) ? r.excludes : [undefined]; 
                        const subs = (r.subjects?.length) ? r.subjects : [undefined]; 
                        const dys = (r.days?.length) ? r.days : [undefined]; 
                        const pds = (r.periods?.length) ? r.periods : [undefined]; 
                        
                        tgs.forEach(tg => excs.forEach(ex => subs.forEach(su => dys.forEach(dy => pds.forEach(pd => { 
                            let nr = {}; 
                            if (tg) nr.grade = tg; 
                            if (ex) nr.exclude = ex; 
                            if (su) nr.subject = su; 
                            if (dy) nr.day = dy; 
                            if (pd) {
                                // undefinedチェック（型安全）
                                const pdStr = pd.toString();
                                nr.period = parseInt(pdStr.replace('限','')); 
                            }
                            if (k === 'continuousClasses') { 
                                nr.priority = r.priority || 'high'; 
                                nr.allowPeriod2 = !!r.allowPeriod2; 
                                nr.allowPeriod4 = !!r.allowPeriod4; 
                            }
                            exR.push(nr); 
                        }))))); 
                    } 
                }); 
                pS.advancedRules[k] = exR; 
            }); 
            // 緩和モード
            if (state.marathon.relaxRules && pS.advancedRules.priorities) {
                Object.keys(pS.advancedRules.priorities).forEach(k => { pS.advancedRules.priorities[k] = 'low'; });
                if (pS.advancedRules.continuousClasses) { pS.advancedRules.continuousClasses.forEach(rc => { rc.priority = 'low'; rc.allowPeriod2 = true; rc.allowPeriod4 = true; }); }
            }
        } 
        return pS; 
    },

    updateSubjectOverride:(cls,sid,k,v)=>{if(!state.classAssignments[cls].overrides)state.classAssignments[cls].overrides={};if(!state.classAssignments[cls].overrides[sid])state.classAssignments[cls].overrides[sid]={};if(v==="")delete state.classAssignments[cls].overrides[sid][k];else state.classAssignments[cls].overrides[sid][k]=v;render();},
    updateHomeroom:(cls,tid)=>{if(!state.classAssignments[cls])state.classAssignments[cls]={overrides:{}};state.classAssignments[cls].homeroom=tid;render();},
    clearAllocations:(cls,sid)=>{if(state.classAssignments[cls].overrides[sid]){delete state.classAssignments[cls].overrides[sid].allocations;render();}},
    openAllocModal:(cls,sid,h)=>{const cd=state.classAssignments[cls],ov=cd.overrides[sid]||{},rows=ov.allocations?JSON.parse(JSON.stringify(ov.allocations)):[{teacherId:ov.teacherId||cd.homeroom,hours:h}];state.allocationModal={cls,subId:sid,stdHours:h,rows};actions.showAllocModalUI();},
    showAllocModalUI:()=>{ const m=state.allocationModal; let tOpts='<option value="">担任</option>'+(state.teachers||[]).map(t=>`<option value="${t.id}">${t.name}</option>`).join(''); let h=`<div class="flex justify-between items-center mb-4 border-b pb-2 shrink-0"><h3 class="font-black text-blue-900">${m.cls} ${safeFind(state.subjects,'id',m.subId).name} 担当分割</h3><button onclick="actions.closeModal()" class="text-slate-400 font-bold">✕</button></div><div class="flex-1 overflow-y-auto custom-scrollbar p-1">`; m.rows.forEach((r,i)=>{ h+=`<div class="flex gap-2 items-center bg-slate-50 p-2 rounded-lg mb-2 border"><select onchange="actions.updateAllocRow(${i},'teacherId',this.value)" class="m3-input flex-1 !bg-white">${tOpts.replace(`value="${r.teacherId}"`,`value="${r.teacherId}" selected`)}</select><input type="number" value="${r.hours}" onchange="actions.updateAllocRow(${i},'hours',this.value)" class="w-14 text-center font-black text-blue-600 bg-white border p-1.5 rounded-lg text-sm"><button onclick="actions.removeAllocRow(${i})" class="text-rose-400 font-bold px-2">✕</button></div>`; }); h+=`<button onclick="actions.addAllocRow()" class="w-full py-2 border-2 border-dashed rounded-xl text-xs font-bold text-slate-400 hover:bg-slate-100">+ 教員を追加</button></div><div class="mt-4 flex justify-end shrink-0"><button onclick="actions.saveAllocModal()" class="m3-btn-primary">保存する</button></div>`; document.getElementById('modal-body').innerHTML=h; document.getElementById('modal-overlay').classList.remove('hidden');},
    updateAllocRow:(i,k,v)=>{if(k==='hours')state.allocationModal.rows[i][k]=Math.max(0,parseInt(v)||0);else state.allocationModal.rows[i][k]=v;actions.showAllocModalUI();},
    removeAllocRow:(i)=>{state.allocationModal.rows.splice(i,1);actions.showAllocModalUI();},
    addAllocRow:()=>{state.allocationModal.rows.push({teacherId:'',hours:1});actions.showAllocModalUI();},
    saveAllocModal:()=>{const m=state.allocationModal,tot=m.rows.reduce((s,r)=>s+(parseInt(r.hours)||0),0);if(tot!==m.stdHours)return showToast(`合計を${m.stdHours}にしてください`,'error');state.classAssignments[m.cls].overrides[m.subId].allocations=m.rows;actions.closeModal();render();},
};
document.addEventListener('DOMContentLoaded',load);
</script>
<div id="allocation-modal-container"></div>
</body>
</html>
