  Smart TimeTable
  Version: 13.52 (Latest URL & Strict Engine)
  Description: 最新GAS URL適用。Step 8の「優先:高(厳守)」対応。診断詳細ポップアップ実装。
=========================================== -->
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart TimeTable - Ver 13.52</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style type="text/tailwindcss">
        @layer utilities {
            html, body { @apply h-full h-[100dvh] overflow-hidden m-0 p-0 font-sans bg-slate-100 text-slate-800; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
            #app-container { @apply h-full h-[100dvh] flex flex-col p-2 md:p-4 pb-[max(16px,env(safe-area-inset-bottom))] max-w-[1800px] mx-auto w-full box-border overflow-hidden; }
            .custom-scrollbar::-webkit-scrollbar { @apply w-1.5 h-1.5; }
            .custom-scrollbar::-webkit-scrollbar-thumb { @apply bg-slate-300 rounded-full; }
            .m3-card { @apply bg-white rounded-2xl shadow-sm border border-slate-200 p-4 md:p-6 flex flex-col overflow-hidden min-h-0; }
            .m3-btn-primary { @apply bg-blue-600 text-white px-6 py-3 rounded-xl font-black hover:bg-blue-700 active:scale-95 transition-all shadow-md shadow-blue-200 flex items-center justify-center gap-2 disabled:opacity-50 text-sm whitespace-nowrap; }
            .m3-btn-secondary { @apply bg-white text-slate-600 border border-slate-300 px-6 py-3 rounded-xl font-black hover:bg-slate-50 active:scale-95 transition-all flex items-center justify-center gap-2 text-sm whitespace-nowrap; }
            .m3-input { @apply p-2 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-blue-500 focus:bg-white font-bold text-xs transition-colors w-full; }
            .step-dot { @apply h-2 w-2 rounded-full transition-all duration-300 bg-slate-200; }
            .step-dot.active { @apply bg-blue-600 w-8; }
            .fade-in { animation: fadeIn 0.2s ease-out forwards; }
            @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
            .dash-cell { @apply min-h-[50px] p-1 border-r border-b border-slate-200 flex flex-col items-center justify-center gap-0.5 relative bg-white transition-colors cursor-pointer hover:bg-blue-50; }
            input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        }
    </style>
</head>
<body>

<div id="toast" class="fixed top-4 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full shadow-xl font-bold text-sm flex items-center gap-2 z-[9999] transition-all opacity-0 pointer-events-none">
    <span id="toast-msg"></span>
</div>

<div id="app-container">
    <header class="flex items-center justify-between mb-3 shrink-0 px-2">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-200 shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            </div>
            <div>
                <h1 class="text-xl font-black tracking-tight leading-none text-slate-800">Smart TimeTable</h1>
                <p class="text-[10px] font-bold text-indigo-500 uppercase tracking-widest leading-tight">Next Gen (13.52 Strict Engine & Latest URL)</p>
            </div>
        </div>
        <div class="flex items-center gap-2 shrink-0">
            <button onclick="actions.exportData()" class="text-xs font-bold text-slate-500 hover:text-blue-600 px-3 py-1.5 bg-white border border-slate-200 rounded-lg shadow-sm transition-colors">JSON出力</button>
            <button onclick="actions.importData()" class="text-xs font-bold text-slate-500 hover:text-blue-600 px-3 py-1.5 bg-white border border-slate-200 rounded-lg shadow-sm transition-colors">JSON読込</button>
            <button onclick="actions.resetData()" class="text-xs font-bold text-rose-500 hover:text-rose-700 px-3 py-1.5 bg-rose-50 border border-rose-100 rounded-lg transition-colors ml-2">リセット</button>
        </div>
    </header>

    <div class="m3-card flex-1 flex flex-col min-h-0 relative">
        <div class="flex items-center justify-between mb-4 shrink-0 border-b border-slate-100 pb-4">
            <h2 id="step-title" class="text-lg font-black text-slate-800"></h2>
            <div id="progress-dots" class="flex gap-1.5 flex-wrap justify-center"></div>
        </div>
        <div id="step-content" class="fade-in flex-1 overflow-hidden flex flex-col relative min-h-0"></div>
        <div class="flex justify-between items-center mt-4 pt-4 border-t border-slate-100 shrink-0" id="bottom-navigation">
            <button id="btn-prev" class="m3-btn-secondary w-[120px]">戻る</button>
            <button id="btn-next" class="m3-btn-primary w-[180px]"><span id="btn-next-text">次へ進む</span></button>
        </div>
    </div>
</div>

<div id="modal-overlay" class="fixed inset-0 z-[150] flex items-center justify-center hidden p-4 bg-slate-900/60 backdrop-blur-sm">
    <div class="bg-white rounded-3xl p-6 max-w-2xl w-full shadow-2xl flex flex-col overflow-hidden max-h-[90vh]" id="modal-body"></div>
</div>
<div id="allocation-modal-container"></div>
<div id="loading-overlay" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[200] hidden items-center justify-center flex-col gap-4 transition-all">
    <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
    <div class="text-white text-center">
        <h3 class="text-lg font-black tracking-widest mb-1" id="loading-title">AI思考中...</h3>
        <p class="text-blue-200 font-bold text-xs" id="loading-desc">しばらくお待ちください</p>
    </div>
</div>

<script>
    // URLの統合（最新のURL）
    var GAS_URL = "https://script.google.com/macros/s/AKfycbz1d_X8kVtu4MixEE4EkyOI7-r3uoHNBg0-47HnQrUOY9St6s7ltTohwNdd03s8yaV18A/exec";
    var GRADES = [1, 2, 3, 4, 5, 6];
    var DAYS = ['月', '火', '水', '木', '金'];
    var PERIODS = [1, 2, 3, 4, 5, 6];
    var stepTitles = ["1. 基本設定", "2. 行事・不可枠", "3. 教科と教室", "4. 教員名簿", "5. 特殊授業", "6. クラス別担当", "7. 教員別確認", "8. 配置ルール", "9. 最終点検", "10. ダッシュボード"];

    var state = {
        currentStep: 1, grades: {1:3, 2:3, 3:3, 4:3, 5:3, 6:3}, periods: {}, rooms: [], subjects: [], teachers: [], globalBlocks: {}, specialBlocks: [], classAssignments: {},
        advancedRules: { lastPeriodSubjects: [], continuousClasses: [], limitContinuousToSpecificPeriods: true, considerSpecialistTimes: true, avoidSpecificTimes: [], amPrioritySubjects: [], consecutiveGradeSubjects: [] },
        generatedSchedule: null, unassigned: [], reportDetails: {}, dashView: 'class', dashFilter: '1-1', relayCount: 0, maxRelayCount: 0,
        subjectsUndoStack: [], undoStack: []
    };

    var lastClickTime = 0;
    var lastClickId = null;

    function forceInitState() {
        GRADES.forEach(g => { if (!state.periods[g]) state.periods[g] = {月:5,火:5,水:4,木:5,金:5}; });
        if (!state.rooms || !state.rooms.length) state.rooms = [{id:'r1', name:'校庭', capacity:2, ngTimes:{}}, {id:'r2', name:'体育館', capacity:2, ngTimes:{}}, {id:'r3', name:'理科室', capacity:1, ngTimes:{}}];
        if (!state.subjects || !state.subjects.length) state.subjects = [{id:'s1', name:'国語', stdHours:{1:9,2:9,3:7,4:7,5:5,6:5}, defaultRoom:'通常教室'}, {id:'s2', name:'算数', stdHours:{1:4,2:5,3:5,4:5,5:5,6:5}, defaultRoom:'通常教室'}];
        initClassAssignments();
    }

    function initClassAssignments() {
        if (!state.classAssignments) state.classAssignments = {};
        GRADES.forEach(g => { for(let i=1; i<=state.grades[g]; i++) { let c = `${g}-${i}`; if(!state.classAssignments[c]) state.classAssignments[c] = { homeroom:'', overrides:{} }; } });
    }

    function sanitizeState(p) {
        if (!p) return;
        var keys = ['globalBlocks', 'periods', 'grades', 'selectedTeacherId', 'dashView', 'dashFilter', 'generatedSchedule', 'unassigned', 'reportDetails', 'diagnostics', 'teachers', 'specialBlocks', 'classAssignments', 'advancedRules', 'subjectsUndoStack'];
        for(var i=0; i<keys.length; i++){
            if(p[keys[i]] !== undefined) state[keys[i]] = p[keys[i]];
        }
        if (p.subjects) state.subjects = p.subjects;
        if (p.rooms) state.rooms = p.rooms;
        
        if(!state.specialBlocks) state.specialBlocks = [];
        if(!state.classAssignments) state.classAssignments = {};
        if(!state.teachers) state.teachers = [];
        if(!state.subjects) state.subjects = [];
        if(!state.subjectsUndoStack) state.subjectsUndoStack = [];
        
        if(!state.advancedRules) {
            state.advancedRules = {
                lastPeriodSubjects: [], continuousClasses: [], limitContinuousToSpecificPeriods: true,
                homeroomOnlyTimes: [], pairHomeroomSubjects: [], limitOneSubjectPerDay: true, 
                maxIntervalSubjects: [], considerSpecialistTimes: true, avoidPeTimes: [], avoidSpecificTimes: [], amPrioritySubjects: [], consecutiveGradeSubjects: []
            };
        } else {
            if(!state.advancedRules.pairHomeroomSubjects) state.advancedRules.pairHomeroomSubjects = [];
            if(!state.advancedRules.maxIntervalSubjects) state.advancedRules.maxIntervalSubjects = [];
            if(!state.advancedRules.amPrioritySubjects) state.advancedRules.amPrioritySubjects = [];
            if(!state.advancedRules.consecutiveGradeSubjects) state.advancedRules.consecutiveGradeSubjects = [];
            if(!state.advancedRules.avoidSpecificTimes) state.advancedRules.avoidSpecificTimes = [];
            if(state.advancedRules.considerSpecialistTimes === undefined) state.advancedRules.considerSpecialistTimes = true;
        }
    }

    function load() {
        try {
            var d = localStorage.getItem('tt_v13_stable');
            if (d) {
                var p = JSON.parse(d);
                sanitizeState(p);
            }
        } catch(e) {}
        
        forceInitState();
        render();
    }

    function showToast(msg, type) {
        if(!type) type = 'info';
        var t = document.getElementById('toast');
        var m = document.getElementById('toast-msg');
        if(!t || !m) return;
        t.className = 'fixed top-4 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full shadow-xl font-bold text-sm z-[9999] transition-all opacity-100 ' + (type==='success'?'bg-emerald-600 text-white':(type==='error'?'bg-rose-600 text-white':'bg-slate-800 text-white'));
        m.innerText = msg;
        setTimeout(function(){ t.classList.replace('opacity-100', 'opacity-0'); }, 3000);
    }

    function showLoading(t, d) {
        var l = document.getElementById('loading-overlay');
        if(l) {
            document.getElementById('loading-title').innerText = t;
            document.getElementById('loading-desc').innerText = d;
            l.classList.replace('hidden', 'flex');
        }
    }

    function hideLoading() {
        var l = document.getElementById('loading-overlay');
        if(l) l.classList.replace('flex', 'hidden');
    }

    function getTeacherLoads() {
        var loads = {};
        state.teachers.forEach(function(t){ loads[t.id] = 0; });
        Object.keys(state.classAssignments).forEach(function(cls){
            var grade = cls.split('-')[0];
            var data = state.classAssignments[cls];
            state.subjects.forEach(function(sub){
                var hours = parseInt(sub.stdHours[grade]) || 0; if(hours===0) return;
                var isSp = false;
                if(state.specialBlocks) {
                    isSp = state.specialBlocks.some(function(b){ return b.subjectId===sub.id && b.targets && b.targets.indexOf(cls)!==-1; });
                }
                if(isSp) return;
                var ovr = (data.overrides && data.overrides[sub.id]) ? data.overrides[sub.id] : {};
                if(ovr.allocations && ovr.allocations.length > 0){
                    ovr.allocations.forEach(function(a){ if(a.teacherId && loads[a.teacherId]!==undefined) loads[a.teacherId] += (parseInt(a.hours)||0); });
                } else {
                    var tId = ovr.teacherId || data.homeroom;
                    if(tId && loads[tId]!==undefined) loads[tId] += hours;
                }
            });
        });
        if(state.specialBlocks) {
            state.specialBlocks.forEach(function(b){
                if(b.teachers) {
                    b.teachers.forEach(function(bt){ if(bt.id && loads[bt.id]!==undefined) loads[bt.id] += (parseInt(bt.hours)||0); });
                }
            });
        }
        return loads;
    }

    function getTeacherDetails() { 
        var details = {}; 
        state.teachers.forEach(function(t){ details[t.id] = { load: 0, items: [] }; });
        var classes = Object.keys(state.classAssignments);
        for(var i=0; i<classes.length; i++){
            var cls = classes[i]; var grade = cls.split('-')[0]; var data = state.classAssignments[cls]; 
            for(var j=0; j<state.subjects.length; j++){
                var sub = state.subjects[j]; var hours = parseInt(sub.stdHours[grade]) || 0; if (hours === 0) continue;
                var isSp = false;
                if(state.specialBlocks) {
                    for(var k=0; k<state.specialBlocks.length; k++){
                        if(state.specialBlocks[k].subjectId === sub.id && state.specialBlocks[k].targets && state.specialBlocks[k].targets.indexOf(cls) !== -1) isSp = true;
                    }
                }
                if(isSp) continue;
                var ovr = (data.overrides && data.overrides[sub.id]) ? data.overrides[sub.id] : {};
                if (ovr.allocations && ovr.allocations.length > 0) {
                    for(var k=0; k<ovr.allocations.length; k++){
                        var a = ovr.allocations[k]; if (a.teacherId && details[a.teacherId]) { 
                            details[a.teacherId].load += parseInt(a.hours); details[a.teacherId].items.push({ target: cls, subject: sub.name, hours: parseInt(a.hours), isSp: false }); 
                        }
                    }
                } else {
                    var tId = ovr.teacherId || data.homeroom;
                    if (tId && details[tId]) { details[tId].load += hours; details[tId].items.push({ target: cls, subject: sub.name, hours: hours, isSp: false }); } 
                }
            }
        }
        if(state.specialBlocks) {
            for(var i=0; i<state.specialBlocks.length; i++){
                var b = state.specialBlocks[i]; 
                var subObj = null;
                for(var j=0; j<state.subjects.length; j++){ if(state.subjects[j].id===b.subjectId) subObj = state.subjects[j]; }
                var subName = subObj ? subObj.name : '特殊';
                
                if (b.teachers) {
                    for(var j=0; j<b.teachers.length; j++){
                        var bt = b.teachers[j]; if (details[bt.id]) { 
                            details[bt.id].load += parseInt(bt.hours); details[bt.id].items.push({ target: (b.targets && b.targets.length>0 ? b.targets.join(',') : '?'), subject: subName, hours: parseInt(bt.hours), isSp: true }); 
                        }
                    }
                }
            }
        }
        return details; 
    }

    function getSubColor(s) { 
        if(!s) return 'bg-slate-100 text-slate-500 border-slate-200'; 
        if(s.indexOf('国') !== -1) return 'bg-blue-100 text-blue-800 border-blue-200';
        if(s.indexOf('算') !== -1) return 'bg-yellow-100 text-yellow-800 border-yellow-200';
        if(s.indexOf('体') !== -1) return 'bg-red-100 text-red-800 border-red-200';
        if(s.indexOf('理') !== -1) return 'bg-green-100 text-green-800 border-green-200';
        return 'bg-slate-100 text-slate-800 border-slate-200'; 
    }

    function render() {
        localStorage.setItem('tt_v13_stable', JSON.stringify(state));
        var scrollPos = {};
        document.querySelectorAll('.custom-scrollbar').forEach(function(el){ if(el.id) scrollPos[el.id] = {t: el.scrollTop, l: el.scrollLeft}; });

        document.getElementById('step-title').innerText = stepTitles[state.currentStep-1];
        const nextBtn = document.getElementById('btn-next');
        const nextText = document.getElementById('btn-next-text');
        if(state.currentStep === 9) { nextText.innerText = "AI自動生成"; nextBtn.className = "m3-btn-primary w-[180px] bg-indigo-600"; }
        else if(state.currentStep === 10) { nextText.innerText = "スプレッドシート出力"; nextBtn.className = "m3-btn-primary w-[180px] bg-emerald-600"; }
        else { nextText.innerText = "次へ進む"; nextBtn.className = "m3-btn-primary w-[180px]"; }
        document.getElementById('btn-prev').style.visibility = (state.currentStep === 1 ? 'hidden' : 'visible');

        var dotsHtml = '';
        for(var i=1; i<=MAX_STEPS-1; i++) { dotsHtml += `<div class="step-dot ${i<=state.currentStep?'active':''}"></div>`; }
        document.getElementById('progress-dots').innerHTML = state.currentStep === 10 ? '' : dotsHtml;

        const content = document.getElementById('step-content');
        try {
            content.innerHTML = eval(`viewStep${state.currentStep}()`);
        } catch(e) { 
            console.error(e);
            content.innerHTML = '<div class="p-8 text-center"><p class="text-red-500 font-bold">描画エラーが発生しました</p><button onclick="actions.resetData()" class="mt-4 p-2 bg-red-100 text-red-600 rounded font-bold">初期化して修復</button><p class="text-xs mt-2 text-slate-400">' + e.message + '</p></div>';
        }

        document.getElementById('allocation-modal-container').innerHTML = renderAllocationModal();

        setTimeout(function(){
            Object.keys(scrollPos).forEach(function(id){
                var el = document.getElementById(id);
                if(el){ el.scrollTop = scrollPos[id].t; el.scrollLeft = scrollPos[id].l; }
            });
        }, 0);
    }

    function buildGrid(ngMap, globalBlocksMap, actionStr, cellType) { 
        var html = '<div class="overflow-x-auto w-full custom-scrollbar min-h-0">';
        html += '<table class="border-separate border-spacing-1 table-fixed w-max mx-auto"><thead><tr><th class="w-8"></th>';
        for(var i=0; i<DAYS.length; i++){ html += '<th class="text-center text-xs font-black text-slate-400 w-9">' + DAYS[i] + '</th>'; }
        html += '</tr></thead><tbody>';
        for(var p=1; p<=6; p++){
            html += '<tr><td class="text-right pr-2 text-[10px] font-bold text-slate-400">' + p + '限</td>';
            for(var i=0; i<DAYS.length; i++){
                var d = DAYS[i]; var k = d + '-' + p; var gl = globalBlocksMap && globalBlocksMap[k]; var ng = ngMap && ngMap[k]; 
                var cls = 'w-8 h-8 border rounded-lg flex items-center justify-center cursor-pointer font-bold text-xs transition-colors ';
                var icon = '〇'; var click = 'onclick="' + actionStr.replace('__KEY__', k) + '"'; 
                if (gl) { cls += 'bg-slate-800 border-slate-800 text-white shadow-md'; icon = '■'; }
                else if (ng) { cls += 'bg-rose-50 border-rose-300 text-rose-500 hover:bg-rose-100'; icon = '✕'; }
                else { cls += 'bg-white border-slate-200 text-slate-200 hover:bg-blue-50'; } 
                html += '<td class="p-0"><div ' + click + ' class="' + cls + '">' + icon + '</div></td>'; 
            }
            html += '</tr>'; 
        }
        html += '</tbody></table></div>'; return html;
    }

    function renderAllocationModal() {
        if (!state.allocationModal) return '';
        var m = state.allocationModal; 
        var subObj = null;
        for(var i=0; i<state.subjects.length; i++){ if(state.subjects[i].id===m.subId) subObj = state.subjects[i]; }
        var subName = subObj ? subObj.name : '';
        
        var tOpts = '<option value="">-- 教員を選択 --</option>';
        for(var i=0; i<state.teachers.length; i++){ tOpts += '<option value="' + state.teachers[i].id + '">' + state.teachers[i].name + '</option>'; }
        var rowsHtml = ''; var total = 0;
        for(var idx=0; idx<m.rows.length; idx++){
            var r = m.rows[idx]; total += parseInt(r.hours) || 0; var sel = tOpts.replace('value="' + r.teacherId + '"', 'value="' + r.teacherId + '" selected');
            rowsHtml += '<div class="flex items-center gap-2 mb-3 bg-slate-50 p-2 rounded-xl border border-slate-200 shadow-sm">';
            rowsHtml += '<span class="text-xs font-black text-slate-400 w-4">' + (idx + 1) + '.</span>';
            rowsHtml += '<select onchange="actions.updateAllocRow(' + idx + ', \'teacherId\', this.value)" class="m3-input w-full flex-1 !py-1.5 shadow-none">' + sel + '</select>';
            rowsHtml += '<div class="flex items-center gap-1 bg-white border border-slate-200 rounded-lg px-1 shadow-sm">';
            rowsHtml += '<button onclick="actions.updateAllocRow(' + idx + ', \'hours\', Math.max(1, ' + r.hours + '-1))" class="w-6 h-6 text-slate-500 font-black hover:bg-slate-100 rounded transition-colors">-</button>';
            rowsHtml += '<input type="number" min="1" value="' + r.hours + '" onchange="actions.updateAllocRow(' + idx + ', \'hours\', this.value)" class="w-8 text-center font-black text-blue-600 outline-none bg-transparent !py-1" />';
            rowsHtml += '<button onclick="actions.updateAllocRow(' + idx + ', \'hours\', ' + r.hours + '+1)" class="w-6 h-6 text-slate-500 font-black hover:bg-slate-100 rounded transition-colors">+</button></div>';
            rowsHtml += '<button onclick="actions.removeAllocRow(' + idx + ')" class="text-red-400 hover:text-red-600 font-bold px-2 py-1 bg-white border border-red-100 rounded-lg shadow-sm">✕</button></div>';
        }
        var isMatch = (total === m.stdHours); var matchClass = isMatch ? 'bg-green-50 text-green-600 border-green-200' : 'bg-red-50 text-red-600 border-red-200';
        var html = '<div class="fixed inset-0 z-[250] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-in fade-in duration-200"><div class="bg-white rounded-[32px] p-6 md:p-8 max-w-md w-full shadow-2xl flex flex-col">';
        html += '<div class="flex justify-between items-center mb-1"><h3 class="text-xl font-black text-blue-900">' + m.cls + ' ' + subName + '</h3><span class="bg-blue-100 text-blue-700 px-3 py-1 rounded-lg text-xs font-black border border-blue-200 shadow-sm">全 ' + m.stdHours + ' コマ</span></div>';
        html += '<p class="text-[10px] text-slate-500 mb-4 font-bold">この授業を複数の教員で分け合う設定を行います。</p>';
        html += '<div class="flex-1 overflow-y-auto mb-4 max-h-[40vh] pr-2 custom-scrollbar" id="scroll-modal-alloc">' + rowsHtml + '<button onclick="actions.addAllocRow()" class="mt-2 w-full text-xs font-black text-blue-600 bg-blue-50 py-3 rounded-xl hover:bg-blue-100 transition-colors border border-blue-100 shadow-sm">+ 教員を追加する</button></div>';
        html += '<div class="p-3 rounded-xl mb-6 text-center font-bold text-sm shadow-inner border ' + matchClass + '">現在の合計: <span class="text-lg font-black">' + total + '</span> / ' + m.stdHours + ' コマ' + (!isMatch?'<br><span class="text-[10px] font-black opacity-80 mt-1 inline-block">※ 合計を一致させてください</span>':'') + '</div>';

    function viewStep9() {
        var errors = []; var loads = getTeacherLoads();
        state.teachers.forEach(function(t){
            var load = loads[t.id] || 0; var avail = 0; 
            DAYS.forEach(function(d){ PERIODS.forEach(function(p){
                var isNg = false; if (t.ngTimes && t.ngTimes[d+'-'+p]) isNg = true; if (state.globalBlocks && state.globalBlocks[d+'-'+p]) isNg = true;
                if (!isNg) avail++; 
            }); });
            if(load > avail) errors.push('[教員限界] ' + t.name + ': 担当授業(' + load + 'コマ) が 勤務可能枠(' + avail + 'コマ) を超過しています。');
        });
        
        var uniqueSubjectNames = [];
        state.subjects.forEach(function(s) {
            if (uniqueSubjectNames.indexOf(s.name) === -1) uniqueSubjectNames.push(s.name);
        });

        var classNeeds = {};
        var classAssigned = {};
        var totalErr = 0;
        var classes = Object.keys(state.classAssignments);
        classes.forEach(function(cls) {
            uniqueSubjectNames.forEach(function(sName) {
                classNeeds[cls + '-' + sName] = 0;
                classAssigned[cls + '-' + sName] = 0;
            });
        });

        classes.forEach(function(cls) {
            var cData = state.classAssignments[cls];
            var grade = cls.split('-')[0];
            if(!cData.homeroom) errors.push('[担任未定] ' + cls + ' の担任が設定されていません'); 
            
            state.subjects.forEach(function(s) {
                var hours = parseInt(s.stdHours[grade]) || 0;
                classNeeds[cls + '-' + s.name] += hours; 
                
                if (hours === 0) return;
                var isSp = false;
                if(state.specialBlocks) {
                    for(var k=0; k<state.specialBlocks.length; k++){
                        if(state.specialBlocks[k].subjectId === s.id && state.specialBlocks[k].targets && state.specialBlocks[k].targets.indexOf(cls) !== -1) isSp = true;
                    }
                }
                if (isSp) return;
                
                var ovr = (cData.overrides && cData.overrides[s.id]) ? cData.overrides[s.id] : {};
                if (ovr.allocations && ovr.allocations.length > 0) {
                    var sumAlloc = 0;
                    ovr.allocations.forEach(function(a) { sumAlloc += (parseInt(a.hours)||0); });
                    classAssigned[cls + '-' + s.name] += sumAlloc; 
                } else {
                    var tId = ovr.teacherId || cData.homeroom;
                    if (tId) classAssigned[cls + '-' + s.name] += hours; 
                }
            });
        });

        if (state.specialBlocks) {
            state.specialBlocks.forEach(function(b) {
                var subObj = null;
                state.subjects.forEach(function(s){ if(s.id === b.subjectId) subObj = s; });
                if (subObj && b.targets) {
                    b.targets.forEach(function(cls) {
                        if (classAssigned[cls + '-' + subObj.name] !== undefined) {
                            classAssigned[cls + '-' + subObj.name] += parseInt(b.hours) || 0;
                        }
                    });
                }
            });
        }

        var html = '<div class="flex flex-col h-full"><div class="mb-4 shrink-0 flex justify-between items-center"><h2 class="text-xl font-black">9. 最終点検</h2>';
        html += '<div class="flex items-center gap-2 bg-white px-3 py-1.5 rounded-xl shadow-sm border border-slate-200"><span class="text-xs font-bold text-slate-500">AI思考時間:</span><select id="relay-setting" class="m3-input !py-1 !px-2 !text-xs font-bold text-blue-600 border-none cursor-pointer"><option value="1">1分 (標準/2回)</option><option value="2">2分 (強力/4回)</option><option value="3">3分 (究極/6回)</option></select></div></div>';
        
        html += '<div class="flex-1 bg-slate-900 rounded-[32px] p-6 flex flex-col overflow-hidden shadow-xl relative"><div class="flex items-center justify-between mb-4 shrink-0"><div class="flex items-center gap-2"><div class="w-3 h-3 rounded-full animate-pulse ' + (totalErr===0 && errors.length===0?'bg-green-500':'bg-red-500') + '"></div><h4 class="text-sm font-black text-white">プレフライト・マトリックス</h4></div><span class="text-[10px] text-slate-400">不足: 赤(-) / 超過: 黄(+) / 一致: 緑(✓)</span></div>';
        
        html += '<div class="flex-1 overflow-auto custom-scrollbar rounded-xl border border-slate-700 bg-white"><table class="w-full text-[10px] text-center border-collapse whitespace-nowrap"><thead class="bg-slate-100 border-b border-slate-200 sticky top-0 z-10"><tr><th class="p-2 border-r border-slate-200">クラス</th>';
        uniqueSubjectNames.forEach(function(sName){ html += '<th class="p-2 border-r border-slate-200 font-black">' + sName + '</th>'; });
        html += '<th class="p-2 font-black text-slate-500">合計(実/必)</th></tr></thead><tbody>';
        
        classes.forEach(function(cls){
            var cTotNeed = 0; var cTotAct = 0;
            html += '<tr class="border-b border-slate-100 hover:bg-slate-50 transition-colors"><td class="p-1.5 bg-slate-50 font-bold border-r border-slate-200">' + cls + '</td>';
            uniqueSubjectNames.forEach(function(sName){
                var need = classNeeds[cls + '-' + sName] || 0;
                var act = classAssigned[cls + '-' + sName] || 0;
                cTotNeed += need; cTotAct += act;
                var diff = act - need;
                var cellCls = 'text-slate-300'; var txt = '-';
                if(need > 0 || act > 0) {
                    if(diff === 0) { cellCls = 'bg-green-50 text-green-500 font-bold'; txt = '✓'; }
                    else if(diff < 0) { cellCls = 'bg-red-100 text-red-600 font-black'; txt = diff; totalErr++; }
                    else { cellCls = 'bg-yellow-100 text-yellow-600 font-black'; txt = '+' + diff; totalErr++; }
                }
                html += '<td class="p-1 border-r border-slate-100 ' + cellCls + '">' + txt + '</td>';
            });
            var totCls = (cTotAct-cTotNeed===0) ? 'text-slate-400' : (cTotAct-cTotNeed<0 ? 'text-red-500 font-bold' : 'text-yellow-500 font-bold');
            html += '<td class="p-1.5 bg-slate-50 ' + totCls + '">' + cTotAct + '/' + cTotNeed + '</td></tr>';
        });
        html += '</tbody></table></div>';
        
        if (totalErr > 0) errors.push('[コマ数不整合] クラスの科目過不足が計 ' + totalErr + ' 箇所あります。ステップ6で担当を割り当ててください。');
        
        html += '<div class="mt-4 shrink-0">';
        if (errors.length > 0) {
            html += '<div class="p-3 bg-red-500/20 border border-red-500/50 rounded-xl text-[10px] text-red-300 font-bold space-y-1 overflow-y-auto max-h-[100px]">';
            errors.forEach(function(e){ html += '<p>⚠️ ' + e + '</p>'; });
            html += '</div>';
        } else {
            html += '<div class="text-center text-green-400 font-bold text-xs">All Checks Passed. AI生成の準備が整いました。</div>';
        }
        html += '</div></div></div>'; return html;
    }

        // -----------------------
        // モーダル関連の処理
        openAllocModal: function(cls, subId, stdHours) { var cData = state.classAssignments[cls]; var ovr = {}; if (cData && cData.overrides && cData.overrides[subId]) ovr = cData.overrides[subId]; var rows = []; if (ovr.allocations && ovr.allocations.length > 0) { rows = JSON.parse(JSON.stringify(ovr.allocations)); } else { var defaultTid = ovr.teacherId || cData.homeroom || ''; rows = [{ teacherId: defaultTid, hours: stdHours }]; } state.allocationModal = { cls: cls, subId: subId, stdHours: stdHours, rows: rows }; render(); },
        closeAllocModal: function() { state.allocationModal = null; render(); },
        addAllocRow: function() { if (state.allocationModal) { state.allocationModal.rows.push({ teacherId: '', hours: 1 }); render(); } },
        updateAllocRow: function(idx, key, val) { if (state.allocationModal) { if(key==='hours') state.allocationModal.rows[idx][key] = Math.max(0, parseInt(val)||0); else state.allocationModal.rows[idx][key] = val; render(); } },
        removeAllocRow: function(idx) { if (state.allocationModal) { state.allocationModal.rows.splice(idx, 1); render(); } },
        saveAllocModal: function() { if (!state.allocationModal) return; var m = state.allocationModal; var total = 0; for(var i=0; i<m.rows.length; i++){ total += parseInt(m.rows[i].hours)||0; } if (total !== m.stdHours) { showToast('合計を ' + m.stdHours + ' コマに合わせてください', 'error'); return; } var hasEmpty = false; for(var i=0; i<m.rows.length; i++){ if(!m.rows[i].teacherId) hasEmpty = true; } if (hasEmpty) { showToast('教員を選択してください', 'error'); return; } if (!state.classAssignments[m.cls].overrides) state.classAssignments[m.cls].overrides = {}; if (!state.classAssignments[m.cls].overrides[m.subId]) state.classAssignments[m.cls].overrides[m.subId] = {}; if (m.rows.length === 1) { state.classAssignments[m.cls].overrides[m.subId].teacherId = m.rows[0].teacherId; delete state.classAssignments[m.cls].overrides[m.subId].allocations; } else { state.classAssignments[m.cls].overrides[m.subId].allocations = JSON.parse(JSON.stringify(m.rows)); } state.allocationModal = null; render(); showToast('分配を保存しました', 'success'); },
        clearAllocations: function(cls, subId) { if (state.classAssignments[cls] && state.classAssignments[cls].overrides && state.classAssignments[cls].overrides[subId]) { delete state.classAssignments[cls].overrides[subId].allocations; render(); showToast('分配をリセットしました', 'success'); } },
        setDashView: function(v) { state.dashView = v; state.selectedDashCell = null; render(); },

        clickDashCell: function(d, p) { 
            if(!state.selectedDashCell) { state.selectedDashCell = { d: d, p: p }; render(); } 
            else { 
                var c1 = state.selectedDashCell; var c2 = { d: d, p: p }; 
                if(c1.d!==c2.d || c1.p!==c2.p) { 
                    actions.pushUndo(); 
                    if(!state.generatedSchedule[c1.d]) state.generatedSchedule[c1.d] = {};
                    if(!state.generatedSchedule[c2.d]) state.generatedSchedule[c2.d] = {};
                    var ls1 = state.generatedSchedule[c1.d][c1.p] || []; var ls2 = state.generatedSchedule[c2.d][c2.p] || []; 
                    var it1 = []; var it2 = [];
                    for(var i=0; i<ls1.length; i++){ var hit = false; if(state.dashView==='class' && ls1[i].targets && ls1[i].targets.indexOf(state.dashFilter)!==-1) hit = true; if(state.dashView==='teacher' && ls1[i].teacherIds && ls1[i].teacherIds.indexOf(state.dashFilter)!==-1) hit = true; if(hit) it1.push(ls1[i]); }
                    for(var i=0; i<ls2.length; i++){ var hit = false; if(state.dashView==='class' && ls2[i].targets && ls2[i].targets.indexOf(state.dashFilter)!==-1) hit = true; if(state.dashView==='teacher' && ls2[i].teacherIds && ls2[i].teacherIds.indexOf(state.dashFilter)!==-1) hit = true; if(hit) it2.push(ls2[i]); }
                    for(var i=0; i<it1.length; i++){ var idx = ls1.indexOf(it1[i]); if(idx!==-1) ls1.splice(idx, 1); }
                    for(var i=0; i<it2.length; i++){ var idx = ls2.indexOf(it2[i]); if(idx!==-1) ls2.splice(idx, 1); }
                    for(var i=0; i<it1.length; i++){ ls2.push(it1[i]); }
                    for(var i=0; i<it2.length; i++){ ls1.push(it2[i]); }
                    state.generatedSchedule[c1.d][c1.p] = ls1; state.generatedSchedule[c2.d][c2.p] = ls2;
                } 
                state.selectedDashCell = null; render(); 
            } 
        },
        openBulk: function(type) { var ov = document.getElementById('modal-overlay'); var bd = document.getElementById('modal-body'); ov.classList.remove('hidden'); bd.innerHTML = '<h3 class="text-xl font-black mb-2">' + (type==='rooms'?'教室':'教員') + '一括貼付</h3><textarea id="bulk-txt" class="w-full h-40 p-4 bg-slate-50 border rounded-xl mb-4 text-xs font-bold" placeholder="改行区切りで貼付"></textarea><div class="flex gap-4"><button onclick="document.getElementById(\'modal-overlay\').classList.add(\'hidden\')" class="flex-1 p-3 bg-slate-100 rounded-xl font-bold">キャンセル</button><button onclick="actions.processBulk(\'' + type + '\')" class="flex-1 bg-blue-600 text-white rounded-xl font-black">追加</button></div>'; },
        processBulk: function(type) { 
            var r = document.getElementById('bulk-txt').value.split('\n'); var c = 0; 
            for(var i=0; i<r.length; i++){
                var n = r[i].trim(); if(!n) continue; var nm = n.split('\t')[0].trim(); if (i === 0 && (nm.indexOf('名')!==-1 || nm==='教室' || nm==='教員')) continue; 
                if(nm) { 
                    if(type==='rooms') { if (!state.rooms) state.rooms = []; state.rooms.push({id:'r_'+Date.now()+Math.random(), name:nm, capacity:1, ngTimes:{}}); }
                    if(type==='teachers') { if (!state.teachers) state.teachers = []; state.teachers.push({id:'t_'+Date.now()+Math.random(), name:nm, maxHours:24, homeroom:'', ngTimes:{}, assignments:[]}); }
                    c++; 
                } 
            }
            document.getElementById('modal-overlay').classList.add('hidden'); render(); showToast(c + '件追加しました', 'success'); 
        },
        pushUndo: function() { if (!state.undoStack) state.undoStack = []; state.undoStack.push(JSON.stringify(state.generatedSchedule)); if(state.undoStack.length > 15) state.undoStack.shift(); },
        undo: function() { if(state.undoStack && state.undoStack.length > 0) { state.generatedSchedule = JSON.parse(state.undoStack.pop()); state.selectedDashCell = null; render(); showToast('戻しました', 'success'); } },
        
        // ★ 詳細診断ポップアップ
        showDiagnostic: function(key) {
            const diag = state.reportDetails?.[key];
            if(!diag) return showToast("詳細データがありません");
            const modal = document.getElementById('modal-overlay');
            const body = document.getElementById('modal-body');
            modal.classList.remove('hidden');
            
            let html = `<h3 class="text-xl font-black text-blue-900 mb-2">【AI診断】${diag.target}：${diag.subject}</h3>
            <p class="text-xs text-slate-500 mb-6 font-bold">AIがこの授業を配置できなかった原因と対策を報告します。</p>
            <div class="space-y-4 mb-6 overflow-y-auto pr-2 custom-scrollbar">`;
            
            if (diag.causes && diag.causes.length > 0) {
                diag.causes.forEach(function(c) {
                    const solution = c.type === "教員の都合" ? `Step 4で${c.detail.split('先生')[0]}先生の「✕」を減らしてください。` : `Step 3で${c.detail.split('が')[0]}の同時使用枠を増やすか、使用制限を緩和してください。`;
                    const imprv = Math.min(99, 100 - c.impact + 30);
                    html += `<div class="bg-slate-50 p-4 rounded-2xl border border-slate-200 shadow-inner">
                        <div class="flex justify-between items-start mb-2"><span class="bg-rose-100 text-rose-700 px-2 py-0.5 rounded text-[10px] font-black">${c.type}</span><span class="text-sm font-black text-rose-600">影響度: ${c.impact}%</span></div>
                        <p class="text-xs font-bold text-slate-700 mb-2">原因：${c.detail}</p>
                        <div class="bg-blue-50/50 p-3 rounded-xl border border-blue-100"><p class="text-[10px] font-black text-blue-700 mb-1">💡 対策と成功率の向上</p><p class="text-xs font-bold text-blue-800">${solution}</p><p class="mt-2 text-[10px] font-black text-blue-600">➔ 対策実行後の配置可能性：<span class="text-lg font-black">${imprv}%</span></p></div>
                    </div>`;
                });
            } else {
                html += `<div class="text-center py-6 text-sm font-bold text-slate-400">特定のエラー原因は見つかりませんでした。条件が厳しすぎる可能性があります。</div>`;
            }
            
            html += `</div><button onclick="document.getElementById('modal-overlay').classList.add('hidden')" class="w-full p-4 bg-slate-800 text-white font-black rounded-2xl hover:bg-slate-900 transition-all">閉じて設定を修正する</button>`;
            body.innerHTML = html;
        },

        // ★ 自動リレー通信ロジック
        startGeneration: async function() {
            if (!GAS_URL || GAS_URL.indexOf("ここに") !== -1) { showToast("URL未設定です。", "error"); return; }
            var relayMinutes = parseInt(document.getElementById('relay-setting')?.value || 1);
            state.maxRelayCount = relayMinutes * 2;
            state.relayCount = 1;
            
            showLoading("AI自動生成中...", `初期配置と最適化を行っています（自動リレー ${state.relayCount}/${state.maxRelayCount}回目）`);
            state.generatedSchedule = null; state.unassigned = []; state.reportDetails = {};
            try {
                var res = await fetch(GAS_URL, { method: 'POST', mode: 'cors', body: JSON.stringify({ action: 'generate', state: state, currentSchedule: null, unassigned: null }) });
                if (!res.ok) throw new Error("サーバーエラー");
                var data = await res.json();
                if (data.success) { 
                    state.generatedSchedule = data.schedule; state.unassigned = data.unassigned; state.reportDetails = data.reportDetails;
                    if(data.isComplete || state.relayCount >= state.maxRelayCount) {
                        state.currentStep = 10; state.undoStack = []; state.selectedDashCell = null; 
                        render(); showToast(data.isComplete?"生成完了！":"指定時間で一時停止しました。", data.isComplete?"success":"info"); hideLoading();
                    } else {
                        actions.autoContinueGeneration();
                    }
                } else { showToast("生成エラー: " + data.message, "error"); hideLoading(); }
            } catch (e) { showToast("通信エラーが発生しました。", "error"); hideLoading(); }
        },
        autoContinueGeneration: async function() {
            state.relayCount++;
            showLoading("AI継続生成中...", `未配置コマの最適化を行っています（自動リレー ${state.relayCount}/${state.maxRelayCount}回目）`);
            try {
                var res = await fetch(GAS_URL, { method: 'POST', mode: 'cors', body: JSON.stringify({ action: 'generate', state: state, currentSchedule: state.generatedSchedule, unassigned: state.unassigned }) });
                if (!res.ok) throw new Error("サーバーエラー");
                var data = await res.json();
                if (data.success) { 
                    state.generatedSchedule = data.schedule; state.unassigned = data.unassigned; state.reportDetails = data.reportDetails;
                    if(data.isComplete || state.relayCount >= state.maxRelayCount) {
                        state.currentStep = 10; state.undoStack = []; state.selectedDashCell = null; 
                        render(); showToast(data.isComplete?"生成完了！":"指定時間で一時停止しました。", data.isComplete?"success":"info"); hideLoading();
                    } else {
                        actions.autoContinueGeneration();
                    }
                } else { showToast("生成エラー: " + data.message, "error"); render(); hideLoading(); }
            } catch (e) { showToast("通信エラー発生。途中結果を表示します。", "error"); state.currentStep = 10; render(); hideLoading(); }
        },
        continueGeneration: function() {
            var relayMinutes = parseInt(document.getElementById('relay-setting-dash')?.value || 1);
            state.maxRelayCount = state.relayCount + (relayMinutes * 2);
            actions.autoContinueGeneration();
        },
        
        exportToSpreadsheet: async function() {
            if (!state.generatedSchedule) return; showLoading("出力中...", "複数のシートを作成しています...");
            try {
                var res = await fetch(GAS_URL, { method: 'POST', mode: 'cors', body: JSON.stringify({ action: 'export', schedule: state.generatedSchedule, state: state }) });
                var data = await res.json();
                if(data.success) showToast("全シートの出力に成功しました！", "success"); else showToast("出力エラー: " + data.message, "error");
            } catch (e) { showToast("通信エラー", "error"); } finally { hideLoading(); }
        },
        resetData: function() { if(confirm("すべてのデータを消去してリセットしますか？")) { try { localStorage.clear(); } catch(e){} location.reload(); } },
        exportData: function() { var a = document.createElement('a'); a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state)); a.download = "timetable.json"; a.click(); },
        importData: function() { var i = document.createElement('input'); i.type = 'file'; i.onchange = function(e){ var r = new FileReader(); r.readAsText(e.target.files[0]); r.onload = function(ev){ try { var parsed = JSON.parse(ev.target.result); sanitizeState(parsed); forceInitState(); state.currentStep=1; render(); showToast("読込完了", "success"); } catch(err) { showToast("読込エラー", "error"); } } }; i.click(); }
    };

    document.getElementById('btn-next').onclick = function() { 
        if (state.currentStep === 9) actions.startGeneration(); 
        else if (state.currentStep < MAX_STEPS) { state.currentStep++; render(); } 
        else actions.exportToSpreadsheet(); 
    };
    
    document.getElementById('btn-prev').onclick = function() { 
        if(state.currentStep > 1) { state.currentStep--; render(); } 
    };
    
    document.addEventListener('DOMContentLoaded', load);
</script>
</body>
</html>
