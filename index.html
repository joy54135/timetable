<style type="text/tailwindcss">

<body>

<div id="app-container">

<div id="modal-overlay" class="fixed inset-0 z-[150] flex items-center justify-center hidden p-4 bg-slate-900/60 dark:bg-black/80 backdrop-blur-sm"><div class="bg-white dark:bg-slate-900 rounded-3xl p-6 max-w-2xl w-full shadow-2xl flex flex-col overflow-hidden max-h-[90vh]" id="modal-body"></div></div>
<div id="loading-overlay" class="fixed inset-0 bg-slate-900/95 backdrop-blur-md z-[200] hidden items-center justify-center flex-col gap-4 text-white"><div class="w-16 h-16 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div><div class="text-center"><h3 class="text-xl font-black mb-1" id="loading-title">思考中...</h3><div id="loading-timer" class="text-7xl font-black text-emerald-400 font-mono drop-shadow-md">0.0s</div><p class="text-indigo-200 font-bold text-sm" id="loading-desc">お待ちください</p><div id="loading-best-container" class="hidden mt-4 justify-center gap-4 text-xs font-bold"><div class="bg-black/30 px-3 py-1.5 rounded-lg border border-white/10">ベスト: <span id="loading-best-record" class="text-emerald-400">--</span></div><div class="bg-black/30 px-3 py-1.5 rounded-lg border border-white/10">今回: <span id="loading-latest-record" class="text-amber-400">--</span></div></div></div><button id="btn-cancel-gen" onclick="actions.cancelGeneration()" class="mt-6 px-8 py-3 bg-slate-800 text-slate-300 border border-slate-600 rounded-full text-sm font-bold hover:bg-rose-900 transition-colors hidden">中断</button></div>

<script>
const GAS_URL="https://script.google.com/macros/s/AKfycbwbwcKI72jk4pxDNiGsEj8PJUdXSBe7UGljRAjw8TMB5q7-CfVOKH81F86r1qdGeOdL/exec";
const GRADES=[1,2,3,4,5,6], DAYS=['月','火','水','木','金'], getId=id=>document.getElementById(id);
const stepTitles=["1.基本設定","2.行事・不可枠","3.教科と教室","4.教員と不可枠","5.特殊授業ビルダー","6.クラス担当設定","7.持ち時数確認","8.配置ルール詳細","9.最終確認","10.ダッシュボード"];
const step8Pkgs=[{id:"pkg1",title:"【基本設定】",items:[{k:"limitOneSubjectPerDayStrict",t:"同日重複を禁止"},{k:"limitContinuousToSpecificPeriods",t:"連続授業をペア枠限定"}]},{id:"pkg2",title:"【教員配慮設定】",items:[{k:"homeroomOnlyTimes",t:"担任固定枠(専科不可)",f:['target','exclude','day','period']},{k:"avoidSpecialistTimes",t:"専科回避枠",f:['day','period']},{k:"homeroomBufferSubjects",t:"担任裁量バッファ",f:['target','exclude','subject']}]},{id:"pkg3",title:"【児童配慮設定】",items:[{k:"amPrioritySubjects",t:"午前に優先配置",f:['target','exclude','subject']},{k:"lastPeriodSubjects",t:"最終コマに優先配置",f:['target','exclude','subject']},{k:"avoidSpecificTimes",t:"特定時間帯回避",f:['target','exclude','subject','day','period']}]}];

let state={currentStep:1, grades:{1:3,2:3,3:3,4:3,5:3,6:3}, periods:{}, rooms:[], subjects:[], teachers:[], globalBlocks:{}, specialBlocks:[], classAssignments:{}, advancedRules:{priorities:{}}, ruleEditor:{}, openPkgs:{}, generatedSchedule:null, unassigned:[], reportDetails:{}, scoreCard:null, dashTab:'matrix', matrixAxis:'class', dashView:'class', dashFilter:'', marathon:{active:false, target:0, maxGen:10, currentGen:1, relaxRules:false}, best:{unassignedCount:9999}, selectedTeacherId:null, editingTeacherId:null, editingSubjectId:null, specialBuilder:{type:'joint', subjectId:'', hours:1, room:'通常教室', targets:[], teachers:[]}, openSpecialEdits:{}, subjectsUndoStack:[], rulesUndoStack:[], birdEyeMode:false, spotlightSub:'', spotlightTeas:['','','',''], movingLesson:null, violations:{}, conflictingIds:[], activeViolationNode:null, scheduleHistory:[], historyIndex:-1, openTeacherLoadId:null};

function safeFind(arr,k,v){return (arr||[]).find(x=>x[k]===v);}
function getDynPeriods(){let m=6;if(state.periods)Object.values(state.periods).forEach(o=>Object.values(o).forEach(v=>{if(v>m)m=v;}));return Array.from({length:m},(_,i)=>i+1);}
function normT(t){return (t||[]).map(x=>typeof x==='object'?x.id:x);}
function forceInit(){
    if(!state.periods)state.periods={}; GRADES.forEach(g=>{if(!state.periods[g])state.periods[g]={月:5,火:5,水:4,木:5,金:5};});
    if(!state.rooms?.length)state.rooms=[{id:'r1',name:'校庭',capacity:2,ngTimes:{}},{id:'r2',name:'体育館',capacity:2,ngTimes:{}},{id:'r3',name:'理科室',capacity:1,ngTimes:{}}];
    if(!state.subjects?.length)state.subjects=[{id:'s1',name:'国語',stdHours:{1:9,2:9,3:7,4:7,5:5,6:5},defaultRoom:'通常教室',gradeRooms:{}},{id:'s2',name:'算数',stdHours:{1:4,2:5,3:5,4:5,5:5,6:5},defaultRoom:'通常教室',gradeRooms:{}}];
    if(!state.classAssignments)state.classAssignments={}; GRADES.forEach(g=>{for(let i=1;i<=(parseInt(state.grades[g])||1);i++){let c=`${g}-${i}`;if(!state.classAssignments[c])state.classAssignments[c]={homeroom:'',overrides:{}};}});
    if(!state.advancedRules)state.advancedRules={priorities:{}}; if(!state.ruleEditor)state.ruleEditor={}; if(!state.openPkgs)state.openPkgs={};
    if(!state.specialBuilder)state.specialBuilder={type:'joint',subjectId:(state.subjects[0]?.id||''),hours:1,room:'通常教室',targets:[],teachers:[]};
    if(!state.spotlightTeas)state.spotlightTeas=['','','',''];
}

function load(){try{const d=localStorage.getItem('tt_v16_9_0');if(d)Object.assign(state,JSON.parse(d));}catch(e){} forceInit(); render();}
function showToast(m,t='info'){const el=getId('toast');el.innerText=m;el.className=`fixed top-4 left-1/2 -translate-x-1/2 px-6 py-3 rounded-full shadow-xl font-bold text-sm z-[9999] transition-all opacity-100 text-white ${t==='error'?'bg-rose-600':(t==='success'?'bg-emerald-600':'bg-blue-600')}`;setTimeout(()=>el.classList.replace('opacity-100','opacity-0'),3000);}
function showLoading(t,d,sc=false){getId('loading-title').innerText=t;getId('loading-desc').innerText=d;getId('btn-cancel-gen').className=sc?"mt-6 px-8 py-3 bg-slate-800 text-slate-300 border border-slate-600 rounded-full text-sm font-bold hover:bg-rose-900":"hidden";getId('loading-overlay').classList.replace('hidden','flex');}
function hideLoading(){stopTimer();getId('loading-overlay').classList.replace('flex','hidden');}
let tInt=null,tSt=null; function startTimer(){tSt=Date.now();if(tInt)clearInterval(tInt);tInt=setInterval(()=>{getId('loading-timer').innerText=((Date.now()-tSt)/1000).toFixed(1)+'s';},100);} function stopTimer(){clearInterval(tInt);}

function getSubCol(sN){const s=safeFind(state.subjects,'name',sN);if(s?.color)return s.color;const n=sN||'';if(n.includes('国'))return '#EFF6FF';if(n.includes('算'))return '#FEFCE8';if(n.includes('体'))return '#FEF2F2';if(n.includes('理'))return '#F0FDF4';if(n.includes('社'))return '#FFF7ED';if(n.includes('英'))return '#FAF5FF';return '#F8FAFC';}
function getSubSty(sN){const s=safeFind(state.subjects,'name',sN);if(s?.color){const r=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(s.color);if(r)return `background-color:rgba(${parseInt(r[1],16)},${parseInt(r[2],16)},${parseInt(r[3],16)},0.25);border:1px solid rgba(${parseInt(r[1],16)},${parseInt(r[2],16)},${parseInt(r[3],16)},0.7);color:${s.color};font-weight:900;`;}return '';}
function getSubCls(sN){const s=safeFind(state.subjects,'name',sN);if(s?.color)return 'shadow-sm';const n=sN?sN.toLowerCase():'';if(n.includes('国'))return 'bg-blue-50 text-blue-800 border-blue-200';if(n.includes('算'))return 'bg-yellow-50 text-yellow-800 border-yellow-200';return 'bg-slate-50 text-slate-800 border-slate-200';}
function getTeaLoads(){let l={};(state.teachers||[]).forEach(t=>l[t.id]={t:0,i:[]});Object.keys(state.classAssignments||{}).forEach(c=>{const g=c.split('-')[0],d=state.classAssignments[c];(state.subjects||[]).forEach(s=>{let h=parseInt(s.stdHours?.[g])||0;if(h===0||(state.specialBlocks||[]).some(b=>b.subjectId===s.id&&(b.targets||[]).includes(c)))return;const ov=d.overrides?.[s.id]||{};if(ov.allocations?.length>0)ov.allocations.forEach(a=>{if(a.teacherId&&l[a.teacherId]){l[a.teacherId].t+=parseInt(a.hours)||0;l[a.teacherId].i.push({c,s:s.name,h:a.hours});}});else{const tid=ov.teacherId||d.homeroom;if(tid&&l[tid]){l[tid].t+=h;l[tid].i.push({c,s:s.name,h});}}});});(state.specialBlocks||[]).forEach(b=>{const sN=safeFind(state.subjects,'id',b.subjectId)?.name||'特';(b.teachers||[]).forEach(bt=>{if(bt.id&&l[bt.id]){l[bt.id].t+=parseInt(bt.hours)||0;l[bt.id].i.push({c:(b.targets||[]).join(','),s:sN,h:bt.hours,sp:1});}});});return l;}

let scrPos={},actId=null;
function saveUI(){document.querySelectorAll('.csb,.overflow-auto').forEach(e=>{if(e.id)scrPos[e.id]={t:e.scrollTop,l:e.scrollLeft};});actId=document.activeElement?.tagName==='INPUT'||document.activeElement?.tagName==='SELECT'?document.activeElement.id:null;}
function restUI(){const r=()=>{document.querySelectorAll('.csb,.overflow-auto').forEach(e=>{if(e.id&&scrPos[e.id]){e.scrollTop=scrPos[e.id].t;e.scrollLeft=scrPos[e.id].l;}});if(actId){const e=getId(actId);if(e?.focus){e.focus();try{const ln=e.value.length;e.setSelectionRange(ln,ln);}catch(x){}}}};r();setTimeout(r,10);setTimeout(r,50);}

let cfId=null, cbTids=[];
function trigCb(){
    cbTids.forEach(clearTimeout); cbTids=[]; if(cfId)cancelAnimationFrame(cfId); if(typeof confetti==='function')confetti.reset();
    const o=getId('celebration-overlay'),t=getId('celebration-text');
    o.classList.remove('hidden','opacity-0'); void o.offsetWidth; o.classList.add('flex','opacity-100');
    const sk=()=>{if(cfId)cancelAnimationFrame(cfId);if(typeof confetti==='function')confetti.reset();cbTids.forEach(clearTimeout);o.classList.replace('opacity-100','opacity-0');setTimeout(()=>{o.classList.add('hidden');o.classList.remove('flex');},500);};
    o.addEventListener('click',sk); cbTids.push(setTimeout(()=>{t.classList.remove('scale-50','opacity-0');t.classList.add('scale-110','opacity-100');cbTids.push(setTimeout(()=>t.classList.replace('scale-110','scale-100'),300));},100)); cbTids.push(setTimeout(sk,4000));
}

function valSch(){
    state.violations={};state.conflictingIds=[];const sch=state.generatedSchedule;if(!sch)return;
    const P=getDynPeriods(),cs=new Set(),dC={};
    DAYS.forEach(d=>{dC[d]={};P.forEach(p=>{const ls=sch[d]?.[p]||[];const tm={},rm={};ls.forEach(l=>{normT(l.teacherIds).forEach(t=>{if(!tm[t])tm[t]=[];tm[t].push(l);});if(l.room&&safeFind(state.rooms,'name',l.room)){if(!rm[l.room])rm[l.room]=[];rm[l.room].push(l);}(l.targets||[]).forEach(c=>{if(!dC[d][c])dC[d][c]={};if(!dC[d][c][l.subject])dC[d][c][l.subject]=[];dC[d][c][l.subject].push({l,p});});});
    Object.keys(tm).forEach(t=>{if(tm[t].length>1){const tn=safeFind(state.teachers,'id',t)?.name||'?';tm[t].forEach(l=>{if(!state.violations[l.id])state.violations[l.id]=[];const os=tm[t].filter(x=>x.id!==l.id);state.violations[l.id].push(`教員重複:${tn}先生が他(${(os||[]).map(x=>(x.targets||[]).join(',')).join('・')})で授業`);os.forEach(x=>cs.add(x.id));});}});
    Object.keys(rm).forEach(rn=>{const rd=safeFind(state.rooms,'name',rn);if(rd&&rm[rn].length>(rd.capacity||1)){rm[rn].forEach(l=>{if(!state.violations[l.id])state.violations[l.id]=[];const os=rm[rn].filter(x=>x.id!==l.id);state.violations[l.id].push(`教室重複:${rn}定員超過(他:${(os||[]).map(x=>(x.targets||[]).join(',')).join('・')})`);os.forEach(x=>cs.add(x.id));});}});});});
    DAYS.forEach(d=>{Object.keys(dC[d]).forEach(c=>{Object.keys(dC[d][c]).forEach(s=>{const is=dC[d][c][s];const u=new Set(is.map(x=>x.l.id));if(u.size>1){is.forEach(i=>{const l=i.l;if(!state.violations[l.id])state.violations[l.id]=[];const m=`同日重複:${c}の${s}が複数配置`;if(!state.violations[l.id].includes(m))state.violations[l.id].push(m);is.filter(x=>x.l.id!==l.id).forEach(x=>cs.add(x.l.id));});}});});}); state.conflictingIds=Array.from(cs);
}
function isBan(d,p,rId,md){if(!d||!p)return false;if(state.movingLesson){let b=false;(state.movingLesson.targets||[]).forEach(c=>{const g=c.split('-')[0];if(p>(state.periods[g]?.[d]||0))b=true;});normT(state.movingLesson.teacherIds).forEach(t=>{const tc=safeFind(state.teachers,'id',t);if(tc?.ngTimes?.[`${d}-${p}`])b=true;});return b;}if(md==='class'&&rId){const g=rId.split('-')[0];if(p>(state.periods[g]?.[d]||0))return true;}if(md==='teacher'&&rId){const t=safeFind(state.teachers,'id',rId);if(t?.ngTimes?.[`${d}-${p}`])return true;}return false;}

function render(){
    saveUI();try{localStorage.setItem('tt_v16_9_0',JSON.stringify(state));}catch(e){}if(state.currentStep===10)valSch();
    const hU=getId('step-header-utils');if(hU)hU.innerHTML=`<button onclick="actions.toggleDarkMode()" class="p-1.5 rounded-lg"><svg class="w-4 h-4 hidden dark:block text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path></svg><svg class="w-4 h-4 block dark:hidden text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg></button><button onclick="actions.importData()" class="text-[9px] font-black bg-slate-50 dark:bg-slate-800 text-slate-500 border dark:border-slate-700 px-2 py-1.5 rounded-lg">📥読込</button><button onclick="actions.exportData()" class="text-[9px] font-black bg-emerald-50 text-emerald-700 border border-emerald-200 px-2 py-1.5 rounded-lg">💾保存</button>`;
    getId('step-title').innerText=stepTitles[state.currentStep-1]||'';getId('progress-dots').innerHTML=Array.from({length:10},(_,i)=>`<div class="sd ${i+1<=state.currentStep?'act':''}"></div>`).join('');
    const nb=getId('btn-next'),nt=getId('btn-next-text'),pb=getId('btn-prev');
    if(pb){pb.style.visibility=(state.currentStep===1?'hidden':'visible');pb.onclick=()=>{(state.currentStep>1)&&(state.currentStep--,render());}}
    if(nb&&nt){nb.onclick=null;if(state.currentStep===9){nb.style.display='none';}else if(state.currentStep===10){nb.style.display='flex';nt.innerText="出力設定";nb.onclick=actions.openExportModal;}else{nb.style.display='flex';nt.innerText="次へ進む";nb.onclick=()=>{state.currentStep++;render();}}}
    const ct=getId('step-content');if(ct){try{ct.innerHTML=window[`viewStep${state.currentStep}`]();}catch(e){console.error(e);}} restUI();

    hC:(d,p,cls,lId=null)=>{getId('violation-popup').classList.add('opacity-0');if(!state.generatedSchedule)return;if(state.movingLesson){const fL=state.movingLesson;if(fL.id===lId){state.movingLesson=null;render();return;}let mO=null;if(fL.day){const ls=state.generatedSchedule[fL.day]?.[fL.period]||[];const i=ls.findIndex(x=>x.id===fL.id);if(i>-1)mO=ls.splice(i,1)[0];}else{const i=state.unassigned.findIndex(x=>x.id===fL.id);if(i>-1)mO=state.unassigned.splice(i,1)[0];}if(!mO){state.movingLesson=null;render();return;}if(d==='tray'){state.unassigned.push(mO);showToast("トレイへ戻しました","success");}else{if(!state.generatedSchedule[d][p])state.generatedSchedule[d][p]=[];let tL=null;if(lId){const i=state.generatedSchedule[d][p].findIndex(x=>x.id===lId);if(i>-1){tL=state.generatedSchedule[d][p].splice(i,1)[0];if(fL.day){if(!state.generatedSchedule[fL.day][fL.period])state.generatedSchedule[fL.day][fL.period]=[];state.generatedSchedule[fL.day][fL.period].push(tL);}else state.unassigned.push(tL);}}state.generatedSchedule[d][p].push(mO);showToast(tL?"入替完了":"移動完了","success");}state.movingLesson=null;actions.pSH();valSch();render();}else{if(!lId)return;if(state.violations?.[lId]){const el=getId('violation-popup');el.innerHTML=`<div class="font-black text-rose-500 text-xs mb-1">⚠️ 違反</div><ul class="text-[10px] pl-4 list-disc">${state.violations[lId].map(m=>`<li>${m}</li>`).join('')}</ul>`;el.classList.remove('opacity-0','pointer-events-none','scale-95');}if(d==='tray')state.movingLesson={id:lId,day:null,period:null,targets:safeFind(state.unassigned,'id',lId)?.targets||[],teacherIds:normT(safeFind(state.unassigned,'id',lId)?.teacherIds)};else{const o=(state.generatedSchedule[d][p]||[]).find(x=>x.id===lId);if(o)state.movingLesson={id:lId,day:d,period:p,cls,targets:o.targets,teacherIds:normT(o.teacherIds)};}render();}},
    iSH:()=>{if(state.generatedSchedule&&state.unassigned){state.scheduleHistory=[{schedule:JSON.parse(JSON.stringify(state.generatedSchedule)),unassigned:JSON.parse(JSON.stringify(state.unassigned))}];state.historyIndex=0;}}, pSH:()=>{if(!state.scheduleHistory)state.scheduleHistory=[];if(state.historyIndex<state.scheduleHistory.length-1)state.scheduleHistory=state.scheduleHistory.slice(0,state.historyIndex+1);state.scheduleHistory.push({schedule:JSON.parse(JSON.stringify(state.generatedSchedule)),unassigned:JSON.parse(JSON.stringify(state.unassigned))});if(state.scheduleHistory.length>30){state.scheduleHistory.shift();state.historyIndex--;}state.historyIndex=state.scheduleHistory.length-1;}, uSc:()=>{if(state.historyIndex>0){state.historyIndex--;const s=state.scheduleHistory[state.historyIndex];state.generatedSchedule=JSON.parse(JSON.stringify(s.schedule));state.unassigned=JSON.parse(JSON.stringify(s.unassigned));state.movingLesson=null;valSch();render();}}, rSc:()=>{if(state.historyIndex<(state.scheduleHistory?.length||0)-1){state.historyIndex++;const s=state.scheduleHistory[state.historyIndex];state.generatedSchedule=JSON.parse(JSON.stringify(s.schedule));state.unassigned=JSON.parse(JSON.stringify(s.unassigned));state.movingLesson=null;valSch();render();}},
    jTR:()=>{state.currentStep=10;render();},
    oEM:()=>{let h=`<div class="flex justify-between items-center mb-4 border-b pb-2"><h3 class="text-lg font-black text-blue-900">🖨️ 出力設定</h3><button onclick="actions.cM()" class="px-2 text-slate-400 font-bold hover:bg-slate-100 rounded">✕</button></div><div class="flex-1 csb pr-2 flex flex-col gap-4 pb-4 text-sm font-bold text-slate-700"><div class="grid grid-cols-1 md:grid-cols-2 gap-4"><div class="bg-slate-50 p-4 rounded-xl border"><h4 class="text-xs font-black text-slate-500 mb-3 border-b pb-1">📄 PDF出力</h4>${['matrixClass:全校クラス','matrixTeacher:全校教員','matrixRoom:全校教室','individualClass:各クラス','individualTeacher:各教員'].map(v=>`<label class="flex items-center gap-2 mb-2 cursor-pointer"><input type="checkbox" id="pdf-${v.split(':')[0]}" ${v.includes('Room')||v.includes('individualTeacher')?'':'checked'} class="w-4 h-4"><span>${v.split(':')[1]}</span></label>`).join('')}</div><div class="bg-emerald-50 p-4 rounded-xl border border-emerald-200"><h4 class="text-xs font-black text-emerald-600 mb-3 border-b border-emerald-200 pb-1">📊 スプレッドシート</h4>${['matrixClass:全校クラス','matrixTeacher:全校教員','matrixRoom:全校教室','individualClass:各クラス','individualTeacher:各教員'].map(v=>`<label class="flex items-center gap-2 mb-2 cursor-pointer"><input type="checkbox" id="ss-${v.split(':')[0]}" ${v.includes('Room')?'':'checked'} class="w-4 h-4 text-emerald-600"><span>${v.split(':')[1]}</span></label>`).join('')}</div></div><div class="bg-blue-50 text-blue-800 p-3 rounded-lg text-xs border border-blue-200">💡 サーバー生成に数秒かかります。</div><div class="mt-2 flex justify-end"><button onclick="actions.eEx()" class="m3-btn-p px-8">生成</button></div></div>`;getId('modal-body').innerHTML=h;getId('modal-overlay').classList.remove('hidden');}, cM:()=>{getId('modal-overlay').classList.add('hidden');},
    eEx:async ()=>{const o={pdf:{matrixClass:getId('pdf-matrixClass')?.checked,matrixTeacher:getId('pdf-matrixTeacher')?.checked,matrixRoom:getId('pdf-matrixRoom')?.checked,individualClass:getId('pdf-individualClass')?.checked,individualTeacher:getId('pdf-individualTeacher')?.checked},spreadsheet:{matrixClass:getId('ss-matrixClass')?.checked,matrixTeacher:getId('ss-matrixTeacher')?.checked,matrixRoom:getId('ss-matrixRoom')?.checked,individualClass:getId('ss-individualClass')?.checked,individualTeacher:getId('ss-individualTeacher')?.checked}};actions.cM();showLoading("生成中","ドライブへ保存中...",false);try{const r=await fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'export',state:state,schedule:state.generatedSchedule,options:o})});const d=await r.json();hideLoading();if(d.success&&d.urls){let h=`<div class="flex justify-between items-center mb-4 border-b pb-2"><h3 class="text-lg font-black text-blue-900">🎉 生成完了</h3><button onclick="actions.cM()" class="px-2 font-black text-slate-400 hover:bg-slate-100 rounded">✕</button></div><div class="flex flex-col gap-3">`;if(d.urls.spreadsheetUrl)h+=`<a href="${d.urls.spreadsheetUrl}" target="_blank" class="p-3 bg-emerald-50 text-emerald-700 border border-emerald-200 rounded-xl font-black text-center text-base transition-all hover:bg-emerald-100">📊 スプレッドシート</a>`;if(d.urls.pdfUrl)h+=`<a href="${d.urls.pdfUrl}" target="_blank" class="p-3 bg-rose-50 text-rose-700 border border-rose-200 rounded-xl font-black text-center text-base transition-all hover:bg-rose-100">📄 PDF (ダウンロード)</a>`;h+=`</div>`;getId('modal-body').innerHTML=h;getId('modal-overlay').classList.remove('hidden');}else showToast("失敗: "+(d.message||""),"error");}catch(e){hideLoading();showToast("通信エラー","error");}},
    oRM:()=>{const sc=state.scoreCard;let h=`<div class="flex justify-between items-center mb-4 border-b pb-2"><h3 class="text-lg font-black text-blue-900">📊 採点レポート</h3><button onclick="actions.cM()" class="px-2 text-slate-400 font-bold hover:bg-slate-100 rounded">✕</button></div><div class="flex-1 overflow-y-auto csb flex flex-col gap-3 pb-4"><div class="bg-blue-50 p-4 rounded-xl border border-blue-200 shrink-0 flex justify-between"><span class="font-black text-blue-900">基礎ルール</span><span class="font-black text-2xl text-blue-600">${sc.basic?.score||0}%</span></div>`;Object.keys(sc.advanced?.rules||{}).forEach(k=>{const r=sc.advanced.rules[k],iP=r.score===100;h+=`<div class="bg-white rounded-xl border ${iP?'border-emerald-200':'border-amber-300'} shadow-sm"><div class="px-4 py-2 flex justify-between ${iP?'bg-emerald-50':'bg-amber-50'} border-b"><span class="font-black text-xs ${iP?'text-emerald-800':'text-amber-800'}">${r.name}</span><span class="font-black text-sm">${r.score}%</span></div><div class="p-3">${r.failures?.length>0?`<ul class="text-[10px] font-bold text-slate-600 list-disc pl-4 space-y-1">${r.failures.map(f=>`<li>${f}</li>`).join('')}</ul>`:`<div class="text-[10px] font-bold text-emerald-600">クリア！</div>`}</div></div>`;});getId('modal-body').innerHTML=h+`</div>`;getId('modal-overlay').classList.remove('hidden');},
    pPL:()=>{return JSON.parse(JSON.stringify(state));}, sGn:async function(){state.marathon.active=true;state.marathon.currentGen=1;state.best={unassignedCount:9999,schedule:null};actions.rMC();}, cGn:function(){state.marathon.active=false;actions.rSC("再調整中...");},
    rMC:async function(){if(!state.marathon.active)return;const m=state.marathon;startTimer();showLoading("AIチャレンジ中",`第${m.currentGen}/${m.maxGen===Infinity?'∞':m.maxGen}回`,true);try{const r=await fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'generate',state:actions.pPL()})});const d=await r.json();if(!state.marathon.active)return;if(d.success){const bc=getId('loading-best-container');if(bc){bc.classList.remove('hidden');bc.classList.add('flex');getId('loading-latest-record').innerText=d.unassigned.length;}if(d.unassigned.length<state.best.unassignedCount){state.best={unassignedCount:d.unassigned.length,schedule:d.schedule,unassigned:d.unassigned,scoreCard:d.scoreCard};getId('loading-best-record').innerText=state.best.unassignedCount;}if(state.best.unassignedCount<=m.target||m.currentGen>=m.maxGen){state.generatedSchedule=state.best.schedule;state.unassigned=state.best.unassigned;state.scoreCard=state.best.scoreCard;state.currentStep=10;state.marathon.active=false;actions.iSH();render();hideLoading();if(state.best.unassignedCount===0){showToast("🎉 完璧です！","success");setTimeout(trigCb,300);}else showToast("終了","success");}else{m.currentGen++;actions.rMC();}}else{showToast("エラー","error");hideLoading();state.marathon.active=false;}}catch(e){showToast("通信エラー","error");hideLoading();state.marathon.active=false;}},
    rSC:async function(st){startTimer();showLoading("計算中",st,true);try{const r=await fetch(GAS_URL,{method:'POST',body:JSON.stringify({action:'generate',state:actions.pPL(),currentSchedule:state.generatedSchedule,unassigned:state.unassigned})});const d=await r.json();if(d.success){state.generatedSchedule=d.schedule;state.unassigned=d.unassigned;state.scoreCard=d.scoreCard;state.currentStep=10;actions.iSH();render();hideLoading();}else{showToast("エラー","error");hideLoading();}}catch(e){showToast("通信エラー","error");hideLoading();}},
