<script>

    items: [
      { key: "homeroomOnlyTimes", type: "array", fields: ['target', 'exclude', 'day', 'period'], format: "[target] ただし [exclude] を除く の [day]曜 [period]限 は専科を入れない", title: "担任授業固定枠 (専科ブロック)", desc: "行事準備等で専科を入れない枠を指定する", tip: "学年一斉の活動時間を確保しやすくします。" },

var state={currentStep:1, grades:{1:3,2:3,3:3,4:3,5:3,6:3}, periods:{}, rooms:[], subjects:[], teachers:[], globalBlocks:{}, specialBlocks:[], classAssignments:{}, advancedRules:{priorities:{}}, openPkgs:{pkg1:true}, generatedSchedule:null, unassigned:[], reportDetails:{}, scoreCard:null, dashTab:'matrix', matrixAxis:'class', dashView:'class', dashFilter:'', marathon: {active:false, target:0, maxGen:10, currentGen:1, ignoreFatal:true}, best: {unassignedCount:9999, schedule:null, unassigned:null, scoreCard:null, reportDetails:null}, selectedTeacherId:null, subjectsUndoStack:[], undoStack:[]};

let genTimerInterval = null, sessionStartTime = null, globalStartTime = null;

function startGenTimer() {
    sessionStartTime = Date.now(); if (!globalStartTime) globalStartTime = Date.now();
    if(genTimerInterval) clearInterval(genTimerInterval);
    genTimerInterval = setInterval(() => {
        const tEl = document.getElementById('loading-timer'), gEl = document.getElementById('global-timer-display'), now = Date.now();
        if(tEl && sessionStartTime) tEl.innerText = ((now - sessionStartTime) / 1000).toFixed(1) + 's';
        if(gEl && globalStartTime) gEl.innerText = `累計経過時間: ${((now - globalStartTime) / 1000).toFixed(1)}s`;
    }, 100);
}
function stopGenTimer() { clearInterval(genTimerInterval); genTimerInterval = null; }

function safeFind(arr,k,v){return (arr||[]).find(x=>x[k]===v);}
function forceInitState(){
    if(!state.periods) state.periods={}; GRADES.forEach(g=>{if(!state.periods[g]) state.periods[g]={月:5,火:5,水:4,木:5,金:5};});
    if(!state.rooms?.length) state.rooms=[{id:'r1',name:'校庭',capacity:2,ngTimes:{}},{id:'r2',name:'体育館',capacity:2,ngTimes:{}},{id:'r3',name:'理科室',capacity:1,ngTimes:{}}];
    if(!state.subjects?.length) state.subjects=[{id:'s1',name:'国語',stdHours:{1:9,2:9,3:7,4:7,5:5,6:5},defaultRoom:'通常教室'},{id:'s2',name:'算数',stdHours:{1:4,2:5,3:5,4:5,5:5,6:5},defaultRoom:'通常教室'}];
    if(!state.grades) state.grades={1:3,2:3,3:3,4:3,5:3,6:3}; if(!state.classAssignments) state.classAssignments={};
    GRADES.forEach(g=>{for(let i=1;i<=(parseInt(state.grades[g])||1);i++){let c=`${g}-${i}`;if(!state.classAssignments[c]) state.classAssignments[c]={homeroom:'',overrides:{}};}});
    if(!state.advancedRules) state.advancedRules={priorities:{}};
    if(!state.openPkgs) state.openPkgs={pkg1:true};
    if(!state.marathon) state.marathon={active:false, target:0, maxGen:10, currentGen:1, ignoreFatal:true};
    if(!state.best) state.best={unassignedCount:9999, schedule:null, unassigned:null, scoreCard:null, reportDetails:null};
    if(!state.dashTab) state.dashTab = 'matrix';
    if(!state.matrixAxis) state.matrixAxis = 'class';
}

function load(){
    try{const d=localStorage.getItem('tt_v15_stable_final');if(d){Object.assign(state,JSON.parse(d));}}catch(e){} 
    forceInitState(); render();
}

function showToast(msg,type='info'){const t=document.getElementById('toast'),m=document.getElementById('toast-msg');if(!t||!m)return; t.className=`fixed top-4 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full shadow-xl font-bold text-sm z-[9999] transition-all opacity-100 ${type==='success'?'bg-emerald-600 text-white':(type==='error'?'bg-rose-600 text-white':(type==='info'?'bg-blue-600 text-white':'bg-slate-800 text-white'))}`; m.innerText=msg; setTimeout(()=>t.classList.replace('opacity-100','opacity-0'),3000);}
function showLoading(t,d,showCancel=false, statusText=""){
    const l=document.getElementById('loading-overlay'), cBtn=document.getElementById('btn-cancel-gen'), stEl=document.getElementById('loading-status');
    if(l){
        document.getElementById('loading-title').innerText=t; document.getElementById('loading-desc').innerText=d;
        if(statusText) { stEl.innerText=statusText; stEl.classList.remove('hidden'); stEl.classList.add('block'); } else { stEl.classList.add('hidden'); }
        if(showCancel)cBtn.classList.remove('hidden');else cBtn.classList.add('hidden');
        l.classList.replace('hidden','flex');
    }
}
function hideLoading(){ stopGenTimer(); const l=document.getElementById('loading-overlay'); if(l)l.classList.replace('flex','hidden'); }

function getSubjectColor(s){
  if(!s)return 'bg-slate-100 text-slate-500 border-slate-200 dark:bg-slate-800 dark:text-slate-400 dark:border-slate-700';
  if(s.includes('国')||s.includes('書'))return 'bg-blue-100 text-blue-800 border-blue-200 dark:bg-blue-900/40 dark:text-blue-300 dark:border-blue-800/60';
  if(s.includes('算')||s.includes('数'))return 'bg-yellow-100 text-yellow-800 border-yellow-200 dark:bg-yellow-900/40 dark:text-yellow-300 dark:border-yellow-800/60';
  if(s.includes('体'))return 'bg-red-100 text-red-800 border-red-200 dark:bg-red-900/40 dark:text-red-300 dark:border-red-800/60';
  if(s.includes('理'))return 'bg-green-100 text-green-800 border-green-200 dark:bg-green-900/40 dark:text-green-300 dark:border-green-800/60';
  if(s.includes('社'))return 'bg-orange-100 text-orange-800 border-orange-200 dark:bg-orange-900/40 dark:text-orange-300 dark:border-orange-800/60';
  if(s.includes('英')||s.includes('外'))return 'bg-fuchsia-100 text-fuchsia-800 border-fuchsia-200 dark:bg-fuchsia-900/40 dark:text-fuchsia-300 dark:border-fuchsia-800/60';
  if(s.includes('音'))return 'bg-pink-100 text-pink-800 border-pink-200 dark:bg-pink-900/40 dark:text-pink-300 dark:border-pink-800/60';

function render(){

    const nb=document.getElementById('btn-next'), nt=document.getElementById('btn-next-text'), pb=document.getElementById('btn-prev');

        pb.onclick = () => { if(state.currentStep > 1) { state.currentStep--; render(); } };

            nt.innerText="マラソン開始";
            nb.className="m3-btn-primary w-[180px] bg-indigo-600 hover:bg-indigo-700 transition-colors";

        html+=`<div class="flex-1 overflow-auto bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl shadow-sm custom-scrollbar relative min-h-0"><table class="w-max border-collapse text-center table-fixed"><thead class="sticky top-0 z-20"><tr class="bg-slate-100 dark:bg-slate-800 border-b dark:border-slate-700"><th class="sticky left-0 bg-slate-100 dark:bg-slate-800 z-30 p-2 w-28 min-w-[7rem] border-r dark:border-slate-700 font-black text-xs text-slate-600 dark:text-slate-300 shadow-[2px_0_4px_-2px_rgba(0,0,0,0.1)] dark:shadow-[2px_0_4px_-2px_rgba(0,0,0,0.5)]">軸 \\ 曜日</th>${DAYS.map(d=>`<th colspan="6" class="p-1 border-r dark:border-slate-700 font-black text-xs text-slate-600 dark:text-slate-300">${d}曜</th>`).join('')}</tr><tr class="bg-slate-50 dark:bg-slate-800/80 border-b dark:border-slate-700"><th class="sticky left-0 bg-slate-50 dark:bg-slate-800/80 z-30 p-1 border-r dark:border-slate-700 text-[10px] font-bold text-slate-400 shadow-[2px_0_4px_-2px_rgba(0,0,0,0.1)] dark:shadow-[2px_0_4px_-2px_rgba(0,0,0,0.5)]">時限</th>${DAYS.map(d=>PERIODS.map(p=>`<th class="p-1 w-[72px] min-w-[4.5rem] border-r dark:border-slate-700 font-black text-[10px] text-slate-500 dark:text-slate-400">${p}</th>`).join('')).join('')}</tr></thead><tbody>`;
        
        html += rows.map(rowId=>{
            let rowName=rowId; if(state.matrixAxis==='teacher') rowName=teachers.find(t=>t.id===rowId)?.name||'不明';
            let tr=`<tr class="border-b dark:border-slate-700/50 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors"><td class="sticky left-0 bg-white dark:bg-slate-900 border-r dark:border-slate-700 p-2 text-xs font-black text-slate-700 dark:text-slate-200 z-10 shadow-[2px_0_4px_-2px_rgba(0,0,0,0.1)] dark:shadow-[2px_0_4px_-2px_rgba(0,0,0,0.5)] whitespace-normal break-words">${rowName}</td>`;
            DAYS.forEach(d=>{PERIODS.forEach(p=>{
                let isNG = false; let isGlobal = isGlobalBlock(d, p);
                if (state.matrixAxis === 'class') { let hr = getClassHomeroom(rowId); if (hr) isNG = isTeacherNG(hr, d, p); }
                else if (state.matrixAxis === 'teacher') { isNG = isTeacherNG(rowId, d, p); }
                else if (state.matrixAxis === 'room') { isNG = isRoomNG(rowId, d, p); }
                
                let bgClass = "bg-slate-50/30 dark:bg-slate-800/20";
                if (isGlobal) bgClass = "bg-global-pattern"; else if (isNG) bgClass = "bg-ng-pattern";

                const lessons=state.generatedSchedule?.[d]?.[p]||[];
                let targetLessons=[];
                if(state.matrixAxis==='class') targetLessons=lessons.filter(l=>l.targets?.includes(rowId));
                else if(state.matrixAxis==='teacher') targetLessons=lessons.filter(l=>l.teacherIds?.includes(rowId));
                else if(state.matrixAxis==='room') targetLessons=lessons.filter(l=>l.room===rowId);
                
                if(targetLessons.length>0){
                    const l=targetLessons[0]; let subText="";
                    if(state.matrixAxis==='class') subText=`${l.teacherName||'未定'}`; 
                    else if(state.matrixAxis==='teacher') subText=`${l.targets?.join(',')||''}`; 
                    else if(state.matrixAxis==='room') subText=`${l.targets?.join(',')||''} ${l.teacherName||''}`;
                    
                    const conflictClass=targetLessons.length>1?'border-2 border-red-500':'border border-slate-200 dark:border-slate-700/50';
                    tr+=`<td class="p-1 border-r dark:border-slate-700/50 h-full align-top ${bgClass}"><div class="h-full flex flex-col items-center justify-center p-1 rounded ${conflictClass} ${getSubjectColor(l.subject)} shadow-sm relative overflow-hidden min-h-[44px]">${targetLessons.length>1?`<span class="absolute top-0 right-0 bg-red-500 text-white text-[8px] font-black px-1 rounded-bl shadow">重複</span>`:''}<div class="font-black text-[10px] w-full truncate leading-tight mb-0.5" title="${l.subject}">${l.subject}</div><div class="text-[8px] font-bold text-slate-500 dark:text-slate-400 w-full truncate opacity-90 leading-none" title="${subText}">${subText}</div>${state.matrixAxis!=='room'&&l.room!=='通常教室'?`<div class="text-[8px] font-bold text-amber-600 dark:text-amber-400 w-full truncate opacity-90 leading-none mt-0.5" title="${l.room}">📍${l.room}</div>`:''}</div></td>`;
                }else{ tr+=`<td class="p-1 border-r dark:border-slate-700/50 ${bgClass}"></td>`; }
            });}); tr+=`</tr>`; return tr;
        }).join('');
        
        html += `</tbody></table></div>`;
    } else {
        const fOpts=state.dashView==='class'?classes.map(c=>`<option value="${c}" ${c===state.dashFilter?'selected':''}>${c}</option>`).join(''):teachers.map(t=>`<option value="${t.id}" ${t.id===state.dashFilter?'selected':''}>${t.name}</option>`).join('');
        html+=`<div class="flex justify-between items-center mb-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-2 rounded-xl shrink-0 gap-2 flex-wrap shadow-sm"><div class="flex items-center gap-2 bg-slate-50 dark:bg-slate-800/50 p-1 rounded-lg border border-slate-200 dark:border-slate-700"><button onclick="actions.setDashView('class')" class="px-4 py-1.5 rounded-md font-black text-xs transition-colors ${state.dashView==='class'?'bg-indigo-600 dark:bg-indigo-500 text-white shadow-sm':'text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700'}">クラス別</button><button onclick="actions.setDashView('teacher')" class="px-4 py-1.5 rounded-md font-black text-xs transition-colors ${state.dashView==='teacher'?'bg-indigo-600 dark:bg-indigo-500 text-white shadow-sm':'text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700'}">教員別</button></div><select onchange="actions.setDashFilter(this.value)" class="m3-input !py-1.5 !text-sm !w-48 shadow-sm cursor-pointer">${fOpts}</select></div>`;
        
        let classStats = "";
        if (state.dashView === 'class') {
            const cls = state.dashFilter, grade = cls.split('-')[0];
            let totalNeeded=0, totalAssigned=0, subStats=[];
            (state.subjects||[]).forEach(s => {
                let needed=parseInt(s.stdHours?.[grade])||0; if(needed===0) return;
                let assigned=0; DAYS.forEach(d=>PERIODS.forEach(p=>{ (state.generatedSchedule?.[d]?.[p]||[]).forEach(l=>{ if(l.targets?.includes(cls)&&l.subject===s.name) assigned++; }); }));
                totalNeeded+=needed; totalAssigned+=assigned;
                subStats.push(`<span class="inline-flex items-center gap-1 ${assigned<needed?'text-rose-500 dark:text-rose-400':(assigned>needed?'text-amber-500 dark:text-amber-400':'text-emerald-600 dark:text-emerald-400')}"><span class="px-1.5 py-0.5 rounded text-[8px] font-black border leading-none ${getSubjectColor(s.name)}">${s.name}</span> ${assigned}/${needed}</span>`);
            });
            classStats=`<div class="bg-white dark:bg-slate-800 p-3 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm mb-3 flex flex-col gap-2 shrink-0"><div class="flex items-center gap-3"><span class="text-sm font-black dark:text-slate-200">${cls} 時数進捗</span><span class="text-xs font-bold px-2 py-1 rounded bg-slate-100 dark:bg-slate-900 ${totalAssigned<totalNeeded?'text-rose-500 dark:text-rose-400':'text-emerald-600 dark:text-emerald-400'}">全体: ${totalAssigned} / ${totalNeeded} コマ</span></div><div class="flex flex-wrap gap-2 text-xs font-bold bg-slate-50 dark:bg-slate-900/50 p-2 rounded-lg border border-slate-100 dark:border-slate-700/50">${subStats.join('')}</div></div>`;
        } else if (state.dashView === 'teacher') {
            const tid = state.dashFilter, tObj = teachers.find(t=>t.id===tid);
            let totalNeeded = getTeacherLoads()[tid]||0, totalAssigned=0, clsStatsMap={};
            DAYS.forEach(d=>PERIODS.forEach(p=>{ (state.generatedSchedule?.[d]?.[p]||[]).forEach(l=>{ if(l.teacherIds?.includes(tid)){ totalAssigned++; l.targets.forEach(tgt=>{ clsStatsMap[tgt]=(clsStatsMap[tgt]||0)+1; }); } }); }));
            let clsStats=Object.entries(clsStatsMap).map(([tgt,count])=>`<span class="inline-flex items-center gap-1 text-indigo-600 dark:text-indigo-400"><span class="px-1.5 py-0.5 rounded text-[8px] font-black border border-indigo-200 bg-indigo-50 dark:bg-indigo-900/30 dark:border-indigo-800 leading-none">${tgt}</span> ${count}コマ</span>`);
            classStats=`<div class="bg-white dark:bg-slate-800 p-3 rounded-xl border border-slate-200 dark:border-slate-700 shadow-sm mb-3 flex flex-col gap-2 shrink-0"><div class="flex items-center gap-3"><span class="text-sm font-black dark:text-slate-200">${tObj?.name||''} 担当進捗</span><span class="text-xs font-bold px-2 py-1 rounded bg-slate-100 dark:bg-slate-900 ${totalAssigned<totalNeeded?'text-rose-500 dark:text-rose-400':'text-emerald-600 dark:text-emerald-400'}">全体: ${totalAssigned} / ${totalNeeded} コマ</span></div><div class="flex flex-wrap gap-2 text-xs font-bold bg-slate-50 dark:bg-slate-900/50 p-2 rounded-lg border border-slate-100 dark:border-slate-700/50">${clsStats.join('')||'<span class="text-slate-400">担当なし</span>'}</div></div>`;
        }
        html+=classStats;
        
        html+=`<div class="flex-1 overflow-auto bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl shadow-sm custom-scrollbar p-1 min-h-0 relative"><div class="grid grid-cols-[40px_repeat(5,1fr)] min-w-[700px] h-full gap-px bg-slate-200 dark:bg-slate-700 border border-slate-200 dark:border-slate-700"><div class="bg-slate-100 dark:bg-slate-800 flex items-center justify-center font-black text-[10px] uppercase dark:text-slate-300">Time</div>${DAYS.map(d=>`<div class="bg-slate-100 dark:bg-slate-800 flex items-center justify-center font-black text-xs py-2 dark:text-slate-300">${d}曜</div>`).join('')}`;
        PERIODS.forEach(p=>{
            html+=`<div class="bg-slate-50 dark:bg-slate-900 flex items-center justify-center font-black text-xs border-r dark:border-slate-700 dark:text-slate-400">${p}限</div>`;
            DAYS.forEach(d=>{
                let isNG = false; let isGlobal = isGlobalBlock(d, p);
                if (state.dashView === 'class') { let hr = getClassHomeroom(state.dashFilter); if (hr) isNG = isTeacherNG(hr, d, p); }
                else if (state.dashView === 'teacher') { isNG = isTeacherNG(state.dashFilter, d, p); }
                let bgClass = "bg-white dark:bg-slate-900";
                if (isGlobal) bgClass = "bg-global-pattern"; else if (isNG) bgClass = "bg-ng-pattern";

                const ls=(state.generatedSchedule?.[d]?.[p]||[]).filter(l=>state.dashView==='class'?l.targets?.includes(state.dashFilter):l.teacherIds?.includes(state.dashFilter));
                html+=`<div class="dash-cell border-b border-r dark:border-slate-700/50 transition-colors ${bgClass} ${ls.length>0?'hover:bg-slate-50 dark:hover:bg-slate-800/80':''}">${ls.map(l=>`<div class="text-center w-full px-1 py-1 flex flex-col items-center justify-center h-full gap-0.5"><div class="px-2 py-0.5 rounded text-[10px] font-black border leading-none ${getSubjectColor(l.subject)} shadow-sm truncate max-w-[95%]">${l.subject}</div><div class="text-[8px] font-bold text-slate-500 dark:text-slate-400 truncate">${state.dashView==='teacher'?l.targets?.join(','):(l.teacherName||'未定')}</div></div>`).join('')}</div>`;
            });
        });
        html+=`</div></div>`;
    }
    html += `</div>`; return html;
};

// --- アクションロジック ---
window.actions = {
    toggleDarkMode: () => { const html = document.documentElement; html.classList.toggle('dark'); localStorage.setItem('tt_theme', html.classList.contains('dark') ? 'dark' : 'light'); },
    hardReset:()=>{if(confirm("すべてリセットしますか？")){localStorage.removeItem('tt_v15_stable_final');location.reload();}},
    jumpToResult:()=>{state.currentStep=10;render();},
    
    // Step 8 専用アクション
    togglePkg: (id) => {
        if(!state.openPkgs) state.openPkgs = {};
        state.openPkgs[id] = !state.openPkgs[id];
        render();
    },
    toggleRuleActive: (k, active) => {
        if(!state.advancedRules) state.advancedRules = { priorities: {} };
        if (active) {
            const pkgItem = step8Packages.flatMap(p=>p.items).find(i=>i.key===k);
            if (pkgItem.type === 'array') state.advancedRules[k] = [];
            else state.advancedRules[k] = true;
            state.advancedRules.priorities[k] = 'high';
        } else {
            delete state.advancedRules[k];
            delete state.advancedRules.priorities[k];
        }
        render();
    },
    setPriority:(k,v)=>{if(!state.advancedRules)state.advancedRules={};if(!state.advancedRules.priorities)state.advancedRules.priorities={};state.advancedRules.priorities[k]=v;render();},
    addRuleNew: (k, fieldsStr) => {
        const fields = fieldsStr.split(',');
        let obj = {};
        if (fields.includes('target')) {
            const val = document.getElementById(`e-tgt-${k}`)?.value;
            if(!val) return showToast('対象を選択してください', 'error');
            obj.grade = val;
        }
        if (fields.includes('exclude')) {
            const val = document.getElementById(`e-exc-${k}`)?.value;
            if(val) obj.exclude = val;
        }
        if (fields.includes('subject')) {
            const val = document.getElementById(`e-sub-${k}`)?.value;
            if(!val) return showToast('教科を選択してください', 'error');
            obj.subject = val;
        }
        if (fields.includes('subject1')) {
            const val = document.getElementById(`e-s1-${k}`)?.value;
            if(!val) return showToast('教科を選択してください', 'error');
            obj.subject1 = val;
        }
        if (fields.includes('subject2')) {
            const val = document.getElementById(`e-s2-${k}`)?.value;
            if(!val) return showToast('教科を選択してください', 'error');
            if(val === obj.subject1) return showToast('異なる教科を選択してください', 'error');
            obj.subject2 = val;
        }
        if (fields.includes('day')) {
            const val = document.getElementById(`e-day-${k}`)?.value;
            if(!val) return showToast('曜日を選択してください', 'error');
            obj.day = val;
        }
        if (fields.includes('period')) {
            const val = document.getElementById(`e-per-${k}`)?.value;
            if(!val) return showToast('時限を選択してください', 'error');
            obj.period = parseInt(val);
        }
        if(!state.advancedRules[k]) state.advancedRules[k] = [];
        state.advancedRules[k].push(obj);
        actions.updatePreviewFromForm(k);
        render();
    },
    removeRuleNew: (k, idx) => {
        state.advancedRules[k].splice(idx, 1);
        render();
    },
    applyPreset: (type) => {
        if(!state.advancedRules) state.advancedRules = { priorities: {} };
        if (type === 'standard') {
            state.advancedRules.limitOneSubjectPerDayStrict = true;
            state.advancedRules.limitContinuousToSpecificPeriods = true;
            state.advancedRules.priorities.limitOneSubjectPerDayStrict = 'high';
            state.advancedRules.priorities.limitContinuousToSpecificPeriods = 'high';
        } else if (type === 'child') {
            state.advancedRules.limitOneSubjectPerDayStrict = true;
            state.advancedRules.limitContinuousToSpecificPeriods = true;
            state.advancedRules.priorities.limitOneSubjectPerDayStrict = 'high';
            state.advancedRules.priorities.limitContinuousToSpecificPeriods = 'high';
            if(!state.advancedRules.amPrioritySubjects) state.advancedRules.amPrioritySubjects = [];
            if(!state.advancedRules.amPrioritySubjects.some(r=>r.subject==='国語')) state.advancedRules.amPrioritySubjects.push({grade: "全学年", subject: "国語"});
            if(!state.advancedRules.amPrioritySubjects.some(r=>r.subject==='算数')) state.advancedRules.amPrioritySubjects.push({grade: "全学年", subject: "算数"});
            if(!state.advancedRules.priorities.amPrioritySubjects) state.advancedRules.priorities.amPrioritySubjects = 'low';
        }
        showToast('プリセットを適用しました', 'success');
        render();
    },
    
    // Step 8 ミニプレビュー制御
    applyPreviewUI: (blocks, desc) => {
        const descEl = document.getElementById('preview-desc');
        if(descEl) descEl.innerText = desc;
        DAYS.forEach(d => {
            PERIODS.forEach(p => {
                const el = document.getElementById(`pv-${d}-${p}`);
                if(el) {
                    if(blocks[`${d}-${p}`]) el.className = "h-6 w-full rounded-[4px] border transition-colors duration-300 bg-rose-500/20 border-rose-500/50 bg-[repeating-linear-gradient(45deg,transparent,transparent_3px,rgba(244,63,94,0.15)_3px,rgba(244,63,94,0.15)_6px)]";
                    else el.className = "h-6 w-full rounded-[4px] border transition-colors duration-300 bg-slate-800 border-slate-700";
                }
            });
        });
    },
    clearPreview: () => {
        actions.applyPreviewUI({}, "左側のルールを設定するか、設定項目にカーソルを合わせると、ブロックされる枠が表示されます。");
    },
    updatePreviewFromForm: (k) => {
        let blocks = {}; let desc = "影響範囲プレビュー";
        const day = document.getElementById(`e-day-${k}`)?.value;
        const per = document.getElementById(`e-per-${k}`)?.value;
        
        if (k === 'amPrioritySubjects') {
            DAYS.forEach(d => [5,6].forEach(p => blocks[`${d}-${p}`] = true));
            desc = "午前優先: 5限・6限への配置がブロック（ペナルティ対象）されます。";
        } else if (k === 'lastPeriodSubjects') {
            DAYS.forEach(d => [1,2,3,4,5].forEach(p => blocks[`${d}-${p}`] = true));
            desc = "最終コマ優先: 最終コマ以外の時間帯がブロックされます。";
        } else if (k === 'avoidSpecificTimes' || k === 'avoidSpecialistTimes' || k === 'homeroomOnlyTimes') {
            if (day && per) {
                blocks[`${day}-${per}`] = true; desc = `指定時間回避: ${day}曜 ${per}限 がブロックされます。`;
            } else { desc = "曜日と時限を選択すると影響範囲が表示されます。"; }
        } else if (k === 'limitContinuousToSpecificPeriods') {
            DAYS.forEach(d => [2,4,6].forEach(p => blocks[`${d}-${p}`] = true));
            desc = "連続ペア限定: 2,4,6限開始の連続授業がブロックされます。";
        } else {
            desc = "この設定は時間割の全体バランス（同日重複や排他）に影響します。";
        }
        actions.applyPreviewUI(blocks, desc);
    },
    hoverRule: (k) => {
        if (!state.advancedRules || state.advancedRules[k] === undefined) return;
        actions.updatePreviewFromForm(k);
    },
    hoverListRule: (k, idx) => {
        const r = state.advancedRules[k][idx];
        let blocks = {}; let desc = "影響範囲プレビュー";
        if (k === 'amPrioritySubjects') {
            DAYS.forEach(d => [5,6].forEach(p => blocks[`${d}-${p}`] = true));
            desc = "午前優先: 5限・6限への配置がブロックされます。";
        } else if (k === 'lastPeriodSubjects') {
            DAYS.forEach(d => [1,2,3,4,5].forEach(p => blocks[`${d}-${p}`] = true));
            desc = "最終コマ優先: 最終コマ以外の枠がブロックされます。";
        } else if (r.day && r.period) {
            blocks[`${r.day}-${r.period}`] = true;
            desc = `指定時間回避: ${r.day}曜 ${r.period}限 がブロックされます。`;
        }
        actions.applyPreviewUI(blocks, desc);
    },

    setDashTab:(tab)=>{state.dashTab=tab;render();},
    setMatrixAxis:(axis)=>{state.matrixAxis=axis;render();},
    setDashView:(v)=>{ state.dashView=v;
        const classes = state.classAssignments ? Object.keys(state.classAssignments) : [];
        if (v === 'class' && (!classes.includes(state.dashFilter) && classes.length > 0)) state.dashFilter = classes[0];
        const teachers = state.teachers || [];
        if (v === 'teacher' && (!teachers.some(t => t.id === state.dashFilter) && teachers.length > 0)) state.dashFilter = teachers[0].id;
        render();
    },
    setDashFilter:(v)=>{state.dashFilter=v;render();},
    updateMarathon:(k,v)=>{state.marathon[k]=v;render();},
    
    closeModal: () => { document.getElementById('modal-overlay').classList.add('hidden'); },

    openReportModal:()=>{
        if(!state.scoreCard) return showToast("スコアデータがありません", "error");

    startGeneration: async function(){
        state.marathon.active = true; state.marathon.currentGen = 1; globalStartTime = Date.now();
        state.best = {unassignedCount:9999, schedule:null, unassigned:null, scoreCard:null, reportDetails:null};
        actions.runMarathonCycle();
    },
    continueMarathon: async function(){
        const addVal = document.getElementById('dash-add-gen')?.value; const addGen = addVal ? parseFloat(addVal) : 10;
        state.marathon.active = true; 
        if(state.marathon.maxGen !== Infinity) { if (addGen === Infinity) state.marathon.maxGen = Infinity; else state.marathon.maxGen += addGen; }
        actions.runMarathonCycle();
    },
    continueGeneration: function(){ state.marathon.active = false; actions.runSingleCycle("今の盤面を元に1回だけ調整中...", false); },
    cancelGeneration: () => {
        hideLoading(); state.marathon.active = false; 
        if (state.best && state.best.schedule) {
            state.generatedSchedule = state.best.schedule; state.unassigned = state.best.unassigned; state.scoreCard = state.best.scoreCard; state.reportDetails = state.best.reportDetails;
            state.currentStep = 10; showToast(`生成を中止しました。最も優秀な盤面（未配置 ${state.best.unassignedCount}）を表示します。`, "info");
        } else { state.currentStep = 9; showToast("生成をキャンセルしました。", "info"); }
        render();
    },
    runMarathonCycle: async function(){
        if (!state.marathon.active) return;
        const m = state.marathon; startGenTimer();
        showLoading("AIマラソン中...", `第 ${m.currentGen} / ${m.maxGen===Infinity?'∞':m.maxGen} 世代`, true, `目標：未配置 ${m.target} 以下`);
        const bc = document.getElementById('loading-best-container'), br = document.getElementById('loading-best-record'), lr = document.getElementById('loading-latest-record');
        if (state.best && state.best.unassignedCount !== 9999 && bc && br) { bc.classList.remove('hidden'); bc.classList.add('flex'); br.innerText = `未配置 ${state.best.unassignedCount}`; }

        try {
            const res = await fetch(GAS_URL, { method:'POST', mode:'cors', body:JSON.stringify({ action:'generate', state, currentSchedule: null, unassigned: null }) });
            const data = await res.json();
            if (!state.marathon.active) return; 

            if(data.success){
                state.generatedSchedule = data.schedule; state.unassigned = data.unassigned; state.scoreCard = data.scoreCard; state.reportDetails = data.reportDetails;
                if (bc && lr) { bc.classList.remove('hidden'); bc.classList.add('flex'); lr.innerText = `未配置 ${data.unassigned.length}`; }

                if(data.unassigned.length < state.best.unassignedCount) {
                    state.best = { unassignedCount: data.unassigned.length, schedule: data.schedule, unassigned: data.unassigned, scoreCard: data.scoreCard, reportDetails: data.reportDetails };
                    if (br) { br.innerText = `未配置 ${state.best.unassignedCount}`; br.classList.add('text-white', 'scale-110'); setTimeout(() => br.classList.remove('text-white', 'scale-110'), 300); }
                }

                const goalReached = state.best.unassignedCount <= m.target, genLimitReached = m.currentGen >= m.maxGen;
                if (goalReached || genLimitReached) {
                    state.generatedSchedule = state.best.schedule; state.unassigned = state.best.unassigned; state.scoreCard = state.best.scoreCard; state.reportDetails = state.best.reportDetails;
                    state.currentStep=10; state.marathon.active = false; render(); hideLoading();
                    if (goalReached) showToast(`目標達成！未配置 ${state.best.unassignedCount} で完了しました。`, "success");
                    else showToast(`最大世代到達。最も優秀な盤面（未配置 ${state.best.unassignedCount}）を表示します。`, "success");
                } else { m.currentGen++; actions.runMarathonCycle(); }
            } else {
                if(m.ignoreFatal) { m.currentGen++; actions.runMarathonCycle(); } 
                else { showToast("致命的エラー: "+data.message,"error"); hideLoading(); state.marathon.active = false; }
            }
        } catch(e) { showToast("通信エラー","error"); hideLoading(); state.marathon.active = false; }
    },
    runSingleCycle: async function(status, isNew){
        startGenTimer(); showLoading("AI思考中...", "1回のリレーを実行中", true, status);
        try {
            const res = await fetch(GAS_URL, { method:'POST', mode:'cors', body:JSON.stringify({ action:'generate', state, currentSchedule: isNew?null:state.generatedSchedule, unassigned: isNew?state.unassigned:state.unassigned }) });
            const data = await res.json();
            if(data.success) { state.generatedSchedule=data.schedule; state.unassigned=data.unassigned; state.scoreCard=data.scoreCard; state.reportDetails=data.reportDetails; state.currentStep=10; render(); hideLoading(); }
            else { showToast("エラー: "+data.message,"error"); hideLoading(); }
        } catch(e) { showToast("通信エラー","error"); hideLoading(); }
    },

    updateAllocRow:(i,k,v)=>{if(state.allocationModal){if(k==='hours')state.allocationModal.rows[i][k]=Math.max(0,parseInt(v)||0);else state.allocationModal.rows[i][k]=v;}render();},
    removeAllocRow:(i)=>{if(state.allocationModal)state.allocationModal.rows.splice(i,1);render();},
    saveAllocModal:()=>{if(!state.allocationModal)return;const m=state.allocationModal,tot=m.rows.reduce((s,r)=>s+(parseInt(r.hours)||0),0);if(tot!==m.stdHours)return showToast(`合計を${m.stdHours}にしてください`,'error');if(!state.classAssignments[m.cls].overrides)state.classAssignments[m.cls].overrides={};if(!state.classAssignments[m.cls].overrides[m.subId])state.classAssignments[m.cls].overrides[m.subId]={};if(m.rows.length===1){state.classAssignments[m.cls].overrides[m.subId].teacherId=m.rows[0].teacherId;delete state.classAssignments[m.cls].overrides[m.subId].allocations;}else{state.classAssignments[m.cls].overrides[m.subId].allocations=JSON.parse(JSON.stringify(m.rows));}state.allocationModal=null;render();},
    clearAllocations:(cls,sId)=>{if(state.classAssignments[cls].overrides[sId]){delete state.classAssignments[cls].overrides[sId].allocations; render();}}
};

document.addEventListener('DOMContentLoaded',load);
</script>
<div id="allocation-modal-container"></div>
</body>
</html>
