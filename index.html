<script>
var GAS_URL="https://script.google.com/macros/s/AKfycby1WS1JEBJDUTWsRfYlFwxn5YXdYakYypYNIdCOatAS9rsO23pyl_-aNkW3cim5tYdxWA/exec";
var GRADES=[1,2,3,4,5,6], DAYS=['月','火','水','木','金'];
function getDynamicPeriods() { let m=6; if(state.periods) Object.values(state.periods).forEach(dObj=>Object.values(dObj).forEach(v=>{if(parseInt(v)>m)m=parseInt(v);})); return Array.from({length:m},(_,i)=>i+1); }

var stepTitles=["1.基本設定","2.行事・不可枠","3.教科と教室","4.教員名簿と不可枠","5.特殊授業ビルダー","6.クラス担当設定","7.持ち時数確認","8.配置ルール詳細","9.最終確認","10.ダッシュボード"];
var marathonGens=[10, 30, 50, 100, Infinity];

const step8Packages=[
  {id:"pkg1", title:"【基本設定】", desc:"授業の分散や連続設定など", items:[{key:"limitOneSubjectPerDayStrict", type:"boolean", title:"同日重複を禁止(分散)", desc:"", tip:""},{key:"limitContinuousToSpecificPeriods", type:"boolean", title:"連続授業を特定の枠に限定", desc:"", tip:""},{key:"continuousClasses", type:"array", fields:['target','exclude','subject'], format:"", title:"連続授業（ニコイチ）", desc:"", tip:""},{key:"exclusivePairs", type:"array", fields:['subject1','subject2'], format:"", title:"同日実施回避(排他ペア)", desc:"", tip:""},{key:"maxIntervalSubjects", type:"array", fields:['target','exclude','subject'], format:"", title:"実施日を離す教科", desc:"", tip:""}]},
  {id:"pkg2", title:"【教員配慮設定】", desc:"学年会議などの予定同期", items:[{key:"homeroomOnlyTimes", type:"array", fields:['target','exclude','day','period'], format:"", title:"担任授業固定枠(専科ブロック)", desc:"", tip:""},{key:"avoidSpecialistTimes", type:"array", fields:['day','period'], format:"", title:"専科回避指定枠", desc:"", tip:""},{key:"homeroomBufferSubjects", type:"array", fields:['target','exclude','subject'], format:"", title:"担任裁量バッファ", desc:"", tip:""}]},
  {id:"pkg3", title:"【児童配慮設定】", desc:"集中度に合わせた教科配置", items:[{key:"amPrioritySubjects", type:"array", fields:['target','exclude','subject'], format:"", title:"午前に優先配置", desc:"", tip:""},{key:"lastPeriodSubjects", type:"array", fields:['target','exclude','subject'], format:"", title:"最終コマに優先配置", desc:"", tip:""},{key:"avoidSpecificTimes", type:"array", fields:['target','exclude','subject','day','period'], format:"", title:"特定の時間帯回避", desc:"", tip:""}]}
];

var state={currentStep:1, grades:{1:3,2:3,3:3,4:3,5:3,6:3}, periods:{}, rooms:[], subjects:[], teachers:[], globalBlocks:{}, specialBlocks:[], classAssignments:{}, advancedRules:{priorities:{}}, ruleEditor:{}, openPkgs:{}, generatedSchedule:null, unassigned:[], reportDetails:{}, scoreCard:null, dashTab:'matrix', matrixAxis:'class', dashView:'class', dashFilter:'', marathon:{active:false, target:0, maxGen:10, currentGen:1, relaxRules:false}, best:{unassignedCount:9999, schedule:null, unassigned:null, scoreCard:null, reportDetails:null}, selectedTeacherId:null, editingTeacherId:null, editingSubjectId:null, editingTeacherLimitId:null, specialBuilder:{type:'joint', subjectId:'', hours:1, room:'通常教室', targets:[], teachers:[]}, openSpecialEdits:{}, subjectsUndoStack:[], rulesUndoStack:[], birdEyeMode:false, spotlightSub:'', spotlightTea:'', spotlightTeas:['','','',''], movingLesson:null, violations:{}, conflictingIds:[], activeViolationNode:null, scheduleHistory:[], historyIndex:-1, openTeacherLoadId:null};

function safeFind(arr,k,v){return (arr||[]).find(x=>x[k]===v);}
function forceInitState(){
    if(!state.periods) state.periods={}; GRADES.forEach(g=>{if(!state.periods[g]) state.periods[g]={月:5,火:5,水:4,木:5,金:5};});
    if(!state.rooms?.length) state.rooms=[{id:'r1',name:'校庭',capacity:2,ngTimes:{}},{id:'r2',name:'体育館',capacity:2,ngTimes:{}},{id:'r3',name:'理科室',capacity:1,ngTimes:{}}];
    if(!state.subjects?.length) state.subjects=[{id:'s1',name:'国語',stdHours:{1:9,2:9,3:7,4:7,5:5,6:5},defaultRoom:'通常教室', gradeRooms:{}},{id:'s2',name:'算数',stdHours:{1:4,2:5,3:5,4:5,5:5,6:5},defaultRoom:'通常教室', gradeRooms:{}}];
    if(!state.grades) state.grades={1:3,2:3,3:3,4:3,5:3,6:3}; if(!state.classAssignments) state.classAssignments={};
    GRADES.forEach(g=>{for(let i=1;i<=(parseInt(state.grades[g])||1);i++){let c=`${g}-${i}`;if(!state.classAssignments[c]) state.classAssignments[c]={homeroom:'',overrides:{}};}});
    if(!state.advancedRules) state.advancedRules={priorities:{}}; if(!state.ruleEditor) state.ruleEditor={}; if(!state.openPkgs) state.openPkgs={};
    if(!state.specialBuilder) state.specialBuilder={type:'joint', subjectId:(state.subjects[0]?.id||''), hours:1, room:'通常教室', targets:[], teachers:[]};
    if(!state.openSpecialEdits) state.openSpecialEdits={}; if(!state.subjectsUndoStack) state.subjectsUndoStack=[]; if(!state.rulesUndoStack) state.rulesUndoStack=[];
    state.birdEyeMode=false; state.spotlightSub=''; state.spotlightTea=''; if(!state.spotlightTeas) state.spotlightTeas=['','','','']; state.movingLesson=null; state.violations={}; state.conflictingIds=[];
    if(!state.scheduleHistory) state.scheduleHistory=[]; if(state.historyIndex===undefined) state.historyIndex=-1; if(state.openTeacherLoadId===undefined) state.openTeacherLoadId=null;
}

function load(){ try{const d=localStorage.getItem('tt_v16_8_1');if(d)Object.assign(state,JSON.parse(d));}catch(e){} forceInitState(); render(); }
function showToast(msg,type='info'){const t=document.getElementById('toast'),m=document.getElementById('toast-msg');if(!t||!m)return; t.className=`fixed top-4 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full shadow-xl font-bold text-sm z-[9999] transition-all opacity-100 ${type==='success'?'bg-emerald-600 text-white':(type==='error'?'bg-rose-600 text-white':'bg-blue-600 text-white')}`; m.innerText=msg; setTimeout(()=>t.classList.replace('opacity-100','opacity-0'),3000);}
function showLoading(t,d,showC=false){const l=document.getElementById('loading-overlay'),cBtn=document.getElementById('btn-cancel-gen');if(l){document.getElementById('loading-title').innerText=t;document.getElementById('loading-desc').innerText=d;if(showC)cBtn.classList.remove('hidden');else cBtn.classList.add('hidden');l.classList.replace('hidden','flex');}}
function hideLoading(){stopGenTimer();const l=document.getElementById('loading-overlay');if(l)l.classList.replace('flex','hidden');}
let genTimerInt=null, sStart=null; function startGenTimer(){sStart=Date.now();if(genTimerInt)clearInterval(genTimerInt);genTimerInt=setInterval(()=>{const t=document.getElementById('loading-timer');if(t&&sStart)t.innerText=((Date.now()-sStart)/1000).toFixed(1)+'s';},100);} function stopGenTimer(){clearInterval(genTimerInt);genTimerInt=null;}

function getDefaultHexColor(sub){if(!sub)return '#F8FAFC';if(sub.includes('国')||sub.includes('書'))return '#EFF6FF';if(sub.includes('算')||sub.includes('数'))return '#FEFCE8';if(sub.includes('体'))return '#FEF2F2';if(sub.includes('理'))return '#F0FDF4';if(sub.includes('社'))return '#FFF7ED';if(sub.includes('外')||sub.includes('英'))return '#FAF5FF';if(sub.includes('音'))return '#FDF2F8';if(sub.includes('図')||sub.includes('工'))return '#ECFEFF';return '#F8FAFC';}
function getSubjectStyle(sName){const s=safeFind(state.subjects,'name',sName);if(s&&s.color){const res=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(s.color);if(res)return `background-color:rgba(${parseInt(res[1],16)},${parseInt(res[2],16)},${parseInt(res[3],16)},0.25);border:1px solid rgba(${parseInt(res[1],16)},${parseInt(res[2],16)},${parseInt(res[3],16)},0.7);color:${s.color};font-weight:900;`;}return '';}
function getSubjectColorClass(sName){const s=safeFind(state.subjects,'name',sName);if(s&&s.color)return 'shadow-sm';const sub=sName?sName.toLowerCase():'';if(sub.includes('国')||sub.includes('書'))return 'bg-blue-50 text-blue-800 border-blue-200';if(sub.includes('算')||sub.includes('数'))return 'bg-yellow-50 text-yellow-800 border-yellow-200';if(sub.includes('体'))return 'bg-red-50 text-red-800 border-red-200';if(sub.includes('理'))return 'bg-green-50 text-green-800 border-green-200';if(sub.includes('社'))return 'bg-orange-50 text-orange-800 border-orange-200';if(sub.includes('外')||sub.includes('英'))return 'bg-purple-50 text-purple-800 border-purple-200';if(sub.includes('音'))return 'bg-pink-50 text-pink-800 border-pink-200';if(sub.includes('図')||sub.includes('工'))return 'bg-cyan-50 text-cyan-800 border-cyan-200';return 'bg-slate-50 text-slate-800 border-slate-200';}

function getTeacherLoadDetails(){let loads={};(state.teachers||[]).forEach(t=>loads[t.id]={total:0,items:[]});Object.keys(state.classAssignments||{}).forEach(cls=>{const g=cls.split('-')[0],d=state.classAssignments[cls];(state.subjects||[]).forEach(sub=>{let hrs=parseInt(sub.stdHours?.[g])||0;if(hrs===0)return;if((state.specialBlocks||[]).some(b=>b.subjectId===sub.id&&b.targets?.includes(cls)))return;const ovr=d.overrides?.[sub.id]||{};if(ovr.allocations?.length>0){ovr.allocations.forEach(a=>{if(a.teacherId&&loads[a.teacherId]){let h=parseInt(a.hours)||0;loads[a.teacherId].total+=h;loads[a.teacherId].items.push({cls,sub:sub.name,hrs:h});}});}else{const tid=ovr.teacherId||d.homeroom;if(tid&&loads[tid]){loads[tid].total+=hrs;loads[tid].items.push({cls,sub:sub.name,hrs});}}});});(state.specialBlocks||[]).forEach(b=>{const subName=safeFind(state.subjects,'id',b.subjectId)?.name||'特殊';(b.teachers||[]).forEach(bt=>{if(bt.id&&loads[bt.id]){let h=parseInt(bt.hours)||0;loads[bt.id].total+=h;loads[bt.id].items.push({cls:(b.targets||[]).join(','),sub:subName,hrs:h,sp:true});}});});return loads;}
function getTeacherLoads(){let l={};const dets=getTeacherLoadDetails();Object.keys(dets).forEach(k=>l[k]=dets[k].total);return l;}

let scrollPos={}, activeElId=null;
function saveUIState(){
    document.querySelectorAll('.custom-scrollbar, .overflow-y-auto, .overflow-auto, .overflow-x-auto').forEach((el)=>{
        if(el.id) scrollPos[el.id]={t:el.scrollTop, l:el.scrollLeft};
    });
    if(document.activeElement && (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'SELECT')) {
        activeElId = document.activeElement.id;
    } else {
        activeElId = null;
    }
}
function restoreUIState(){
    const doRestore = () => {
        document.querySelectorAll('.custom-scrollbar, .overflow-y-auto, .overflow-auto, .overflow-x-auto').forEach(el=>{
            if(el.id && scrollPos[el.id]){ el.scrollTop=scrollPos[el.id].t; el.scrollLeft=scrollPos[el.id].l; }
        });
        if(activeElId){ 
            const el=document.getElementById(activeElId); 
            if(el && typeof el.focus==='function') {
                el.focus();
                if (el.setSelectionRange && (el.type==='text' || el.type==='number')) {
                    try { const len = el.value.length; el.setSelectionRange(len, len); } catch(e){}
                }
            } 
        }
    };
    doRestore(); 
    setTimeout(doRestore, 10); 
    setTimeout(doRestore, 50); 
}

let confettiAnimationId = null;
let celebrationTimeoutIds = [];

function triggerCelebration() {
    celebrationTimeoutIds.forEach(clearTimeout);
    celebrationTimeoutIds = [];
    if(confettiAnimationId) cancelAnimationFrame(confettiAnimationId);
    if(typeof confetti === 'function') confetti.reset();

    if(typeof confetti === 'function') {
        var duration = 4000;
        var end = Date.now() + duration;
        (function frame() {
            confetti({ particleCount: 6, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#26ccff', '#a25afd', '#ff5e7e', '#88ff5a', '#fcff42', '#ffa62d', '#ff36ff'], zIndex: 400 });
            confetti({ particleCount: 6, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#26ccff', '#a25afd', '#ff5e7e', '#88ff5a', '#fcff42', '#ffa62d', '#ff36ff'], zIndex: 400 });
            if (Date.now() < end) {
                confettiAnimationId = requestAnimationFrame(frame);
            }
        }());
    }
    const overlay = document.getElementById('celebration-overlay');
    const text = document.getElementById('celebration-text');
    overlay.classList.remove('hidden');
    void overlay.offsetWidth; 
    overlay.classList.remove('opacity-0');
    overlay.classList.add('flex', 'opacity-100');
    
    const skipCelebration = () => {
        if(confettiAnimationId) cancelAnimationFrame(confettiAnimationId);
        if(typeof confetti === 'function') confetti.reset();
        celebrationTimeoutIds.forEach(clearTimeout);
        celebrationTimeoutIds = [];
        
        overlay.classList.replace('opacity-100', 'opacity-0');
        text.classList.remove('scale-100', 'scale-110');
        text.classList.add('scale-150', 'opacity-0');
        
        setTimeout(() => {
            overlay.classList.add('hidden');
            overlay.classList.remove('flex');
            text.className = "text-6xl md:text-[10rem] font-black text-transparent bg-clip-text bg-gradient-to-br from-yellow-300 via-pink-500 to-indigo-500 drop-shadow-[0_15px_20px_rgba(0,0,0,0.4)] transform scale-50 opacity-0 transition-all duration-700 ease-out tracking-tighter";
        }, 500);
        overlay.removeEventListener('click', skipCelebration);
    };
    overlay.addEventListener('click', skipCelebration);

    celebrationTimeoutIds.push(setTimeout(() => {
        text.classList.remove('scale-50', 'opacity-0');
        text.classList.add('scale-110', 'opacity-100');
        celebrationTimeoutIds.push(setTimeout(() => {
            text.classList.replace('scale-110', 'scale-100');
        }, 300));
    }, 100));

    celebrationTimeoutIds.push(setTimeout(() => {
        skipCelebration();
    }, 4000));
}

function validateSchedule() {
    state.violations = {}; state.conflictingIds = [];
    const schedule = state.generatedSchedule;
    if(!schedule) return;
    const PERIODS = getDynamicPeriods(), confSet = new Set(), dailyCls = {};
    
    DAYS.forEach(d => {
        dailyCls[d] = {};
        PERIODS.forEach(p => {
            const ls = schedule[d]?.[p] || [];
            const tMap = {}, rMap = {};
            ls.forEach(l => {
                l.teacherIds.forEach(tid => { if(!tMap[tid]) tMap[tid]=[]; tMap[tid].push(l); });
                if(l.room && safeFind(state.rooms, 'name', l.room)) { if(!rMap[l.room]) rMap[l.room]=[]; rMap[l.room].push(l); }
                l.targets.forEach(c => {
                    if(!dailyCls[d][c]) dailyCls[d][c]={};
                    if(!dailyCls[d][c][l.subject]) dailyCls[d][c][l.subject]=[];
                    dailyCls[d][c][l.subject].push({lesson: l, period: p});
                });
            });
            Object.keys(tMap).forEach(tid => {
                if(tMap[tid].length > 1) {
                    const tName = safeFind(state.teachers, 'id', tid)?.name || '不明';
                    tMap[tid].forEach(l => {
                        if(!state.violations[l.id]) state.violations[l.id]=[];
                        const ots = tMap[tid].filter(x=>x.id!==l.id);
                        state.violations[l.id].push(`教員重複: ${tName}先生が他クラス(${ots.map(x=>x.targets.join(',')).join('・')})で授業中`);
                        ots.forEach(x=>confSet.add(x.id));
                    });
                }
            });
            Object.keys(rMap).forEach(rName => {
                const roomDef = safeFind(state.rooms, 'name', rName);
                if(roomDef) {
                    const cap = roomDef.capacity || 1;
                    if(rMap[rName].length > cap) {
                        rMap[rName].forEach(l => {
                            if(!state.violations[l.id]) state.violations[l.id]=[];
                            const ots = rMap[rName].filter(x=>x.id!==l.id);
                            state.violations[l.id].push(`教室重複: ${rName}が定員オーバー(他: ${ots.map(x=>x.targets.join(',')).join('・')})`);
                            ots.forEach(x=>confSet.add(x.id));
                        });
                    }
                }
            });
        });
    });
    
    DAYS.forEach(d => {
        Object.keys(dailyCls[d]).forEach(c => {
            Object.keys(dailyCls[d][c]).forEach(s => {
                const items = dailyCls[d][c][s];
                const uniqueIds = new Set(items.map(x => x.lesson.id));
                if(uniqueIds.size > 1) {
                    items.forEach(item => {
                        const l = item.lesson;
                        if(!state.violations[l.id]) state.violations[l.id]=[];
                        const msg = `同日重複: ${c}の${s}が同日に複数(別コマとして)配置されています`;
                        if(!state.violations[l.id].includes(msg)) state.violations[l.id].push(msg);
                        items.filter(x=>x.lesson.id!==l.id).forEach(x=>confSet.add(x.lesson.id));
                    });
                }
            });
        });
    });
    state.conflictingIds = Array.from(confSet);
}

function isBannedArea(d, p, rowId, mode) {
    if(!d || !p) return false;
    if(state.movingLesson) {
        let banned = false;
        state.movingLesson.targets.forEach(cls => {
            const g = cls.split('-')[0];
            if(p > (state.periods[g]?.[d]||0)) banned = true;
        });
        state.movingLesson.teacherIds.forEach(tid => {
            const t = safeFind(state.teachers, 'id', tid);
            if(t && t.ngTimes && t.ngTimes[`${d}-${p}`]) banned = true;
        });
        return banned;
    }
    if(mode === 'class' && rowId) {
        const g = rowId.split('-')[0];
        if(p > (state.periods[g]?.[d]||0)) return true;
    }
    if(mode === 'teacher' && rowId) {
        const t = safeFind(state.teachers, 'id', rowId);
        if(t && t.ngTimes && t.ngTimes[`${d}-${p}`]) return true;
    }
    return false;
}

        }).join(''); html += `</tbody></table></div>`;
    } else {

        html+=`<div id="step10-indiv-scroll" class="flex-1 overflow-auto bg-white border rounded-2xl custom-scrollbar p-1 min-h-0 shadow-inner"><div class="grid grid-cols-[40px_repeat(5,1fr)] min-w-[600px] h-full gap-px bg-slate-200 border"><div class="bg-slate-50 flex items-center justify-center font-black text-[8px] uppercase text-slate-400">Time</div>${DAYS.map(d=>`<div class="bg-slate-50 flex items-center justify-center font-black text-xs py-1 text-slate-500">${d}曜</div>`).join('')}`;

                }).join('')}</div>`;
            });

    }

};

    handleCellClick: (d, p, cls, lId = null) => {
        window.hideViolationPopup();
        if (!state.generatedSchedule) return;
        
        if (state.movingLesson) {
            const fromL = state.movingLesson;
            if (fromL.id === lId) { state.movingLesson = null; render(); return; }
            let schedule = state.generatedSchedule;
            
            let movingObj = null;
            if (fromL.day && fromL.period) {
                const fromList = schedule[fromL.day]?.[fromL.period] || [];
                const lIndex = fromList.findIndex(x => x.id === fromL.id);
                if(lIndex > -1) { movingObj = fromList[lIndex]; fromList.splice(lIndex, 1); }
            } else {
                const uIndex = state.unassigned.findIndex(x => x.id === fromL.id);
                if(uIndex > -1) { movingObj = state.unassigned[uIndex]; state.unassigned.splice(uIndex, 1); }
            }
            if (!movingObj) { state.movingLesson = null; render(); return; }

            if (d && p && d !== 'tray') {
                const toList = schedule[d][p] || [];
                if (!schedule[d][p]) schedule[d][p] = toList;
                let targetL = null;
                if (lId) {
                    const tIndex = toList.findIndex(x => x.id === lId);
                    if (tIndex > -1) {
                        targetL = toList[tIndex];
                        toList.splice(tIndex, 1);
                        if (fromL.day && fromL.period) {
                            if(!schedule[fromL.day][fromL.period]) schedule[fromL.day][fromL.period] = [];
                            schedule[fromL.day][fromL.period].push(targetL);
                        } else {
                            state.unassigned.push(targetL);
                        }
                    }
                }
                toList.push(movingObj);
                showToast(targetL ? "コマを入れ替えました" : "コマを移動しました", "success");
            } else if (d === 'tray') {
                state.unassigned.push(movingObj);
                showToast("トレイに戻しました", "success");
            }
            state.movingLesson = null;
            actions.pushScheduleHistory(); 
            validateSchedule();
            render();
        } else {
            if (!lId) return;
            if(state.violations && state.violations[lId]) { setTimeout(() => window.showViolationPopup(lId), 10); }
            
            if(d === 'tray') {
                state.movingLesson = { id: lId, day: null, period: null, targets: safeFind(state.unassigned, 'id', lId)?.targets||[], teacherIds: safeFind(state.unassigned, 'id', lId)?.teacherIds||[] };
            } else {
                let obj = (state.generatedSchedule[d][p]||[]).find(x=>x.id===lId);
                if(obj) state.movingLesson = { id: lId, day: d, period: p, cls: cls, targets: obj.targets, teacherIds: obj.teacherIds };
            }
            render();
        }
    },

    showAllocModalUI:()=>{ const m=state.allocationModal; let tOpts='<option value="">担任</option>'+(state.teachers||[]).map(t=>`<option value="${t.id}">${t.name}先生</option>`).join(''); let h=`<div class="flex justify-between items-center mb-4 border-b pb-2 shrink-0"><h3 class="font-black text-blue-900">${m.cls} ${safeFind(state.subjects,'id',m.subId).name} 担当分担</h3><button onclick="actions.closeModal()" class="text-slate-400 font-bold hover:bg-slate-100 rounded px-2">✕</button></div><div id="modal-scroll" class="flex-1 overflow-y-auto custom-scrollbar p-1">`; m.rows.forEach((r,i)=>{ h+=`<div class="flex gap-2 items-center bg-slate-50 p-2 rounded-lg mb-2 border"><select onchange="actions.updateAllocRow(${i},'teacherId',this.value)" class="m3-input flex-1 !bg-white">${tOpts.replace(`value="${r.teacherId}"`,`value="${r.teacherId}" selected`)}</select><input type="number" value="${r.hours}" onchange="actions.updateAllocRow(${i},'hours',this.value)" class="w-14 text-center font-black text-blue-600 bg-white border p-1.5 rounded-lg text-sm"><button onclick="actions.removeAllocRow(${i})" class="text-rose-400 font-bold px-2 hover:bg-rose-50 rounded">✕</button></div>`; }); h+=`<button onclick="actions.addAllocRow()" class="w-full py-2 border-2 border-dashed rounded-xl text-xs font-bold text-slate-400 hover:bg-slate-100">+ 教員を追加</button></div><div class="mt-4 flex justify-end shrink-0"><button onclick="actions.saveAllocModal()" class="m3-btn-primary">保存する</button></div>`; document.getElementById('modal-body').innerHTML=h; document.getElementById('modal-overlay').classList.remove('hidden');},
    updateAllocRow:(i,k,v)=>{if(k==='hours')state.allocationModal.rows[i][k]=Math.max(0,parseInt(v)||0);else state.allocationModal.rows[i][k]=v;actions.showAllocModalUI();},
    removeAllocRow:(i)=>{state.allocationModal.rows.splice(i,1);actions.showAllocModalUI();},
    addAllocRow:()=>{state.allocationModal.rows.push({teacherId:'',hours:1});actions.showAllocModalUI();},
    saveAllocModal:()=>{const m=state.allocationModal,tot=m.rows.reduce((s,r)=>s+(parseInt(r.hours)||0),0);if(tot!==m.stdHours)return showToast(`合計を${m.stdHours}にしてください`,'error');state.classAssignments[m.cls].overrides[m.subId].allocations=m.rows;actions.closeModal();render();},

    preparePayload: () => { 
        const pS = JSON.parse(JSON.stringify(state)); 
        if (pS.advancedRules) { 
            Object.keys(pS.advancedRules).forEach(k => { 
                if (k === 'priorities') return; 
                const oR = pS.advancedRules[k]; 
                if (!Array.isArray(oR)) return; 
                const exR = []; 
                oR.forEach(r => { 
                    if (k === 'exclusivePairs') { 
                        const s1s = r.subjects1 || [r.subject1]; const s2s = r.subjects2 || [r.subject2]; 
                        s1s.forEach(s1 => s2s.forEach(s2 => { if(s1 !== s2) exR.push({subject1: s1, subject2: s2}); })); 
                    } else { 
                        const tgs = (r.targets?.length) ? r.targets : [undefined]; const excs = (r.excludes?.length) ? r.excludes : [undefined]; const subs = (r.subjects?.length) ? r.subjects : [undefined]; const dys = (r.days?.length) ? r.days : [undefined]; const pds = (r.periods?.length) ? r.periods : [undefined]; 
                        tgs.forEach(tg => excs.forEach(ex => subs.forEach(su => dys.forEach(dy => pds.forEach(pd => { let nr = {}; if (tg) nr.grade = tg; if (ex) nr.exclude = ex; if (su) nr.subject = su; if (dy) nr.day = dy; if (pd) nr.period = parseInt(pd.toString().replace(/[^0-9]/g, ''), 10); exR.push(nr); }))))); 
                    } 
                }); 
                pS.advancedRules[k] = exR; 
            }); 
            if (state.marathon.relaxRules && pS.advancedRules.priorities) {
                Object.keys(pS.advancedRules.priorities).forEach(k => { pS.advancedRules.priorities[k] = 'low'; });
            }
        } 
        return pS; 
    },

    updateMarathon: (k,v) => { state.marathon[k] = v; render(); },
    startGeneration: async function(){ state.marathon.active = true; state.marathon.currentGen = 1; globalStartTime = Date.now(); state.best = {unassignedCount:9999, schedule:null, unassigned:null, scoreCard:null, reportDetails:null}; actions.runMarathonCycle(); },
    continueMarathon: async function(){ 
        const addGen = 10; 
        state.marathon.active = true; 
        if(state.marathon.maxGen !== Infinity) state.marathon.maxGen = parseInt(state.marathon.maxGen, 10) + addGen; 
        actions.runMarathonCycle(); 
    },
    continueGeneration: function(){ state.marathon.active = false; actions.runSingleCycle("今の盤面を元に再調整中...", false); },
    cancelGeneration: () => { hideLoading(); state.marathon.active = false; if (state.best.schedule) { state.generatedSchedule = state.best.schedule; state.unassigned = state.best.unassigned; state.scoreCard = state.best.scoreCard; state.reportDetails = state.best.reportDetails; state.currentStep = 10; actions.initScheduleHistory(); showToast(`ベスト盤面を表示します。`, "info"); } else { state.currentStep = 9; } render(); },
    
    runMarathonCycle: async function(){ 
        if (!state.marathon.active) return; 
        const m = state.marathon; startGenTimer(); 
        showLoading("AIチャレンジ中", `第 ${Number(m.currentGen)} / ${m.maxGen===Infinity?'∞':Number(m.maxGen)} 回`, true); 
        try { 
            const res = await fetch(GAS_URL, { method:'POST', mode:'cors', body:JSON.stringify({ action:'generate', state: actions.preparePayload(), currentSchedule: null, unassigned: null }) }); 
            const data = await res.json(); 
            if (!state.marathon.active) return; 
            if(data.schedule) state.generatedSchedule = data.schedule; 
            if(data.unassigned) state.unassigned = data.unassigned; 
            if(data.scoreCard) state.scoreCard = data.scoreCard; 
            if(data.reportDetails) state.reportDetails = data.reportDetails;
            if(data.success){ 
                const bc = document.getElementById('loading-best-container'), br = document.getElementById('loading-best-record'), lr = document.getElementById('loading-latest-record'); 
                if(bc && lr){ bc.classList.remove('hidden'); bc.classList.add('flex'); lr.innerText = data.unassigned.length; } 
                if(data.unassigned.length < state.best.unassignedCount) { 
                    state.best = { unassignedCount: data.unassigned.length, schedule: data.schedule, unassigned: data.unassigned, scoreCard: data.scoreCard, reportDetails: data.reportDetails }; 
                    if (br) br.innerText = state.best.unassignedCount; 
                } 
                const goalReached = state.best.unassignedCount <= m.target, genLimitReached = Number(m.currentGen) >= parseInt(m.maxGen, 10); 
                
                if (goalReached || genLimitReached) { 
                    state.generatedSchedule = state.best.schedule; state.unassigned = state.best.unassigned; state.scoreCard = state.best.scoreCard; state.reportDetails = state.best.reportDetails; 
                    state.currentStep=10; state.marathon.active = false; actions.initScheduleHistory(); render(); hideLoading(); 
                    
                    if (state.best.unassignedCount === 0) {
                        showToast(`🎉 完璧な時間割が完成しました！`, "success"); 
                        setTimeout(triggerCelebration, 300); 
                    } else if (goalReached) {
                        showToast(`目標達成！未配置${state.best.unassignedCount}`, "success"); 
                    } else {
                        showToast(`最大チャレンジ回数に到達。`, "success"); 
                    }
                } else { 
                    m.currentGen = Number(m.currentGen) + 1; 
                    actions.runMarathonCycle(); 
                } 
            } else { showToast("エラー発生","error"); hideLoading(); state.marathon.active = false; } 
        } catch(e) { showToast("通信エラー","error"); hideLoading(); state.marathon.active = false; } 
    },
    runSingleCycle: async function(status, isNew){ 
        startGenTimer(); showLoading("計算中", status, true); 
        try { 
            const res = await fetch(GAS_URL, { method:'POST', mode:'cors', body:JSON.stringify({ action:'generate', state: actions.preparePayload(), currentSchedule: isNew?null:state.generatedSchedule, unassigned: state.unassigned }) }); 
            const data = await res.json(); 
            if(data.schedule) state.generatedSchedule=data.schedule; 
            if(data.unassigned) state.unassigned=data.unassigned; 
            if(data.scoreCard) state.scoreCard=data.scoreCard; 
            if(data.reportDetails) state.reportDetails=data.reportDetails; 
            if(data.success) { state.currentStep=10; actions.initScheduleHistory(); render(); hideLoading(); } 
            else { showToast("エラー","error"); hideLoading(); } 
        } catch(e) { showToast("通信エラー","error"); hideLoading(); } 
    },
    
    openReportModal:()=>{ 
        const sc = state.scoreCard; 
        let h = `<div class="flex justify-between items-center mb-4 border-b pb-2"><h3 class="text-lg font-black text-blue-900">📊 AI自己採点レポート</h3><button onclick="actions.closeModal()" class="text-slate-400 font-bold text-xl hover:bg-slate-100 rounded px-2">✕</button></div><div id="modal-scroll" class="flex-1 overflow-y-auto custom-scrollbar pr-2 flex flex-col gap-3 pb-4">`; 
        h += `<div class="bg-blue-50 dark:bg-slate-800 p-4 rounded-xl border border-blue-200 shrink-0"><div class="flex justify-between items-center"><span class="font-black text-sm text-blue-900 dark:text-blue-300">基礎ルール (配置率)</span><span class="font-black text-2xl text-blue-600">${sc.basic?.score||0}%</span></div></div>`; 
        const rules = sc.advanced?.rules || {}; 
        Object.keys(rules).forEach(k => { 
            const r = rules[k], isP = r.score === 100; 
            h += `<div class="bg-white dark:bg-slate-900 rounded-xl border ${isP ? 'border-emerald-200 shadow-emerald-50' : 'border-amber-300 shadow-amber-50'} shadow-sm overflow-hidden"><div class="px-4 py-2 flex justify-between items-center ${isP ? 'bg-emerald-50' : 'bg-amber-50'} border-b dark:border-slate-800"><span class="font-black text-xs ${isP ? 'text-emerald-800' : 'text-amber-800'}">${r.name}</span><span class="font-black text-sm">${r.score}%</span></div><div class="p-3">${r.failures?.length > 0 ? `<ul class="text-[10px] font-bold text-slate-600 dark:text-slate-400 space-y-1 list-disc pl-4">${r.failures.map(f => `<li>${f}</li>`).join('')}</ul>` : `<div class="text-[10px] font-bold text-emerald-600 flex items-center gap-1"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>ミッションクリア！</div>`}</div></div>`; 
        }); 
        document.getElementById('modal-body').innerHTML = h + `</div>`; document.getElementById('modal-overlay').classList.remove('hidden'); 
    },

    openExportModal:()=>{
        let h = `<div class="flex justify-between items-center mb-4 border-b pb-2 shrink-0"><h3 class="text-lg font-black text-blue-900">🖨️ 出力設定 (10項目のマルチ印刷)</h3><button onclick="actions.closeModal()" class="text-slate-400 font-bold text-xl hover:bg-slate-100 rounded px-2">✕</button></div><div id="modal-scroll" class="flex-1 overflow-y-auto custom-scrollbar pr-2 flex flex-col gap-4 pb-4 text-sm font-bold text-slate-700">`;
        h += `<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                    <h4 class="text-xs font-black text-slate-500 mb-3 border-b pb-1">📄 PDF出力 (印刷用)</h4>
                    <label class="flex items-center gap-2 mb-2 cursor-pointer"><input type="checkbox" id="pdf-matrix-class" checked class="w-4 h-4"><span>全校クラス時間割</span></label>
                    <label class="flex items-center gap-2 mb-2 cursor-pointer"><input type="checkbox" id="pdf-matrix-teacher" checked class="w-4 h-4"><span>全校教員時間割</span></label>
                    <label class="flex items-center gap-2 mb-2 cursor-pointer"><input type="checkbox" id="pdf-matrix-room" class="w-4 h-4"><span>全校教室時間割</span></label>
                    <label class="flex items-center gap-2 mb-2 cursor-pointer"><input type="checkbox" id="pdf-indiv-class" checked class="w-4 h-4"><span>各クラス別時間割</span></label>
                    <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="pdf-indiv-teacher" class="w-4 h-4"><span>各教員別時間割</span></label>
                </div>
                <div class="bg-emerald-50 p-4 rounded-xl border border-emerald-200">
                    <h4 class="text-xs font-black text-emerald-600 mb-3 border-b border-emerald-200 pb-1">📊 スプレッドシート (編集用)</h4>
                    <label class="flex items-center gap-2 mb-2 cursor-pointer"><input type="checkbox" id="ss-matrix-class" checked class="w-4 h-4 text-emerald-600"><span>全校クラス時間割</span></label>
                    <label class="flex items-center gap-2 mb-2 cursor-pointer"><input type="checkbox" id="ss-matrix-teacher" checked class="w-4 h-4 text-emerald-600"><span>全校教員時間割</span></label>
                    <label class="flex items-center gap-2 mb-2 cursor-pointer"><input type="checkbox" id="ss-matrix-room" class="w-4 h-4 text-emerald-600"><span>全校教室時間割</span></label>
                    <label class="flex items-center gap-2 mb-2 cursor-pointer"><input type="checkbox" id="ss-indiv-class" class="w-4 h-4 text-emerald-600"><span>各クラス別時間割</span></label>
                    <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" id="ss-indiv-teacher" class="w-4 h-4 text-emerald-600"><span>各教員別時間割</span></label>
                </div>
              </div>`;
        h += `<div class="bg-blue-50 text-blue-800 p-3 rounded-lg text-xs border border-blue-200">💡 ヒント: サーバーでファイルを生成するため、数秒〜十数秒かかります。完了後、ダウンロードリンクが表示されます。</div>`
        h += `<div class="mt-2 flex justify-end shrink-0"><button onclick="actions.executeExport()" class="m3-btn-primary px-8">サーバーで生成</button></div>`;
        document.getElementById('modal-body').innerHTML = h + `</div>`; document.getElementById('modal-overlay').classList.remove('hidden');
    },

    executeExport: async function() {
        const options = {
            pdf: {
                matrixClass: document.getElementById('pdf-matrix-class')?.checked,
                matrixTeacher: document.getElementById('pdf-matrix-teacher')?.checked,
                matrixRoom: document.getElementById('pdf-matrix-room')?.checked,
                individualClass: document.getElementById('pdf-indiv-class')?.checked,
                individualTeacher: document.getElementById('pdf-indiv-teacher')?.checked
            },
            spreadsheet: {
                matrixClass: document.getElementById('ss-matrix-class')?.checked,
                matrixTeacher: document.getElementById('ss-matrix-teacher')?.checked,
                matrixRoom: document.getElementById('ss-matrix-room')?.checked,
                individualClass: document.getElementById('ss-indiv-class')?.checked,
                individualTeacher: document.getElementById('ss-indiv-teacher')?.checked
            }
        };

        actions.closeModal();
        showLoading("ファイル生成中", "スプレッドシートとPDFを作成しています...", false);

        try {
            const res = await fetch(GAS_URL, { 
                method: 'POST', 
                mode: 'cors', 
                body: JSON.stringify({ 
                    action: 'export', 
                    state: actions.preparePayload(), 
                    schedule: state.generatedSchedule,
                    options: options
                }) 
            });
            const data = await res.json();
            hideLoading();
            
            if (data.success && data.urls) {
                let h = `<div class="flex justify-between items-center mb-4 border-b pb-2 shrink-0"><h3 class="text-lg font-black text-blue-900">🎉 生成完了</h3><button onclick="actions.closeModal()" class="text-slate-400 font-bold text-xl hover:bg-slate-100 rounded px-2">✕</button></div><div class="flex-1 flex flex-col gap-4 pb-4">`;
                h += `<p class="text-sm font-bold text-slate-700">ファイルが正常に生成されました。以下のリンクからアクセスしてください。</p>`;
                h += `<div class="flex flex-col gap-3">`;
                if (data.urls.spreadsheetUrl) {
                    h += `<a href="${data.urls.spreadsheetUrl}" target="_blank" class="flex items-center justify-center gap-2 p-3 bg-emerald-50 hover:bg-emerald-100 border border-emerald-200 rounded-xl text-emerald-700 font-black transition-colors text-base">📊 スプレッドシートを開く</a>`;
                }
                if (data.urls.pdfUrl) {
                    h += `<a href="${data.urls.pdfUrl}" target="_blank" class="flex items-center justify-center gap-2 p-3 bg-rose-50 hover:bg-rose-100 border border-rose-200 rounded-xl text-rose-700 font-black transition-colors text-base">📄 PDFを開く (ダウンロード)</a>`;
                }
                h += `</div></div>`;
                document.getElementById('modal-body').innerHTML = h;
                document.getElementById('modal-overlay').classList.remove('hidden');
            } else {
                showToast("ファイルの生成に失敗しました: " + (data.message || ""), "error");
            }
        } catch (e) {
            hideLoading();
            showToast("通信エラーが発生しました", "error");
        }
    }
};

window.showViolationPopup = function(lessonId) {
    if(!state.violations || !state.violations[lessonId]) return;
    const msgs = state.violations[lessonId];
    const el = document.getElementById('violation-popup');
    el.innerHTML = `<div class="font-black text-rose-500 text-xs mb-1 flex items-center gap-1">⚠️ ルール違反を検知</div><ul class="text-[10px] font-bold list-disc pl-4 space-y-1 leading-snug">${msgs.map(m=>`<li>${m}</li>`).join('')}</ul>`;
    el.classList.remove('opacity-0', 'pointer-events-none', 'scale-95');
    state.activeViolationNode = lessonId;
};
window.hideViolationPopup = function() {
    const el = document.getElementById('violation-popup');
    el.classList.add('opacity-0', 'pointer-events-none', 'scale-95');
    state.activeViolationNode = null;
};
document.addEventListener('click', (e) => {
    if(state.activeViolationNode && !e.target.closest('#violation-popup')) {
        setTimeout(window.hideViolationPopup, 50);
    }
});

document.addEventListener('DOMContentLoaded',load);
</script>
