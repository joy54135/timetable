<!-- ==========================================
  Smart TimeTable
  Version: 13.24 (Next Generation - Final Stable)
  Type: Vanilla HTML / JS / Tailwind CSS
  Description: 変数定義順の修正（真っ白バグ解消）、全校マトリックス、未配置挿入、最新URL
=========================================== -->
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smart TimeTable - Ver 13.24</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style type="text/tailwindcss">
        @layer utilities {
            html, body { @apply h-full h-[100dvh] overflow-hidden m-0 p-0 font-sans bg-slate-100 text-slate-800; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
            #app-container { @apply h-full h-[100dvh] flex flex-col p-2 md:p-4 pb-[max(16px,env(safe-area-inset-bottom))] max-w-[1800px] mx-auto w-full box-border overflow-hidden; }
            .custom-scrollbar::-webkit-scrollbar { @apply w-1.5 h-1.5; }
            .custom-scrollbar::-webkit-scrollbar-thumb { @apply bg-slate-300 rounded-full; }
            .m3-card { @apply bg-white rounded-2xl shadow-sm border border-slate-200 p-4 md:p-6 flex flex-col overflow-hidden min-h-0; }
            .m3-btn-primary { @apply bg-blue-600 text-white px-6 py-3 rounded-xl font-black hover:bg-blue-700 active:scale-95 transition-all shadow-md shadow-blue-200 flex items-center justify-center gap-2 disabled:opacity-50 text-sm whitespace-nowrap; }
            .m3-btn-secondary { @apply bg-white text-slate-600 border border-slate-300 px-6 py-3 rounded-xl font-black hover:bg-slate-50 active:scale-95 transition-all flex items-center justify-center gap-2 text-sm whitespace-nowrap; }
            .m3-input { @apply p-2 bg-slate-50 border border-slate-200 rounded-lg outline-none focus:border-blue-500 focus:bg-white font-bold text-xs transition-colors w-full; }
            .step-dot { @apply h-2 w-2 rounded-full transition-all duration-300 bg-slate-200; }
            .step-dot.active { @apply bg-blue-600 w-8; }
            .fade-in { animation: fadeIn 0.2s ease-out forwards; }
            @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
            .dash-cell { @apply min-h-[50px] p-1 border-r border-b border-slate-200 flex flex-col items-center justify-center gap-0.5 relative bg-white transition-colors cursor-pointer hover:bg-blue-50; }
        }
    </style>
</head>
<body>

<div id="toast" class="fixed top-4 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full shadow-xl font-bold text-sm flex items-center gap-2 z-[9999] transition-all opacity-0 pointer-events-none">
    <span id="toast-msg"></span>
</div>

<div id="app-container">
    <header class="flex items-center justify-between mb-3 shrink-0 px-2">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-blue-200 shrink-0">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            </div>
            <div>
                <h1 class="text-xl font-black tracking-tight leading-none text-slate-800">Smart TimeTable</h1>
                <p class="text-[10px] font-bold text-indigo-500 uppercase tracking-widest leading-tight">Next Gen (Stable 13.24)</p>
            </div>
        </div>
        <div class="flex items-center gap-2 shrink-0">
            <button onclick="actions.exportData()" class="text-xs font-bold text-slate-500 hover:text-blue-600 px-3 py-1.5 bg-white border border-slate-200 rounded-lg shadow-sm transition-colors">JSON出力</button>
            <button onclick="actions.importData()" class="text-xs font-bold text-slate-500 hover:text-blue-600 px-3 py-1.5 bg-white border border-slate-200 rounded-lg shadow-sm transition-colors">JSON読込</button>
            <button onclick="actions.resetData()" class="text-xs font-bold text-rose-500 hover:text-rose-700 px-3 py-1.5 bg-rose-50 border border-rose-100 rounded-lg transition-colors ml-2">リセット</button>
        </div>
    </header>

    <div class="m3-card flex-1 flex flex-col min-h-0 relative">
        <div class="flex items-center justify-between mb-4 shrink-0 border-b border-slate-100 pb-4">
            <h2 id="step-title" class="text-lg font-black text-slate-800"></h2>
            <div id="progress-dots" class="flex gap-1.5 flex-wrap justify-center"></div>
        </div>
        <div id="step-content" class="fade-in flex-1 overflow-hidden flex flex-col relative min-h-0"></div>
        <div class="flex justify-between items-center mt-4 pt-4 border-t border-slate-100 shrink-0">
            <button id="btn-prev" class="m3-btn-secondary w-[120px]">戻る</button>
            <button id="btn-next" class="m3-btn-primary w-[180px]"><span id="btn-next-text">次へ進む</span></button>
        </div>
    </div>
</div>

<div id="modal-overlay" class="fixed inset-0 z-[150] flex items-center justify-center hidden p-4 bg-slate-900/60 backdrop-blur-sm">
    <div class="bg-white rounded-2xl p-6 max-w-2xl w-full shadow-2xl flex flex-col" id="modal-body"></div>
</div>

<div id="loading-overlay" class="fixed inset-0 bg-slate-900/80 backdrop-blur-sm z-[200] hidden items-center justify-center flex-col gap-4 transition-all">
    <div class="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
    <div class="text-white text-center">
        <h3 class="text-lg font-black tracking-widest mb-1" id="loading-title">処理中...</h3>
        <p class="text-blue-200 font-bold text-xs" id="loading-desc">しばらくお待ちください</p>
    </div>
</div>

<script>
    // --- 1. 定数と初期データ（定義順を最優先に修正） ---
    const GRADES = [1, 2, 3, 4, 5, 6];
    const DAYS = ['月', '火', '水', '木', '金'];
    const PERIODS = [1, 2, 3, 4, 5, 6];
    const MAX_STEPS = 10;
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzk7FOx-EuX906szB8GmGsrMLxlESbc0bn2hFWq0XFFyHECZCDWLZzRbrmoi5vlBvVoHA/exec";

    const initialRooms = [{id:'r1', name:'校庭', capacity:2, ngTimes:{}}, {id:'r2', name:'体育館', capacity:2, ngTimes:{}}, {id:'r3', name:'理科室', capacity:1, ngTimes:{}}, {id:'r4', name:'音楽室', capacity:1, ngTimes:{}}, {id:'r5', name:'図工室', capacity:1, ngTimes:{}}, {id:'r6', name:'家庭科室', capacity:1, ngTimes:{}}, {id:'r7', name:'外国語教室', capacity:1, ngTimes:{}}, {id:'r8', name:'図書室', capacity:1, ngTimes:{}}];
    const initialSubjects = [{ id:'s1', name:'国語', stdHours:{1:9, 2:9, 3:7, 4:7, 5:5, 6:5}, defaultRoom:'通常教室' }, { id:'s2', name:'社会', stdHours:{1:0, 2:0, 3:2, 4:2, 5:3, 6:3}, defaultRoom:'通常教室' }, { id:'s3', name:'算数', stdHours:{1:4, 2:5, 3:5, 4:5, 5:5, 6:5}, defaultRoom:'通常教室' }, { id:'s4', name:'理科', stdHours:{1:0, 2:0, 3:3, 4:3, 5:3, 6:3}, defaultRoom:'理科室' }, { id:'s5', name:'生活', stdHours:{1:3, 2:3, 3:0, 4:0, 5:0, 6:0}, defaultRoom:'通常教室' }, { id:'s6', name:'音楽', stdHours:{1:2, 2:2, 3:2, 4:2, 5:2, 6:2}, defaultRoom:'音楽室' }, { id:'s7', name:'図工', stdHours:{1:2, 2:2, 3:2, 4:2, 5:2, 6:2}, defaultRoom:'図工室' }, { id:'s8', name:'家庭', stdHours:{1:0, 2:0, 3:0, 4:0, 5:2, 6:2}, defaultRoom:'家庭科室' }, { id:'s9', name:'中体育', stdHours:{1:1, 2:1, 3:1, 4:1, 5:1, 6:1}, defaultRoom:'体育館' }, { id:'s10', name:'外体育', stdHours:{1:2, 2:2, 3:2, 4:2, 5:2, 6:2}, defaultRoom:'校庭' }, { id:'s11', name:'道徳', stdHours:{1:1, 2:1, 3:1, 4:1, 5:1, 6:1}, defaultRoom:'通常教室' }, { id:'s12', name:'外国語', stdHours:{1:0, 2:0, 3:1, 4:1, 5:2, 6:2}, defaultRoom:'外国語教室' }, { id:'s13', name:'総合', stdHours:{1:0, 2:0, 3:1, 4:1, 5:2, 6:2}, defaultRoom:'通常教室' }, { id:'s14', name:'学活', stdHours:{1:1, 2:1, 3:1, 4:1, 5:1, 6:1}, defaultRoom:'通常教室' }, { id:'s15', name:'たまいち', stdHours:{1:1, 2:1, 3:1, 4:1, 5:1, 6:1}, defaultRoom:'通常教室' }];
    const defaultAdvancedRules = { lastPeriodSubjects: [], continuousClasses: [], limitContinuousToSpecificPeriods: true, homeroomOnlyTimes: [], limitOneSubjectPerDay: true, avoidSpecialistTimes: [], maxIntervalSubjects: [], avoidPeTimes: [], amPrioritySubjects: [], consecutiveGradeSubjects: [] };

    const stepTitles = ["1. 基本設定", "2. 行事・不可枠", "3. 教科と教室", "4. 教員名簿", "5. 特殊授業", "6. クラス別担当", "7. 教員別確認", "8. 配置ルール", "9. 最終点検", "10. ダッシュボード"];

    // --- 2. 状態管理（State） ---
    let state = {
        periods: GRADES.reduce((acc, g) => ({ ...acc, [g]: {月:5,火:5,水:4,木:5,金:5} }), {}),
        grades: { 1:3, 2:3, 3:3, 4:3, 5:3, 6:3 },
        rooms: JSON.parse(JSON.stringify(initialRooms)),
        subjects: JSON.parse(JSON.stringify(initialSubjects)),
        teachers: [], globalBlocks: {}, specialBlocks: [], classAssignments: {}, 
        advancedRules: JSON.parse(JSON.stringify(defaultAdvancedRules)),
        generatedSchedule: null, unassigned: [],
        dashView: 'all', dashFilter: '1-1', 
        subjectsUndoStack: [], undoStack: [], conflicts: [], selectedDashCell: null, selectedUnassignedIndex: null, editingTeacherNameId: null, selectedTeacherId: null
    };

    // --- 3. ユーティリティ ---
    const showToast = (msg, type="info", timeout=3000) => { const t = document.getElementById('toast'); t.className = `fixed top-4 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-full shadow-xl font-bold text-sm z-[9999] transition-all opacity-100 ${type==="success"?"bg-emerald-600 text-white":"bg-rose-600 text-white"}`; document.getElementById('toast-msg').innerText = msg; setTimeout(() => t.classList.replace('opacity-100', 'opacity-0'), timeout); };
    const showLoading = (title, desc) => { document.getElementById('loading-title').innerText = title; document.getElementById('loading-desc').innerText = desc; document.getElementById('loading-overlay').classList.replace('hidden', 'flex'); };
    const hideLoading = () => document.getElementById('loading-overlay').classList.replace('flex', 'hidden');
    const save = () => localStorage.setItem('tt_v13_data', JSON.stringify(state));

    const sanitizeState = (p) => {
        if (!p) return;
        ['globalBlocks', 'periods', 'grades', 'selectedTeacherId', 'dashView', 'dashFilter', 'generatedSchedule', 'unassigned', 'teachers', 'specialBlocks', 'classAssignments'].forEach(k => { if(p[k] !== undefined) state[k] = p[k]; });
        if (p.subjects) state.subjects = p.subjects;
        if (p.rooms) state.rooms = p.rooms;
        if (p.advancedRules) state.advancedRules = { ...JSON.parse(JSON.stringify(defaultAdvancedRules)), ...p.advancedRules };
    };

    const load = () => {
        const s = localStorage.getItem('tt_v13_data');
        if (s) { try { sanitizeState(JSON.parse(s)); } catch(e) { console.error(e); } }
        initClassAssignments();
        render();
    };

    const initClassAssignments = () => { Object.keys(state.grades).forEach(g => { const n = parseInt(state.grades[g]) || 1; for(let i=1; i<=n; i++) { const cls = `${g}-${i}`; if(!state.classAssignments[cls]) state.classAssignments[cls] = { homeroom: '', overrides: {} }; } }); };
    const getTeacherLoads = () => { const loads = {}; state.teachers.forEach(t => loads[t.id] = 0); Object.keys(state.classAssignments).forEach(cls => { const grade = cls.split('-')[0]; const data = state.classAssignments[cls]; state.subjects.forEach(sub => { const hours = parseInt(sub.stdHours[grade]) || 0; if (hours === 0 || (state.specialBlocks && state.specialBlocks.some(b => b.subjectId === sub.id && b.targets.includes(cls)))) return; const tId = data.overrides[sub.id]?.teacherId || data.homeroom; if (tId && loads[tId] !== undefined) loads[tId] += hours; }); }); (state.specialBlocks || []).forEach(b => { b.teachers.forEach(bt => { if (loads[bt.id] !== undefined) loads[bt.id] += (parseInt(bt.hours) || 0); }); }); return loads; };

    // --- 4. 描画 (View Functions) ---
    const buildGrid = (ngMap, globalBlocksMap, actionStr, cellType = 'teacher') => { 
        let html = `<div class="overflow-x-auto w-full custom-scrollbar min-h-0"><table class="border-separate border-spacing-1 table-fixed w-max mx-auto"><thead><tr><th class="w-8"></th>${DAYS.map(d=>`<th class="text-center text-xs font-black text-slate-400 w-9">${d}</th>`).join('')}</tr></thead><tbody>`; 
        PERIODS.forEach(p => { html += `<tr><td class="text-right pr-2 text-[10px] font-bold text-slate-400">${p}限</td>${DAYS.map(d => { const k = `${d}-${p}`; const gl = globalBlocksMap?.[k]; const ng = ngMap?.[k]; let cls = 'w-8 h-8 border rounded-lg flex items-center justify-center cursor-pointer font-bold text-xs transition-colors ', icon = '〇', click = ''; if (cellType === 'global') { if (gl) { cls += 'bg-slate-800 border-slate-800 text-white shadow-md'; icon = '■'; } else { cls += 'bg-white border-slate-200 text-slate-200 hover:bg-blue-50'; } click = `onclick="${actionStr.replace('__KEY__', k)}"`; } else { if (gl) { cls += 'bg-slate-100 border-slate-200 cursor-not-allowed text-slate-300'; icon = '■'; } else if (ng) { cls += 'bg-rose-50 border-rose-300 text-rose-500 hover:bg-rose-100 shadow-inner'; icon = '✕'; click = `onclick="${actionStr.replace('__KEY__', k)}"`; } else { cls += 'bg-white border-slate-200 text-slate-200 hover:bg-blue-50'; click = `onclick="${actionStr.replace('__KEY__', k)}"`; } } html += `<td class="p-0"><div ${click} class="${cls}">${icon}</div></td>`; }).join('')}</tr>`; }); 
        return html + `</tbody></table></div>`; 
    };

    const viewStep1 = () => `
        <div class="flex flex-col gap-6 h-full overflow-y-auto custom-scrollbar pr-2" id="step1-scroll">
            <div class="bg-slate-50 rounded-2xl p-4 border border-slate-200 shadow-inner"><h3 class="font-black text-sm mb-3">学級数の設定</h3><div class="grid grid-cols-3 md:grid-cols-6 gap-3">${GRADES.map(g => `<div class="bg-white p-3 rounded-xl border border-slate-200 shadow-sm flex flex-col items-center"><span class="text-slate-500 font-bold text-xs mb-2">${g}年</span><div class="flex items-center gap-2"><button onclick="state.grades[${g}]=Math.max(1, (parseInt(state.grades[${g}])||1)-1);render()" class="w-6 h-6 rounded bg-slate-100 hover:bg-slate-200 font-black text-slate-500">-</button><span class="text-xl font-black text-blue-600 w-6 text-center">${state.grades[g]}</span><button onclick="state.grades[${g}]=Math.min(10, (parseInt(state.grades[${g}])||1)+1);render()" class="w-6 h-6 rounded bg-slate-100 hover:bg-slate-200 font-black text-slate-500">+</button></div></div>`).join('')}</div></div>
            <div class="bg-slate-50 rounded-2xl p-4 border border-slate-200 shadow-inner"><h3 class="font-black text-sm mb-3">時数設定</h3><div class="overflow-x-auto"><table class="w-full text-xs text-center border-collapse min-w-[500px]"><thead><tr><th class="p-2 border-b text-slate-500">学年</th>${DAYS.map(d=>`<th class="p-2 border-b font-black text-slate-700">${d}曜</th>`).join('')}</tr></thead><tbody>${GRADES.map(g => `<tr><td class="p-2 font-bold border-b text-slate-600">${g}年</td>${DAYS.map(d => `<td class="p-2 border-b"><div class="flex items-center justify-center gap-2"><button onclick="actions.updatePeriod(${g}, '${d}', -1)" class="w-7 h-7 bg-white shadow-sm border border-slate-200 hover:bg-slate-50 rounded-lg font-black text-slate-500 transition-colors">-</button><span class="w-5 text-center font-black text-blue-600 text-base">${state.periods[g][d]}</span><button onclick="actions.updatePeriod(${g}, '${d}', 1)" class="w-7 h-7 bg-white shadow-sm border border-slate-200 hover:bg-slate-50 rounded-lg font-black text-slate-500 transition-colors">+</button></div></td>`).join('')}</tr>`).join('')}</tbody></table></div></div>
        </div>`;

    const viewStep2 = () => `<div class="flex flex-col items-center justify-center h-full text-center space-y-4"><h2 class="text-xl font-black">行事・全校不可枠設定</h2><p class="text-xs text-slate-500 max-w-md">学校全体で授業を入れない時間帯を設定します。</p><div class="bg-slate-50 border border-slate-200 rounded-3xl p-4 shadow-inner">${buildGrid(null, state.globalBlocks, `actions.toggleBlock('__KEY__')`, 'global')}</div></div>`;
    const viewStep3 = () => { let rmOpts = `<option value="通常教室">通常教室</option>`; state.rooms.forEach(r => { rmOpts += `<option value="${r.name}">${r.name}</option>`; }); const totals = GRADES.reduce((acc, g) => ({...acc, [g]: state.subjects.reduce((s, sub) => s + (parseInt(sub.stdHours[g])||0), 0)}), {}); let html = `<div class="flex flex-col md:flex-row gap-4 h-full"><div class="w-full md:w-1/4 flex flex-col bg-slate-50 rounded-2xl border border-slate-200 p-3 h-1/3 md:h-full"><div class="flex justify-between items-center mb-3"><h3 class="font-black text-xs">特別教室</h3><div class="flex gap-1.5"><button onclick="actions.openBulk('rooms')" class="text-[10px] bg-white border border-slate-200 px-2 py-1 rounded-md font-bold">一括</button><button onclick="state.rooms.push({id:'r_'+Date.now(), name:'新規教室', capacity:1, ngTimes:{}});render()" class="text-[10px] bg-blue-50 text-blue-600 border px-2 py-1 rounded-md font-bold">+ 追加</button></div></div><div class="flex-1 overflow-y-auto custom-scrollbar space-y-1.5 pr-1">`; state.rooms.forEach(r => { html += `<div class="flex items-center gap-1 bg-white p-1.5 rounded-lg border shadow-sm"><input type="text" value="${r.name}" onchange="actions.updateRoomName('${r.id}', this.value)" class="flex-1 min-w-0 text-xs font-bold outline-none"><div class="flex items-center gap-0.5 ml-1"><span class="text-[8px] text-slate-400 font-bold">枠:</span><input type="number" value="${r.capacity||1}" onchange="actions.updateRoomCapacity('${r.id}', parseInt(this.value)||1)" min="1" class="w-8 text-xs font-black text-center bg-slate-50 rounded p-1 border"></div><button onclick="actions.removeRoom('${r.id}')" class="text-slate-300 hover:text-rose-500 font-bold px-1 ml-1">✕</button></div>`; }); html += `</div></div><div class="flex-1 flex flex-col bg-slate-50 rounded-2xl border border-slate-200 p-3 h-2/3 md:h-full overflow-hidden"><div class="flex justify-between items-center mb-3"><h3 class="font-black text-xs">科目時数</h3><button onclick="actions.addSubject('新規教科')" class="text-[10px] bg-blue-600 text-white px-3 py-1.5 rounded-md font-bold shadow-sm hover:bg-blue-700">+ 新規教科</button></div><div class="flex-1 overflow-auto custom-scrollbar pr-1 relative border border-slate-200 rounded-xl bg-white"><table class="w-full text-xs text-center border-collapse min-w-[700px]"><thead class="sticky top-0 bg-slate-100 z-10 shadow-sm"><tr><th class="p-2 border-r text-left pl-3 w-28">科目名</th><th class="p-2 border-r w-24">教室</th>`; GRADES.forEach(g => { html += `<th class="p-2 border-r">${g}年</th>`; }); html += `<th class="w-12"></th></tr></thead><tbody>`; state.subjects.forEach(s => { const rmSelected = rmOpts.replace(`value="${s.defaultRoom||'通常教室'}"`, `value="${s.defaultRoom||'通常教室'}" selected`); html += `<tr class="border-b border-slate-100 hover:bg-slate-50"><td class="p-1 border-r"><input type="text" value="${s.name}" onchange="actions.updateSubject('${s.id}', 'name', this.value)" class="m3-input !p-1.5 w-full font-bold bg-transparent border-transparent focus:bg-white shadow-none"></td><td class="p-1 border-r"><select onchange="actions.updateSubject('${s.id}', 'defaultRoom', this.value)" class="m3-input !p-1.5 text-[10px] w-full bg-transparent border-transparent cursor-pointer shadow-none">${rmSelected}</select></td>`; GRADES.forEach(g => { html += `<td class="p-1 border-r"><div class="flex items-center justify-center gap-1"><button onclick="actions.updateSubjectHour('${s.id}', ${g}, -1)" class="w-5 h-5 bg-slate-100 rounded text-slate-500 font-black">-</button><span class="w-4 text-center font-black text-blue-600">${s.stdHours[g]||0}</span><button onclick="actions.updateSubjectHour('${s.id}', ${g}, 1)" class="w-5 h-5 bg-slate-100 rounded text-slate-500 font-black">+</button></div></td>`; }); html += `<td><div class="flex items-center justify-center gap-1"><button onclick="actions.cloneSubject('${s.id}')" title="複製" class="text-blue-400 p-1 font-bold">📋</button><button onclick="actions.removeSubject('${s.id}')" class="text-slate-300 hover:text-rose-500 p-1 font-bold">✕</button></div></td></tr>`; }); html += `</tbody></table></div></div></div>`; return html; };

    document.getElementById('btn-next').onclick = () => { if (currentStep === 9) actions.startGeneration(); else if (currentStep < MAX_STEPS) { currentStep++; render(); } else actions.exportToSpreadsheet(); };
    document.getElementById('btn-prev').onclick = () => { if(currentStep>1) { currentStep--; render(); } };
    document.addEventListener('DOMContentLoaded', load);
</script>
</body>
</html>
